reliance on ad-hoc assistance. 4) Implement first wave of assistance-pattern optimisation at Isibonelo (and one other hotspot, likely Carolina), removing clearly redundant assistance hours while maintaining a small buffer. 5) Apply initial capacity target recalibration at Wildfontein and Rustenburg OC to reflect new achievable productivity and availability levels, informing redeployment planning for the next quarter."}, {"ph": 3, "d": "Phase 3 (Q3): Consolidate gains and adjust fleet structure. 1) Push remaining productivity gaps towards 85% on all targeted MMUs, focusing on process bottlenecks (queue times, loading cycle times, in-pit delays). 2) Roll out refined assistance-pattern optimisation across all three hotspot sites (Isibonelo, Carolina, Dorstfontein), using Q1-Q2 data to safely reduce assistance dependency and free up up to 3-5 MMUs for redeployment within the 15-per-quarter limit. 3) Implement full capacity target recalibration across the affected sites, using actual performance data to set sustainable targets and identify structurally under-utilised units for redeployment or retirement (up to 5). 4) Reinvest part of the realised savings (cost plus margin improvement) into targeted training and minor capex (e.g., loading system upgrades) where ROI is highest."}, {"ph": 4, "d": "Phase 4 (Q4): Optimise portfolio and embed continuous improvement. 1) Fine-tune productivity and availability performance, focusing on sustaining 80-85% productivity and 90%+ availability on key MMUs (Wildfontein cluster, Rustenburg OC, Isibonelo). 2) Lock in optimised assistance patterns as the new standard, with clear triggers for temporary assistance increases during peak campaigns. 3) Review fleet structure vs. demand: based on a full year of data, confirm any further redeployments or retirements needed for the next cycle, ensuring alignment with the 15/5 quarterly constraints. 4) Institutionalise best practices from Wildfontein and Isibonelo as standard operating models for other sites, using them as reference cases for future productivity and availability programmes."}], "sb": {"Operations": "For Operations, this portfolio is a high-impact, site-focused play, especially at Wildfontein and Isibonelo. The main operational challenge will be managing change without disrupting daily blasting commitments. Prioritise sequencing: stabilise availability (MMU-761, 760, 705) before pushing aggressive productivity targets. At Wildfontein, treat MMU-752, 717, 731, and 754 as a single improvement cell-standardise procedures, It is recommended to align shift patterns, and coordinate with the mine to reduce queuing and non-productive travel. At Isibonelo, link MMU-758's productivity plan directly to assistance-pattern changes so that as the unit becomes more reliable and productive, It is possible to safely reduce external assistance without risking missed blasts. The capacity target recalibration should be used to negotiate realistic but stretching commitments with the mines, and to justify redeployment of under-utilised units to Carolina and Dorstfontein within the 15-per-quarter limit.", "Finance": "For Finance, Diversity_2 delivers a strong margin-focused return: margin improvement plus direct cost reductions, with most value coming from productivity improvements rather than capex. The key is to track realised vs. upside by lever and by site, especially at Wildfontein (strong potential from four MMUs) and availability actions (material). It is expected that some short-term cost upticks in Q1-Q2 (planned maintenance downtime, training, possible temporary assistance) that should be more than offset by increased tonnes and reduced breakdown costs from Q2 onwards. Capacity target recalibration will influence depreciation allocation and unit cost calculations; ensure financial models are updated to reflect higher utilisation on key MMUs and potential redeployments/retirements (up to 5 per quarter) so that fleet carrying costs are aligned with actual productive use.", "Maintenance": "For Maintenance, the portfolio shifts the focus from reactive to proactive reliability. The availability improvements on MMU-761 and 760 and the preventative service on MMU-705 must be tightly scheduled and executed in Q1 to avoid clashing with productivity ramp-up. These units as pilots for a more predictive maintenance regime should be used, leveraging the high risk score (0.76) on MMU-705 to refine the risk-based prioritisation. As productivity increases (especially at Wildfontein and Rustenburg OC), maintenance intervals may need adjustment to account for higher duty cycles-plan for slightly more frequent but shorter planned interventions rather than risking major breakdowns. Coordinate closely with Operations to align maintenance windows with assistance-pattern changes, ensuring that when key units are down for service, assistance or alternative capacity is pre-planned. Feed actual failure and downtime data back into the capacity target recalibration process so that future redeployment and retirement decisions reflect true lifecycle and reliability performance."}, "wf": [{"l": 1, "ip": 80.2}, {"l": 5, "ip": 13.1}, {"l": 7, "ip": 3.9}, {"l": 4, "ip": 2.7}], "tn": [{"l": 1, "avg": 10.03, "lo": 1.24, "hi": 21.07}, {"l": 5, "avg": 1.64, "lo": 0.87, "hi": 3.42}, {"l": 4, "avg": 0.91, "lo": 0.91, "hi": 0.91}, {"l": 7, "avg": 0.66, "lo": 0.66, "hi": 0.66}], "sc": [{"a": "A1_f4574d58", "p": 61.0, "rs": 0.62, "ip": 21.07, "l": 1}, {"a": "A1_074b3a74", "p": 63.0, "rs": 0.62, "ip": 17.61, "l": 1}, {"a": "A1_0b9f4048", "p": 62.0, "rs": 0.61, "ip": 16.66, "l": 1}, {"a": "A1_ae1f1a6b", "p": 65.0, "rs": 0.62, "ip": 11.11, "l": 1}, {"a": "A1_c5576793", "p": 63.0, "rs": 0.62, "ip": 5.65, "l": 1}, {"a": "A1_15f161c3", "p": 72.0, "rs": 0.61, "ip": 3.88, "l": 1}, {"a": "A5_e26677a5", "p": 70.0, "rs": 0.62, "ip": 3.42, "l": 5}, {"a": "A5_2e9335d1", "p": 70.0, "rs": 0.63, "ip": 3.21, "l": 5}, {"a": "A1_3f4c2810", "p": 74.0, "rs": 0.62, "ip": 2.99, "l": 1}, {"a": "M5_705_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.83, "l": 5}, {"a": "A1_a19de71f", "p": 73.0, "rs": 0.62, "ip": 1.24, "l": 1}, {"a": "M5_702_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.14, "l": 5}, {"a": "A4_4160ca25", "p": 55.0, "rs": 0.44, "ip": 0.91, "l": 4}, {"a": "A4_4eb01a65", "p": 55.0, "rs": 0.44, "ip": 0.91, "l": 4}, {"a": "A4_71ad48f5", "p": 55.0, "rs": 0.44, "ip": 0.91, "l": 4}, {"a": "A5_c132e079", "p": 70.0, "rs": 0.62, "ip": 0.89, "l": 5}, {"a": "M5_735_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.88, "l": 5}, {"a": "M5_785_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.88, "l": 5}, {"a": "M5_794_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.87, "l": 5}, {"a": "A7_6e4144a9", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_0bf19786", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_062fb7a9", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_2168480f", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_66b5e04e", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_3a73e26d", "p": 80.0, "rs": 0.28, "ip": 0.66, "l": 7}], "mp": 87.7}, {"id": 3, "nm": "Synergy Maximiser", "on": "Diversity_3", "st": "diversity", "ac": 25, "ld": {"1": 8, "2": 0, "3": 0, "4": 1, "5": 8, "6": 0, "7": 8, "8": 0}, "pa": "Very strong alignment. about 81% of total value is from Lever 1 productivity interventions, heavily concentrated at Wildfontein (MMU-752/717/731/754) and supported by Weilaagte and Rustenburg OC. These actions directly address idle capacity (c. 14,000t+ across top 4 MMUs) and convert it into billable tonnes, contributing materially to the group productivity potential.", "ca": "Moderate but positive. Direct cost reductions are (c. 12% of total value), mainly via better availability (Lever 5) and capacity target recalibration (Lever 7). The margin improvement indicates that improved productivity is achieved largely without proportional cost increases, improving unit economics rather than pure opex cuts.", "ks": "Wildfontein productivity + availability synergy: Concentrating productivity interventions on MMU-752/717/731/754 at Wildfontein, combined with targeted availability improvements on related support units, will unlock both higher tonnes and more reliable delivery windows. For example, moving these MMUs from 6-23% to closer to 85% productivity while maintaining 90%+ availability can yield > uplift and create surplus capacity that can reduce assistance calls from nearby sites.; Productivity + capacity target recalibration synergy: Lever 1 and Lever 7 together ensure that once MMUs are optimised, their contractual/operational capacity targets are reset to realistic, stretch-but-achievable levels. This reduces chronic underperformance penalties, aligns staffing and shift patterns, and prevents over-capitalisation on backup units. The synergy is that recalibrated targets lock in behavioural and planning changes that sustain the productivity gains.; Availability improvements enabling productivity at constrained sites: Lever 5 actions, especially on MMU-761 (74%->90% availability,) and MMU-760 (77%->90%,), create stable operating baselines so that productivity interventions (e.g., cycle-time reduction, loading pattern optimisation) can be executed without frequent breakdown interruptions. This is particularly important at sites like Isibonelo where assistance dependency is high and reliability is a key driver of assistance calls.; Preventative maintenance + redeployment potential synergy: The MaintenancePriority action on MMU-705 reduces failure risk and stabilises performance. Once availability is improved and productivity uplift is realised across the portfolio, Enaex can identify consistently underutilised or structurally low-potential units for redeployment or retirement within the quarterly caps (15 redeployments, 5 retirements), improving fleet mix without compromising service levels.", "kt": "Short-term capex/opex vs. long-term margin improvement: Achieving the targeted productivity jumps (e.g., MMU-752 from 6% to near 85%, MMU-717 from 12% to 85%) will require investment in operator training, supervision, possible minor retrofits, and process engineering. This may temporarily increase operating costs and reduce flexibility during ramp-up. However, the expected productivity value and margin improvement significantly outweigh these costs if implementation is disciplined.; Operational risk and change fatigue vs. speed of rollout: Implementing 25 actions across multiple levers in a single quarter could overload site teams, especially at Wildfontein and Isibonelo. Aggressive timelines risk poor adoption, safety incidents, or degraded service to key clients. A phased rollout (starting with the highest-value 5-7 actions) trades off maximum immediate value capture for more controlled change and lower execution risk.; Local service resilience vs. fleet consolidation potential: As productivity and availability improve, some MMUs may appear surplus. Redeploying or retiring them (within the 15 redeployment / 5 retirement caps) can reduce fixed costs, but it may also reduce local redundancy and responsiveness to unplanned peaks or client emergencies. The trade-off is between lean fleet economics and buffer capacity for service continuity.; The focus should be on Wildfontein vs. hotspot assistance sites: Concentrating interventions at Wildfontein (top 4 actions material) maximises financial return, but leaves Carolina and Dorstfontein assistance patterns largely untouched in this portfolio. Prioritising Wildfontein first may delay assistance cost reductions at those hotspots; conversely, diverting resources to hotspots too early would dilute the strong ROI available at Wildfontein.", "rp": {"Medium": 13, "High": 11, "Low": 1}, "ap": 74.0, "ar": [{"a": "A1_f4574d58", "ip": 21.21}, {"a": "A1_074b3a74", "ip": 17.73}, {"a": "A1_0b9f4048", "ip": 16.77}, {"a": "A1_ae1f1a6b", "ip": 11.18}, {"a": "A1_c5576793", "ip": 5.69}, {"a": "A1_15f161c3", "ip": 3.91}, {"a": "A5_e26677a5", "ip": 3.44}, {"a": "A5_2e9335d1", "ip": 3.23}, {"a": "A1_3f4c2810", "ip": 3.01}, {"a": "M5_705_predictive_service", "ip": 1.84}, {"a": "A1_a19de71f", "ip": 1.24}, {"a": "M5_706_predictive_service", "ip": 1.12}, {"a": "M5_709_predictive_service", "ip": 1.12}, {"a": "A4_71ad48f5", "ip": 0.91}, {"a": "M5_912_predictive_service", "ip": 0.78}, {"a": "A5_dde036c0", "ip": 0.76}, {"a": "M5_798_predictive_service", "ip": 0.75}, {"a": "A7_921671b7", "ip": 0.66}, {"a": "A7_015f5672", "ip": 0.66}, {"a": "A7_0bf19786", "ip": 0.66}, {"a": "A7_9a7839fd", "ip": 0.66}, {"a": "A7_2168480f", "ip": 0.66}, {"a": "A7_4120349c", "ip": 0.66}, {"a": "A7_97f87bef", "ip": 0.66}, {"a": "A7_3a73e26d", "ip": 0.66}], "rm": [{"ph": 1, "d": "Phase 1 (Q1): Stabilise availability and secure quick wins"}, {"ph": 2, "d": "1) Execute high-risk preventative maintenance and critical availability actions:\n- Prioritise MaintenancePriority on MMU-705 to reduce breakdown risk (predictive risk score 0.76) and protect revenue at its site.\n- It is recommended to implement availability improvements for MMU-761 (74%->90%,) and MMU-760 (77%->90%,). The focus should be on root-cause fixes: planned maintenance discipline, parts availability, and workshop scheduling.\n- Roll out basic reliability-centred maintenance (RCM) routines for the remaining Lever 5 units to lift baseline availability.\n2) Prepare for productivity interventions:\n- It is recommended to conduct time-and-motion and cycle-time studies at Wildfontein, Weilaagte, Rustenburg OC, and Isibonelo to validate the idle capacity assumptions (e.g., 3,519t for MMU-752, 3,130t for MMU-717, 2,853t for MMU-731, 2,224t for MMU-754).\n- Standardise KPIs and dashboards (tonnes per shift, blasts per day, loading time, travel time) so that productivity gains can be measured consistently.\n3) Minimal disruption principle:\n- Avoid major redeployments/retirements in Q1; This phase should be used to stabilise operations and build data confidence. Keep redeployments <5 and retirements at 0-1, focused only on clearly non-critical, high-risk units if any."}, {"ph": 3, "d": "Phase 2 (Q2): Capture core productivity value at Wildfontein and key sites"}, {"ph": 4, "d": "1) Implement top productivity interventions at Wildfontein:\n- MMU-752 (6%->target 85%,): Redesign daily schedule, reduce non-productive travel, optimise loading patterns, and assign a senior operator/mentor. Target an interim step (e.g., 50-60%) within Q2, with 85% as a 6-12 month goal.\n- MMU-717 (12%->85%,) and MMU-731 (8%->85%,): Apply the same playbook, with cross-learning between units. Consider staggered shift starts to avoid queuing at loading and blasting points.\n- MMU-754 (23%->85%,): The focus should be on eliminating micro-delays and improving coordination with drilling and blasting schedules.\n2) Extend productivity improvements to secondary sites:\n- MMU-756 at Weilaagte (16%->85%,): Introduce standard operating procedures (SOPs) from Wildfontein, focusing on turnaround times and on-bench efficiency.\n- MMU-759 at Rustenburg OC (54%->85%,): Target quick wins (route optimisation, refuelling strategy, and queue management) to push productivity above 70% as a first step.\n- MMU-758 at Isibonelo (64%->85%,): This is critical for a hotspot site. Prioritise integration with mine planning to reduce waiting time and assistance calls.\n3) Begin selective capacity target recalibration (Lever 7):\n- For MMUs where Q1-Q2 data shows sustained uplift, adjust capacity targets upward to reflect realistic performance (e.g., move from historical averages to 70-80% of the 85% target). This locks in behavioural change and supports more accurate staffing and assistance planning.\n4) Start identifying candidates for future redeployment/retirement:\n- Using improved productivity and availability data, flag MMUs that remain structurally underutilised or misaligned with site needs. Do not yet execute large moves; It is recommended to prepare a Q3 redeployment/retirement plan within the 15/5 quarterly caps."}, {"ph": 5, "d": "Phase 3 (Q3): Optimise fleet mix and assistance patterns"}, {"ph": 6, "d": "1) Consolidate gains and refine productivity interventions:\n- For Wildfontein MMUs (752/717/731/754), move from initial uplift to process standardisation: common SOPs, cross-training, and shared best practices.\n- At Isibonelo, MMU-758's improved productivity should be used to reduce reliance on assistance units. Assistance hours and costs should be tracked monthly to quantify reduction.\n2) Execute planned redeployments and retirements:\n- Based on Q1-Q2 performance, redeploy up to 10-12 underutilised MMUs from high-productivity, now self-sufficient sites to assistance-dependent hotspots (Carolina, Dorstfontein, Isibonelo) where justified by demand.\n- Up to 3-4 oldest should be retired, highest-maintenance-cost units that are consistently below utilisation thresholds, ensuring that local service levels remain acceptable.\n3) Deepen capacity target recalibration:\n- For all MMUs with stable 6-month performance data, recalibrate capacity targets to align with actual sustainable productivity and availability. This may include lowering unrealistic targets at structurally constrained sites and raising them where process improvements have unlocked more capacity.\n4) Refine assistance pattern optimisation (Lever 4):\n- The single assistance-pattern action as a pilot should be used to redesign how assistance is requested, scheduled, and billed. Apply learnings to other hotspots, focusing on reducing ad-hoc assistance and replacing it with planned, high-productivity support."}, {"ph": 7, "d": "Phase 4 (Q4): Institutionalise best practices and prepare next portfolio"}, {"ph": 8, "d": "1) Standardise operating model across fleet:\n- Codify the Wildfontein and Isibonelo playbooks into group-wide standards: productivity KPIs, maintenance intervals, shift structures, and assistance rules.\n- It is recommended to implement a continuous improvement loop with monthly performance reviews and quarterly recalibration of targets.\n2) Optimise cost base and fleet size:\n- Based on a full year of data, It is recommended to execute the remaining redeployments (up to the 15-per-quarter cap) and retirements (up to 5) to right-size the fleet for 2027 planning.\n- Quantify and lock in the cost reductions and margin improvement in budgets and contracts.\n3) Risk and resilience review:\n- Assess whether improved productivity and availability have reduced operational risk (fewer breakdowns, fewer emergency assistance events). Where risk remains high, It is recommended to plan additional maintenance or redundancy.\n4) Design next-generation portfolio:\n- Insights from Diversity_3 should be used to shape the next optimisation portfolio, with a stronger explicit focus on Carolina and Dorstfontein assistance patterns while maintaining gains at Wildfontein, Weilaagte, Rustenburg OC, and Isibonelo."}], "sb": {"Operations": "For the Operations Manager, this portfolio is a lever to significantly increase tonnes per MMU without adding new units. Focus operationally on Wildfontein first: MMU-752/717/731/754 have very low current productivity (6-23%) and large idle capacity (c. 11,700t combined), offering > uplift if It is possible to redesign daily operations. Prioritise: (1) stabilising availability (MMU-761/760 and MMU-705 service) in Q1 so that productivity initiatives are not undermined by breakdowns; (2) implementing standardised productivity routines in Q2 (cycle-time reduction, queue management, better coordination with drilling/blasting); and (3) using the improved performance to reduce dependence on assistance at Isibonelo and, later, Carolina and Dorstfontein. Be cautious about change fatigue: sequence interventions so that each site has a clear 90-day focus, and ensure supervisors are trained to manage the new KPIs and routines.", "Finance": "For the Finance Controller, Diversity_3 offers a strong financial case: total value with margin improvement and direct cost reductions. Around 80% of value is from productivity uplift, which improves revenue and margin per MMU rather than just cutting costs. The main financial levers are: (1) prioritising the top 6-7 actions (Wildfontein MMUs 752/717/731/754, Weilaagte 756, Rustenburg OC 759, and availability improvements for 761/760) to secure about 70-75% of the portfolio value early; (2) using capacity target recalibration to align budgets and performance expectations, reducing variance and write-offs from unrealistic plans; and (3) planning redeployments/retirements in Q3-Q4 to structurally lower fixed costs while staying within the 15 redeployment / 5 retirement caps. It is advisable to expect some upfront opex and minor capex for training and maintenance in Q1-Q2; ensure these are ring-fenced and tracked against realised uplift to validate ROI.", "Maintenance": "For the Maintenance Lead, this portfolio underscores the importance of reliability as an enabler of productivity. The immediate priority is to address high-risk units: It is recommended to schedule the preventative M8 service for MMU-705 (risk score 0.76) and execute availability improvements for MMU-761 and MMU-760 to move them toward 90% availability. Standardise preventative maintenance intervals and parts planning across the eight Lever 5 actions to reduce unplanned downtime. As productivity increases at Wildfontein, Weilaagte, Rustenburg OC, and Isibonelo, maintenance windows will need to be carefully planned to avoid disrupting high-utilisation schedules-consider night-shift or off-peak servicing where feasible. Q1-Q2 data should be used to identify chronic problem units that may be better candidates for retirement or redeployment in Q3-Q4, thereby reducing maintenance burden and focusing resources on high-value, high-availability MMUs. Close collaboration with Operations will be essential to synchronise maintenance plans with the new productivity-focused operating model."}, "wf": [{"l": 1, "ip": 80.7}, {"l": 5, "ip": 13.0}, {"l": 7, "ip": 5.3}, {"l": 4, "ip": 0.9}], "tn": [{"l": 1, "avg": 10.09, "lo": 1.24, "hi": 21.21}, {"l": 5, "avg": 1.63, "lo": 0.75, "hi": 3.44}, {"l": 4, "avg": 0.91, "lo": 0.91, "hi": 0.91}, {"l": 7, "avg": 0.66, "lo": 0.66, "hi": 0.66}], "sc": [{"a": "A1_f4574d58", "p": 61.0, "rs": 0.62, "ip": 21.21, "l": 1}, {"a": "A1_074b3a74", "p": 63.0, "rs": 0.62, "ip": 17.73, "l": 1}, {"a": "A1_0b9f4048", "p": 62.0, "rs": 0.61, "ip": 16.77, "l": 1}, {"a": "A1_ae1f1a6b", "p": 65.0, "rs": 0.62, "ip": 11.18, "l": 1}, {"a": "A1_c5576793", "p": 63.0, "rs": 0.62, "ip": 5.69, "l": 1}, {"a": "A1_15f161c3", "p": 72.0, "rs": 0.61, "ip": 3.91, "l": 1}, {"a": "A5_e26677a5", "p": 70.0, "rs": 0.62, "ip": 3.44, "l": 5}, {"a": "A5_2e9335d1", "p": 70.0, "rs": 0.63, "ip": 3.23, "l": 5}, {"a": "A1_3f4c2810", "p": 74.0, "rs": 0.62, "ip": 3.01, "l": 1}, {"a": "M5_705_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.84, "l": 5}, {"a": "A1_a19de71f", "p": 73.0, "rs": 0.62, "ip": 1.24, "l": 1}, {"a": "M5_706_predictive_service", "p": 80.0, "rs": 0.41, "ip": 1.12, "l": 5}, {"a": "M5_709_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.12, "l": 5}, {"a": "A4_71ad48f5", "p": 55.0, "rs": 0.44, "ip": 0.91, "l": 4}, {"a": "M5_912_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.78, "l": 5}, {"a": "A5_dde036c0", "p": 70.0, "rs": 0.61, "ip": 0.76, "l": 5}, {"a": "M5_798_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.75, "l": 5}, {"a": "A7_921671b7", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_015f5672", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_0bf19786", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_9a7839fd", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_2168480f", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_4120349c", "p": 80.0, "rs": 0.38, "ip": 0.66, "l": 7}, {"a": "A7_97f87bef", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_3a73e26d", "p": 80.0, "rs": 0.28, "ip": 0.66, "l": 7}], "mp": 88.2}, {"id": 4, "nm": "Adaptive Fleet Mix", "on": "Diversity_4", "st": "diversity", "ac": 25, "ld": {"1": 8, "2": 0, "3": 0, "4": 1, "5": 8, "6": 0, "7": 8, "8": 0}, "pa": "Very strong alignment. (81% of total value) comes from 8 productivity interventions, heavily concentrated at Wildfontein (MMU-752/717/731/754) and supported by Weilaagte and Rustenburg OC. These actions directly address the group-wide productivity potential and unlock more than 12,000t of idle capacity at Wildfontein alone, materially improving tonnes per MMU and revenue per unit.", "ca": "Moderate but positive. Direct cost reductions are (12% of value), but the main economic benefit is margin improvement via better asset utilization. By lifting productivity and availability, fixed and semi-fixed costs per tonne fall by an estimated 8-12% on the affected units, even if explicit cost-out levers are limited in this portfolio.", "ks": "Wildfontein productivity + availability synergy: Coordinated productivity interventions on MMU-752, 717, 731, and 754 at Wildfontein, combined with targeted availability improvements on their supporting workshop and spares processes, can convert idle capacity (more than 11,700t combined) into reliable production. This creates a compounding effect: each 10% productivity gain on these four units, when supported by stable availability, can conservatively add per annum beyond the base case, while also reducing the need for assistance units from other sites.; Productivity + capacity target recalibration synergy: Aligning capacity targets (Lever 7) with the new, higher productivity expectations on MMU-752/717/731/754/756/759 and MMU-758 at Isibonelo creates a self-reinforcing loop. Clear, realistic but stretched targets drive operator behavior and shift-planning discipline; when combined with operational availability improvements (MMU-760/761 and maintenance on MMU-705), this can reduce idle time and micro-delays by 5-10%, effectively turning soft behavioral changes into hard financial gains.; Availability + assistance pattern optimization synergy: Improving availability on MMU-760/761 and ensuring preventative maintenance on MMU-705 reduces breakdown frequency and duration, which in turn lowers the need for assistance trucks and inter-site support. When paired with the single assistance-pattern optimization action (Lever 4), Enaex can reconfigure assistance routes and standby patterns, freeing up 0.5-1.0 MMU-equivalents of capacity that can be redeployed to hotspot sites like Carolina, Dorstfontein, or Isibonelo in later quarters.; Isibonelo hotspot + productivity uplift synergy: The productivity intervention on MMU-758 at Isibonelo (64%->85%) directly supports a known hotspot with high assistance dependency. As MMU-758's productivity increases, the site's reliance on external assistance should drop by an estimated 15-25%, which can then be captured in future quarters as explicit cost reductions and/or redeployments from Isibonelo to other constrained sites.", "kt": "Execution bandwidth vs value capture: Implementing 25 actions across four levers in one cycle risks dilution of focus, especially at Wildfontein where four high-value MMUs (752/717/731/754) all require behavioral, planning, and possibly minor configuration changes. If execution resources (site supervisors, trainers, planners, maintenance) are stretched, the realized uplift may be 60-70% of theoretical value. A phased rollout focusing first on the top 4-6 MMUs could trade off speed for higher realization (e.g., 80-90% of theoretical value on priority units).; Short-term maintenance downtime vs availability gains: Availability improvements on MMU-760/761 and the preventative service on MMU-705 will require planned downtime. In the short term (1-2 weeks), this may reduce available capacity by 5-10% on those units and could increase assistance needs temporarily. The trade-off is a medium-term gain of about 13-16 percentage points in availability, worth material annually and lower breakdown risk. Poorly scheduled interventions could create production bottlenecks and erodes operator confidence.; Productivity stretch targets vs operator fatigue and safety: Moving MMU-752 from 6% to 85% and similar large jumps for MMU-717/731/754 are aggressive. If not supported with realistic ramp-up curves, additional staffing or shift redesign, and clear safety guardrails, there is a risk of operator fatigue, shortcuts, and safety incidents. A more gradual ramp (e.g., 6->40->60->85% over 2-3 quarters) may slightly delay full value realization (by in Q1-Q2) but materially reduces safety and turnover risk.; Local optimization vs group-wide redeployment strategy: This portfolio focuses on improving productivity and availability in situ rather than redeploying or retiring MMUs. While this is low-disruption, it may delay structural decisions where some MMUs are fundamentally surplus to medium-term demand. The trade-off is between near-term margin improvement at current sites and potentially larger, longer-term value from redeploying 1-2 high-performing units to more constrained or higher-margin contracts, within the group limit of 15 redeployments and 5 retirements per quarter.", "rp": {"Medium": 15, "High": 10}, "ap": 74.0, "ar": [{"a": "A1_f4574d58", "ip": 21.33}, {"a": "A1_074b3a74", "ip": 17.83}, {"a": "A1_0b9f4048", "ip": 16.86}, {"a": "A1_ae1f1a6b", "ip": 11.24}, {"a": "A1_c5576793", "ip": 5.72}, {"a": "A1_15f161c3", "ip": 3.93}, {"a": "A5_e26677a5", "ip": 3.46}, {"a": "A5_2e9335d1", "ip": 3.25}, {"a": "A1_3f4c2810", "ip": 3.03}, {"a": "M5_705_predictive_service", "ip": 1.86}, {"a": "A1_a19de71f", "ip": 1.25}, {"a": "M5_708_predictive_service", "ip": 1.04}, {"a": "M5_704_predictive_service", "ip": 0.96}, {"a": "A4_4160ca25", "ip": 0.92}, {"a": "A7_6e4144a9", "ip": 0.67}, {"a": "A7_921671b7", "ip": 0.67}, {"a": "A7_015f5672", "ip": 0.67}, {"a": "A7_062fb7a9", "ip": 0.67}, {"a": "A7_9a7839fd", "ip": 0.67}, {"a": "A7_66b5e04e", "ip": 0.67}, {"a": "A7_97f87bef", "ip": 0.67}, {"a": "A7_4b0b6a44", "ip": 0.67}, {"a": "M5_753_predictive_service", "ip": 0.67}, {"a": "M5_916_predictive_service", "ip": 0.66}, {"a": "M5_779_predictive_service", "ip": 0.64}], "rm": [{"ph": 1, "d": "Phase 1 (Q1: Stabilize and focus on high-value productivity): Priority should be given to Wildfontein and Isibonelo. 1) Implement detailed productivity interventions on MMU-752, 717, 731, and 754 at Wildfontein: It is recommended to conduct time-and-motion studies, It is recommended to refine loading and blasting cycles, optimize queueing, and adjust operator rosters. Set interim productivity targets (e.g., 6->35% for MMU-752, 12->40% for MMU-717, 8->35% for MMU-731, 23->50% for MMU-754) to be achieved within Q1. 2) Launch the productivity uplift program for MMU-758 at Isibonelo, targeting a step from 64% to about 75% by end of Q1, with explicit focus on reducing assistance calls. 3) Begin availability improvement planning for MMU-760/761 and schedule the preventative service for MMU-705, but execute only the least disruptive maintenance tasks in Q1 to avoid compounding downtime. 4) Initiate capacity target recalibration design: define new target frameworks per MMU type and site, but do not yet lock in final targets; Q1 data should be used to validate assumptions."}, {"ph": 2, "d": "Phase 2 (Q2: Lock in availability and recalibrate capacity targets): 1) Execute full availability improvement plans for MMU-761 and MMU-760, including planned maintenance windows, critical spares stocking, and improved fault diagnostics. Aim to reach at least 85% availability by end of Q2, with a glide path to 90% by early Q3. 2) Complete the preventative service and any follow-up work on MMU-705, ensuring predictive risk score is reduced and unplanned downtime trend is reversed. 3) Finalize and implement capacity target recalibration (Lever 7) across the MMUs in this portfolio: set site- and unit-specific capacity targets that reflect the new productivity baselines (e.g., Wildfontein MMUs targeted at 65-75% by end Q2, with 85% as Q4 goal). 4) Implement the assistance-pattern optimization action, using early Q1-Q2 data from Isibonelo and Wildfontein to reconfigure assistance routes and standby patterns, with explicit KPIs on assistance hours and cost per tonne."}, {"ph": 3, "d": "Phase 3 (Q3: Consolidate gains and prepare for structural fleet moves): 1) Push the second-stage productivity ramp on Wildfontein MMUs (752/717/731/754) and MMU-756 (Weilaagte) and MMU-759 (Rustenburg OC), targeting 70-80% productivity where site conditions allow. Q1-Q2 learnings should be used to refine operator training, shift design, and loading patterns. 2) Monitor realized availability on MMU-760/761 and post-service performance of MMU-705; adjust maintenance intervals and spares strategies to lock in more than 88-90% availability. 3) Reassess assistance needs at Isibonelo, Carolina, and Dorstfontein using updated productivity and availability data; It is recommended to identify 1-2 MMUs that could be candidates for redeployment in Q4, staying within the group cap of 15 redeployments per quarter. 4) Review capacity targets and adjust where actual performance consistently exceeds or falls short by more than 10%, ensuring targets remain stretching but credible."}, {"ph": 4, "d": "Phase 4 (Q4: Optimize fleet structure and embed continuous improvement): 1) Based on Q3 performance, recommend specific redeployments or retirements (up to 3-5 units from the broader fleet, not necessarily only from this portfolio) to align with demand and contract margins, using the improved productivity and availability baselines as input. 2) Institutionalize the productivity and availability playbooks developed at Wildfontein, Isibonelo, Weilaagte, and Rustenburg OC, and roll them out to hotspot sites Carolina and Dorstfontein, with tailored training and KPI dashboards. 3) Tighten assistance patterns further, using a rolling 12-month view of assistance hours and costs to reduce structural assistance dependency at hotspot sites by at least 20%. 4) Integrate capacity target recalibration into annual budgeting and performance management cycles, ensuring Operations, Finance, and Maintenance share a single, aligned view of expected tonnes, availability, and cost per MMU."}], "sb": {"Operations": "For the Operations Manager, this portfolio is an opportunity to unlock material production without adding new MMUs. Focus operational energy on Wildfontein and Isibonelo first: MMU-752/717/731/754 at Wildfontein and MMU-758 at Isibonelo are the primary levers, together representing more than half of the portfolio's value. Treat these units as pilot cases for a standardized productivity improvement playbook: clear daily productivity targets, visible dashboards, disciplined pre-shift planning, and post-shift debriefs. Stagger maintenance on MMU-760/761 and MMU-705 to avoid simultaneous downtime, and coordinate closely with planning to ensure that availability improvements translate into more blasts loaded, not just more idle time. The capacity target recalibration should be used to align supervisors' expectations with what each MMU should deliver per shift, and link this to operator incentives and coaching. Finally, Assistance hours at Isibonelo, Carolina, and Dorstfontein should be tracked weekly; as productivity and availability improve, deliberately reduce assistance reliance and reassign those hours to higher-value work.", "Finance": "For the Finance Controller, Diversity_4 is primarily a margin expansion play: of the value is margin improvement from better utilization, with meaningful direct cost reductions. The key is to ensure that the incremental tonnes generated by higher productivity and availability come with minimal incremental fixed cost. It is recommended to monitor unit cost per tonne and contribution margin per MMU at Wildfontein, Isibonelo, Weilaagte, and Rustenburg OC before and after interventions. It is expected that a 5-10% reduction in cost per tonne on the targeted MMUs if execution is disciplined. The capacity target recalibration should be used to improve budgeting accuracy: It is recommended to align financial forecasts with the new productivity and availability baselines, and flag where structural underutilization persists, as this will inform future redeployment or retirement decisions within the 15 redeployments/5 retirements per quarter constraint. Also, quantify the financial impact of reduced assistance at hotspot sites: lower fuel, labor, and overtime costs, and potentially lower standby capacity requirements. Build a simple benefits-tracking dashboard that reconciles theoretical vs realized value by lever (productivity, availability, assistance, capacity targets) each quarter.", "Maintenance": "For the Maintenance Lead, the portfolio highlights the need to shift from reactive to planned reliability improvements. The availability actions on MMU-761 and MMU-760, and the preventative service on MMU-705, should be treated as flagship reliability projects. It is recommended to plan these interventions with Operations to minimize production impact, but do not defer them excessively; the medium-term gain in availability (towards 90%) and reduced breakdown risk is worth the short-term downtime. These units should be used to refine standard maintenance packages, critical spares lists, and inspection routines that can be replicated across the fleet. Link maintenance KPIs directly to productivity outcomes: for example, How improved availability on MMU-760/761 translates into more tonnes loaded and fewer assistance calls should be tracked. Feed reliability data into the capacity target recalibration process so that targets reflect realistic availability assumptions, not idealized ones. Finally, Predictive risk scores (like the 0 should be used.76 on MMU-705) systematically to prioritize maintenance across the fleet, especially at hotspot sites (Carolina, Dorstfontein, Isibonelo), thereby reducing unplanned downtime and the need for emergency assistance deployments."}, "wf": [{"l": 1, "ip": 81.2}, {"l": 5, "ip": 12.5}, {"l": 7, "ip": 5.3}, {"l": 4, "ip": 0.9}], "tn": [{"l": 1, "avg": 10.15, "lo": 1.25, "hi": 21.33}, {"l": 5, "avg": 1.57, "lo": 0.64, "hi": 3.46}, {"l": 4, "avg": 0.92, "lo": 0.92, "hi": 0.92}, {"l": 7, "avg": 0.67, "lo": 0.67, "hi": 0.67}], "sc": [{"a": "A1_f4574d58", "p": 61.0, "rs": 0.62, "ip": 21.33, "l": 1}, {"a": "A1_074b3a74", "p": 63.0, "rs": 0.62, "ip": 17.83, "l": 1}, {"a": "A1_0b9f4048", "p": 62.0, "rs": 0.61, "ip": 16.86, "l": 1}, {"a": "A1_ae1f1a6b", "p": 65.0, "rs": 0.62, "ip": 11.24, "l": 1}, {"a": "A1_c5576793", "p": 63.0, "rs": 0.62, "ip": 5.72, "l": 1}, {"a": "A1_15f161c3", "p": 72.0, "rs": 0.61, "ip": 3.93, "l": 1}, {"a": "A5_e26677a5", "p": 70.0, "rs": 0.62, "ip": 3.46, "l": 5}, {"a": "A5_2e9335d1", "p": 70.0, "rs": 0.63, "ip": 3.25, "l": 5}, {"a": "A1_3f4c2810", "p": 74.0, "rs": 0.62, "ip": 3.03, "l": 1}, {"a": "M5_705_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.86, "l": 5}, {"a": "A1_a19de71f", "p": 73.0, "rs": 0.62, "ip": 1.25, "l": 1}, {"a": "M5_708_predictive_service", "p": 80.0, "rs": 0.44, "ip": 1.04, "l": 5}, {"a": "M5_704_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.96, "l": 5}, {"a": "A4_4160ca25", "p": 55.0, "rs": 0.44, "ip": 0.92, "l": 4}, {"a": "A7_6e4144a9", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_921671b7", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_015f5672", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_062fb7a9", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_9a7839fd", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_66b5e04e", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_97f87bef", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_4b0b6a44", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "M5_753_predictive_service", "p": 80.0, "rs": 0.44, "ip": 0.67, "l": 5}, {"a": "M5_916_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 5}, {"a": "M5_779_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.64, "l": 5}], "mp": 87.9}, {"id": 5, "nm": "Comprehensive Coverage", "on": "Diversity_5", "st": "diversity", "ac": 25, "ld": {"1": 8, "2": 0, "3": 0, "4": 0, "5": 8, "6": 1, "7": 8, "8": 0}, "pa": "Very strong alignment. about 82% of value comes from productivity interventions, heavily concentrated at Wildfontein (MMU-752/717/731/754) plus Weilaagte and Rustenburg OC. The portfolio directly addresses idle capacity (about 14,000t+ across top units) and can materially close the group-wide productivity gap if executed with discipline.", "ca": "Moderate but positive. Direct cost reductions are (about 11% of total value), largely via better utilization and availability (less standby, overtime, and unplanned maintenance). Indirectly, higher productivity per MMU reduces cost per tonne and allows future retirements/redeployments without new capex.", "ks": "Wildfontein productivity + availability synergy: Coordinated productivity interventions on MMU-752/717/731/754 at Wildfontein, combined with targeted availability improvements (where applicable), can lift site output without adding units. As productivity rises toward 85%, any incremental availability gains convert almost 1:1 into extra tonnes, amplifying the + Wildfontein uplift and enabling future redeployments from that site.; Productivity + capacity target recalibration synergy: Recalibrating capacity targets (Lever 7) at Wildfontein, Weilaagte, Rustenburg OC, and Isibonelo in parallel with productivity interventions creates realistic, site-specific benchmarks. This reduces artificial underperformance flags, focuses teams on true gaps, and supports performance-based redeployment/retirement decisions, improving both fleet efficiency and cost control.; Availability + maintenance prioritization synergy: The availability improvements for MMU-761 and MMU-760, combined with the preventative service on MMU-705, create a virtuous cycle: fewer breakdowns, higher planned availability, and more stable shift planning. This reduces emergency assistance calls at hotspot sites (notably Isibonelo) and frees high-performing MMUs to be redeployed within the 15-per-quarter cap.; Route optimization + productivity synergy: The single route distance optimization action, though small in value, reduces non-productive travel time. When layered onto productivity interventions (especially at Wildfontein and Rustenburg OC), it increases effective charging time per shift and supports achieving the 85% productivity targets without additional labour or MMUs.", "kt": "Execution bandwidth at Wildfontein vs other sites: Concentrating multiple high-impact productivity actions on four MMUs at Wildfontein maximizes value quickly but risks overloading local operations and maintenance teams. If change management and training capacity are limited, improvements at Weilaagte, Rustenburg OC, and Isibonelo may lag, delaying benefits at hotspot sites and potentially increasing assistance dependency there.; Short-term maintenance downtime vs availability gains: Implementing availability improvements and preventative services (e.g., MMU-705 M8 service, MMU-760/761 availability uplift) will require planned downtime. In the short term, this can reduce available capacity and may require temporary assistance units or overtime. The trade-off is between a controlled, scheduled impact now versus higher unplanned downtime and cost later.; Aggressive productivity targets vs operational risk: Targeting 85% productivity for units currently at 6-23% (MMU-752/717/731/754) is ambitious. Pushing too fast may increase operator fatigue, safety risk, and maintenance load (tyres, pumps, wear parts). A phased ramp-up (e.g., 50% -> 70% -> 85%) may slightly delay full value realization but reduces safety and reliability risk.; Capacity recalibration vs perceived performance: Recalibrating capacity targets downward where current assumptions are unrealistic can improve KPI fairness and focus, but some sites may perceive this as lowering the bar. Conversely, raising targets where feasible may create resistance from operations teams. The trade-off is between accurate, actionable benchmarks and short-term morale/industrial relations concerns.", "rp": {"Medium": 13, "High": 12}, "ap": 74.0, "ar": [{"a": "A1_f4574d58", "ip": 21.41}, {"a": "A1_074b3a74", "ip": 17.9}, {"a": "A1_0b9f4048", "ip": 16.93}, {"a": "A1_ae1f1a6b", "ip": 11.28}, {"a": "A1_c5576793", "ip": 5.75}, {"a": "A1_15f161c3", "ip": 3.94}, {"a": "A5_e26677a5", "ip": 3.48}, {"a": "A5_2e9335d1", "ip": 3.26}, {"a": "A1_3f4c2810", "ip": 3.04}, {"a": "M5_705_predictive_service", "ip": 1.86}, {"a": "A1_a19de71f", "ip": 1.26}, {"a": "A5_c132e079", "ip": 0.9}, {"a": "M5_735_predictive_service", "ip": 0.89}, {"a": "M5_785_predictive_service", "ip": 0.89}, {"a": "M5_794_predictive_service", "ip": 0.89}, {"a": "A7_921671b7", "ip": 0.67}, {"a": "A7_57a0f4d3", "ip": 0.67}, {"a": "A7_015f5672", "ip": 0.67}, {"a": "A7_9a7839fd", "ip": 0.67}, {"a": "A7_97f87bef", "ip": 0.67}, {"a": "A7_b68c0ed5", "ip": 0.67}, {"a": "A7_ae5fd684", "ip": 0.67}, {"a": "A7_58d18496", "ip": 0.67}, {"a": "M5_797_predictive_service", "ip": 0.63}, {"a": "A6_8ce59fe0", "ip": 0.34}], "rm": [{"ph": 1, "d": "Phase 1 (Q1): Stabilize and prepare - The focus should be on availability and maintenance foundations plus quick productivity wins\n- Operational Availability (Lever 5): It is recommended to implement availability improvements for MMU-761 (74% -> 90%) and MMU-760 (77% -> 90%) with detailed maintenance and spares plans. It is recommended to execute the preventative M8 service for MMU-705 to reduce high predictive failure risk (score 0.76).\n- Productivity (Lever 1): Start with moderate-gap units where uplift is achievable with minimal disruption: MMU-759 at Rustenburg OC (54% -> 85%) and MMU-758 at Isibonelo (64% -> 85%). These are important for reducing assistance dependency at hotspot Isibonelo.\n- Capacity Target Recalibration (Lever 7): It is recommended to run a diagnostic across Wildfontein, Weilaagte, Rustenburg OC, and Isibonelo to define realistic capacity baselines per MMU, using historical best weeks and OEM specs.\n- Route Optimization (Lever 6): It is recommended to implement the identified route distance optimization action and standardize route-mapping and tracking (GPS/telematics) at the affected site.\n- Outcome: De-risk key units, especially at hotspot Isibonelo, and create a stable base to absorb later productivity pushes. It is recommended to identify 3-5 candidate MMUs for potential redeployment/retirement in later quarters based on emerging performance."}, {"ph": 2, "d": "Phase 2 (Q2): High-impact Wildfontein productivity push and refined capacity targets\n- Productivity (Lever 1): Launch structured productivity interventions at Wildfontein for MMU-754 (23% -> 85%) and MMU-756 at Weilaagte (16% -> 85%) as early movers. It is recommended to begin operator training, shift pattern optimization, and blast scheduling alignment for Wildfontein to support higher utilization.\n- Capacity Target Recalibration (Lever 7): Finalize and implement recalibrated capacity targets for all Wildfontein MMUs (752/717/731/754) and Weilaagte (756), linking them to site KPIs and incentive schemes.\n- Operational Availability (Lever 5): Apply learnings from Q1 availability improvements to other high-value units with emerging reliability issues, prioritizing Wildfontein and Weilaagte.\n- Outcome: Realize a material portion (30-40%) of the productivity value while ensuring targets are realistic and embedded in site management routines."}, {"ph": 3, "d": "Phase 3 (Q3): Full Wildfontein scale-up and cross-site optimization\n- Productivity (Lever 1): Roll out intensive productivity interventions for the remaining high-gap Wildfontein units: MMU-752 (6% -> 85%), MMU-717 (12% -> 85%), and MMU-731 (8% -> 85%). Introduce continuous improvement routines (daily huddles, visual management, weekly performance reviews) at Wildfontein.\n- Operational Availability (Lever 5): It is recommended to align maintenance windows and spares planning to support higher utilization at Wildfontein and Rustenburg OC, minimizing productivity loss from planned downtime.\n- Fleet Strategy: Based on improved productivity and availability, It is recommended to identify underutilized MMUs at Wildfontein and Rustenburg OC for redeployment to hotspot sites (Carolina, Dorstfontein, Isibonelo) or for retirement, staying within the cap of 15 redeployments and 5 retirements per quarter.\n- Outcome: Capture the bulk of Wildfontein's + uplift, create surplus capacity for strategic redeployment, and start structurally reducing assistance dependency at hotspot sites."}, {"ph": 4, "d": "Phase 4 (Q4): Consolidation, redeployment/retirement, and cost optimization\n- Productivity & Capacity (Levers 1 & 7): Fine-tune productivity targets and capacity baselines based on actual performance data; adjust where 85% is consistently exceeded or not yet realistic. Lock in best practices from Wildfontein, Weilaagte, Rustenburg OC, and Isibonelo and standardize across the MMU fleet.\n- Fleet Efficiency & Cost: It is recommended to execute a structured redeployment/retirement plan using Q1-Q3 data: Chronically underperforming/high-cost units (up to 5) and redeploy 10-15 high-performing units to high-demand or hotspot sites should be retired. Improved productivity and availability should be used to reduce reliance on contractor assistance and overtime, capturing the + cost reductions and additional indirect savings.\n- Outcome: A leaner, more productive fleet with lower cost per tonne, reduced assistance dependency at Carolina/Dorstfontein/Isibonelo, and a clear template for future optimization cycles."}], "sb": {"Operations": "Priority should be given to sequencing to avoid overloading Wildfontein while still capturing its large upside. In Q1-Q2, the focus should be on stabilizing availability (MMU-760/761/705) and lifting moderate-gap units (MMU-759 at Rustenburg OC, MMU-758 at Isibonelo) to quickly reduce assistance needs at hotspot sites. For Wildfontein, It is recommended to plan a phased ramp-up: start with MMU-754 and MMU-756 (Weilaagte) before tackling the very low-productivity units (752/717/731). It is recommended to align blast planning, shift patterns, and operator allocation to support the 85% targets, and use recalibrated capacity targets as the basis for daily and weekly production meetings. Ensure that any planned maintenance for high-value units is coordinated with backup coverage to avoid production dips.", "Finance": "This portfolio delivers meaningful overall benefit, with margin improvement and direct cost reductions. The value is heavily concentrated in a small number of MMUs at Wildfontein (material), so tracking site-level performance is critical. It is expected that some short-term cost uptick in Q1-Q2 from planned maintenance, training, and possible temporary assistance, but these are enablers for sustained margin improvement. The recalibrated capacity targets and improved productivity data should be used to refine unit cost per tonne and to build a business case for Q4 retirements and redeployments, ensuring that any capex deferrals or disposals are backed by demonstrated surplus capacity. It is recommended to monitor ROI by site and by lever (productivity vs availability vs capacity recalibration) to guide future optimization portfolios.", "Maintenance": "The role is central in Q1-Q2. Priority should be given to the preventative service on MMU-705 and the availability improvements for MMU-760 and MMU-761, ensuring that root causes of downtime (e.g., specific components, maintenance practices) are addressed, not just symptoms. Coordinate with operations to schedule these interventions during low-demand windows to minimize impact. As productivity rises at Wildfontein, Weilaagte, and Rustenburg OC, It is expected that higher wear rates; pre-plan spares, technician availability, and condition monitoring to prevent a spike in breakdowns. The capacity recalibration work should be used to align maintenance intervals with realistic operating hours and duty cycles. Standardize best practices from the high-performing units and roll them out to the rest of the fleet, supporting the Q3-Q4 redeployment and retirement decisions with clear reliability and lifecycle cost data."}, "wf": [{"l": 1, "ip": 81.5}, {"l": 5, "ip": 12.8}, {"l": 7, "ip": 5.4}, {"l": 6, "ip": 0.3}], "tn": [{"l": 1, "avg": 10.19, "lo": 1.26, "hi": 21.41}, {"l": 5, "avg": 1.6, "lo": 0.63, "hi": 3.48}, {"l": 6, "avg": 0.34, "lo": 0.34, "hi": 0.34}, {"l": 7, "avg": 0.67, "lo": 0.67, "hi": 0.67}], "sc": [{"a": "A1_f4574d58", "p": 61.0, "rs": 0.62, "ip": 21.41, "l": 1}, {"a": "A1_074b3a74", "p": 63.0, "rs": 0.62, "ip": 17.9, "l": 1}, {"a": "A1_0b9f4048", "p": 62.0, "rs": 0.61, "ip": 16.93, "l": 1}, {"a": "A1_ae1f1a6b", "p": 65.0, "rs": 0.62, "ip": 11.28, "l": 1}, {"a": "A1_c5576793", "p": 63.0, "rs": 0.62, "ip": 5.75, "l": 1}, {"a": "A1_15f161c3", "p": 72.0, "rs": 0.61, "ip": 3.94, "l": 1}, {"a": "A5_e26677a5", "p": 70.0, "rs": 0.62, "ip": 3.48, "l": 5}, {"a": "A5_2e9335d1", "p": 70.0, "rs": 0.63, "ip": 3.26, "l": 5}, {"a": "A1_3f4c2810", "p": 74.0, "rs": 0.62, "ip": 3.04, "l": 1}, {"a": "M5_705_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.86, "l": 5}, {"a": "A1_a19de71f", "p": 73.0, "rs": 0.62, "ip": 1.26, "l": 1}, {"a": "A5_c132e079", "p": 70.0, "rs": 0.62, "ip": 0.9, "l": 5}, {"a": "M5_735_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.89, "l": 5}, {"a": "M5_785_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.89, "l": 5}, {"a": "M5_794_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.89, "l": 5}, {"a": "A7_921671b7", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_57a0f4d3", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_015f5672", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_9a7839fd", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_97f87bef", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_b68c0ed5", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_ae5fd684", "p": 80.0, "rs": 0.42, "ip": 0.67, "l": 7}, {"a": "A7_58d18496", "p": 80.0, "rs": 0.38, "ip": 0.67, "l": 7}, {"a": "M5_797_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.63, "l": 5}, {"a": "A6_8ce59fe0", "p": 60.0, "rs": 0.58, "ip": 0.34, "l": 6}], "mp": 89.1}, {"id": 7, "nm": "Cost Reduction Focus", "on": "Cost_Reduction_Focus", "st": "policy", "ac": 25, "ld": {"1": 6, "2": 0, "3": 0, "4": 0, "5": 8, "6": 8, "7": 3, "8": 0}, "pa": "Strong alignment. about 81% of total value is driven by 6 productivity actions, with four Wildfontein MMUs (752, 717, 731, 754) contributing material. These interventions directly close large idle-capacity gaps (6-23% current vs 85% target) and convert underutilised fixed cost into revenue and margin improvement.", "ca": "Moderate but targeted alignment. Direct cost reductions are (about 12% of value), but the portfolio's margin improvement is largely from better utilisation of existing fleet rather than capex reduction. Cost benefits are mainly via improved availability (less breakdown cost, overtime, and standby units) and route/capacity recalibration (fuel, tyres, and assistance reduction).", "ks": "Wildfontein productivity cluster synergy: Coordinated productivity interventions on MMU-752, 717, 731, and 754 at a single site create a step-change in site-level capacity. By jointly moving these units toward the 85% target, Wildfontein can unlock material while enabling: (a) consolidation of blasting schedules, (b) reduced need for assistance MMUs from other sites, and (c) a platform to retire or redeploy 1-2 lower-performing units in later quarters without compromising service.; Availability-productivity synergy at high-potential units: Improving availability on MMUs with strong productivity upside (e.g., MMU-760 and 761) ensures that the uplift from productivity interventions is actually realised in delivered tonnes. Higher availability (74-77% to 90%) reduces lost shifts, stabilises cycle times, and allows route and capacity recalibration levers to lock in fuel, tyre, and overtime savings while sustaining higher utilisation.; Predictive maintenance-cost avoidance synergy: Immediate preventative services on MMU-705 and MMU-702 (high predictive risk scores of 0.76 and 0.75) prevent high-cost breakdowns that would otherwise force emergency assistance, rental units, or overtime. This protects both the availability value and the productivity value by avoiding cascading downtime across the fleet.; Route optimisation-capacity recalibration synergy: Route distance optimisation combined with capacity target recalibration allows MMUs to operate closer to optimal payloads on shorter, standardised routes. This reduces fuel per tonne, cycle time variance, and operator fatigue, while freeing up time windows to execute productivity interventions (operator coaching, loading discipline, blast planning) without adding extra shifts.", "kt": "Concentration risk at Wildfontein vs portfolio diversification: Focusing four of the top six productivity actions at Wildfontein maximises short-term value (material) but increases exposure to any site-specific disruptions (geology, client schedule changes, contract renegotiations). Diversifying some productivity effort to Rustenburg OC (MMU-759) and Weilaagte (MMU-756) slightly reduces immediate value concentration but improves resilience and learning transfer across sites.; Short-term maintenance downtime vs availability and cost reductions: Immediate preventative services for MMU-705 and MMU-702 will temporarily reduce available hours in the quarter they are executed. This may slightly constrain capacity if not coordinated with productivity interventions and blast schedules. However, the trade-off is favourable: a planned 1-2 day outage per unit avoids significantly longer unplanned downtime, higher repair costs, and emergency assistance deployments.; Operator and technical bandwidth vs speed of rollout: Implementing 6 productivity, 8 availability, 8 route, and 3 capacity actions (25 total) in a single quarter risks overloading supervisors, planners, and maintenance teams. A phased rollout will slow the realisation of some savings but reduces execution risk, rework, and change fatigue, and allows lessons from Wildfontein to be applied at Weilaagte and Rustenburg OC.; Maximising utilisation vs enabling redeployments/retirements: Pushing MMUs toward 85% productivity and 90% availability increases delivered tonnes and margin, but if all units are kept at high utilisation, it may delay the opportunity to retire or redeploy surplus capacity. To capture fleet-efficiency gains, Enaex will need to deliberately identify 1-2 units for redeployment/retirement once Wildfontein and other key sites demonstrate stable higher productivity, accepting a small buffer reduction in standby capacity.", "rp": {"Medium": 15, "High": 10}, "ap": 69.0, "ar": [{"a": "A1_f4574d58", "ip": 22.37}, {"a": "A1_074b3a74", "ip": 18.69}, {"a": "A1_0b9f4048", "ip": 17.68}, {"a": "A1_ae1f1a6b", "ip": 11.79}, {"a": "A1_c5576793", "ip": 6.0}, {"a": "A1_15f161c3", "ip": 4.12}, {"a": "A5_e26677a5", "ip": 3.63}, {"a": "A5_2e9335d1", "ip": 3.41}, {"a": "M5_705_predictive_service", "ip": 1.95}, {"a": "M5_702_predictive_service", "ip": 1.21}, {"a": "M5_706_predictive_service", "ip": 1.18}, {"a": "M5_709_predictive_service", "ip": 1.18}, {"a": "M5_708_predictive_service", "ip": 1.09}, {"a": "M5_704_predictive_service", "ip": 1.01}, {"a": "A7_57a0f4d3", "ip": 0.7}, {"a": "A7_66b5e04e", "ip": 0.7}, {"a": "A7_58d18496", "ip": 0.7}, {"a": "A6_8ce59fe0", "ip": 0.36}, {"a": "A6_122ff2c8", "ip": 0.35}, {"a": "A6_56179f3f", "ip": 0.33}, {"a": "A6_c7283502", "ip": 0.32}, {"a": "A6_a8984fad", "ip": 0.32}, {"a": "A6_26976cca", "ip": 0.31}, {"a": "A6_6ad0d6bb", "ip": 0.3}, {"a": "A6_ac60ad17", "ip": 0.3}], "rm": [{"ph": 1, "d": "Phase 1 (Q1): Stabilise availability and de-risk high-value assets\n- It is recommended to execute immediate preventative services on MMU-705 and MMU-702 (M8 services) to address high predictive risk scores and prevent breakdowns.\n- It is recommended to implement availability improvements on MMU-760 and MMU-761 first, targeting the 74-77% -> 90% shift, as they are among the highest-value availability actions (combined material) and foundational for any productivity or route optimisation.\n- It is recommended to begin basic route distance optimisation where it does not require major schedule changes (e.g., quick wins like standardising refuelling points, removing obvious detours) to capture early fuel and time savings.\n- Define and lock in site-level KPIs and baselines at Wildfontein, Weilaagte, and Rustenburg OC (current productivity, availability, average route distance, capacity utilisation) to measure uplift precisely."}, {"ph": 2, "d": "Phase 2 (Q2): It is recommended to execute core productivity interventions at Wildfontein\n- Roll out structured productivity interventions for MMU-752, 717, 731, and 754 at Wildfontein, focusing on: (a) operator coaching, (b) loading and dispatch discipline, and (c) tighter blast scheduling to move toward the 85% productivity target.\n- In parallel, It is recommended to refine route optimisation for Wildfontein to support these units (shortest safe paths to loading points and benches, minimised queuing, synchronised loading/blast windows).\n- Start capacity target recalibration on Wildfontein MMUs to align planned tonnes per shift with the new productivity targets, ensuring that the uplift is embedded in planning and not treated as ad hoc over-performance.\n- It is recommended to monitor assistance usage into and out of Wildfontein; It is recommended to begin planning for potential redeployment of 1 low-utilisation assistance MMU in later quarters if sustained productivity gains are observed."}, {"ph": 3, "d": "Phase 3 (Q3): It is recommended to extend productivity and availability improvements to Weilaagte and Rustenburg OC\n- It is recommended to implement the productivity intervention for MMU-756 at Weilaagte and MMU-759 at Rustenburg OC, using the Wildfontein playbook (standardised SOPs, coaching modules, and planning templates) to accelerate ramp-up.\n- It is recommended to complete remaining availability improvement actions across the 8 targeted MMUs, prioritising those supporting hotspot or assistance-dependent sites (Carolina, Dorstfontein, Isibonelo) to reduce their reliance on external support.\n- Expand route distance optimisation and capacity recalibration to Weilaagte and Rustenburg OC, ensuring that higher productivity does not increase non-productive travel or overload specific routes.\n- The improved performance data should be used to identify 1-2 MMUs suitable for redeployment from overserved sites to hotspot sites, staying within the quarterly cap of 15 redeployments and aligning with assistance reduction goals."}, {"ph": 4, "d": "Phase 4 (Q4): Consolidate gains and enable structural cost-out via fleet efficiency\n- It is recommended to review fleet-wide utilisation, availability, and assistance patterns post-interventions. It is recommended to identify 2-3 structurally underutilised MMUs that can be retired or redeployed with minimal service risk, targeting up to 5 retirements in line with quarterly limits.\n- At Wildfontein, assess whether the four optimised MMUs (752, 717, 731, 754) can cover projected demand with reduced backup, enabling retirement or redeployment of at least one older or high-maintenance unit.\n- Lock in optimised routes and recalibrated capacity targets into standard planning systems (scheduling tools, dispatch rules) so that savings are sustained without continuous manual intervention.\n- Integrate learnings into Enaex's standard operating model for new sites and contracts, particularly around the sequence: predictive maintenance -> availability uplift -> productivity optimisation -> route/capacity recalibration -> redeployment/retirement decisions."}], "sb": {"Operations": "Prioritise execution discipline and change management at Wildfontein. The four high-value productivity interventions (MMU-752, 717, 731, 754) are the operational heart of this portfolio and together drive about 70% of the total value. It is advisable to: (1) assign a dedicated site champion to coordinate operator coaching, blast planning, and dispatch changes; (2) tightly sequence maintenance windows for MMU-705 and 702 and availability improvements for MMU-760 and 761 so they do not clash with peak blasting periods; and (3) The improved productivity at Wildfontein, Weilaagte (MMU-756), and Rustenburg OC (MMU-759) should be used to reduce reliance on assistance MMUs at hotspot sites. Build a simple weekly dashboard showing productivity %, availability %, and assistance hours per MMU to track whether interventions are translating into real tonnes and reduced support needs.", "Finance": "This portfolio is margin-accretive with limited capex and focuses on sweating existing assets. Of the upside, is margin improvement and is direct cost reductions, largely from better utilisation and reduced downtime rather than headcount cuts or new investment. Concentration at Wildfontein is intentional to maximise ROI, but it does create exposure; It is recommended to monitor contract stability and volume forecasts for that site closely. Q2-Q3 results should be used to inform a structured fleet-rightsizing plan in Q4: It is recommended to identify 2-3 MMUs for retirement or redeployment that can deliver recurring opex and maintenance savings while staying within the 5-retirements-per-quarter limit. Ensure that savings from route optimisation and capacity recalibration are captured in budgets (fuel, tyres, maintenance, and overtime lines) rather than treated as one-off variances.", "Maintenance": "The early actions are critical to protect the portfolio's value. Immediate preventative services on MMU-705 and MMU-702, given their high predictive risk scores, should be scheduled in Q1 with clear coordination with Operations to avoid peak blast windows. For availability improvements (especially MMU-760 and 761), the focus should be on root causes: recurring component failures, inadequate spares, or delayed planned maintenance. Standardise a reliability-centred maintenance plan for the 8 availability-targeted MMUs, including condition-based checks where possible. As productivity increases at Wildfontein, Weilaagte, and Rustenburg OC, It is expected that higher wear rates; pre-position critical spares and adjust PM intervals to avoid new bottlenecks. Finally, The performance and maintenance history should be used to flag high-cost, low-availability units as candidates for Q4 retirement, ensuring that technical evidence supports any fleet reduction decisions."}, "wf": [{"l": 1, "ip": 80.7}, {"l": 5, "ip": 14.7}, {"l": 6, "ip": 2.6}, {"l": 7, "ip": 2.1}], "tn": [{"l": 1, "avg": 13.44, "lo": 4.12, "hi": 22.37}, {"l": 5, "avg": 1.83, "lo": 1.01, "hi": 3.63}, {"l": 6, "avg": 0.32, "lo": 0.3, "hi": 0.36}, {"l": 7, "avg": 0.7, "lo": 0.7, "hi": 0.7}], "sc": [{"a": "A1_f4574d58", "p": 61.0, "rs": 0.62, "ip": 22.37, "l": 1}, {"a": "A1_074b3a74", "p": 63.0, "rs": 0.62, "ip": 18.69, "l": 1}, {"a": "A1_0b9f4048", "p": 62.0, "rs": 0.61, "ip": 17.68, "l": 1}, {"a": "A1_ae1f1a6b", "p": 65.0, "rs": 0.62, "ip": 11.79, "l": 1}, {"a": "A1_c5576793", "p": 63.0, "rs": 0.62, "ip": 6.0, "l": 1}, {"a": "A1_15f161c3", "p": 72.0, "rs": 0.61, "ip": 4.12, "l": 1}, {"a": "A5_e26677a5", "p": 70.0, "rs": 0.62, "ip": 3.63, "l": 5}, {"a": "A5_2e9335d1", "p": 70.0, "rs": 0.63, "ip": 3.41, "l": 5}, {"a": "M5_705_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.95, "l": 5}, {"a": "M5_702_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.21, "l": 5}, {"a": "M5_706_predictive_service", "p": 80. cenario, it prioritizes revenue/margin over pure opex cuts, which is appropriate if redeployment reduces assistance trucks and contractor reliance at Carolina, Dorstfontein, and Isibonelo.", "ks": "Productivity optimization at Wildfontein (MMU-752/717/731/754) combined with capacity target recalibration creates a redeployment pool: once these units move from 6-23% to about 60-70% productivity, Enaex can safely retire or redeploy 2-3 chronically underperforming MMUs elsewhere without compromising service levels, unlocking both margin improvement and structural cost reduction.; Operational availability improvements (MMU-761/760 and high-risk units 705/702/706) paired with assistance pattern optimization at hotspot sites (Carolina, Dorstfontein, Isibonelo) allow a deliberate reduction in assistance dependency: higher availability at primary MMUs means fewer standby/assistance units are needed, enabling 3-5 redeployments per quarter from assistance-heavy sites to growth or high-margin contracts.", "kt": "Short-term volume and service risk at origin sites vs long-term margin and efficiency gains: aggressively redeploying capacity from Wildfontein and other low-productivity sites may temporarily stress blasting schedules and operator teams while new patterns and targets bed in. It is expected that a 1-2 quarter transition where utilization and on-time performance may be volatile before stabilizing at higher productivity.; Maintenance and availability investment vs immediate cost reductions: prioritizing preventative services (M8) on MMU 705/702/706 and availability upgrades for MMU-761/760 will increase maintenance hours and parts spend in the next 1-2 quarters, slightly dampening near-term opex savings. The trade-off is reduced breakdown risk and higher sustainable availability, which supports redeployment and potential retirement of older, high-cost units in later quarters.", "rp": {"Medium": 17, "High": 8}, "ap": 71.0, "ar": [{"a": "A1_f4574d58", "ip": 22.44}, {"a": "A1_074b3a74", "ip": 18.76}, {"a": "A1_0b9f4048", "ip": 17.74}, {"a": "A1_ae1f1a6b", "ip": 11.83}, {"a": "A1_c5576793", "ip": 6.02}, {"a": "A5_e26677a5", "ip": 3.64}, {"a": "A5_2e9335d1", "ip": 3.42}, {"a": "M5_705_predictive_service", "ip": 1.95}, {"a": "M5_702_predictive_service", "ip": 1.22}, {"a": "M5_706_predictive_service", "ip": 1.19}, {"a": "M5_709_predictive_service", "ip": 1.18}, {"a": "M5_708_predictive_service", "ip": 1.09}, {"a": "M5_704_predictive_service", "ip": 1.01}, {"a": "A4_4160ca25", "ip": 0.96}, {"a": "A4_4eb01a65", "ip": 0.96}, {"a": "A4_71ad48f5", "ip": 0.96}, {"a": "A7_57a0f4d3", "ip": 0.7}, {"a": "A7_4120349c", "ip": 0.7}, {"a": "A7_66b5e04e", "ip": 0.7}, {"a": "A7_b68c0ed5", "ip": 0.7}, {"a": "A7_ae5fd684", "ip": 0.7}, {"a": "A7_4b0b6a44", "ip": 0.7}, {"a": "A7_58d18496", "ip": 0.7}, {"a": "A6_8ce59fe0", "ip": 0.36}, {"a": "A6_122ff2c8", "ip": 0.35}], "rm": [{"ph": 1, "d": "Phase 1 (Q1): Stabilize availability and de-risk core units. It is recommended to execute all high-priority Operational Availability actions first: raise availability on MMU-761 (74%->90%) and MMU-760 (77%->90%), and complete immediate preventative services on MMU 705/702/706 and any other high-risk units in the portfolio. In parallel, start productivity interventions at Wildfontein (focus on MMU-752 and MMU-717 first, then MMU-731/754) and Weilaagte (MMU-756). This phase should be used to validate that targeted 85% productivity is realistic; if not, reset interim targets to 65-75% while still unlocking most of the value."}, {"ph": 2, "d": "Phase 2 (Q2): It is recommended to implement assistance pattern and route optimizations, then begin controlled redeployments. With availability stabilized and productivity trending up, roll out Assistance Pattern Optimization at Carolina, Dorstfontein, and Isibonelo to reduce assistance truck hours and clarify primary vs backup roles. It is recommended to implement Route Distance Optimization actions to shorten average run distances and cycle times, freeing up 5-10% additional productive capacity. Based on Q1 performance data, It is recommended to identify 5-7 MMUs for redeployment (prioritizing those with improved productivity and availability) and 1-2 candidates for retirement, staying within the quarterly cap (<=15 redeployments, <=5 retirements)."}, {"ph": 3, "d": "Phase 3 (Q3): Lock in capacity target recalibration and scale redeployments. Apply Capacity Target Recalibration across the 7 identified units to align each MMU's target tonnes with actual demand and new productivity baselines. This is where the 'Aggressive_Redeployment' posture becomes structural: reduce target capacity at chronically low-demand sites and increase it at high-margin or hotspot sites now supported by better availability and optimized assistance patterns. It is recommended to execute a second wave of 8-10 redeployments and 2-3 retirements, focusing on eliminating the bottom quartile of cost-per-tonne units and consolidating volumes onto the now higher-performing fleet."}, {"ph": 4, "d": "Phase 4 (Q4): Optimize portfolio and institutionalize policies. It is recommended to review realized vs upside and refine redeployment and retirement rules into standard policy: minimum productivity thresholds (e.g., <40% for 2 consecutive quarters triggers review), availability floors (e.g., <85% triggers maintenance intervention), and assistance usage caps at hotspot sites. Q4 should be used to fine-tune route and assistance patterns, adjust capacity targets based on updated mine plans, and plan the next year's redeployment/retirement pipeline to continue shifting the fleet towards higher productivity and lower structural cost."}], "sb": {"Operations": "This portfolio will materially change how the MMUs are deployed and managed. Operationally, the biggest wins come from turning Wildfontein and Weilaagte into productivity leaders and using that capacity to relieve pressure at Carolina, Dorstfontein, and Isibonelo. In Q1, the focus should be on execution discipline: ensure operators, planners, and dispatch are aligned on new productivity targets (moving from 6-23% towards at least 60-70% for MMU-752/717/731/754 and 756) and that availability upgrades (MMU-761/760 and serviced units 705/702/706) are translated into more planned blasts, not idle time. In Q2-Q3, It will be necessary to have tight coordination across sites to manage redeployments: standardize operating procedures and training so that redeployed MMUs and crews can plug into new sites with minimal ramp-up. At hotspot sites, The assistance pattern changes should be used to clarify roles: define which MMUs are primary, which are backup, and under what conditions assistance is triggered. This will help This reduces assistance dependency without compromising blast reliability.", "Finance": "From a financial perspective, this portfolio is attractive: total value with margin improvement and cost reductions, heavily driven by productivity gains rather than pure cost cutting. It is expected that a front-loaded investment in maintenance and some temporary inefficiencies during redeployments, but the payback is strong if the top 5 productivity actions deliver even 70-80% of their theoretical uplift. It is advisable to track ROI by lever: (1) Productivity Optimization at Wildfontein and Weilaagte should be monitored via incremental margin per MMU and cost per tonne; (2) Operational Availability improvements should be tracked via reduced breakdown costs, overtime, and rental/contractor spend; (3) Capacity Target Recalibration and Assistance Pattern Optimization should show up as lower fixed cost per tonne and fewer assistance hours billed. Build quarterly dashboards that link redeployment and retirement decisions to P&L impact, and set thresholds where underperforming MMUs are automatically flagged for redeployment or disposal. This will help manage within the cap of 15 redeployments and 5 retirements per quarter while maximizing financial impact.", "Maintenance": "Maintenance is the enabler for this aggressive redeployment strategy. The portfolio explicitly calls out high-risk units (MMU 705/702/706) for immediate preventative service and targets availability improvements for MMU-761 and MMU-760. In Q1, priority should be given to these M8 services and availability upgrades even if it means short-term workshop congestion; the goal is to lift these units above 90% availability so they can be reliably redeployed or take on more primary load at their current sites. Predictive risk scores (e should be used.g., 0.75-0.76 on 705/702/706) to refine the preventative maintenance intervals and avoid unplanned failures that could derail redeployment schedules. As redeployments ramp up in Q2-Q3, standardize pre-redeployment inspections and refurbishments so that any unit moving to a new site arrives in 'ready-to-run' condition, minimizing early-life failures in the new duty cycle. Also, feed back real-world availability and failure data into the capacity target recalibration process: if certain models or ages of MMUs cannot sustain 90% availability under heavier loads, flag them as retirement candidates rather than stretching them and increasing lifecycle cost."}, "wf": [{"l": 1, "ip": 76.8}, {"l": 5, "ip": 14.7}, {"l": 7, "ip": 4.9}, {"l": 4, "ip": 2.9}, {"l": 6, "ip": 0.7}], "tn": [{"l": 1, "avg": 15.36, "lo": 6.02, "hi": 22.44}, {"l": 5, "avg": 1.84, "lo": 1.01, "hi": 3.64}, {"l": 6, "avg": 0.36, "lo": 0.35, "hi": 0.36}, {"l": 4, "avg": 0.96, "lo": 0.96, "hi": 0.96}, {"l": 7, "avg": 0.7, "lo": 0.7, "hi": 0.7}], "sc": [{"a": "A1_f4574d58", "p": 61.0, "rs": 0.62, "ip": 22.44, "l": 1}, {"a": "A1_074b3a74", "p": 63.0, "rs": 0.62, "ip": 18.76, "l": 1}, {"a": "A1_0b9f4048", "p": 62.0, "rs": 0.61, "ip": 17.74, "l": 1}, {"a": "A1_ae1f1a6b", "p": 65.0, "rs": 0.62, "ip": 11.83, "l": 1}, {"a": "A1_c5576793", "p": 63.0, "rs": 0.62, "ip": 6.02, "l": 1}, {"a": "A5_e26677a5", "p": 70.0, "rs": 0.62, "ip": 3.64, "l": 5}, {"a": "A5
