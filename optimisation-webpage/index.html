<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Fleet Optimisation Engine | Enaex Africa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        :root {
            --bg-primary: #2b2f38;
            --bg-secondary: #343842;
            --bg-card: #3d424e;
            --bg-card-hover: #464c59;
            --bg-input: #2f3340;
            --accent-red: #c41e3a;
            --accent-red-light: #e63950;
            --accent-red-glow: rgba(196, 30, 58, 0.3);
            --accent-green: #22c55e;
            --accent-amber: #f59e0b;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-primary: #f0f0f2;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --glass-bg: rgba(61, 66, 78, 0.7);
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.25);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.35);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }

        @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideInLeft { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
        @keyframes slideInRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        @keyframes glowPulse { 0%,100%{opacity:.6} 50%{opacity:1} }

        /* HEADER */
        .header { background:var(--bg-secondary); border-bottom:1px solid var(--border-color); padding:.6rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:1000; overflow:hidden; }
        .header::before { content:''; position:absolute; top:-30px; right:80px; width:200px; height:200px; border:1px solid rgba(255,255,255,.04); transform:rotate(45deg); pointer-events:none; }
        .header::after { content:''; position:absolute; top:-50px; right:180px; width:160px; height:160px; border:1px solid rgba(255,255,255,.03); transform:rotate(45deg); pointer-events:none; }
        .logo-section { display:flex; align-items:center; gap:1rem; animation:slideInLeft .6s ease-out; }
        .logo { width:44px; height:44px; flex-shrink:0; }
        .logo svg { width:100%; height:100%; }
        .header-title h1 { font-size:1.1rem; font-weight:700; letter-spacing:-.02em; }
        .header-title p { font-size:.7rem; color:var(--text-secondary); margin-top:.1rem; }
        .header-meta { display:flex; align-items:center; gap:1rem; animation:slideInRight .6s ease-out; }
        .header-badge { display:flex; align-items:center; gap:.4rem; background:var(--accent-red); padding:.3rem .7rem; border-radius:20px; font-size:.65rem; font-weight:600; color:white; }
        .header-badge .dot { width:6px; height:6px; border-radius:50%; background:white; animation:glowPulse 2s ease-in-out infinite; }
        .date-display { background:var(--bg-card); padding:.35rem .7rem; border-radius:6px; border:1px solid var(--border-color); font-size:.7rem; color:var(--text-secondary); font-family:'Roboto Mono',monospace; }

        /* PRIMARY TAB BAR */
        .tab-bar { display:flex; background:var(--bg-secondary); border-bottom:1px solid var(--border-color); overflow-x:auto; flex-shrink:0; scrollbar-width:none; position:sticky; top:52px; z-index:999; }
        .tab-bar::-webkit-scrollbar { display:none; }
        .tab-btn { flex-shrink:0; padding:.55rem .85rem; font-size:.65rem; font-weight:600; font-family:'Inter',sans-serif; color:var(--text-muted); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; transition:all .2s ease; white-space:nowrap; }
        .tab-btn:hover { color:var(--text-secondary); background:rgba(255,255,255,.03); }
        .tab-btn.active { color:var(--text-primary); border-bottom-color:var(--accent-red); background:rgba(196,30,58,.08); }
        .tab-btn .tab-count { background:var(--bg-card); padding:.1rem .35rem; border-radius:8px; font-size:.55rem; margin-left:.3rem; font-family:'Roboto Mono',monospace; }
        .tab-btn.active .tab-count { background:var(--accent-red); color:white; }

        /* SUB-TAB BAR */
        .sub-tab-bar { display:flex; gap:.25rem; padding:.5rem 0; margin-bottom:.8rem; border-bottom:1px solid var(--border-color); }
        .sub-tab-btn { padding:.4rem .8rem; font-size:.65rem; font-weight:600; color:var(--text-muted); background:none; border:1px solid transparent; border-radius:6px; cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
        .sub-tab-btn:hover { color:var(--text-secondary); background:rgba(255,255,255,.03); }
        .sub-tab-btn.active { color:var(--text-primary); background:var(--bg-card); border-color:var(--border-color); }
        .sub-content { display:none; }
        .sub-content.active { display:block; animation:fadeInUp .3s ease-out; }

        /* CONTENT */
        .content-area { padding:1rem 1.5rem; max-width:1600px; margin:0 auto; animation:fadeInUp .5s ease-out; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        /* CARDS */
        .card { background:var(--glass-bg); -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); border:1px solid var(--glass-border); border-radius:10px; padding:.85rem; transition:border-color .3s ease; margin-bottom:.8rem; }
        .card:hover { border-color:var(--border-hover); }
        .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.7rem; padding-bottom:.5rem; border-bottom:1px solid var(--border-color); }
        .card-title { font-size:.72rem; font-weight:600; color:var(--text-primary); display:flex; align-items:center; gap:.4rem; text-transform:uppercase; letter-spacing:.04em; }
        .card-title .icon { width:16px; height:16px; display:flex; align-items:center; justify-content:center; background:var(--accent-red); border-radius:3px; font-size:.55rem; }

        /* STATS */
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.5rem; margin-bottom:.8rem; }
        .stats-grid-6 { grid-template-columns:repeat(6,1fr); }
        .stat-item { background:var(--bg-primary); border-radius:7px; padding:.55rem .4rem; text-align:center; border:1px solid var(--border-color); transition:all .25s ease; position:relative; overflow:hidden; }
        .stat-item::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; opacity:0; transition:opacity .25s ease; }
        .stat-item:hover { border-color:var(--border-hover); transform:translateY(-1px); }
        .stat-item:hover::before { opacity:1; }
        .stat-item.red::before { background:var(--accent-red); }
        .stat-item.green::before { background:var(--accent-green); }
        .stat-item.amber::before { background:var(--accent-amber); }
        .stat-item.blue::before { background:var(--accent-blue); }
        .stat-item.purple::before { background:var(--accent-purple); }
        .stat-value { font-size:1.3rem; font-weight:800; font-family:'Roboto Mono',monospace; line-height:1; font-variant-numeric:tabular-nums; }
        .stat-value.accent-red { color:var(--accent-red-light); }
        .stat-value.accent-green { color:var(--accent-green); }
        .stat-value.accent-amber { color:var(--accent-amber); }
        .stat-value.accent-blue { color:var(--accent-blue); }
        .stat-value.accent-purple { color:var(--accent-purple); }
        .stat-label { font-size:.55rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin-top:.25rem; font-weight:500; }

        /* LAYOUTS */
        .two-col { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; margin-bottom:.8rem; }
        .three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.8rem; margin-bottom:.8rem; }

        /* PORTFOLIO BANNER */
        .portfolio-banner { background:linear-gradient(135deg,rgba(196,30,58,.12),rgba(196,30,58,.04)); border:1px solid var(--glass-border); border-radius:10px; padding:1rem 1.2rem; margin-bottom:.8rem; }
        .portfolio-banner h2 { font-size:1rem; font-weight:700; margin-bottom:.2rem; }
        .portfolio-banner .scenario-badge { display:inline-block; background:var(--accent-red); color:white; padding:.15rem .5rem; border-radius:10px; font-size:.6rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-left:.5rem; }
        .portfolio-banner .scenario-badge.policy { background:var(--accent-blue); }
        .portfolio-banner p { font-size:.72rem; color:var(--text-secondary); margin-top:.4rem; line-height:1.5; }

        /* SECTION HEADERS */
        .section-title { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:.6rem; color:var(--text-primary); display:flex; align-items:center; gap:.4rem; }
        .section-title .dot { width:8px; height:8px; border-radius:50%; background:var(--accent-red); }

        /* BADGES */
        .badge { display:inline-block; padding:.15rem .45rem; border-radius:6px; font-size:.58rem; font-weight:600; text-transform:uppercase; letter-spacing:.03em; }
        .badge-low { background:rgba(34,197,94,.15); color:var(--accent-green); }
        .badge-medium { background:rgba(245,158,11,.15); color:var(--accent-amber); }
        .badge-high { background:rgba(196,30,58,.15); color:var(--accent-red-light); }
        .badge-critical { background:rgba(239,68,68,.25); color:#ef4444; }
        .badge-medium_high { background:rgba(249,115,22,.15); color:var(--accent-amber); }
        .badge-low_medium { background:rgba(34,197,94,.1); color:#86efac; }
        .badge-very_high { background:rgba(239,68,68,.3); color:#ef4444; }
        .lever-badge { display:inline-block; padding:.12rem .4rem; border-radius:4px; font-size:.55rem; font-weight:600; }

        /* LEVER CARDS */
        .lever-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.5rem; margin-bottom:.8rem; }
        .lever-card { background:var(--bg-primary); border:1px solid var(--border-color); border-radius:8px; padding:.6rem; transition:all .25s; position:relative; overflow:hidden; cursor:default; }
        .lever-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
        .lever-card:hover { border-color:var(--border-hover); transform:translateY(-1px); box-shadow:var(--shadow-md); }
        .lever-card-name { font-size:.62rem; font-weight:600; color:var(--text-primary); margin-bottom:.3rem; }
        .lever-card-stats { display:flex; gap:.6rem; margin-bottom:.3rem; }
        .lever-card-stat { text-align:center; }
        .lever-card-stat-val { font-size:.85rem; font-weight:700; font-family:'Roboto Mono',monospace; }
        .lever-card-stat-lbl { font-size:.48rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.04em; }
        .lever-card-bar { height:3px; border-radius:2px; background:var(--bg-card); overflow:hidden; }
        .lever-card-bar-fill { height:100%; border-radius:2px; transition:width .6s ease; }

        /* RISK CARDS */
        .risk-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:.5rem; margin-bottom:.8rem; }
        .risk-card { background:var(--bg-primary); border:1px solid var(--border-color); border-radius:8px; padding:.7rem; position:relative; overflow:hidden; }
        .risk-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
        .risk-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.4rem; }
        .risk-card-title { font-size:.68rem; font-weight:700; }
        .risk-card-count { font-size:.85rem; font-weight:800; font-family:'Roboto Mono',monospace; }
        .risk-card-body { font-size:.62rem; color:var(--text-secondary); line-height:1.5; }
        .risk-card-item { padding:.3rem 0; border-bottom:1px solid var(--border-color); }
        .risk-card-item:last-child { border-bottom:none; }

        /* ACTION TABLE */
        .action-table-wrap { max-height:500px; overflow-y:auto; border-radius:8px; border:1px solid var(--border-color); }
        .action-table { width:100%; border-collapse:collapse; font-size:.68rem; }
        .action-table thead { position:sticky; top:0; z-index:10; }
        .action-table th { background:var(--bg-secondary); padding:.5rem .4rem; text-align:left; font-size:.58rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); border-bottom:1px solid var(--border-color); cursor:pointer; }
        .action-table th:hover { color:var(--text-primary); }
        .action-table td { padding:.45rem .4rem; border-bottom:1px solid var(--border-color); color:var(--text-secondary); vertical-align:top; }
        .action-table tr:hover td { background:rgba(255,255,255,.02); }
        .action-table .impact-bar { height:4px; border-radius:2px; background:var(--accent-red); display:block; margin-top:.2rem; }
        .action-table .prob-bar { height:4px; border-radius:2px; display:block; margin-top:.2rem; }

        /* CHART CONTAINER */
        .chart-box { background:var(--bg-primary); border:1px solid var(--border-color); border-radius:8px; padding:.8rem; position:relative; }
        .chart-box canvas { max-height:280px; }

        /* TIMELINE */
        .timeline { display:flex; gap:0; margin-bottom:.8rem; }
        .timeline-phase { flex:1; position:relative; padding:.8rem .6rem .6rem; background:var(--bg-primary); border:1px solid var(--border-color); }
        .timeline-phase:first-child { border-radius:8px 0 0 8px; }
        .timeline-phase:last-child { border-radius:0 8px 8px 0; }
        .timeline-phase:only-child { border-radius:8px; }
        .timeline-phase::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--accent-red); opacity:.3; }
        .timeline-phase.active::before { opacity:1; }
        .timeline-phase-num { font-size:.85rem; font-weight:800; font-family:'Roboto Mono',monospace; color:var(--accent-red-light); margin-bottom:.3rem; }
        .timeline-phase-text { font-size:.62rem; color:var(--text-secondary); line-height:1.5; }

        /* ACCORDION */
        .accordion-item { border:1px solid var(--border-color); border-radius:8px; margin-bottom:.4rem; overflow:hidden; }
        .accordion-header { display:flex; align-items:center; justify-content:space-between; padding:.6rem .8rem; background:var(--bg-primary); cursor:pointer; transition:background .2s; }
        .accordion-header:hover { background:var(--bg-card); }
        .accordion-header h4 { font-size:.72rem; font-weight:600; display:flex; align-items:center; gap:.5rem; flex:1; }
        .accordion-header .chevron { font-size:.7rem; color:var(--text-muted); transition:transform .2s; }
        .accordion-header.open .chevron { transform:rotate(180deg); }
        .accordion-body { display:none; padding:.8rem; background:var(--bg-card); border-top:1px solid var(--border-color); }
        .accordion-body.open { display:block; animation:fadeInUp .2s ease-out; }
        .accordion-body p { font-size:.68rem; color:var(--text-secondary); line-height:1.6; margin-bottom:.5rem; }
        .accordion-body .sub-title { font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-primary); margin-bottom:.3rem; margin-top:.6rem; }

        /* STAKEHOLDER TABS */
        .sh-tabs { display:flex; gap:.3rem; margin-bottom:.6rem; }
        .sh-tab { padding:.3rem .6rem; font-size:.6rem; font-weight:600; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-primary); color:var(--text-muted); cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
        .sh-tab.active { background:var(--accent-red); color:white; border-color:var(--accent-red); }
        .sh-content { display:none; font-size:.68rem; color:var(--text-secondary); line-height:1.6; }
        .sh-content.active { display:block; }

        /* EXEC MEMO */
        .exec-section { margin-bottom:.8rem; }
        .exec-section h3 { font-size:.78rem; font-weight:700; color:var(--accent-red-light); margin-bottom:.3rem; }
        .exec-section p { font-size:.7rem; color:var(--text-secondary); line-height:1.6; }

        /* OPERATIONAL SUMMARY */
        .freshness-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.7rem; margin-bottom:.8rem; }
        .freshness-card { display:flex; align-items:center; justify-content:space-between; gap:.8rem; padding:.7rem .8rem; border:1px solid var(--border-color); border-radius:8px; background:var(--bg-secondary); }
        .freshness-card.ok { border-left:3px solid var(--accent-green); }
        .freshness-card.stale { border-left:3px solid var(--accent-red); }
        .freshness-title { font-size:.66rem; font-weight:700; color:var(--text-primary); }
        .freshness-detail { margin-top:.15rem; font-size:.58rem; color:var(--text-muted); }
        .freshness-state { font-size:.6rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
        .freshness-card.ok .freshness-state { color:var(--accent-green); }
        .freshness-card.stale .freshness-state { color:var(--accent-red-light); }
        .op-group { margin-bottom:.8rem; }
        .op-group:last-child { margin-bottom:0; }
        .op-group-title { display:flex; align-items:center; gap:.45rem; margin-bottom:.45rem; font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em; }
        .op-group-title.completed { color:var(--accent-green); }
        .op-group-title.action { color:var(--accent-blue); }
        .op-group-title.hold { color:var(--accent-amber); }
        .op-list { list-style:none; display:grid; gap:.35rem; }
        .op-item { display:flex; align-items:flex-start; gap:.55rem; padding:.55rem .65rem; border:1px solid var(--border-color); border-radius:7px; background:var(--bg-secondary); font-size:.69rem; line-height:1.45; color:var(--text-secondary); }
        .op-item.completed { border-left:3px solid var(--accent-green); }
        .op-item.action { border-left:3px solid var(--accent-blue); }
        .op-item.hold { border-left:3px solid var(--accent-amber); }
        .op-rank { flex:0 0 1.6rem; font-family:'Roboto Mono',monospace; font-size:.58rem; font-weight:700; color:var(--text-muted); padding-top:.08rem; }
        .op-text { color:var(--text-primary); }
        .op-score { margin-left:auto; flex-shrink:0; font-family:'Roboto Mono',monospace; font-size:.56rem; color:var(--text-muted); }
        .request-table-wrap { overflow-x:auto; }
        .request-table { width:100%; border-collapse:collapse; font-size:.66rem; }
        .request-table th { padding:.48rem; text-align:left; color:var(--text-muted); background:var(--bg-secondary); border-bottom:1px solid var(--border-color); font-size:.56rem; text-transform:uppercase; letter-spacing:.04em; }
        .request-table td { padding:.52rem .48rem; color:var(--text-secondary); border-bottom:1px solid var(--border-color); vertical-align:top; }
        .request-status { display:inline-block; border-radius:10px; padding:.12rem .4rem; font-size:.52rem; font-weight:800; letter-spacing:.03em; }
        .request-status.actionable { color:var(--accent-green); background:rgba(34,197,94,.12); }
        .request-status.contract-renegotiation { color:var(--accent-amber); background:rgba(245,158,11,.12); }
        .request-status.unmet,.request-status.blocked { color:var(--accent-red-light); background:rgba(196,30,58,.13); }
        .request-form { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:.65rem; margin-top:.6rem; }
        .request-field { display:flex; flex-direction:column; gap:.25rem; }
        .request-field.span-2 { grid-column:span 2; }
        .request-field.span-4 { grid-column:span 4; }
        .request-field label { font-size:.56rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.04em; }
        .request-field input,.request-field select,.request-field textarea { width:100%; padding:.48rem .55rem; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-input); color:var(--text-primary); font:inherit; font-size:.66rem; }
        .request-field textarea { min-height:66px; resize:vertical; }
        .request-field input:focus,.request-field select:focus,.request-field textarea:focus { outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 2px rgba(59,130,246,.18); }
        .request-actions { grid-column:span 4; display:flex; align-items:center; gap:.7rem; }
        .request-export-btn { padding:.48rem .8rem; border:1px solid var(--accent-blue); border-radius:6px; background:var(--accent-blue); color:white; font:inherit; font-size:.62rem; font-weight:700; cursor:pointer; }
        .request-note { font-size:.58rem; line-height:1.45; color:var(--text-muted); }
        .feature-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.45rem; }
        .feature-item { padding:.55rem .6rem; border:1px solid var(--border-color); border-left:3px solid var(--accent-green); border-radius:6px; background:var(--bg-secondary); }
        .feature-item.stale { border-left-color:var(--accent-amber); }
        .feature-name { font-size:.64rem; font-weight:700; color:var(--text-primary); }
        .feature-detail { margin-top:.2rem; font-size:.56rem; line-height:1.4; color:var(--text-muted); }

        /* COMPARISON TABLE */
        .comp-table { width:100%; border-collapse:collapse; font-size:.68rem; }
        .comp-table th { background:var(--bg-secondary); padding:.5rem; text-align:left; font-size:.58rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); border-bottom:1px solid var(--border-color); }
        .comp-table td { padding:.5rem; border-bottom:1px solid var(--border-color); color:var(--text-secondary); }
        .comp-table tr { cursor:pointer; transition:background .15s; }
        .comp-table tr:hover td { background:rgba(255,255,255,.03); }
        .comp-table .bar-stack { display:flex; height:8px; border-radius:4px; overflow:hidden; min-width:120px; }
        .comp-table .bar-seg { height:100%; }
        .lever-heat { min-width:42px; text-align:center !important; font-family:'Roboto Mono',monospace; font-weight:700; border-left:1px solid rgba(255,255,255,.025); }
        .lever-heat.zero { color:var(--text-muted); background:rgba(107,114,128,.08); }
        .comparison-bars { display:grid; gap:.8rem; }
        .comparison-lever-group { padding:.55rem .65rem; border:1px solid var(--border-color); border-radius:7px; background:var(--bg-secondary); }
        .comparison-lever-title { margin-bottom:.4rem; font-size:.6rem; font-weight:700; color:var(--text-primary); text-transform:uppercase; letter-spacing:.04em; }
        .comparison-bar-row { display:grid; grid-template-columns:minmax(120px,180px) 1fr 28px; align-items:center; gap:.45rem; margin:.25rem 0; font-size:.58rem; color:var(--text-secondary); }
        .comparison-bar-track { height:8px; overflow:hidden; border-radius:4px; background:rgba(255,255,255,.05); }
        .comparison-bar-fill { height:100%; border-radius:4px; min-width:0; }
        .portfolio-membership { display:flex; flex-wrap:wrap; gap:.25rem; margin-top:.25rem; }
        .portfolio-link { border:1px solid rgba(59,130,246,.35); border-radius:10px; padding:.1rem .38rem; background:rgba(59,130,246,.09); color:#93c5fd; font-size:.51rem; cursor:pointer; }
        .no-dispatch { color:var(--accent-amber); font-size:.52rem; font-weight:800; text-transform:uppercase; }

        /* COMPARISON MODULE */
        .comp-toggle { display:flex; gap:.3rem; margin-bottom:.8rem; }
        .comp-toggle-btn { padding:.35rem .7rem; font-size:.62rem; font-weight:600; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-primary); color:var(--text-muted); cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
        .comp-toggle-btn.active { background:var(--accent-red); color:white; border-color:var(--accent-red); }
        .comp-view { display:none; }
        .comp-view.active { display:block; }
        .portfolio-selector { display:flex; flex-wrap:wrap; gap:.35rem; margin-bottom:.8rem; }
        .port-check { display:flex; align-items:center; gap:.25rem; background:var(--bg-input); padding:.3rem .5rem; border-radius:4px; border:1px solid var(--border-color); cursor:pointer; font-size:.62rem; color:var(--text-secondary); transition:all .2s; }
        .port-check:hover { border-color:var(--accent-red); }
        .port-check input { accent-color:var(--accent-red); width:11px; height:11px; }
        .comp-stats-row { display:grid; gap:.5rem; margin-top:.8rem; }

        /* BAR LEGEND */
        .bar-legend { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.4rem; }
        .bar-legend-item { display:flex; align-items:center; gap:.2rem; font-size:.55rem; color:var(--text-muted); }
        .bar-legend-dot { width:8px; height:8px; border-radius:2px; }

        /* FILTER BAR */
        .filter-bar { display:flex; gap:.5rem; align-items:center; padding:.5rem .6rem; background:var(--bg-primary); border-radius:8px; border:1px solid var(--border-color); margin-bottom:.6rem; flex-wrap:wrap; }
        .filter-select { background:var(--bg-input); border:1px solid var(--border-color); border-radius:6px; padding:.4rem .6rem; color:var(--text-primary); font-size:.68rem; font-family:'Inter',sans-serif; cursor:pointer; }
        .filter-select:focus { outline:none; border-color:var(--accent-red); box-shadow:0 0 0 2px var(--accent-red-glow); }
        .filter-label { font-size:.6rem; color:var(--text-muted); font-weight:500; }
        .search-input { background:var(--bg-input); border:1px solid var(--border-color); border-radius:6px; padding:.4rem .6rem; color:var(--text-primary); font-size:.68rem; font-family:'Inter',sans-serif; min-width:140px; }
        .search-input:focus { outline:none; border-color:var(--accent-red); box-shadow:0 0 0 2px var(--accent-red-glow); }
        .search-input::placeholder { color:var(--text-muted); }
        .filter-count { font-size:.6rem; color:var(--text-muted); margin-left:auto; font-family:'Roboto Mono',monospace; }

        /* COPY BUTTON */
        .copy-btn { padding:.3rem .6rem; font-size:.58rem; font-weight:600; border:1px solid var(--border-color); border-radius:5px; background:var(--bg-primary); color:var(--text-muted); cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
        .copy-btn:hover { border-color:var(--accent-red); color:var(--text-primary); }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border-color); border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }

        /* ACCESSIBILITY */
        .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
        *:focus-visible { outline:2px solid var(--accent-blue); outline-offset:2px; }
        *:focus:not(:focus-visible) { outline:none; }

        /* REDUCED MOTION */
        @media(prefers-reduced-motion:reduce) {
            *,*::before,*::after { animation-duration:.01ms !important; transition-duration:.01ms !important; }
        }

        /* PRINT */
        @media print {
            .header,.tab-bar,.sub-tab-bar,.filter-bar,.copy-btn,.comp-toggle,.portfolio-selector,.request-form { display:none !important; }
            body { background:white; color:black; }
            .content-area { padding:0; max-width:none; }
            .card { background:white; border:1px solid #ccc; break-inside:avoid; backdrop-filter:none; -webkit-backdrop-filter:none; }
            .stat-value,.stat-label,.card-title,.section-title,.lever-card-name { color:black !important; }
            .tab-content { display:block !important; }
            .sub-content { display:block !important; }
            canvas { max-width:100%; max-height:200px; }
        }

        /* RESPONSIVE */
        @media(max-width:1100px) {
            .two-col,.three-col { grid-template-columns:1fr; }
            .stats-grid { grid-template-columns:repeat(2,1fr); }
            .stats-grid-6 { grid-template-columns:repeat(3,1fr); }
            .lever-grid { grid-template-columns:repeat(2,1fr); }
            .timeline { flex-direction:column; }
            .timeline-phase { border-radius:8px !important; }
            .header { flex-direction:column; gap:.4rem; }
        }
        @media(max-width:768px) {
            .content-area { padding:.6rem; }
            .stats-grid-6 { grid-template-columns:repeat(2,1fr); }
            .lever-grid { grid-template-columns:1fr; }
            .freshness-grid { grid-template-columns:1fr; }
            .feature-grid,.request-form { grid-template-columns:1fr; }
            .request-field.span-2,.request-field.span-4,.request-actions { grid-column:span 1; }
            .op-item { flex-wrap:wrap; }
            .op-score { width:100%; margin-left:2.15rem; }
            .filter-bar { flex-direction:column; align-items:stretch; }
        }

erred minor repairs, or corners cut on quality checks. The portfolio's policy nature (Quality_First) implies that availability gains must not compromise charging quality, density control, or safety standards; this may cap achievable availability slightly below 90% on some weeks, reducing theoretical upside but preserving margin and risk profile.; Reduced flexibility from formalized hub-and-spoke assistance vs. lower cost and better planning: codifying assistance rules at Carolina and Dorstfontein (30% reduction in ad-hoc assistance) will limit supervisors' ability to pull trucks at short notice. While this cuts fuel, overtime, and coordination chaos (savings), it may occasionally force deferral of marginal blasts or require better long-range planning to avoid production dips.; Capacity target recalibration vs. headline volume targets: recalibrating capacity targets to realistic, quality-compliant levels may lower nominal tonnage or blast count targets per MMU or per site. This can create tension with production KPIs focused on volume rather than margin or quality. The trade-off is smaller but more profitable and compliant output (value) versus chasing volume with higher rework, assistance, and maintenance costs.", "rp": {"Medium": 22, "High": 3}, "ap": 71.0, "ar": [{"a": "A5_e26677a5", "ip": 14.46}, {"a": "A5_2e9335d1", "ip": 13.57}, {"a": "M5_705_predictive_service", "ip": 7.74}, {"a": "M5_702_predictive_service", "ip": 4.83}, {"a": "M5_706_predictive_service", "ip": 4.71}, {"a": "M5_709_predictive_service", "ip": 4.7}, {"a": "M5_708_predictive_service", "ip": 4.32}, {"a": "M5_704_predictive_service", "ip": 4.03}, {"a": "A4_4160ca25", "ip": 3.82}, {"a": "A4_4eb01a65", "ip": 3.82}, {"a": "A4_71ad48f5", "ip": 3.82}, {"a": "A7_6e4144a9", "ip": 2.78}, {"a": "A7_57a0f4d3", "ip": 2.78}, {"a": "A7_2168480f", "ip": 2.78}, {"a": "A7_4120349c", "ip": 2.78}, {"a": "A7_66b5e04e", "ip": 2.78}, {"a": "A7_3a73e26d", "ip": 2.78}, {"a": "A7_4b0b6a44", "ip": 2.78}, {"a": "A7_58d1849 o shift more planned load and blast volume onto these now high-availability units, enabling consolidation of work from weaker units and supporting up to 1-2 redeployments or 1 retirement without loss of service level.; Synergy between Assistance Pattern Optimization and Route Distance Optimization: Formal hub-spoke rules at Carolina, Dorstfontein, and Isibonelo reduce ad-hoc assistance by about 30%; when combined with route distance optimization, this not only cuts assistance kilometres but also allows tighter routing of hub MMUs, improving average cycle times and freeing 5-10% of productive time per hub unit for core blasting rather than travel.; Synergy between Preventative Maintenance (M8 services) and Availability Improvements: Immediate M8 services on MMUs 705, 702, 706, 709, and 708 reduce unplanned downtime and stabilise availability; this underpins the targeted availability improvements on 761 and 760 by ensuring that support and backup units are mechanically reliable, enabling more aggressive capacity allocation to the top performers with lower operational risk.; Synergy between Capacity Target Recalibration and Assistance Rules at Hotspot Sites: Once hub-spoke rules are in place at Carolina, Dorstfontein, and Isibonelo, capacity targets can be recalibrated so that hubs carry higher planned utilisation while spokes are sized for peak but not average demand. This combination can unlock 1-3 MMUs for redeployment from these clusters in subsequent quarters while maintaining service reliability.", "kt": "Short-term downtime vs long-term availability: Immediate M8 services on MMUs 705, 702, 706, 709, and 708 will require planned downtime (likely 1-2 shifts per unit), temporarily reducing available capacity. The trade-off is a short-term loss of production (potentially 3-5% of weekly capacity per affected unit) in exchange for an expected + in avoided failures and improved availability, plus reduced emergency repair costs.; Reduced assistance flexibility vs cost and stability: Formalizing hub-spoke assistance rules at Carolina, Dorstfontein, and Isibonelo will limit ad-hoc cross-site support. This may reduce flexibility to respond to unexpected spikes in demand or last-minute schedule changes, but it yields material direct savings and more predictable operations. In extreme peak scenarios, this could mean accepting occasional under-servicing or needing temporary rentals instead of pulling in distant MMUs.; Higher utilisation on top-performing MMUs vs accelerated wear: Increasing availability and capacity targets on MMU-761 and MMU-760 concentrates workload on these units. While this maximizes value (material improvement), it can accelerate component wear and increase medium-term maintenance spend by an estimated 5-10% on these units unless maintenance intervals are adjusted and condition monitoring is tightened.; Route efficiency vs operator familiarity and safety margins: Route distance optimization may require operators to use less familiar but shorter routes or adjust staging points. This reduces kilometres and fuel costs, but may initially increase perceived risk or complexity for operators and could require additional training and route risk assessments, slightly increasing overhead in Q1-Q2.", "rp": {"Medium": 21, "High": 4}, "ap": 71.0, "ar": [{"a": "A5_e26677a5", "ip": 14.59}, {"a": "A5_2e9335d1", "ip": 13.69}, {"a": "M5_705_predictive_service", "ip": 7.82}, {"a": "M5_702_predictive_service", "ip": 4.87}, {"a": "M5_706_predictive_service", "ip": 4.76}, {"a": "M5_709_predictive_service", "ip": 4.74}, {"a": "M5_708_predictive_service", "ip": 4.36}, {"a": "A4_4160ca25", "ip": 3.86}, {"a": "A4_4eb01a65", "ip": 3.86}, {"a": "A4_71ad48f5", "ip": 3.86}, {"a": "A5_c132e079", "ip": 3.78}, {"a": "A7_6e4144a9", "ip": 2.81}, {"a": "A7_921671b7", "ip": 2.81}, {"a": "A7_0bf19786", "ip": 2.81}, {"a": "A7_062fb7a9", "ip": 2.81}, {"a": "A7_2168480f", "ip": 2.81}, {"a": "A7_66b5e04e", "ip": 2.81}, {"a": "A7_3a73e26d", "ip": 2.81}, {"a ules at Carolina, Dorstfontein, Isibonelo), and route distance optimization (fuel/tyre/driver-time savings). Assistance-pattern and route actions structurally reduce variable and overhead costs per tonne.", "ks": "Synergy between Operational Availability and Capacity Target Recalibration: Improving availability on MMU-761 and MMU-760 (combined meaningful margin improvement) only translates into realized value if capacity targets are recalibrated to absorb the extra productive hours. By raising targets on these improved units and slightly lowering targets on chronically constrained or older units, Enaex can shift about 5-10% of total planned volume onto the most reliable MMUs, increasing tonnes per MMU and enabling future retirements or redeployments without service risk.; Synergy between Assistance Pattern Optimization and Route Distance Optimization at hotspot sites: Formalizing hub-spoke relationships for Carolina, Dorstfontein, and Isibonelo creates predictable assistance flows. When combined with route distance optimization, assistance and primary routes can be redesigned to minimize deadheading and cross-site travel. This can reduce assistance kilometres by about 20-30% at these sites, cutting fuel/tyre costs and freeing up 0.1-0.2 MMU-equivalents of time per hotspot for productive loading and blasting.; Synergy between Preventative Maintenance and Availability Improvements: Immediate M8 services for MMU 705/702/706/709/708 (combined material) reduce breakdown probability on high-risk units. This stabilizes the availability baseline, making the targeted 90% availability for MMU-761 and MMU-760 more achievable at fleet level. The combined effect is fewer emergency call-outs and less need for ad-hoc assistance, reinforcing the new hub-spoke rules and supporting more accurate capacity planning.; Synergy between Capacity Target Recalibration and Assistance Reduction: By recalibrating capacity targets at Carolina, Dorstfontein, and Isibonelo to reflect realistic, post-optimization availability and routing, Enaex can reduce structural over-reliance on assistance. Lowering targets on chronically assisted units and increasing them on stable hub units can reduce assistance events by about 25-30%, capturing both the direct savings and secondary benefits (less overtime, fewer standby costs).", "kt": "Short-term maintenance downtime vs. availability gains: Immediate M8 services for MMU 705/702/706/709/708 will temporarily reduce availability (e.g., 1-2 days per unit). This may defer about 1-3 blasts per unit in the service window, potentially impacting short-term production KPIs. However, the modeled value (material) implies that preventing even 1-2 major breakdowns per unit over the next 6-12 months more than offsets the short-term loss. Operations must accept a controlled, scheduled downtime now to avoid unplanned outages later.; Reduced assistance flexibility vs. cost and stability benefits: Formalizing hub-spoke rules at Carolina, Dorstfontein, and Isibonelo will limit supervisors' ability to request last-minute cross-site assistance. While this reduces ad-hoc responsiveness, it delivers material savings and more predictable fleet utilization. The trade-off is that some marginal, low-value blasts may be delayed rather than covered by emergency assistance, which needs to be managed via better planning and communication with the mines.; Tighter capacity targets vs. operator and asset strain: Recalibrating capacity targets upward on high-availability units (e.g., MMU-761, MMU-760) will increase daily workload and perceived pressure on operators and equipment. If targets are pushed too aggressively (e.g., more than 10-15% increase without support), it can drive fatigue, safety risk, and accelerated wear. The value is contingent on a balanced approach: moderate target increases combined with route optimization and better scheduling, not just \"work harder\".; Route optimization vs. site-specific constraints and relationships: Shorter d 77->90%) drive material of the value and directly support the group-wide productivity potential.", "ca": "High alignment: cost reductions (about 69% of total value) with margin improvement. Assistance pattern optimization and capacity target recalibration are structurally reducing cost-to-serve by cutting ad-hoc assistance and aligning capacity to realistic, data-backed targets. This reduces overtime, standby costs, and unproductive kilometers, especially at hotspot sites Carolina and Dorstfontein.", "ks": "Synergy between OPERATIONAL_AVAILABILITY and CAPACITY_TARGET_RECALIBRATION: Improving availability on MMU-761 and MMU-760 to about 90% and then recalibrating their capacity targets ensures the additional available hours are converted into productive, billable work rather than idle standby. This combination amplifies margin improvement by pairing mechanical reliability with realistic, stretch-but-achievable productivity expectations.; Synergy between ASSISTANCE_PATTERN_OPTIMIZATION and PRODUCTIVITY_OPTIMIZATION: Formalizing hub-spoke assistance rules at Carolina and Dorstfontein reduces ad-hoc assistance by about 30%, which frees up MMU hours currently lost to travel and standby. The freed capacity can then be directed into the 6 productivity optimization actions (e.g., patterning, shift alignment, loading discipline), turning cost reductions from reduced assistance into incremental productive tonnes and higher revenue density per MMU.; Synergy between preventative M8 services and availability improvements: Executing the 6 high-risk M8 services (MMUs 702, 704, 705, 706, 708, 709) before availability uplift initiatives stabilizes the technical baseline. This reduces the probability that newly set higher availability and capacity targets will be missed due to avoidable breakdowns, protecting both the availability value and the capacity recalibration value.; Synergy between hotspot assistance optimization and future redeployments: By structurally reducing assistance dependency at Carolina and Dorstfontein, the portfolio creates a more predictable base-load per MMU. This, in turn, enables Finance and Operations to identify surplus capacity for up to 15 redeployments and 5 retirements per quarter in later phases without compromising service levels at these historically fragile sites.", "kt": "Short-term availability loss vs. long-term uptime: Scheduling immediate M8 services on six MMUs (702, 704, 705, 706, 708, 709) will temporarily reduce available hours (e.g., 1-2 days per unit). This may require short-term assistance or overtime to maintain production, but it unlocks an estimated + in avoided breakdown costs and supports the availability improvement value over the quarter.; Reduced assistance flexibility vs. cost reductions: Formalizing hub-spoke assistance rules at Carolina and Dorstfontein (30% reduction in ad-hoc assistance) saves an estimated material direct value from the top two actions (and across the lever) but reduces the ability to respond to unplanned production spikes with last-minute support. Operations must accept tighter planning discipline and potentially higher penalties for late, unplanned changes in exchange for lower structural costs.; Higher capacity targets vs. operator and asset strain: Recalibrating capacity targets (value) increases expected output per MMU. If not sequenced after availability and maintenance improvements, this can lead to operator fatigue, higher fuel and wear rates, and increased breakdown risk. The portfolio must therefore phase target increases only after reliability is stabilized to avoid eroding the margin improvement.; The focus should be on high-value units vs. equity across sites: Prioritizing MMU-761 and MMU-760 for availability improvement (material combined value) concentrates benefits on specific contracts or pits. Other sites may perceive underinvestment in their units, even though group-level ROI is higher. This trade-off is necessary to maximize the portfolio value bu alized savings from route optimization by 5-10% through reduced dead-heading and standby.", "kt": "Short-term availability loss vs long-term reliability and cost reductions: scheduling immediate M8 preventative services for six MMUs (702, 704, 705, 706, 708, 709) will temporarily reduce available capacity, potentially increasing assistance needs in the next 1-2 weeks. The trade-off is a controlled, planned downtime now versus higher-cost unplanned breakdowns later that could erode a material portion (20-30%) of the projected availability value.; Tighter capacity targets vs operational flexibility: recalibrating capacity targets at Carolina (120% -> closer to 100%) and Foskor (159% -> closer to 110% or below) will reduce chronic over-utilization and cost overruns, but it also reduces the buffer for last-minute production surges. Finance gains more predictable costs and margins, while Operations loses some surge capacity unless redeployments are carefully phased and assistance strategies are updated.", "rp": {"Medium": 18, "High": 7}, "ap": 69.0, "ar": [{"a": "A5_e26677a5", "ip": 16.93}, {"a": "A5_2e9335d1", "ip": 15.89}, {"a": "M5_705_predictive_service", "ip": 9.07}, {"a": "M5_702_predictive_service", "ip": 5.66}, {"a": "M5_706_predictive_service", "ip": 5.52}, {"a": "M5_709_predictive_service", "ip": 5.5}, {"a": "M5_708_predictive_service", "ip": 5.06}, {"a": "M5_704_predictive_service", "ip": 4.72}, {"a": "A7_57a0f4d3", "ip": 3.26}, {"a": "A7_015f5672", "ip": 3.26}, {"a": "A7_0bf19786", "ip": 3.26}, {"a": "A7_062fb7a9", "ip": 3.26}, {"a": "A7_2168480f", "ip": 3.26}, {"a": "A7_4b0b6a44", "ip": 3.26}, {"a": "A6_8ce59fe0", "ip": 1.67}, {"a": "A6_122ff2c8", "ip": 1.65}, {"a": "A6_56179f3f", "ip": 1.52}, {"a": "A6_c7283502", "ip": 1.51}, {"a": "A6_a8984fad", "ip": 1.5}, {"a": "A6_26976cca", "ip": 1.43}, {"a": "A6_6ad0d6bb", "ip": 1.41}, {"a": "A6_ac60ad17", "ip": 1.4}, {"a": "N2_77db72ba", "ip": 0.0}, {"a": "N2_48dbe415", "ip": 0.0}, {"a": "N2_0c2c630e", "ip": 0.0}], " .", "ks": "Synergy between Operational Availability improvements and Assistance Pattern Optimization at hotspot sites: By lifting availability of MMU-761 and MMU-760 to 90% and preventing failures on MMU-702/705/706, the fleet can reliably support formalized hub-spoke assistance rules at Carolina, Dorstfontein, and Isibonelo. This combination reduces ad-hoc assistance by about 30% at each hotspot while maintaining service levels, unlocking both productivity (fewer disruptions) and cost reductions (less standby and travel).; Synergy between Capacity Target Recalibration and Route Distance Optimization: Recalibrating capacity targets at Carolina and Witbank Mini-Pits (value) allows planners to assign MMUs to closer, more efficient routes without overloading specific units. When combined with route distance optimization, this reduces average km per tonne and balances wear across the fleet, lowering maintenance burden and fuel costs while sustaining availability gains.; Synergy between Preventative Maintenance (M8 services) and Aggressive Redeployment: Performing immediate preventative services on MMU-702/705/706 before or early in redeployment phases reduces the risk that newly redeployed units fail at receiving sites. This protects the expected availability value and avoids emergency assistance that would undermine the new hub-spoke rules.; Synergy between Travel Cost Elimination and Assistance Pattern Optimization: Eliminating low-value or redundant travel legs (Lever 2) reinforces the new assistance rules by structurally removing legacy patterns of ad-hoc support. This locks in behavioral change, ensuring that the modeled assistance savings are realized and not eroded by informal workarounds.", "kt": "Short-term availability loss vs long-term availability gain: Pulling MMUs into preventative M8 services (MMU-702/705/706) and redeploying them may temporarily reduce available capacity at donor sites. The trade-off is a planned short dip in availability (e.g., 1-2 days of service downtime) for a modeled + in avoided unplanned downtime and material sustained availability improvements across the portfolio.; Operational stability vs aggressive redeployment pace: Implementing 15 redeployments in a single quarter maximizes the upside but increases change complexity. There is a risk of coordination failures (misaligned shifts, untrained operators at receiving sites) that could temporarily reduce blast reliability. A phased rollout within the quarter (pilot hub-spoke at one hotspot first, then scale) slightly delays full savings but reduces operational risk.; Local autonomy vs standardized assistance rules: Formalizing hub-spoke relationships at Carolina, Dorstfontein, and Isibonelo reduces ad-hoc flexibility for local supervisors. While this yields material savings and more predictable fleet utilization, it may be perceived as loss of control and could slow response to rare, extreme events unless clear escalation paths are defined.; Maintenance workload concentration vs failure risk reduction: Prioritizing three high-risk M8 services in a short window concentrates maintenance workload and may defer lower-priority jobs. This can create a backlog and perceived pressure in workshops, but it materially reduces the probability of high-impact failures on units with risk scores about 0.75-0.76, which would be far more costly in both downtime and repair costs.; Tighter capacity targets vs buffer for demand spikes: Recalibrating capacity targets at Carolina and Witbank Mini-Pits to address 120-127% utilization improves planning accuracy and reduces chronic overuse of certain MMUs. However, it also reduces the implicit 'buffer' that over-utilization provided for unexpected demand spikes, requiring better forecasting and contingency plans (e.g., defined surge assistance rules within the new hub-spoke framework).", "rp": {"Medium": 10, "High": 5}, "ap": 65.0, "ar": [{"a": "A5_e26677a5", "ip": 22.18}, {"a": "A5_2e9335d1", "ip": 20.82}, {"a": "M5_70     function riskBadge(level) {
        if (!level) return '';
        var cl = level.toLowerCase().replace(/\s+/g,'_');
        return '<span class="badge badge-'+cl+'">'+level+'</span>';
    }
    function leverBadge(lev) {
        var c = LEVER_COLORS[lev] || '#666';
        return '<span class="lever-badge" style="background:'+c+'22;color:'+c+'">'+(LEVER_NAMES[lev]||'L'+lev)+'</span>';
    }
    function probColor(p) {
        if (p>=70) return 'var(--accent-green)';
        if (p>=50) return 'var(--accent-amber)';
        return 'var(--accent-red-light)';
    }
    function truncate(text,len) { if(!text) return ''; return text.length>len ? text.substring(0,len)+'...' : text; }
    function escHtml(value) {
        return String(value==null?'':value).replace(/[&<>"']/g,function(ch){
            return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
        });
    }
    function csvValue(value) {
        var text=String(value==null?'':value);
        return /[",\n\r]/.test(text) ? '"'+text.replace(/"/g,'""')+'"' : text;
    }
    function localIsoDate(date) {
        var d=date||new Date();
        return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    }
    function exportRedeploymentRequest() {
        var form=document.getElementById('redeploymentRequestForm');
        if(!form || !form.reportValidity()) return;
        var now=new Date();
        var draftId='DRAFT-'+localIsoDate(now).replace(/-/g,'')+'-'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0')+String(now.getSeconds()).padStart(2,'0');
        var row={
            request_id:draftId,
            request_date:localIsoDate(now),
            destination_site:form.elements.destination_site.value.trim(),
            required_mmu_count:form.elements.required_mmu_count.value,
            required_tank_size_t:form.elements.required_tank_size_t.value,
            required_mmu_type:form.elements.required_mmu_type.value.trim(),
            need_by_date:form.elements.need_by_date.value,
            monthly_tonnes:form.elements.monthly_tonnes.value,
            customers_or_trials:form.elements.customers_or_trials.value.trim(),
            route_distances_km:form.elements.route_distances_km.value.trim(),
            business_reason:form.elements.business_reason.value.trim(),
            requester:form.elements.requester.value.trim(),
            approval_status:'DRAFT',
            hard_requirement:'FALSE',
            allow_size_substitution:'FALSE',
            cross_border_approved:'FALSE',
            status_as_of:localIsoDate(now)
        };
        var csv='\uFEFF'+D.requestColumns.map(csvValue).join(',')+'\r\n'
            +D.requestColumns.map(function(column){return csvValue(row[column]||'');}).join(',')+'\r\n';
        var url=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
        var link=document.createElement('a');
        link.href=url;
        link.download=draftId+'_redeployment_request.csv';
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        announce('Draft redeployment request CSV exported for governance review');
    }

    function switchTab(id) {
        var btns = document.querySelectorAll('.tab-btn');
        btns.forEach(function(b) {
            var match = b.getAttribute('data-tab')===id;
            b.classList.toggle('active',match);
            b.setAttribute('aria-selected',match?'true':'false');
        });
        document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
        var el = document.getElementById('tab-'+id);
        if (el) {
            el.classList.add('active');
            renderChartsForTab(id);
        }
        var label = id==='exec' ? 'Executive Summary' : (id==='ops' ? 'Operational Summary' : id.replace('p','Portfolio '));
        announce('Switched to '+label+' tab');
    }

    function switchSubTab(pid,name) {
        var container = document.getElementById('tab-p'+pid);
        if(!container) return;
        container.querySelectorAll('.sub-tab-btn').forEach(function(b){b.classList.remove('active');b.setAttribute('aria-selected','false');});
        container.querySelectorAll('.sub-content').forEach(function(c){c.classList.remove('active');});
        var btn = container.querySelector('[data-subtab="'+name+'"]');
        if(btn){btn.classList.add('active');btn.setAttribute('aria-selected','true');}
        var panel = document.getElementById('sub-'+pid+'-'+name);
        if(panel) panel.classList.add('active');
        renderChartsForSubTab(pid,name);
        announce('Switched to '+name+' view');
    }
