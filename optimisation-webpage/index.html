rational Summary is the authoritative dispatch view. Portfolio scenarios below include only actions that passed the current operational audit."}, {"s": "Headline", "c": "Unlock EV from MMU fleet with a single, policy-aligned optimization portfolio"}, {"s": "Recommended Portfolio", "c": "Productivity Focus"}, {"s": "Recommendation Rationale", "c": "Productivity Focus delivers the joint-highest upside while tightly aligning with Enaex Africa's strategic emphasis on productivity, availability and quality at mining sites. It concentrates actions in high-ROI levers (productivity, availability, capacity recalibration) and avoids over-weighting diversity moves that add operational complexity without additional value. This portfolio is policy-consistent, easier to communicate to mining clients, and can be phased over two quarters within the 15 redeployment / 5 retirement per-quarter constraint."}, {"s": "Board Memo", "c": "Adoption of the Productivity Focus portfolio is recommended, unlocking upside from MMU fleet optimization while staying aligned with Enaex Africa's productivity and service commitments. This portfolio matches the highest-value option (Balanced Optimisation) but is simpler to execute and easier to align with existing client contracts and operating policies. The analysis covers 106 candidate actions across five levers, with total theoretical value. In practice, 67 actions in productivity and operational availability generate 89% of the value, making them the core of the recommended plan. All portfolios require 25 actions, so It is proposed that a two-quarter rollout to respect capacity limits of 15 redeployments and 5 retirements per quarter. Phase 1 should prioritize high-impact productivity and availability moves at the largest mining sites, targeting at least EV within six months. Phase 2 should complete remaining recalibrations and route optimizations. This approach maximizes ROI, protects quality and safety, and creates a repeatable playbook for future MMU deployments across Africa."}, {"s": "Key Finding 1", "c": "Top portfolios converge EV, indicating a clear value ceiling under current constraints."}, {"s": "Key Finding 2", "c": "Productivity and operational availability levers drive 89% of value (+ across 67 actions)."}, {"s": "Key Finding 3", "c": "Each portfolio requires 25 actions, exceeding quarterly capacity (15 redeployments, 5 retirements), so phasing is essential."}, {"s": "Key Finding 4", "c": "Policy-driven portfolios outperform pure cost focus by up EV while preserving service quality."}, {"s": "Key Finding 5", "c": "Diversity scenarios deliver similar value but add complexity without incremental EV upside."}, {"s": "Scenario: aggressive", "c": "Aggressive Redeployment (EV) front-loads redeployments and retirements to minimize cost and idle capacity. It stresses operational availability and client service buffers, increases execution risk, and pushes against quarterly capacity limits, but could accelerate cash benefits if change management is flawless."}, {"s": "Scenario: conservative", "c": "Maintenance Priority and Quality First (EV each) emphasize reliability, safety and quality KPIs over pure productivity. They slightly sacrifice value (c. vs top portfolios) in exchange for lower operational risk and smoother client relationships, making them suitable if market or regulatory uncertainty increases."}, {"s": "Scenario: balanced", "c": "Productivity Focus and Balanced Optimisation (EV) balance productivity, availability and risk. Productivity Focus is the preferred balanced scenario: it concentrates on high-ROI productivity and availability levers, keeps complexity manageable, and can be phased over two quarters within redeployment and retirement capacity."}], "cp": [{"nm": "Balanced Optimisation", "ac": 25, "rl": "medium", "cx": "medium-high"}, {"nm": "Productivity Focus", "ac": 25, "rl": "medium", "cx": "medium"}, {"nm": "Quality First", "ac": 25, "rl": "low-medium", "cx": "medium"}, {"nm": "Main y and a high overall risk score of 0.62. The key risks are a 45% probability of equipment breakdown or chronic reliability issues on MMU 717, amplified by an already elevated maintenance risk of 0.72, and a 30% probability of customer service disruption during the transition to higher utilization, such as loading delays or misalignment with the blasting schedule. Mitigating these risks will require proactive maintenance planning, clear production and blasting coordination, and phased ramp-up of utilization to protect both equipment health and service levels while capturing the identified productivity gains.", "wi": "If the business does not implement this productivity optimization on MMU 717, the 3,130 tonnes of idle capacity at Wildfontein will remain underutilized, and the business forgoes an expected margin improvement and a risk-adjusted benefit. Over a 12-month horizon, this equates to leaving meaningful meaningful upside unrealized after risk adjustment every month, while fixed costs continue unchanged. The site will continue operating at just 12.2% productivity despite 200% utilization pressure, increasing the likelihood of ad-hoc overtime, reactive scheduling, and potential service bottlenecks during peak demand. Delaying the intervention by even six months effectively halves the near-term value capture and risks locking in inefficient operating patterns that become harder and more expensive to correct later.", "ob": "For Operations, this action turns 3,130 tonnes of idle MMU 717 capacity into productive output by lifting productivity from 12.2% to a targeted 85%. It will be necessary to tighten daily scheduling, It is recommended to align the MMU more closely with the Wildfontein blasting plan, and coordinate crews to minimize loading and waiting time. The upside is a more predictable, higher-throughput operation that reduces last-minute truck reallocations and firefighting during peak days. The main operational risks are temporary service disruptions and congestion during the ramp-up, which can be mitigate through a phased increase in utilization and clear communication with the customer on schedule changes.", "fb": "From a Finance perspective, this intervention offers an expected margin improvement and a risk-adjusted benefit, with no incremental cost outlay indicated and therefore a very high implied ROI. With a 63% probability of success and an 80% confidence interval thousand, the downside risk is limited relative to the potential value unlocked from existing assets. Because this is a productivity play rather than a capex project, payback is effectively immediate once the higher productivity levels are achieved, and cash flow improves as additional tonnes are processed through current fixed cost structures. Not proceeding means the business structurally forgo material risk-adjusted benefit and continue to carry the cost of underutilized capacity on MMU 717.", "mb": "For Maintenance, the key challenge is to support a sharp utilization increase on MMU 717, which already carries a high maintenance risk score of 0.72 and a 45% probability of breakdown during ramp-up. To protect equipment health, It is advisable to front-load inspections, refresh condition monitoring, and lock in a preventive maintenance schedule that aligns with the new operating pattern rather than the current low-use regime. This may require short, planned maintenance windows during the early ramp-up to avoid longer unplanned outages later. By managing these risks proactively, This can sustain the targeted 85% productivity without accelerating wear beyond acceptable limits, while also reducing the likelihood of service-impacting failures at Wildfontein."}, "A1_0b9f4048": {"es": "Optimising MMU 731 productivity at Wildfontein from 8.5% toward an 85% target unlocks an expected margin improvement, with a risk-adjusted benefit. This intervention converts 2,853 tonnes of idle capacity into revenue-generating output without additional capex, improving site utilisation from the current 42.7% and strengthening contract profitability at Wildfontein.", "dd": "This productivity intervention focuses on MMU 731 at Wildfontein, where current productivity sits at only 8.5% against an 85% target, leaving 2,853 tonnes of capacity idle and under-monetised. By redesigning loading sequences, tightening alignment with blasting schedules, and improving crew deployment around MMU 731, The aim is to capture an expected margin improvement, translating into a risk-adjusted benefit given a 62% probability of success and a high overall risk score of 0.61. The site currently operates at 42.7% utilisation, so this action directly increases throughput without additional fixed cost, enhancing unit economics and contract resilience. However, the elevated maintenance risk (0.62) and a 45% probability of breakdown or downtime during ramp-up, combined with a 35% probability of temporary customer service disruption, require a tightly managed implementation plan with preventive maintenance windows, contingency MMU coverage, and close coordination with the mine's blasting schedule. Within", "wi": "If the business does not implement this optimisation, MMU 731 will continue to operate at roughly 8.5% productivity, leaving approximately 2,853 tonnes of capacity idle and forfeiting an expected margin improvement, or on a risk-adjusted basis. The site will remain at about 42.7% utilisation, limiting the ability to absorb volume growth or schedule volatility without additional equipment or overtime costs. Over a 12-month horizon, this lost uplift equates to roughly per week in unrealised margin, eroding the business case for future investment at Wildfontein and weakening the competitive position in contract renewals. Delaying the intervention by even six months would defer material risk-adjusted benefit and lock in another half-year of suboptimal crew and asset utilisation.", "ob": "For Operations, this action converts 2,853 tonnes of idle MMU 731 capacity into usable output by lifting productivity from 8.5% toward 85%, directly improving Wildfontein's ability to meet blast plans without adding new units. It will be necessary to re-sequence loading, tighten shift handovers, and align MMU 731 movements more closely with the mine's blasting schedule to avoid bottlenecks and minimise the 35% risk of temporary service disruption. The intervention should raise effective site utilisation above the current 42.7%, providing more headroom to handle peak days and unplanned changes without overtime or emergency rescheduling. A phased ramp-up with clear daily productivity targets and contingency coverage from other MMUs will be critical to maintain on-time blast readiness while the business push the unit harder.", "fb": "From a Finance perspective, this optimisation offers an expected margin improvement with no incremental capex and no direct cost reductions, translating into a risk-adjusted benefit at a 62% success probability. Because the intervention primarily monetises existing idle capacity on MMU 731, the payback is effectively immediate once higher productivity is achieved, and the uplift flows directly into operating margin at Wildfontein. Even if the business only capture 50% of the target uplift, the site still gains over material in additional margin, with downside risk mainly linked to temporary downtime or service disruption rather than structural cost increases. Not proceeding means locking in an opportunity cost of roughly per week in unrealised margin, which compounds over the contract term and weakens the NPV on the Wildfontein engagement.", "mb": "For Maintenance, the key challenge is to support a substantial utilisation increase on MMU 731, where maintenance risk is already elevated at 0.62 and the probability of breakdown or increased downtime during ramp-up is estimated at 45%. To protect the margin opportunity (risk-adjusted), It will be necessary to front-load inspections, refresh condition monitoring baselines, and tighten planned service intervals as the business move productivity toward the 85% target. A detailed component risk review (pumps, drive train, hydraulics, and critical safety systems) and a spares strategy that anticipates higher wear rates will be essential to avoid extended outages. Coordinating short, high-discipline maintenance windows with Operations will help contain unplanned downtime and reduce the likelihood that maintenance-related delays trigger the 35% risk of customer service disruption during the optimisation period."}, "A1_f4574d58": {"es": "Optimizing MMU 752's productivity at Wildfontein from 5.8% to an 85% target unlocks material gross margin improvement, with a risk-adjusted benefit at a 61% probability of success. By converting 3,519 tonnes of idle capacity into billable output, this intervention materially improves site economics without additional capital spend, despite a high overall risk score of 0.62.", "dd": "MMU 752 at Wildfontein is currently operating at only 5.8% productivity with site utilization at 43.7%, leaving 3,519 tonnes of capacity idle and constraining revenue from an existing asset. This productivity optimization initiative (Lever 1) targets an uplift to 85% productivity, translating into a gross margin improvement and an overall benefit, with no incremental cost outlay and a 61% probability of success. The core levers include tighter shift and blast scheduling, improved operator deployment, and standardised loading and travel cycles to ensure the MMU is consistently aligned to the blasting plan. The high risk score of 0.62 is driven by two main factors: a 45% probability that operator resistance, suboptimal shift planning, and learning-curve effects will limit the uplift; and a 40% probability that higher duty cycles on a unit with a maintenance risk of 0.63 will increase breakdowns and unplanned downtime. Even after risk adjustment, the intervention delivers an upside, making it a high-impact, high-risk opportunity that requires disciplined change management, robust maintenance planning, and close performance tracking to capture the upside while containing operational and reliability risks.", "wi": "If the business does not implement this productivity intervention on MMU 752, the 3,519 tonnes of idle capacity at Wildfontein will remain underutilized, and the business will forgo up to material gross margin improvement and material risk-adjusted benefit. The MMU will continue to operate at around 5.8% productivity, effectively locking in low site utilization (43.7%) and forcing the operation to rely on additional shifts, external capacity, or schedule compromises to meet blasting requirements. Over a typical planning horizon, this lost margin compounds into weaker cash generation from the Wildfontein contract and reduces the ability to absorb cost shocks or invest in higher-return initiatives. In addition, by not addressing operator practices and planning discipline now, the business risks entrenching inefficient work patterns that will be more costly and disruptive to change later, while still carrying the same underlying maintenance risk profile without the benefit of higher revenue per operating hour.", "ob": "For Operations, this intervention turns MMU 752 from a 5.8% productive unit into a high-utilization asset targeting 85%, unlocking 3,519 tonnes of currently idle capacity at Wildfontein. By tightening shift planning, aligning the MMU schedule to the blast plan, and standardising operator practices, It is possible to reduce bottlenecks and avoid needing extra equipment or overtime to meet the same blasting volume. The uplift supports more predictable daily output and better alignment between drilling, charging, and blasting activities, which simplifies crew coordination and reduces last-minute rescheduling. If the business does not act, low utilization will persist, and you will continue to manage around a chronically underperforming unit, increasing operational complexity without any upside.", "fb": "From a Finance perspective, the MMU 752 productivity uplift offers a gross margin increase and an overall benefit, with a risk-adjusted benefit at a 61% success probability. There is no direct cost reduction and no additional capital required, so the effective payback is immediate once the uplift is achieved, and the incremental margin flows straight to operating profit and cash. The high risk score of 0.62 means actual outcomes could range widely, but even Not implementing this action effectively means accepting a foregone margin of over material from an existing asset, which weakens contract profitability and the ability to fund other high-return projects internally.", "mb": "For Maintenance, this plan will increase MMU 752's duty cycle as the business move from 5.8% towards 85% productivity, directly interacting with its elevated maintenance risk score of 0.63. There is a 40% probability that higher utilisation will drive more breakdowns and unplanned downtime, so It is necessary to front-load condition assessments, tighten preventive maintenance intervals, and ensure critical spares availability before ramp-up. By proactively managing component wear, monitoring key health indicators, and coordinating maintenance windows with the new operating schedule, This can convert more hours into productive output without a spike in reactive repairs. If the business does not intervene, the unit will remain underutilized, and The plan will continue to carry the same risk profile and fixed maintenance overhead without the benefit of higher revenue and margin per operating hour."}, "A1_ae1f1a6b": {"es": "By lifting MMU 754 productivity at Wildfontein from 22.6% to 85%, This can unlock an expected margin improvement, with a risk-adjusted benefit and an 80% confidence range. This intervention converts 2,224 tonnes of idle capacity into revenue-generating output without additional capital spend, directly improving site profitability despite s, increasing the likelihood that reliability issues will surface reactively during peak demand, when the cost of downtime and customer disruption is highest.", "ob": "For Operations, this action converts 2,224 tonnes of currently idle MMU 754 capacity into productive output by lifting productivity from 22.6% to 85% at a site already running at 101.7% utilization. The change will require tighter scheduling, revised loading patterns, and more disciplined cycle times, as well as potential adjustments to shift patterns to avoid bottlenecks and ensure blasts are serviced on time. There is a 35% probability of temporary customer service disruption during the transition, so the business needs a phased implementation plan with clear blast calendars, contingency coverage, and close coordination with the mine's planning team. If executed well, this will reduce operational strain on other units, improve on-time blast performance, and give Operations more headroom without adding new equipment.", "fb": "From a Finance perspective, the intervention offers an expected margin improvement with no incremental cost reductions and no new capital outlay, translating into a risk-adjusted benefit. The overall risk score of 0.62, driven by a 45% probability of breakdown-related underperformance and a 35% probability of service disruption, means It is advisable to treat this as a medium-to-high volatility cash-flow improvement, but still attractive relative to its lever rank of #50. Not pursuing the action effectively locks in a multi-material-rand annual earnings gap at Wildfontein, while pursuing it with strong risk controls can materially lift site EBITDA without increasing fixed costs.", "mb": "For Maintenance, the key issue is that MMU 754 carries a high maintenance risk score of 0.7, with a 45% probability that breakdowns or chronic unreliability will undermine the planned productivity ramp-up. Increasing utilization from 22.6% to 85% will stress the unit more frequently, so the busi  between operations, maintenance, and customer scheduling to ramp up output while protecting equipment health and service reliability, ensuring the realised value remains within the confidence band.", "wi": "If the business does not implement this productivity optimisation on MMU 756, this effectively leaves the full margin improvement and the 1,042 tonnes of idle capacity unrealized, locking in a risk-adjusted benefit loss for this asset alone. The site will continue operating at 120.3% utilisation but with only 15.6% productivity, meaning crews and support resources remain stretched without a corresponding increase in billable output. Over a 12-month horizon, this foregone value compounds into weaker contract profitability at Weilaagte and reduces the ability to absorb cost shocks or price pressure from the customer. In addition, delaying the intervention keeps the elevated maintenance risk (0.66) unaddressed in a structured way, increasing the likelihood that breakdowns occur reactively rather than as part of a planned reliability improvement, which can further erode service quality and future margin potential.", "ob": "For operations, this intervention converts 1,042 tonnes of idle MMU 756 capacity into productive tonnes by lifting productivity from 15.6% to 85%, directly supporting blast plan adherence at Weilaagte. It will be necessary to refine shift patterns, loading sequences, and dispatching so that the MMU is consistently aligned with the drilling and blasting schedule, especially given the current 120.3% site utilisation. The main operational risk is that an aggressive ramp-up could create bottlenecks or misalignment with customer blast windows, so the business must phase the increase and monitor cycle times daily. if executed well, the benefit is more output from the same crew and equipment footprint, reducing the need for additional units or overtime to meet customer demand.", "fb": "Financially, this action offers an expected margin improvement with no incremental cost reduction component, translating into a risk-adjusted benefit and an 80% confidence interval. Because the intervention relies on process and scheduling optimisation rather than new capex, the implied ROI is high and the payback period is effectively immediate once the higher productivity stabilises. The key financial risks are a 45% probability of breakdown-related downtime and a 30% probability of customer service disruption, either of which could delay or reduce the cash flow uplift. From a portfolio perspective, this lever ranks #38, so while it is not the top priority, it remains a material contributor to contract NPV and should be sequenced alongside other medium-to-high value actions with similar risk profiles.", "mb": "For maintenance, the intervention targets a high-maintenance-risk unit (MMU 756, risk 0.66) and plans to increase its utilisation intensity to reach 85% productivity, which raises the stakes for reliability. To protect the margin opportunity and the risk-adjusted benefit, It will be necessary to front-load condition assessments, tighten preventive maintenance intervals, and ensure critical spares availability to reduce the 45% probability of breakdown or chronic downtime. Coordinated planning with operations is essential so that maintenance windows are scheduled around the new, tighter production cycles rather than as unplanned stops that disrupt blast plans. If the business manages the health of MMU 756 proactively during the ramp-up, This can both stabilise the unit for the long term and avoid emergency repairs that would erode both margin and customer confidence."}, "A1_a19de71f": {"es": "By lifting MMU-757 productivity at Carolina from 62.6% to 85%, This can unlock an estimated margin improvement, with a risk-adjusted benefit and an 80% range of outcomes. This action converts 608 tonnes of idle capacity into revenue-generating output without additional capex, ranking as the top productivity lever on the site. Even after a ndows with the new dispatch pattern so that the business avoid running the unit to failure. By integrating maintenance planning into the productivity push, This can protect equipment health, reduce the likelihood of catastrophic failures, and still capture the risk-adjusted benefit from this lever."}, "A1_3f4c2810": {"es": "Boosting MMU 758 productivity at Isibonelo from 64.4% to 85% unlocks an expected margin improvement, with a risk-adjusted benefit and an 80% confidence range. By converting 1,597 tonnes of idle capacity into productive output, the intervention delivers value without additional operating cost, but carries a high overall risk score of 0.62 that must be actively managed.", "dd": "This productivity intervention targets MMU 758 at Isibonelo, where current productivity sits at 64.4% and site utilization at only 33.3%, leaving 1,597 tonnes of idle capacity unexploited. By tightening cycle discipline, reducing idle time, and improving shift handovers, The aim is to lift productivity to 85%, generating an expected margin improvement at zero incremental cost and a risk-adjusted benefit. The initiative ranks #13 among productivity levers and is supported by a 74% probability of success and an 80% confidence interval to meaningful value creation. However, the overall risk level is high (score 0.62), driven by a maintenance risk of 0.71 and a 45% probability of breakdown or unplanned downtime, as well as a 35% probability that operator resistance and behavioural non-compliance cap the uplift below target. Success will depend on synchronizing production schedules with MMU availability, embedding new operating standards with operators and supervisors, and aligning maintenance planning to protect the asset during the uplift period.", "wi": "If the business does not implement this intervention, MMU 758 will continue operating at roughly 64.4% productivity, leaving 1,597 tonnes of capacity unused and foregoing an expected margin improvement and a risk-adjusted benefit of material the current planning horizon. Over a 12-month period, this equates to sacrificing material risk-adjusted benefit per week, while site utilization remains stuck near 33.3%, constraining the ability to respond to volume or contract growth at Isibonelo. The high maintenance risk (0.71) will still exist, but without the structured improvement program the business lose the opportunity to stabilise operating practices and integrate maintenance windows more intelligently with production. Delaying this action by even one quarter effectively pushes back the value capture by three months, eroding NPV and weakening the business case for future capital or fleet upgrades at the site.", "ob": "For Operations, this action converts 1,597 tonnes of idle MMU 758 capacity into productive output by lifting productivity from 64.4% to 85%, directly supporting more reliable blasting schedules at Isibonelo. It will be necessary to rework daily and weekly schedules to align loading, travel, and blasting windows so the MMU runs closer to its planned cycle with minimal idle time. The main operational risks are unplanned downtime (45% probability) and operator non-compliance (35% probability), so clear SOPs, visible KPIs, and supervisor-led coaching on cycle discipline and shift handovers are critical. if executed well, the benefit is a more predictable MMU, reduced last-minute rescheduling, and better alignment between mine plans and explosives delivery without adding extra units.", "fb": "From a Finance perspective, this intervention offers an expected margin improvement at zero incremental operating cost, with a risk-adjusted benefit and an 80% confidence range. Because the lever is purely productivity-based on an existing asset, the effective payback period is immediate once the new practices are embedded, and the ROI is effectively constrained only by the implementation effort and minor training or change-management costs. The overall risk score of 0.62, driven by a 45% chance of breakdown and 35% chance of under-delivery, should be reflected in scenario planning, but even under conservative assumptions the NPV remains positive. Not proceeding means the business locks in a lower earnings baseline at Isibonelo and leave a low-capex, high-return opportunity (#13 ranked lever) unrealised in the current budget cycle.", "mb": "For Maintenance, the key challenge is to support a productivity uplift on MMU 758 while managing an already elevated maintenance risk of 0.71 and a 45% probability of breakdown or unplanned downtime. The intervention will increase utilisation of the unit, so It is advisable to front-load inspections, tighten condition monitoring, and align planned services with the new operating pattern to avoid peak-load failures. Embedding operator care routines and quick defect reporting is essential to counter the 35% risk of behavioural non-compliance and to catch issues before they escalate into emergency repairs. If the business coordinate maintenance windows with the revised production schedule, This can stabilise the asset, reduce unplanned stoppages over time, and turn the uplift into a sustainable operating state rather than a short-lived push that accelerates wear and tear."}, "A1_15f161c3": {"es": "By lifting MMU 759 productivity at Rustenburg OC from 54.1% to 85%, This can unlock an estimated margin improvement, with a risk-adjusted benefit and an 80% confidence range. This intervention converts 1,422 tonnes of idle capacity into revenue-generating output on a site already operating at 98.4% utilization, without adding new capital equipment. Despite a high overall risk score of 0.61, the upside justifies a tightly managed productivity ramp-up with strong operational and maintenance controls.", "dd": "This productivity optimization on MMU 759 at Rustenburg OC targets an increase in utilization from 54.1% to 85%, converting 1,422 tonnes of idle capacity into productive tonnes and delivering an expected margin improvement (risk-adjusted benefit). The site already runs at 98.4% utilization, so the lever focuses on better scheduling, queue management at the bench, and tighter alignment with blasting plans rather than additional assets or headcount. The initiative ranks #25 among levers and carries a high risk level (score 0.61), primarily due to a 45% probability of equipment breakdown or added downtime on MMU 759 (maintenance risk 0.63) and a 35% probability of customer service disruption through misaligned blasting schedules or bench queueing. The plan requires disciplined coordination between operations and mine planning to avoid congestion, plus a proactive maintenance strategy to support higher duty cycles. if executed well, the intervention improves asset productivity, strengthens the service reliability at Rustenburg OC, and increases margin without incremental cost, but it demands close monitoring of equipment health and blast execution to keep the risk profile under control.", "wi": "If the business does not implement this productivity intervention on MMU 759, the business leaves meaningful margin opportunity unrealized and forgoes a risk-adjusted benefit, effectively locking in the current 54.1% productivity level and 1,422 tonnes of idle capacity. Over a 12-month horizon, this equates to a missed opportunity of roughly per percentage point of productivity gap, while fixed costs continue to be spread over a sub-optimal output base. Operationally, Rustenburg OC remains constrained, with limited ability to absorb demand spikes or schedule changes, increasing the likelihood of overtime, reactive rescheduling, or the need for additional assets in future. The maintenance risk (0.63) also remains unmanaged in a structured way, meaning breakdowns will still occur but without the benefit of higher revenue per operating hour to offset them, reducing overall return on asset health investments.", "ob": "For operations, this action lifts MMU 759 productivity from 54.1% to 85%, unlocking 1,422 tonnes of currently idle capacity and improving the ability to meet Rustenburg OC's blasting schedule without adding another MMU. It will be necessary to refine shift planning, bench queue management, and coordination with mine operations so that the higher MMU throughput does not create congestion or missed blast windows. The site is already at 98.4% utilization, so the focus is on eliminating non-productive time (waiting, re-positioning, misaligned call-outs) rather than stretching crews beyond safe limits. If the business manages the ramp-up carefully, The benefit is more reliable service delivery and buffer capacity for peak days, while avoiding the need for additional equipment or emergency rescheduling.", "fb": "Financially, this intervention offers an expected margin improvement with no additional cost base, translating into a risk-adjusted benefit and an 80% confidence interval. Because the lever is pure productivity on an existing MMU, the payback is effectively immediate once the higher productivity level is reached, and the ROI is high as the business convert sunk and fixed costs into incremental margin. The high risk score of 0.61, driven by a 45% chance of breakdown-related downtime and a 35% chance of service disruption, is mitigated through targeted maintenance and tighter scheduling, which protects both revenue and customer penalties exposure. Not implementing this action means accepting a structural under-utilization of MMU 759 and foregoing material risk-adjusted benefit, while still carrying the same asset and overhead costs.", "mb": "For maintenance, the plan increases MMU 759's duty cycle from 54.1% to 85%, which will raise mechanical load and exposure hours on an asset already showing an elevated maintenance risk of 0.63. There is a 45% probability that, without proactive intervention, the ramp-up could trigger breakdowns, lost loading time, and emergency repairs, so the business needs a pre-emptive maintenance strategy: condition-based inspections, tighter service intervals, and clear criteria for pulling the unit for planned work. By aligning the productivity ramp with a reinforced maintenance schedule, the business convert more operating hours into revenue while controlling unplanned downtime and avoiding cascading failures that could disrupt Rustenburg OC's blasting program. This is an opportunity to demonstrate that higher utilization can coexist with stable equipment health, provided the business front-load risk mitigation and monitor key health indicators closely during the ramp-up period."}, "A4_4160ca25": {"es": "By formalizing a hub-and-spoke assistance model for Site Carolina and cutting ad-hoc assistance by 30%, It is expected to unlock material annual cost reductions, with a risk-adjusted benefit and an 80% confidence range. This rule change does not rely on productivity gains or margin improvement; it directly reduces avoidable support and logistics costs while standardizing how Carolina draws and provides assistance within the network.", "dd": "This optimization formalizes the hub-and-spoke relationship for Site Carolina, replacing informal, ad-hoc assistance with clear rules that target a 30% reduction in unplanned support movements and associated costs. Today, Carolina and surrounding sites rely on reactive assistance patterns that drive duplicated effort, inefficient dispatching, and higher variable costs without improving output. By codifying when and how Carolina can request or provide assistance, It is expected to remove annual avoidable costs, translating into a risk-adjusted benefit at a 55% probability of success and an 80% confidence interval. The change will require planner and operator alignment on new rules, integration into scheduling tools, and clear escalation paths for genuine emergencies to avoid service disruption. Key risks include resistance from operators and planners that could lead to non-compliance and dilute savings (40% probability), and potential customer an translate into tighter commercial terms or lost future volume as the client seeks more reliable alternatives.", "ob": "For operations, lifting MMU 760 availability from 77% to 90% directly increases reliable charging capacity on a unit that is already heavily utilized (site utilization 127.2) and performing well (productivity 81.5). This improvement will reduce last-minute blast rescheduling, cut waiting time for explosives, and provide more buffer to handle unplanned events without slipping the daily plan. To achieve this, The plan will need tighter shift handovers, clearer readiness checks before each blast, and better coordination between dispatch, blasting crews, and maintenance to minimize idle time between jobs. The main operational risks are potential crew fatigue and safety incidents if the business extend operating windows too aggressively, so the business must pair the availability push with robust rostering, rest management, and adherence to safety protocols.", "fb": "From a financial perspective, this action is expected to generate material additional margin with no incremental operating cost, with benefits that remain attractive after risk adjustment given the 70% probability of success and high risk score of 0.63. Because the initiative focuses on process and scheduling improvements rather than capex, the payback is effectively immediate once the higher availability is achieved and sustained, with a very high ROI on any minor enabling spend (e.g., training, planning tools). Not implementing this action means the business effectively accepts an annual opportunity cost in the order (risk-adjusted) on a single MMU, and the business forgoes the option value of scaling a proven availability-improvement model to other units.", "mb": "For maintenance, the core challenge is to support a step-up in MMU 760 availability to 90% without triggering the breakdown risk associated with the current maintenance risk score of 0.62 and the 45% probability of increased     /* ---- UTILITIES ---- */
    function riskBadge(level) {
        if (!level) return '';
        var cl = level.toLowerCase().replace(/\s+/g,'_');
        return '<span class="badge badge-'+cl+'">'+level+'</span>';
    }
    function leverBadge(lev) {
        var c = LEVER_COLORS[lev] || '#666';
        return '<span class="lever-badge" style="background:'+c+'22;color:'+c+'">'+(LEVER_NAMES[lev]||'L'+lev)+'</span>';
    }
    function probColor(p) {
        if (p>=70) return 'var(--accent-green)';
        if (p>=50) return 'var(--accent-amber)';
        return 'var(--accent-red-light)';
    }
    function truncate(text,len) { if(!text) return ''; return text.length>len ? text.substring(0,len)+'...' : text; }
    function escHtml(value) {
        return String(value==null?'':value).replace(/[&<>"']/g,function(ch){
            return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
        });
    }
    function csvValue(value) {
        var text=String(value==null?'':value);
        return /[",\n\r]/.test(text) ? '"'+text.replace(/"/g,'""')+'"' : text;
    }
    function localIsoDate(date) {
        var d=date||new Date();
        return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    }
    function exportRedeploymentRequest() {
        var form=document.getElementById('redeploymentRequestForm');
        if(!form || !form.reportValidity()) return;
        var now=new Date();
        var draftId='DRAFT-'+localIsoDate(now).replace(/-/g,'')+'-'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0')+String(now.getSeconds()).padStart(2,'0');
        var row={
            request_id:draftId,
            request_date:localIsoDate(now),
            destination_site:form.elements.destination_site.value.trim(),
            required_mmu_count:form.elements.required_mmu_count.value,
            required_tank_size_t:form.elements.required_tank_size_t.value,
            required_mmu_type:form.elements.required_mmu_type.value.trim(),
            need_by_date:form.elements.need_by_date.value,
            monthly_tonnes:form.elements.monthly_tonnes.value,
            customers_or_trials:form.elements.customers_or_trials.value.trim(),
            route_distances_km:form.elements.route_distances_km.value.trim(),
            business_reason:form.elements.business_reason.value.trim(),
            requester:form.elements.requester.value.trim(),
            approval_status:'DRAFT',
            hard_requirement:'FALSE',
            allow_size_substitution:'FALSE',
            cross_border_approved:'FALSE',
            status_as_of:localIsoDate(now)
        };
        var csv='\uFEFF'+D.requestColumns.map(csvValue).join(',')+'\r\n'
            +D.requestColumns.map(function(column){return csvValue(row[column]||'');}).join(',')+'\r\n';
        var url=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
        var link=document.createElement('a');
        link.href=url;
        link.download=draftId+'_redeployment_request.csv';
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        announce('Draft redeployment request CSV exported for governance review');
    }

    function switchTab(id) {
        var btns = document.querySelectorAll('.tab-btn');
        btns.forEach(function(b) {
            var match = b.getAttribute('data-tab')===id;
            b.classList.toggle('active',match);
            b.setAttribute('aria-selected',match?'true':'false');
        });
        document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
        var el = document.getElementById('tab-'+id);
        if (el) {
            el.classList.add('active');
            renderChartsForTab(id);
        }
        var label = id==='exec' ? 'Executive Summary' : (id==='ops' ? 'Operational Summary' : id.replace('p','Portfolio '));
        announce('Switched to '+label+' tab');
    }

    function switchSubTab(pid,name) {

        container.querySelectorAll('.sub-tab-btn').forEach(function(b){b.classList.remove('active');b.setAttribute('aria-selected','false');});
        container.querySelectorAll('.sub-content').forEach(function(c){c.classList.remove('active');});
        var btn = container.querySelector('[data-subtab="'+name+'"]');
        if(btn){btn.classList.add('active');btn.setAttribute('aria-selected','true');}
        var panel = document.getElementById('sub-'+pid+'-'+name);
        if(panel) panel.classList.add('active');

            + (p.kt?'<div class="exec-section"><h3>Key Trade-offs</h3><p>'+p.kt+'</p></div>':'')

        html += '</div>';

    /* ---- RISK & IMPLEMENTATION SUB-TAB ---- */
    function buildRiskView(p) {
        var html = '<div class="sub-content" id="sub-'+p.id+'-risk">';

        // Two-col: Risk scatter + Risk bar
        html += '<div class="two-col">';
        html += '<div class="card">'
            + '<div class="card-header"><div class="card-title"><span class="icon">&#9888;</span> Risk Matrix</div></div>'
            + '<div class="chart-box" role="img" aria-label="Scatter chart plotting probability vs risk score for actions in '+p.nm+'"><canvas id="scatter-'+p.id+'" aria-hidden="true"></canvas></div>'
            + '</div>';
        html += '<div class="card">'
            + '<div class="card-header"><div class="card-title"><span class="icon">&#9632;</span> Risk Distribution</div></div>'
            + '<div class="chart-box" role="img" aria-label="Bar chart of risk level distribution for '+p.nm+'"><canvas id="riskbar-'+p.id+'" aria-hidden="true"></canvas></div>'
            + '</div>';
        html += '</div>';

        // Risk profile cards
        html += '<div class="section-title"><span class="dot"></span> Risk Profile</div>';
        html += '<div class="risk-cards">';
        var riskColors = {'Low':'var(--accent-green)','Medium':'var(--accent-amber)','High':'var(--accent-red-light)','Critical':'#ef4444'};
        ['Low','Medium','High','Critical'].forEach(function(level) {
            var count = p.rp[level]||0;
            if(count===0) return;
            var c = riskColors[level];
            // Find top 3 actions at this risk level
            var levelActions = p.ar.filter(function(ref){var a=D.ua[ref.a];return a&&a.rl===level;}).slice(0,3);
            html += '<div class="risk-card">'
                + '<div style="position:absolute;top:0;left:0;width:3px;height:100%;background:'+c+';border-radius:8px 0 0 8px;"></div>'
                + '<div class="risk-card-header" style="padding-left:.3rem;">'
                + '<div class="risk-card-title" style="color:'+c+'">'+level+' Risk</div>'
                + '<div class="risk-card-count" style="color:'+c+'">'+count+'</div>'
                + '</div>'
                + '<div class="risk-card-body">';
            levelActions.forEach(function(ref) {
                var a=D.ua[ref.a]; var rk=D.rk[ref.a]||{};
                if(!a) return;
                html += '<div class="risk-card-item">'
                    + '<div style="font-weight:600;color:var(--text-primary);font-size:.62rem;">'+actionTypeName(a.t)+' - '+(a.e||'N/A')+'</div>'
                    + (rk.tr?'<div style="font-size:.58rem;margin-top:.1rem;">'+truncate(rk.tr,200)+'</div>':'')
                    + (rk.tm?'<div style="font-size:.58rem;color:var(--accent-green);margin-top:.1rem;">Mitigation: '+truncate(rk.tm,150)+'</div>':'')
                    + '</div>';
            });
            html += '</div></div>';
        });
        html += '</div>';

        // Implementation roadmap
        if (p.rm && p.rm.length>0) {
            html += '<div class="section-title"><span class="dot"></span> Implementation Roadmap</div>';
            var currentQ = Math.ceil((new Date().getMonth()+1)/3);
            html += '<div class="timeline">';
            p.rm.forEach(function(phase,i) {
                var isActive = (phase.ph===currentQ);
                html += '<div class="timeline-phase '+(isActive?'active':'')+'">'
                    + '<div class="timeline-phase-num">Phase '+phase.ph+'</div>'
                    + '<div class="timeline-phase-text">'+(phase.d||'').replace(/\n/g,'<br>')+'</div>'
                    + '</div>';
            });
            html += '</div>';
        }

        // Stakeholder briefings
        if (p.sb && Object.keys(p.sb).length>0) {
            html += '<div class="card">'
                + '<div class="card-header"><div class="card-title"><span class="icon">&#9670;</span> Stakeholder Briefings</div></div>'
                + '<div class="sh-tabs">';
            var sKeys = Object.keys(p.sb);
            sKeys.forEach(function(s,i) { html += '<button class="sh-tab '+(i===0?'active':'')+'" onclick="switchSH(this,\'sh-'+p.id+'-'+s.replace(/\s/g,'')+'\')">'+s+'</button>'; });
            html += '</div>';
            sKeys.forEach(function(s,i) { html += '<div class="sh-content '+(i===0?'active':'')+'" id="sh-'+p.id+'-'+s.replace(/\s/g,'')+'">'+(p.sb[s]||'').replace(/\n/g,'<br>')+'</div>'; });
            html += '</div>';
        }

        html += '</div>';
        return html;
    }

    /* ---- EVENT HANDLERS ---- */
    function toggleAccordion(header) {
        header.classList.toggle('open');
        header.setAttribute('aria-expanded', header.classList.contains('open'));
        var body = header.nextElementSibling;
        body.classList.toggle('open');
    }

    function toggleActionDetail(id) {
        var row = document.getElementById(id);
        if(row) row.style.display = row.style.display==='none' ? 'table-row' : 'none';
    }

    function switchSH(btn,contentId) {
        var parent = btn.parentElement;
        parent.querySelectorAll('.sh-tab').forEach(function(t){t.classList.remove('active');});
        btn.classList.add('active');
        var container = parent.parentElement;
        container.querySelectorAll('.sh-content').forEach(function(c){c.classList.remove('active');});
        var el = document.getElementById(contentId);
        if(el) el.classList.add('active');
    }

    function toggleCompView(view,btn) {
        btn.parentElement.querySelectorAll('.comp-toggle-btn').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active');
        document.querySelectorAll('.comp-view').forEach(function(v){v.classList.remove('active');});
        var el = document.getElementById('comp-'+view);
        if(el) el.classList.add('active');
        if(view==='sidebyside') updateComparison();
    }

    /* ---- FILTERING ---- */
    var filterTimers = {};
    function applyFilters(pid) {
        clearTimeout(filterTimers[pid]);
        filterTimers[pid] = setTimeout(function() {
            var leverVal = document.getElementById('fl-'+pid).value;
            var riskVal = document.getElementById('fr-'+pid).value;
            var searchVal = (document.getElementById('fs-'+pid).value||'').toLowerCase();
            var table = document.getElementById('tbl-'+pid);
            if(!table) return;
            var rows = table.querySelectorAll('tbody tr.action-row');
            var shown = 0;
            rows.forEach(function(row) {
                var detailRow = row.nextElementSibling;
                var show = true;
                if(leverVal!=='all' && row.dataset.lever!==leverVal) show=false;
                if(riskVal!=='all' && row.dataset.risk!==riskVal) show=false;
                if(searchVal && row.dataset.search.indexOf(searchVal)===-1) show=false;
                row.style.display = show ? '' : 'none';
                if(detailRow && detailRow.classList.contains('action-detail-row')) detailRow.style.display='none';
                if(show) shown++;
            });
            var fc = document.getElementById('fc-'+pid);
            if(fc) fc.textContent = shown+' of '+rows.length;
        }, 200);
    }

    /* ---- COPY TO CLIPBOARD ---- */
    function copyTableToClipboard(tableId) {
        var table = document.getElementById(tableId);
        if(!table) return;
        var rows = table.querySelectorAll('tr');
        var tsv = '';
        rows.forEach(function(row) {
            if(row.style.display==='none') return;
            if(row.classList.contains('action-detail-row')) return;
            var cells = row.querySelectorAll('th,td');
            var rowData = [];
            cells.forEach(function(cell){rowData.push(cell.textContent.trim().replace(/\t/g,' '));});
            tsv += rowData.join('\t')+'\n';
        });
        navigator.clipboard.writeText(tsv).then(function(){
            var btn = document.querySelector('[data-copy="'+tableId+'"]');
            if(btn){var orig=btn.textContent;btn.textContent='Copied!';setTimeout(function(){btn.textContent=orig;},2000);}
        }).catch(function(){});
    }

    /* ---- COMPARISON MODULE ---- */
    function updateComparison() {
        var selected = [];
        document.querySelectorAll('.comp-check:checked').forEach(function(cb){
            selected.push(parseInt(cb.value));
        });
        if(selected.length>4) return;
        if(selected.length===0) return;
        comparisonSelection = selected;

        // Rebuild radar
        var key='compRadar';
        if(charts[key]){charts[key].destroy();delete charts[key];}
        renderComparisonRadar('compRadarCanvas',selected);

        // Build stat columns
        var panel = document.getElementById('compStatsPanel');
        if(!panel) return;
        var h = '<div style="display:grid;grid-template-columns:repeat('+selected.length+',1fr);gap:.5rem;">';
        selected.forEach(function(pid,i) {
            var p = D.p.find(function(x){return x.id===pid;});
            if(!p) return;
            var hr = (p.rp['High']||0)+(p.rp['Critical']||0);
            h += '<div class="card" style="border-top:3px solid '+COMP_COLORS[i]+'">'
                + '<div style="font-size:.7rem;font-weight:700;color:'+COMP_COLORS[i]+';margin-bottom:.5rem;">'+p.nm+'</div>'
                + '<div style="font-size:.58rem;color:var(--text-muted);margin-bottom:.2rem;">ACTIONS</div><div style="font-size:1rem;font-weight:800;font-family:\'Roboto Mono\',monospace;">'+p.ac+'</div>'
                + '<div style="font-size:.58rem;color:var(--text-muted);margin-top:.4rem;margin-bottom:.2rem;">AVG PROB.</div><div style="font-size:1rem;font-weight:800;font-family:\'Roboto Mono\',monospace;color:'+probColor(p.ap)+'">'+p.ap+'%</div>'
                + '<div style="font-size:.58rem;color:var(--text-muted);margin-top:.4rem;margin-bottom:.2rem;">HIGH RISK</div><div style="font-size:1rem;font-weight:800;font-family:\'Roboto Mono\',monospace;color:var(--accent-amber);">'+hr+'</div>'
                + '<div style="font-size:.58rem;color:var(--text-muted);margin-top:.4rem;margin-bottom:.2rem;">MARGIN</div><div style="font-size:1rem;font-weight:800;font-family:\'Roboto Mono\',monospace;">'+p.mp+'%</div>'
                + '</div>';
        });
        h += '</div>';
        panel.innerHTML = h;
    }

    /* ---- CHART RENDERERS ---- */
    function renderWaterfall(canvasId, wfData) {
        var key = canvasId;
        if(charts[key]) return;
        var ctx = document.getElementById(canvasId);
        if(!ctx) return;

        var labels = wfData.map(function(d){return LEVER_NAMES[d.l]||'L'+d.l;});
        labels.push('Total');
        var values = wfData.map(function(d){return d.ip;});
        var totalPct = values.reduce(function(a,b){return a+b;},0);
        values.push(Math.round(totalPct*10)/10);
        var bases = [];
        var cum = 0;
        wfData.forEach(function(d){bases.push(cum);cum+=d.ip;});
        bases.push(0);
        var colors = wfData.map(function(d){return LEVER_COLORS[d.l]||'#666';});
        colors.push('#f0f0f2');

        charts[key] = new Chart(ctx, {
            type:'bar',
            data:{
                labels:labels,
                datasets:[
                    {label:'Base',data:bases,backgroundColor:'transparent',borderWidth:0,borderSkipped:false},
                    {label:'Value',data:values,backgroundColor:colors,borderWidth:0,borderRadius:3}
                ]
            },
            options:{
                responsive:true, maintainAspectRatio:false,
                scales:{
                    x:{stacked:true,grid:{display:false},ticks:{color:'#9ca3af',font:{size:9}}},
                    y:{stacked:true,grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10},callback:function(v){return v+'%';}}}
                },
                plugins:{
                    legend:{display:false},
                    tooltip:{callbacks:{label:function(ctx){if(ctx.datasetIndex===0)return '';return ctx.parsed.y+'% of total impact';}}},
                    datalabels:{display:function(ctx){return ctx.datasetIndex===1;},color:'#f0f0f2',anchor:'end',align:'end',font:{size:9,weight:600},formatter:function(v){return v>1?v+'%':'';}}
                }
            }
        });
    }

    function renderTornado(canvasId, tnData) {
        var key = canvasId;
        if(charts[key]) return;
        var ctx = document.getElementById(canvasId);
        if(!ctx) return;
        if(!tnData||tnData.length===0) return;

        var labels = tnData.map(function(d){return LEVER_NAMES[d.l]||'L'+d.l;});
        var downside = tnData.map(function(d){return Math.round((d.lo-d.avg)*100)/100;});
        var upside = tnData.map(function(d){return Math.round((d.hi-d.avg)*100)/100;});

        charts[key] = new Chart(ctx, {
            type:'bar',
            data:{
                labels:labels,
                datasets:[
                    {label:'Downside',data:downside,backgroundColor:'rgba(248,113,113,0.7)',borderColor:'#f87171',borderWidth:1,borderRadius:3},
                    {label:'Upside',data:upside,backgroundColor:'rgba(74,222,128,0.7)',borderColor:'#4ade80',borderWidth:1,borderRadius:3}
                ]
            },
            options:{
                responsive:true, maintainAspectRatio:false, indexAxis:'y',
                scales:{
                    x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10},callback:function(v){return v+'%';}}},
                    y:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:10}}}
                },
                plugins:{
                    legend:{labels:{color:'#9ca3af',font:{size:10}}},
                    tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.x+'% from average';}}},
                    annotation:{annotations:{zeroLine:{type:'line',xMin:0,xMax:0,borderColor:'rgba(255,255,255,0.3)',borderWidth:1,borderDash:[4,4]}}}
                }
            }
        });
    }

    function renderRiskScatter(canvasId, scatterData) {
        var key = canvasId;
        if(charts[key]) return;
        var ctx = document.getElementById(canvasId);
        if(!ctx) return;
        if(!scatterData||scatterData.length===0) return;

        var datasets = {};
        scatterData.forEach(function(d) {
            var lev = d.l;
            if(!datasets[lev]) datasets[lev]={label:LEVER_NAMES[lev]||'L'+lev,data:[],backgroundColor:LEVER_COLORS[lev]||'#666',pointRadius:[]};
            datasets[lev].data.push({x:d.p,y:d.rs});
            datasets[lev].pointRadius.push(Math.max(4,Math.min(16,d.ip*1.5)));
        });
        var dsArr = Object.values(datasets);

        charts[key] = new Chart(ctx, {
            type:'scatter',
            data:{datasets:dsArr},
            options:{
                responsive:true, maintainAspectRatio:false,
                scales:{
                    x:{title:{display:true,text:'Success Probability (%)',color:'#9ca3af',font:{size:10}},min:0,max:100,grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10}}},
                    y:{title:{display:true,text:'Risk Score',color:'#9ca3af',font:{size:10}},min:0,max:1,grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10}}}
                },
                plugins:{
                    legend:{labels:{color:'#9ca3af',font:{size:9}},position:'bottom'},
                    tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': Prob='+ctx.parsed.x+'%, Risk='+ctx.parsed.y;}}},
                    annotation:{annotations:{
                        vLine:{type:'line',xMin:50,xMax:50,borderColor:'rgba(255,255,255,0.15)',borderWidth:1,borderDash:[4,4]},
                        hLine:{type:'line',yMin:0.5,yMax:0.5,borderColor:'rgba(255,255,255,0.15)',borderWidth:1,borderDash:[4,4]}
                    }}
                }
            }
        });
    }

    function renderComparisonRadar(canvasId, pids) {
        var key = 'compRadar';
        var ctx = document.getElementById(canvasId);
        if(!ctx) return;

        var datasets = [];
        pids.forEach(function(pid,i) {
            var p = D.p.find(function(x){return x.id===pid;});
            if(!p) return;
            var total=0;
            for(var lev=1;lev<=8;lev++) total+=(p.ld[String(lev)]||0);
            var data=[];
            for(var lev=1;lev<=8;lev++) data.push(((p.ld[String(lev)]||0)/total*100).toFixed(1));
            datasets.push({
                label:p.nm,data:data,
                borderColor:COMP_COLORS[i],backgroundColor:COMP_COLORS[i]+'15',
                pointBackgroundColor:COMP_COLORS[i],borderWidth:2,pointRadius:3
            });
        });

        charts[key] = new Chart(ctx, {
            type:'radar',
            data:{labels:Object.values(LEVER_NAMES),datasets:datasets},
            options:{
                responsive:true,
                scales:{r:{grid:{color:'rgba(255,255,255,0.08)'},angleLines:{color:'rgba(255,255,255,0.08)'},pointLabels:{color:'#9ca3af',font:{size:10}},ticks:{display:false},beginAtZero:true}},
                plugins:{legend:{labels:{color:'#9ca3af',font:{size:10}}}}
            }
        });
    }

    function renderLeverDoughnut() {
        if(charts['leverDoughnut']) return;
        var ctx = document.getElementById('leverDoughnut');
        if(!ctx) return;
        charts['leverDoughnut'] = new Chart(ctx, {
            type:'doughnut',
            data:{
                labels:D.ls.map(function(l){return l.s;}),
                datasets:[{data:D.ls.map(function(l){return l.ip;}),backgroundColor:D.ls.map(function(l){return l.c;}),borderColor:'#2b2f38',borderWidth:2}]
            },
            options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+ctx.parsed+'% of total impact';}}}},cutout:'55%'}
        });
    }

    function renderRiskBar(pid) {
        var key='riskbar-'+pid;
        if(charts[key]) return;
        var ctx = document.getElementById(key);
        if(!ctx) return;
        var p = D.p.find(function(x){return x.id===pid;});
        if(!p) return;
        var levels=['Low','Medium','High','Critical'];
        var colors=['#22c55e','#f59e0b','#c41e3a','#ef4444'];
        var data=levels.map(function(l){return p.rp[l]||0;});
        charts[key] = new Chart(ctx, {
            type:'bar',
            data:{labels:levels,datasets:[{data:data,backgroundColor:colors.map(function(c){return c+'88';}),borderColor:colors,borderWidth:1,borderRadius:4}]},
            options:{
                responsive:true,indexAxis:'y',
                scales:{
                    x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10}}},
                    y:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:11}}}
                },
                plugins:{
                    legend:{display:false},
                    tooltip:{callbacks:{label:function(ctx){return ctx.parsed.x+' actions';}}},
                    datalabels:{display:true,color:'#f0f0f2',anchor:'end',align:'end',font:{size:10,weight:600},formatter:function(v){return v>0?v:'';}}
                }
            }
        });
    }

    /* ---- CHART ROUTING ---- */
    function renderChartsForTab(tabId) {
        if(tabId==='exec') {
            renderWaterfall('execWaterfall',D.ls.map(function(l){return {l:l.l,ip:l.ip};}).sort(function(a,b){return b.ip-a.ip;}));
        } else if(tabId==='ops') {
            return;
        } else {
            var pid = parseInt(tabId.replace('p',''));
            renderChartsForSubTab(pid,'overview');
        }
    }

    function renderChartsForSubTab(pid,subTab) {
        var p = D.p.find(function(x){return x.id===pid;});
        if(!p) return;
        if(subTab==='overview') {
            renderWaterfall('wf-'+pid, p.wf);
        } else if(subTab==='actions') {
            renderTornado('tornado-'+pid, p.tn);
        } else if(subTab==='risk') {
            renderRiskScatter('scatter-'+pid, p.sc);
            renderRiskBar(pid);
        }
    }

    /* ---- KEYBOARD SUPPORT ---- */
    document.addEventListener('keydown',function(e) {
        if(e.key==='Enter'||e.key===' ') {
            var el = document.activeElement;
            if(el&&el.classList.contains('accordion-header')) { e.preventDefault(); toggleAccordion(el); }
        }
    });

    /* ---- INIT ---- */
    function init() {
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-ZA',{year:'numeric',month:'short',day:'numeric'});
        document.getElementById('portfolioCountBadge').textContent = D.p.length+' PORTFOLIOS';
        buildTabBar();
        var contentHtml = buildExecTab()+buildOperationalTab();
        D.p.forEach(function(p){contentHtml+=buildPortfolioTab(p);});
        document.getElementById('contentArea').innerHTML = contentHtml;
        renderChartsForTab('exec');
    }

document.addEventListener('DOMContentLoaded',init);
    </script>
</body>
</html>
