rgency-assistance criteria, ensure that critical equipment support remains prioritized, and use the first months of implementation to fine-tune rules based on actual breakdown and response data."}, "A4_71ad48f5": {"es": "By formalizing a hub-and-spoke assistance model at Isibonelo and cutting ad-hoc assistance by 30%, the business target direct cost reductions annually, with a central estimate and an 80% confidence interval. Given a 55% probability of success and a medium risk score of 0.42, the current risk-adjusted benefit is marginal at approximately R-1,000, so disciplined implementation and change management are critical to unlock the upside.", "dd": "This action formalizes a hub-and-spoke assistance pattern for Site Isibonelo, replacing the current ad-hoc support model with clear rules on when and how assistance is dispatched from the hub to the spoke. The primary objective is to reduce unplanned, reactive assistance movements by 30%, which are currently driving avoidable logistics, overtime, and coordination costs estimated annually. Under Lever 4 (Assistance Pattern Optimization), the business standardize call-out criteria, escalation paths, and scheduling windows so that support is planned, batched, and aligned with known demand rather than triggered informally. The expected total value uplift is annually: operator and planner resistance (35% probability) that could erode adherence to the new rules, and potential customer service disruption during peak or breakdown events (25% probability) if the system responds too slowly. To succeed, the business must pair the rule change with clear service-level agreements, exception protocols for genuine emergencies, and active monitoring of response times and customer feedback during the first 3-6 months.", "wi": "If the business does not implement this hub-and-spoke assistance rule change at Isibonelo, The plan will likely continue to incur annual avoidable ad-hoc assistance costs, with no structural mechanism to reduce unplanned call-outs or optimize crew and vehicle deployment. The site will remain dependent on informal decision-making by operators and planners, which tends to grow rather than shrink over time as more exceptions are granted, increasing variability in logistics and overtime spend. Over a 3-year horizon, this could translate into roughly material cumulative lost savings, while also limiting the ability to benchmark and improve assistance performance across sites. In addition, by not formalizing rules now, any future shift to a more disciplined model will face even stronger cultural resistance, as ad-hoc practices become further entrenched and perceived as the \"only way\" to maintain service levels.", "ob": "For Operations at Isibonelo, this change introduces a clear hub-and-spoke assistance model that reduces ad-hoc call-outs by 30%, freeing up crews and vehicles from last-minute redeployments. The benefit is more predictable schedules and better visibility of when and how assistance will arrive, which should simplify daily planning and reduce firefighting. The main operational risk is slower response during genuine emergencies if teams over-apply the rules, so the plan will define explicit exception criteria and fast-track protocols for breakdowns and peak demand. The role will be to enforce adherence, It is recommended to monitor response times in the first 3-6 months, and adjust thresholds if There is any negative impact on service or production continuity.", "fb": "From a Finance perspective, the initiative targets annual direct cost reductions from reduced ad-hoc assistance, with a central upside and an 80% confidence interval. With a 55% probability of success and a medium risk score of 0.42, the current risk-adjusted benefit is approximately R-1,000, which means the financial case depends heavily on disciplined implementation and risk mitigation. There is no expected margin improvement, so the benefit flows primarily through lower logistics, overtime, and coordination costs, improving operating cash flow rather than revenue. It is advisable to focus on tracking realized monthly savings versus the annual target, validating that any temporary service disruptions do not create offsetting penalties or lost revenue, and confirming that the payback period remains under 12 months once the process stabilizes.", "mb": "For Maintenance, the formal hub-and-spoke assistance rules will change how you request and receive support during breakdowns and planned interventions at Isibonelo. The intent is to cut non-essential, ad-hoc assistance by 30% without compromising response to critical equipment failures, thereby reducing unnecessary call-outs and associated costs while keeping equipment availability stable. The key risk for the area is a potential slowdown in response during peak breakdown periods if the rules are applied too rigidly, which could increase downtime and maintenance backlog. To mitigate this, The plan will build clear priority tiers for equipment, define emergency override conditions, and monitor breakdown response times and backlog trends in the first months so This can fine-tune the rules before they impact asset health or service reliability."}, "A5_2e9335d1": {"es": "Improving MMU 760 operational availability at Rustenburg OC from 77% to 90% is expected to unlock material additional margin, with a risk-adjusted benefit and an 80% confidence range. This action leverages already strong site utilization of 94.5% and stable productivity of 81.5 to convert existing demand into higher billable output without additional capital spend.", "dd": "This availability improvement initiative targets MMU 760 at Rustenburg OC, increasing operational availability from 77% to 90% to capture an expected margin improvement (risk-adjusted. With site utilization already at 94.5% and productivity stable at 81.5, the primary constraint is equipment availability rather than demand or crew performance, making this a levered operational g maintenance, but by avoiding the overtime and disruption that come from last-minute plan changes when equipment cannot meet over-ambitious targets. The plan will use maintenance feedback to validate that the new targets do not compress critical service windows and will adjust if There is increased risk to asset health."}, "A7_b68c0ed5": {"es": "Recalibrating capacity targets at Tharisa unlocks an expected annual planning cost reductions, with a risk-adjusted benefit with an 80% confidence range -. By aligning formal capacity assumptions with the current 118% utilisation, the site can reduce planning inefficiencies and overtime exposure without adding new capital or headcount.", "dd": "This action formally recalibrates the capacity targets for Site Tharisa to reflect the actual operating reality of 118% utilisation, enabling planners to schedule work closer to true site capability and capture an estimated annual planning-related cost reductions. The value comes from reducing over-conservative buffers, smoothing crew deployment, and lowering avoidable overtime and standby costs, rather than from direct margin improvement. 42 indicate a modest but reliable optimisation lever, ranked #19 among current initiatives. Key risks include 35% probability of operator and planner resistance to higher or more formalised targets, which could dilute adherence and erodes the expected benefit, and a 25% probability of customer service disruption if reduced buffers lead to delayed blasts or missed windows. Mitigation will require clear communication of the new targets, phased implementation, and close monitoring of blast punctuality and crew workload to ensure that higher utilisation assumptions do not compromise safety, equipment health, or customer commitments.", "wi": "If the business does not recalibrate the capacity targets at Tharisa, the site will likely forgo annual planning cost reductions, leaving between and of value unrealized based on Over a 3-year horizon, this equates gher overtime, and frequent last-minute changes to blast plans, which increase fatigue risk and reduce predictability for both Enaex and the customer. In addition, the current planning approach leaves no structured buffer for breakdowns or weather delays, increasing the likelihood of unplanned service failures that can damage customer confidence and trigger penalty or recovery costs that are not reflected in the current /year estimate.", "ob": "Recalibrating the Witbank Mini-Pits capacity targets away from the current 127% utilization will provide a realistic operating envelope and reduce the need for emergency rescheduling and overtime. With a more accurate capacity plan, It is possible to stabilize weekly blast schedules, improve crew allocation, and reduce last-minute truck and product movements that disrupt other sites. The change is expected to save annually by cutting inefficiencies, while maintaining service levels through a phased rollout and close monitoring of blast-day performance. The focus will be to drive adherence to the new targets among supervisors and operators and to manage the transition so that customers experience a smoother, more predictable service rather than a step-change on a single blast cycle.", "fb": "This action delivers an expected annual cost reductions at Witbank Mini-Pits.38. Assuming minimal implementation cost, the payback period is effectively immediate and the ROI is high, as the initiative is primarily a planning and governance change rather than a capex-heavy intervention. Over a 3-5 year horizon, the cumulative savings could reach - if the new targets are sustained and embedded into budgeting and forecasting baselines. The key concerns will be to validate that the realized cost reductions (overtime, logistics premiums, and unplanned support costs) are measurable in the P&L and to ensure that any short-term service disruptions do not trigger penalties or revenue leakage that erode the net benefit.", "mb": "Bringing Witbank Mini-Pits down from a planned 127% utilization to a realistic capacity target will reduce the pressure on equipment and allow maintenance to follow planned service intervals more consistently. With fewer over-committed blast days, It is possible to schedule inspections and preventative maintenance without as many last-minute cancellations or deferrals, which lowers the risk of in-field failures and unscheduled breakdowns. Although the quantified benefit is framed as annual operating cost reductions, a portion of this will come from reduced emergency repairs, lower after-hours call-outs, and better parts usage. The role will be to align maintenance windows with the new capacity plan, It is recommended to monitor any shifts in failure patterns during the transition, and provide feedback if the recalibrated targets still create unsustainable strain on critical assets."}, "A8_7547da52": {"es": "Reactivating parked MMU 745 is expected to unlock up to meaningful annual margin improvement and meaningful carrying cost reductions, with a risk-adjusted benefit with an 80% confidence range. This action strengthens Enaex Africa's ability to capture incremental blasting revenue without new capex, while rationalizing the fleet by bringing an existing asset back into productive service.", "dd": "This optimization action proposes reactivating long-parked MMU 745 under Lever 8 (Fleet Rationalization) to convert a non-productive asset into a revenue-generating unit. The business case is driven by an estimated annual additional margin from deploying the MMU into active blasting operations, combined with material avoided carrying costs associated with keeping the unit idle, yielding an overall benefit before risk adjustment. After applying a 50% probability of success and a quantified risk score of 0.44, the risk-adjusted benefit is approximately. The rationale is to use existing fleet capacity to support current or near-term contracts, avoiding the delay and capital outlay of acquiring rdination delays that could leave the truck underutilized in the first months, so It is advisable to lock in a deployment plan with target sites and shift patterns upfront. With proper planning, MMU 745 can improve on-time blast execution, reduce reliance on overtime or hired capacity, and provide more flexibility to cover breakdowns elsewhere in the fleet.", "fb": "This action converts an idle asset into a cash-generating unit, with an estimated annual margin improvement and material avoided carrying costs, with benefits that remain attractive after risk adjustment of roughly. Because the business is reactivating existing equipment rather than purchasing new, the incremental capex is minimal, which should translate into a short payback period once the unit is fully utilized and a positive NPV even after applying the medium risk profile (risk score 0.44 and 50% probability of success). If the business does not proceed, the business continues to incur annual non-productive carrying costs while missing out on potential revenue, effectively depressing asset returns and ROA. It is advisable to view this as a low-capex, moderate-risk opportunity to improve fleet productivity and margin density, provided the business tightly control reactivation and early deployment costs.", "mb": "Reactivating MMU 745 will require a structured recommissioning program to address the 35% probability of equipment breakdown or latent defects after long-term parking. It is advisable to plan a full inspection, replacement of age-sensitive components (fluids, seals, hoses, electrical checks), and a controlled test period before the unit goes to site, to reduce the risk of early-life failures and unplanned downtime. Once in service, the business must integrate MMU 745 into the standard preventive maintenance schedule, with shorter initial inspection intervals in the first 3 months to catch any issues arising from storage. By investing upfront in a thorough reactivation and clear maintenance history, This can turn a dormant risk into a reliable production asset, while also generating data to refine the approach for future parked-unit reactivations."}, "A8_5faa8f5d": {"es": "Reactivating parked MMU 747 is expected to unlock meaningful annual margin improvement and eliminate material carrying costs, delivering a risk-adjusted benefit. This action converts an idle asset into a revenue-generating unit while supporting fleet rationalization and reducing non-productive capital on the books.", "dd": "This action proposes reactivating the long-parked MMU 747 to shift it from a cost-only asset to a productive unit generating an expected material additional annual margin while removing material carrying costs, for a risk-adjusted benefit. The initiative aligns with Lever 8 (Fleet Rationalization) by optimizing fleet composition and ensuring that capital-intensive equipment either earns a return or is removed from the cost base. Execution will require a structured recommissioning program, including technical inspections, component replacements where needed, and validation blasts to confirm performance, while in parallel securing an operator, permits, mine induction, and integration into the blasting schedule. The main risks are a 35% probability of equipment breakdown or latent defects during reactivation, which could extend downtime and delay revenue, and a 30% probability of coordination delays in onboarding the unit to site operations; both can be mitigated through pre-start inspections, staged commissioning, and early engagement with operations and HR. If managed well, MMU 747 can be brought back into service with controlled risk, improving asset utilization and supporting more flexible deployment across current and future contracts.", "wi": "If the business does not reactivate MMU 747, the business forgoes an expected meaningful annual margin improvement and continue to incur material carrying costs on an idle asset, effectively leaving a risk-adjusted of value u ive contribution to NPV, especially if reactivation capex and start-up costs remain tightly controlled and below the risk-adjusted benefit. Over a three-year horizon, the gross cumulative opportunity exceeds material The focus should be on validating reactivation costs, confirming the payback period under conservative utilization assumptions, and ensuring that this action ranks appropriately against higher-value, lower-risk fleet rationalization options despite its current lever rank of #94.", "mb": "Reactivating MMU 795 will require a structured recommissioning plan to manage a high maintenance risk profile, reflected in a maintenance risk score of 0.72 and a 45% probability of latent mechanical failures during start-up. If these issues materialize, they could cause extended downtime, increase unplanned maintenance hours, and delay the unit's contribution to the projected annual margin improvement. The priority will be to perform a comprehensive pre-start inspection, replace age-sensitive components, and schedule a controlled ramp-up period to detect and resolve faults before the unit is fully committed to production schedules. By front-loading condition assessments and aligning spares and technician availability, It is possible to reduce the likelihood and duration of reactivation failures, protect the fleet's overall reliability, and ensure that MMU 795 returns to its historical productivity level of 88.5 without compromising existing maintenance commitments."}, "A8_10da3d14": {"es": "Reactivating parked MMU 781 is expected to unlock meaningful annual margin improvement and meaningful carrying cost reductions, with a central total value estimate and an 80% confidence range. After adjusting for a 50% probability of success and identified operational and technical risks, the risk-adjusted benefit remains meaningful, positioning this as a moderate-upside, medium-risk fleet rationalization move. This action strengthens the ability to capture incremental blasting reve east one full year, eroding NPV and limiting the flexibility to respond to market opportunities with an already-owned asset.", "ob": "Reactivating MMU 781 provides an additional fully functional unit to deploy, enabling up to material incremental annual margin without waiting for new equipment procurement. The main operational risks are a 35% chance of breakdown or latent defects on start-up and a 30% chance of delays in permits, site access, and explosives licensing, which could slow the ramp-up. To manage this, It is advisable to plan a structured recommissioning window, It is recommended to align crew scheduling and training in advance, and lock in customer deployment slots before the unit leaves the yard. If the business does not proceed, the business keeps a parked asset that cannot support peak demand, back-up coverage, or new contracts, limiting the flexibility during high-activity periods.", "fb": "This action converts a parked asset into a cash-generating MMU, with a central overall benefit driven by up to meaningful annual margin improvement and meaningful carrying cost reductions. After applying a 50% probability of success and accounting for identified risks, the risk-adjusted benefit remains meaningful, placing it in the mid-range of the portfolio (lever rank #92) and suggesting a modest but positive NPV contribution if implementation costs are contained. The key financial sensitivities are the duration of ramp-up (affected by a 30% probability of coordination delays) and potential unplanned repair capex or opex from a 35% probability of latent defects discovered during recommissioning. Not acting means the business continues to incur carrying costs on a non-productive asset and forego the incremental cash flows, effectively accepting a lower return on the existing capital base.", "mb": "Reactivating MMU 781 will require a thorough recommissioning program to address the 35% probability of equipment breakdown or latent defects associated with long-term p unctional testing), and agree on a realistic but compressed schedule that does not skip essential maintenance steps."}, "A8_bd676127": {"es": "Accelerating the rebuild of MMU 763 is expected to unlock meaningful cost reductions from earlier deployment, with a central risk-adjusted benefit estimate and an 80% confidence range between and. However, the high overall risk level (score 0.62) and a negative risk-adjusted benefit of R-10,950 mean the decision hinges on how much the business value earlier fleet availability and operational resilience versus the potential for quality defects and schedule slippage.", "dd": "This action brings forward the rebuild completion of MMU 763 to realize meaningful cost reductions by deploying the unit earlier into a fleet that currently operates at 48.5% site utilization and stable productivity of 111.0. The lever sits at rank #88 within the fleet rationalization portfolio, indicating it is a secondary but still material opportunity. The expected total value. The risk profile is elevated: a 38% probability that accelerated work introduces quality defects or incomplete refurbishment, potentially causing unplanned breakdowns and on-bench failures within six months, and a 42% probability that workshop constraints (parts, bays, technicians) delay completion and erodes the timing benefit. With a maintenance risk of 0.68 and an overall risk score of 0.62, the risk-adjusted benefit is slightly negative at R-10,950, so this action only makes sense if This can actively mitigate quality and scheduling risks and if the operational value of earlier availability is strategically important for upcoming contracts or peak demand periods.", "wi": "If the business does not accelerate the rebuild of MMU 763, the business forgoes the estimated meaningful cost reduction tied to earlier deployment and the central upside, along with the upside potential up within the 80% confidence band. The fleet will continue to operate with current capacity, leaving site  perspective, this action should only proceed if This can materially reduce the identified risks through tighter quality controls and confirmed workshop capacity, or if there is a clear, quantified link between earlier availability and higher cash flows on specific contracts that is not yet captured in the current model.", "mb": "For maintenance, this action compresses the rebuild schedule of MMU 763, increasing the risk that quality steps are skipped or rushed, which already shows in a maintenance risk of 0.68 and a 38% probability of early breakdowns within the first six months. Any quality defect could lead to on-bench failures at customer sites, driving emergency repairs, reputational damage, and unplanned workshop load. There is also a 42% probability that parts shortages, bay conflicts, or technician constraints undermine the acceleration and extend downtime beyond plan, negating the intended benefit while still stressing the team. If the business proceed, It will be necessary to have a detailed, locked-in rebuild plan with secured parts, dedicated bay time, and additional QA checks at critical stages to ensure that speed does not compromise equipment health and that MMU 763 returns to the field with reliability comparable to a standard rebuild."}, "A8_730492be": {"es": "Accelerating the rebuild of MMU 782 is expected to unlock meaningful cost reductions from earlier deployment, with a risk-adjusted benefit with an 80% confidence range. By bringing a 121.7-productivity unit back into service faster in a fleet that is currently only 41.1% utilized, the business improves fleet rationalization and reduce reliance on higher-cost alternatives, despite a high overall risk level of 0.61.", "dd": "This action accelerates the rebuild of MMU 782 to capture an estimated meaningful cost reduction by deploying the unit earlier and reducing the need for more expensive backup equipment or outsourced capacity. MMU 782 operates at a strong productivity level of 121.7, and with s. The main operational risk is a 45% chance of rebuild overruns and a 35% chance of early-life failures if QA is rushed, which could disrupt blasting schedules. To manage this, It is advisable to lock in a detailed rebuild timeline, define clear go/no-go QA gates, and pre-plan deployment slots so MMU 782 is integrated smoothly into the production schedule once released.", "fb": "This action targets meaningful cost reductions from earlier deployment of MMU 782, with a risk-adjusted benefit of approximately and an 80% range of outcomes. While the modeled margin improvement is, the savings directly improve operating costs and cash flow by reducing reliance on higher-cost alternatives and enabling fleet rationalization under Lever 8. The probability of success is 55%, and the overall risk score of 0.61 is driven by a 45% chance of rebuild delays and a 35% chance of early failures, both of which could defer or dilute the savings. From an NPV and payback perspective, the earlier the business complete the rebuild, the sooner these savings are realized; delaying the decision effectively sacrifices the risk-adjusted benefit and keeps the current cost base locked in.", "mb": "Accelerating the rebuild of MMU 782 requires you to manage a high maintenance risk profile (0.73) while still delivering a reliable unit back to operations, targeting meaningful cost reductions and a risk-adjusted benefit of about. The key technical risks are a 45% probability of rebuild overruns due to unforeseen component issues and a 35% probability of post-rebuild breakdowns if QA and commissioning are compressed. To mitigate this, It is advisable to prioritize critical component inspections, enforce non-negotiable QA and test protocols, and schedule a structured burn-in period before full production deployment. If the business manages these risks well, the business not only support fleet rationalization but also improve the long-term health and reliability of MMU 782, reducing future unplanned downtime and rework costs."}, "A8_753417d3": {"es": "Accelerating the rebuild of MMU 794 is expected to unlock meaningful cost reductions from earlier deployment, with a risk-adjusted benefit and an 80% confidence range. By bringing this high-productivity unit (158.0) back into service sooner, the business improves fleet availability and support better utilization of under-served sites currently operating at only 54.1% utilization.", "dd": "This action fast-tracks the rebuild of MMU 794 to capture an estimated meaningful cost reduction through earlier deployment and reduced reliance on less efficient or hired capacity, with benefits that remain attractive after risk adjustment at a 55% probability of success. MMU 794's strong productivity profile (158.0) makes it a valuable asset to support fleet rationalization (Lever 8), particularly where current site utilization is only 54.1%, indicating headroom to absorb additional productive capacity without expanding the fleet. However, the maintenance risk is high at 0.77, and the overall risk score of 0.62 reflects two key threats: a 45% probability of breakdowns or quality defects due to compressed rebuild timelines, and a 40% probability of coordination delays between workshop, suppliers, and operations that could miss the early deployment window and erodes the timing benefit. To realize the upside, the business must tightly manage rebuild quality, parts availability, and scheduling, while enforcing clear go/no-go criteria to avoid unsafe commissioning or costly rework. If executed with disciplined risk controls, this action supports leaner fleet deployment, reduces operating costs, and improves the effective return on existing capital equipment without adding new units.", "wi": "If the business does not accelerate the rebuild of MMU 794, the business forgoes the estimated timing-related cost reduction and the overall benefit, effectively leaving the meaningful upside unrealized after risk adjustment. Operations will continu he business must treat this as a managed risk investment with clear stage gates and quality controls to protect the upside. if executed well, the earlier cost reductions and improved fleet efficiency will shorten the payback period on the rebuild spend and support stronger NPV and ROI for the fleet rationalization program.", "mb": "Accelerating the rebuild of MMU 794 places additional pressure on the team to deliver a high-quality rebuild under compressed timelines, despite an already elevated maintenance risk of 0.77. The key technical risk is a 45% probability of breakdowns or quality defects if work is rushed, which could lead to rework, extended downtime, and unsafe or failed commissioning that erodes the benefit. There is also a 40% risk that parts and supplier coordination do not keep pace with the accelerated schedule, causing delays that negate the timing advantage without reducing the workload. To succeed, It will be necessary to have a tightly sequenced rebuild plan, confirmed parts availability, clear quality checkpoints, and the authority to delay deployment if safety or equipment health standards are not met, ensuring the business gain the cost reduction without compromising long-term reliability of MMU 794."}, "A8_a1ad5994": {"es": "Retiring high-risk MMU 702 is expected to avoid material annual maintenance spend and deliver a risk-adjusted benefit of material year one. This action rationalizes a 50.6% utilized unit with a maintenance risk score of 0.75, freeing budget and workshop capacity for healthier assets without impacting current margin.", "dd": "This action retires MMU 702, a moderately productive (productivity 129.3) but underutilized (site utilization 50.6%) unit with a high maintenance risk score of 0.75, to avoid annual forecast maintenance and overhaul costs. The decision focuses on fleet rationalization (Lever 8, rank #83) by removing a high-risk asset that contributes no direct margin improvement but consumes cash, workshop hours, and ma MU 916 supports fleet rationalization and reduces exposure to unplanned maintenance spikes, but the relatively low lever rank (#97) suggests there are higher-NPV actions to prioritize first. Financially, this should be framed as a cautious, low-to-moderate upside move that is only attractive if This can demonstrably mitigate the 35% service risk and avoid knock-on costs that would erode the saving.", "mb": "MMU 916 carries a high maintenance risk score of 0.75, and its retirement would immediately remove roughly annual planned maintenance, plus reduce exposure to unplanned breakdowns and safety-related interventions on an aging asset. From a workshop and spares perspective, this frees capacity, parts, and technician hours that can be redirected to higher-criticality units, potentially improving overall fleet reliability and reducing overtime or emergency call-outs. The trade-off is that with 62% utilization today, the remaining fleet will need to absorb MMU 916's workload, so the business must confirm that their maintenance schedules and condition can support higher utilization without increasing failure rates. The focus should be on validating the health of the remaining MMUs, updating preventive maintenance plans to reflect the new loading, and ensuring the business have clear criteria and monitoring in place so that the retirement of MMU 916 does not inadvertently shift risk onto other units."}, "A8_c9395f4c": {"es": "Retiring MMU 920 avoids material annual maintenance spend, with a base-case overall benefit and an 80% confidence range. Despite a high overall risk level (score 0.62) and a 45% probability of success, this action targets a high-risk asset (maintenance risk 0.72) with only 55% site utilization and stable but modest productivity of 53.6, making it the #2 priority lever in the fleet rationalization portfolio.", "dd": "This action proposes retiring MMU 920 to eliminate roughly annual maintenance costs on a high-risk unit (maintenance risk score 0.72) t lume without impacting blast schedules or responsiveness. The main risk for you is a 35% probability of customer service disruption if the business does not proactively reallocate capacity and adjust crew and routing plans before the retirement date. It will be necessary to have a clear transition plan that locks in replacement capacity, updates daily and weekly schedules, and ensures dispatch and site teams know exactly when MMU 920 is no longer available. If executed well, you maintain service levels while simplifying fleet coordination and reducing the number of high-risk units you must schedule around.", "fb": "This action targets annual avoided maintenance costs from retiring MMU 920, with a base-case overall benefit and an 80% confidence range. However, the probability of success is only 45%, and the risk-adjusted benefit is slightly negative at R-6,000 once the business factor in a 35% chance of service disruption and a 40% chance of coordination delays that could erode savings or trigger penalty costs. From a capital efficiency perspective, removing a high-risk, low-utilization asset improves the quality of the fleet and can support better long-term cash flow by avoiding large, lumpy repair spend, but it requires disciplined execution to protect revenue. It is advisable to view this as a high-leverage but high-risk rationalization move (Lever 8, ranked #2) that warrants conditional approval tied to a robust mitigation plan and clear tracking of realized savings versus any service-related costs.", "mb": "MMU 920 carries a high maintenance risk score of 0.72, and retiring it would immediately remove roughly annual planned and unplanned maintenance exposure from the portfolio. This reduces the likelihood of major breakdowns, emergency call-outs, and parts spend on an ageing, high-risk unit, allowing the team to focus effort on healthier assets and preventative maintenance. The main risk for you is a 40% probability of coordination delays in decommissioning, documentation, and system updates, which could create confusion about whether MMU 920 is still in service and lead to scheduling or safety issues. To capture the benefit, It will be necessary to have a tightly managed decommissioning process: lock out and tag out the unit, update the maintenance system and asset register on the effective date, communicate clearly with planners and site teams, and define the final disposition plan (cannibalisation, sale, or scrap) to avoid lingering maintenance obligations."}, "A8_3dfcffbc": {"es": "Retiring MMU 922 avoids material annual maintenance and compliance costs, with an upside and a risk-adjusted benefit of R-15,250 at a 45% success probability. Despite no direct margin improvement, this is the top-ranked fleet rationalization lever and materially reduces exposure to a high-risk asset with a maintenance risk score of 0.71.", "dd": "This action retires MMU 922, a high-risk unit with a maintenance risk score of 0.71, to eliminate roughly annual maintenance and associated regulatory costs while productivity remains stable at 50.0 and site utilization is effectively zero. The initiative delivers an upside.62) and the probability of success is 45%, resulting in a risk-adjusted benefit of R-15,250. The primary rationale is to remove a low-utilization, high-maintenance-risk MMU from the fleet, freeing budget and management attention for higher-performing assets without compromising current contracted volumes. However, the decision introduces specific risks: a 35% probability of reduced blasting flexibility or service disruption due to loss of backup capacity, and a 30% probability of coordination delays during decommissioning (deregistration, explosives license removal, and operator reallocation) that could temporarily affect scheduling and operational efficiency. To capture the upside while containing downside, the business must tightly manage the transition plan, validate that remaining MMUs can absorb demand spikes, and sequence d er planning and cross-site support.", "fb": "This action removes annual maintenance and compliance costs from a high-risk MMU with no current site utilization, generating an upside of material the first year and an 80% confidence range. With a 45% probability of success and a high overall risk score of 0.62, the risk-adjusted benefit is R-15,250, so the financial case depends on disciplined execution to avoid service penalties or revenue loss from any disruption. Over a three-year period, the avoided maintenance spend could reach material before discounting, improving cash flow and freeing budget for higher-ROI projects, even though there is no direct margin improvement attributed to this lever. It is advisable to view this as a fleet simplification and risk-reduction move that converts a potentially lumpy maintenance and failure cost profile into a more predictable cost base, provided the business manages the decommissioning to avoid customer service impacts.", "mb": "MMU 922 carries a maintenance risk score of 0.71 and costs roughly annually to keep compliant and operational, despite having no active site utilization, making it a prime candidate for retirement from a maintenance efficiency perspective. Removing this unit will immediately reduce the scheduled and unscheduled workload, lower exposure to high-risk failures, and simplify the maintenance plan across the fleet. The trade-off is that you lose one piece of backup capacity, so any remaining MMUs will need robust preventive maintenance and clear critical spares strategies to handle demand spikes without this unit as a fallback. The focus should be on planning the decommissioning sequence (inspections, safe de-gassing, component recovery, and documentation) to avoid the 30% risk of transition-related delays, while updating maintenance strategies on the remaining fleet to preserve reliability and blasting readiness."}}, "rk": {"A1_74bf6c67": {"rl": "High", "rs": 0.62, "tr": "Equipment breakdown during intensi itor key health indicators (hydraulics, pumps, chassis, electrical) weekly with rapid response to emerging defects."}, "A5_2b853e03": {"rl": "Medium", "rs": 0.46, "tr": "Equipment breakdown during implementation of availability improvement measures for MMU 765 (e.g., extended downtime for inspections, component changes or reliability upgrades) leading to lower actual availability than baseline.", "tp": 40.0, "tm": "It is recommended to plan improvements into scheduled maintenance windows; It is recommended to perform detailed pre-work inspection and parts readiness check; OEM/qualified technicians should be used; It is recommended to implement a clear go/no-go checklist to avoid scope creep; It is recommended to monitor availability daily for 30 days post-change and trigger rapid response if availability drops below historical baseline."}, "A5_16abfb84": {"rl": "High", "rs": 0.58, "tr": "Equipment breakdowns increase during availability push (higher duty cycle on MMU 927 with existing maintenance risk of 0.66), causing unplanned downtime and possible loss of availability gains.", "tp": 45.0, "tm": "It is recommended to implement a focused reliability plan for MMU 927 before ramp-up: pre-emptive component inspections, condition-based checks on critical systems (hydraulics, pumps, electrical), and a temporary increase in planned maintenance frequency for 3 months. Lock in OEM/contractor response SLAs and maintain a small stock of critical spares on-site to reduce MTTR."}, "A5_dde036c0": {"rl": "High", "rs": 0.58, "tr": "Equipment breakdown during transition to higher availability targets for MMU 928 due to already elevated maintenance risk (0.64), leading to unplanned downtime and potential drop below current 86% availability.", "tp": 45.0, "tm": "It is recommended to implement a focused reliability improvement plan before ramp-up: It is recommended to conduct full condition assessment on MMU 928, priority should be given to replacement of high-failure components, inc     function switchTab(id) {
        var btns = document.querySelectorAll('.tab-btn');
        btns.forEach(function(b) {
            var match = b.getAttribute('data-tab')===id;
            b.classList.toggle('active',match);
            b.setAttribute('aria-selected',match?'true':'false');
        });
        document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
        var el = document.getElementById('tab-'+id);
        if (el) {
            el.classList.add('active');
            renderChartsForTab(id);
        }
        var label = id==='exec' ? 'Executive Summary' : (id==='ops' ? 'Operational Summary' : id.replace('p','Portfolio '));
        announce('Switched to '+label+' tab');
    }

    function switchSubTab(pid,name) {

        container.querySelectorAll('.sub-tab-btn').forEach(function(b){b.classList.remove('active');b.setAttribute('aria-selected','false');});
        container.querySelectorAll('.sub-content').forEach(function(c){c.classList.remove('active');});

        if(btn){btn.classList.add('active');btn.setAttribute('aria-selected','true');}
        var panel = document.getElementById('sub-'+pid+'-'+name);
        if(panel) panel.classList.add('active');

        // Waterfall + Lever cards

            var ap=meta?meta.ap:0;
            var c=LEVER_COLORS[lev];
            html += '<div class="lever-card">'

                + '<div class="lever-card-stat"><div class="lever-card-stat-val">'+ip+'%</div><div class="lever-card-stat-lbl">Impact</div></div>'
                + '<div class="lever-card-stat"><div class="lever-card-stat-val" style="color:'+probColor(ap)+'">'+ap+'%</div><div class="lever-card-stat-lbl">Prob.</div></div>'
                + '</div>'

        html += '</div></div>';
        html += '</div>';

        // Strategy narrative
        html += '<div class="card">'
            + '<div class="card-header"><div class="card-title"><span class="icon">&#9670;</span> Strategic Alignment</div></div>'
            + '<div class="exec-section"><h3>'+p.nm+' — Productivity Alignment</h3><p>'+(p.pa||'N/A')+'</p></div>'
            + '<div class="exec-section"><h3>'+p.nm+' — Cost Reduction Alignment</h3><p>'+(p.ca||'N/A')+'</p></div>'
            + (p.ks?'<div class="exec-section"><h3>Key Synergies</h3><p>'+p.ks+'</p></div>':'')
            + (p.kt?'<div class="exec-section"><h3>Key Trade-offs</h3><p>'+p.kt+'</p></div>':'')
            + '</div>';

        html += '</div>';
        return html;
    }

    /* ---- RISK & IMPLEMENTATION SUB-TAB ---- */
    function buildRiskView(p) {
        var html = '<div class="sub-content" id="sub-'+p.id+'-risk">';

        // Two-col: Risk scatter + Risk bar
        html += '<div class="two-col">';
        html += '<div class="card">'
            + '<div class="card-header"><div class="card-title"><span class="icon">&#9888;</span> Risk Matrix</div></div>'
            + '<div class="chart-box" role="img" aria-label="Scatter chart plotting probability vs risk score for actions in '+p.nm+'"><canvas id="scatter-'+p.id+'" aria-hidden="true"></canvas></div>'
            + '</div>';
        html += '<div class="card">'
            + '<div class="card-header"><div class="card-title"><span class="icon">&#9632;</span> Risk Distribution</div></div>'
            + '<div class="chart-box" role="img" aria-label="Bar chart of risk level distribution for '+p.nm+'"><canvas id="riskbar-'+p.id+'" aria-hidden="true"></canvas></div>'
            + '</div>';
        html += '</div>';

        // Risk profile cards
        html += '<div class="section-title"><span class="dot"></span> Risk Profile</div>';
        html += '<div class="risk-cards">';
        var riskColors = {'Low':'var(--accent-green)','Medium':'var(--accent-amber)','High':'var(--accent-red-light)','Critical':'#ef4444'};
        ['Low','Medium','High','Critical'].forEach(function(level) {
            var count = p.rp[level]||0;
            if(count===0) return;
            var c = riskColors[level];
            // Find top 3 actions at this risk level
            var levelActions = p.ar.filter(function(ref){var a=D.ua[ref.a];return a&&a.rl===level;}).slice(0,3);
            html += '<div class="risk-card">'
                + '<div style="position:absolute;top:0;left:0;width:3px;height:100%;background:'+c+';border-radius:8px 0 0 8px;"></div>'
                + '<div class="risk-card-header" style="padding-left:.3rem;">'
                + '<div class="risk-card-title" style="color:'+c+'">'+level+' Risk</div>'
                + '<div class="risk-card-count" style="color:'+c+'">'+count+'</div>'
                + '</div>'
                + '<div class="risk-card-body">';
            levelActions.forEach(function(ref) {
                var a=D.ua[ref.a]; var rk=D.rk[ref.a]||{};
                if(!a) return;
                html += '<div class="risk-card-item">'
                    + '<div style="font-weight:600;color:var(--text-primary);font-size:.62rem;">'+actionTypeName(a.t)+' - '+(a.e||'N/A')+'</div>'
                    + (rk.tr?'<div style="font-size:.58rem;margin-top:.1rem;">'+truncate(rk.tr,200)+'</div>':'')
                    + (rk.tm?'<div style="font-size:.58rem;color:var(--accent-green);margin-top:.1rem;">Mitigation: '+truncate(rk.tm,150)+'</div>':'')
                    + '</div>';
            });
            html += '</div></div>';
        });
        html += '</div>';

        // Implementation roadmap
        if (p.rm && p.rm.length>0) {
            html += '<div class="section-title"><span class="dot"></span> Implementation Roadmap</div>';
            var currentQ = Math.ceil((new Date().getMonth()+1)/3);
            html += '<div class="timeline">';
            p.rm.forEach(function(phase,i) {
                var isActive = (phase.ph===currentQ);
                html += '<div class="timeline-phase '+(isActive?'active':'')+'">'
                    + '<div class="timeline-phase-num">Phase '+phase.ph+'</div>'
                    + '<div class="timeline-phase-text">'+(phase.d||'').replace(/\n/g,'<br>')+'</div>'
                    + '</div>';
            });
            html += '</div>';
        }

        // Stakeholder briefings
        if (p.sb && Object.keys(p.sb).length>0) {
            html += '<div class="card">'
                + '<div class="card-header"><div class="card-title"><span class="icon">&#9670;</span> Stakeholder Briefings</div></div>'
                + '<div class="sh-tabs">';
            var sKeys = Object.keys(p.sb);
            sKeys.forEach(function(s,i) { html += '<button class="sh-tab '+(i===0?'active':'')+'" onclick="switchSH(this,\'sh-'+p.id+'-'+s.replace(/\s/g,'')+'\')">'+s+'</button>'; });
            html += '</div>';
            sKeys.forEach(function(s,i) { html += '<div class="sh-content '+(i===0?'active':'')+'" id="sh-'+p.id+'-'+s.replace(/\s/g,'')+'">'+(p.sb[s]||'').replace(/\n/g,'<br>')+'</div>'; });
            html += '</div>';
        }

        html += '</div>';
        return html;
    }

    /* ---- EVENT HANDLERS ---- */
    function toggleAccordion(header) {
        header.classList.toggle('open');
        header.setAttribute('aria-expanded', header.classList.contains('open'));
        var body = header.nextElementSibling;
        body.classList.toggle('open');
    }

    function toggleActionDetail(id) {
        var row = document.getElementById(id);
        if(row) row.style.display = row.style.display==='none' ? 'table-row' : 'none';
    }

    function switchSH(btn,contentId) {
        var parent = btn.parentElement;
        parent.querySelectorAll('.sh-tab').forEach(function(t){t.classList.remove('active');});
        btn.classList.add('active');
        var container = parent.parentElement;
        container.querySelectorAll('.sh-content').forEach(function(c){c.classList.remove('active');});
        var el = document.getElementById(contentId);
        if(el) el.classList.add('active');
    }

    function toggleCompView(view,btn) {
        btn.parentElement.querySelectorAll('.comp-toggle-btn').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active');
        document.querySelectorAll('.comp-view').forEach(function(v){v.classList.remove('active');});
        var el = document.getElementById('comp-'+view);
        if(el) el.classList.add('active');
        if(view==='sidebyside') updateComparison();
    }

    /* ---- FILTERING ---- */
    var filterTimers = {};
    function applyFilters(pid) {
        clearTimeout(filterTimers[pid]);
        filterTimers[pid] = setTimeout(function() {
            var leverVal = document.getElementById('fl-'+pid).value;
            var riskVal = document.getElementById('fr-'+pid).value;
            var searchVal = (document.getElementById('fs-'+pid).value||'').toLowerCase();
            var table = document.getElementById('tbl-'+pid);
            if(!table) return;
            var rows = table.querySelectorAll('tbody tr.action-row');
            var shown = 0;
            rows.forEach(function(row) {
                var detailRow = row.nextElementSibling;
                var show = true;
                if(leverVal!=='all' && row.dataset.lever!==leverVal) show=false;
                if(riskVal!=='all' && row.dataset.risk!==riskVal) show=false;
                if(searchVal && row.dataset.search.indexOf(searchVal)===-1) show=false;
                row.style.display = show ? '' : 'none';
                if(detailRow && detailRow.classList.contains('action-detail-row')) detailRow.style.display='none';
                if(show) shown++;
            });
            var fc = document.getElementById('fc-'+pid);
            if(fc) fc.textContent = shown+' of '+rows.length;
        }, 200);
    }

    /* ---- COPY TO CLIPBOARD ---- */
    function copyTableToClipboard(tableId) {
        var table = document.getElementById(tableId);
        if(!table) return;
        var rows = table.querySelectorAll('tr');
        var tsv = '';
        rows.forEach(function(row) {
            if(row.style.display==='none') return;
            if(row.classList.contains('action-detail-row')) return;
            var cells = row.querySelectorAll('th,td');
            var rowData = [];
            cells.forEach(function(cell){rowData.push(cell.textContent.trim().replace(/\t/g,' '));});
            tsv += rowData.join('\t')+'\n';
        });
        navigator.clipboard.writeText(tsv).then(function(){
            var btn = document.querySelector('[data-copy="'+tableId+'"]');
            if(btn){var orig=btn.textContent;btn.textContent='Copied!';setTimeout(function(){btn.textContent=orig;},2000);}
        }).catch(function(){});
    }

    /* ---- COMPARISON MODULE ---- */
    function updateComparison() {
        var selected = [];
        document.querySelectorAll('.comp-check:checked').forEach(function(cb){
            selected.push(parseInt(cb.value));
        });
        if(selected.length>4) return;
        if(selected.length===0) return;
        comparisonSelection = selected;

        // Rebuild radar
        var key='compRadar';
        if(charts[key]){charts[key].destroy();delete charts[key];}
        renderComparisonRadar('compRadarCanvas',selected);

        // Build stat columns
        var panel = document.getElementById('compStatsPanel');
        if(!panel) return;
        var h = '<div style="display:grid;grid-template-columns:repeat('+selected.length+',1fr);gap:.5rem;">';
        selected.forEach(function(pid,i) {
            var p = D.p.find(function(x){return x.id===pid;});
            if(!p) return;
            var hr = (p.rp['High']||0)+(p.rp['Critical']||0);
            h += '<div class="card" style="border-top:3px solid '+COMP_COLORS[i]+'">'
                + '<div style="font-size:.7rem;font-weight:700;color:'+COMP_COLORS[i]+';margin-bottom:.5rem;">'+p.nm+'</div>'
                + '<div style="font-size:.58rem;color:var(--text-muted);margin-bottom:.2rem;">ACTIONS</div><div style="font-size:1rem;font-weight:800;font-family:\'Roboto Mono\',monospace;">'+p.ac+'</div>'
                + '<div style="font-size:.58rem;color:var(--text-muted);margin-top:.4rem;margin-bottom:.2rem;">AVG PROB.</div><div style="font-size:1rem;font-weight:800;font-family:\'Roboto Mono\',monospace;color:'+probColor(p.ap)+'">'+p.ap+'%</div>'
                + '<div style="font-size:.58rem;color:var(--text-muted);margin-top:.4rem;margin-bottom:.2rem;">HIGH RISK</div><div style="font-size:1rem;font-weight:800;font-family:\'Roboto Mono\',monospace;color:var(--accent-amber);">'+hr+'</div>'
                + '<div style="font-size:.58rem;color:var(--text-muted);margin-top:.4rem;margin-bottom:.2rem;">MARGIN</div><div style="font-size:1rem;font-weight:800;font-family:\'Roboto Mono\',monospace;">'+p.mp+'%</div>'
                + '</div>';
        });
        h += '</div>';
        panel.innerHTML = h;
    }

    /* ---- CHART RENDERERS ---- */
    function renderWaterfall(canvasId, wfData) {
        var key = canvasId;
        if(charts[key]) return;
        var ctx = document.getElementById(canvasId);
        if(!ctx) return;

        var labels = wfData.map(function(d){return LEVER_NAMES[d.l]||'L'+d.l;});
        labels.push('Total');
        var values = wfData.map(function(d){return d.ip;});
        var totalPct = values.reduce(function(a,b){return a+b;},0);
        values.push(Math.round(totalPct*10)/10);
        var bases = [];
        var cum = 0;
        wfData.forEach(function(d){bases.push(cum);cum+=d.ip;});
        bases.push(0);
        var colors = wfData.map(function(d){return LEVER_COLORS[d.l]||'#666';});
        colors.push('#f0f0f2');

        charts[key] = new Chart(ctx, {
            type:'bar',
            data:{
                labels:labels,
                datasets:[
                    {label:'Base',data:bases,backgroundColor:'transparent',borderWidth:0,borderSkipped:false},
                    {label:'Value',data:values,backgroundColor:colors,borderWidth:0,borderRadius:3}
                ]
            },
            options:{
                responsive:true, maintainAspectRatio:false,
                scales:{
                    x:{stacked:true,grid:{display:false},ticks:{color:'#9ca3af',font:{size:9}}},
                    y:{stacked:true,grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10},callback:function(v){return v+'%';}}}
                },
                plugins:{
                    legend:{display:false},
                    tooltip:{callbacks:{label:function(ctx){if(ctx.datasetIndex===0)return '';return ctx.parsed.y+'% of total impact';}}},
                    datalabels:{display:function(ctx){return ctx.datasetIndex===1;},color:'#f0f0f2',anchor:'end',align:'end',font:{size:9,weight:600},formatter:function(v){return v>1?v+'%':'';}}
                }
            }
        });
    }

    function renderTornado(canvasId, tnData) {
        var key = canvasId;
        if(charts[key]) return;
        var ctx = document.getElementById(canvasId);
        if(!ctx) return;
        if(!tnData||tnData.length===0) return;

        var labels = tnData.map(function(d){return LEVER_NAMES[d.l]||'L'+d.l;});
        var downside = tnData.map(function(d){return Math.round((d.lo-d.avg)*100)/100;});
        var upside = tnData.map(function(d){return Math.round((d.hi-d.avg)*100)/100;});

        charts[key] = new Chart(ctx, {
            type:'bar',
            data:{
                labels:labels,
                datasets:[
                    {label:'Downside',data:downside,backgroundColor:'rgba(248,113,113,0.7)',borderColor:'#f87171',borderWidth:1,borderRadius:3},
                    {label:'Upside',data:upside,backgroundColor:'rgba(74,222,128,0.7)',borderColor:'#4ade80',borderWidth:1,borderRadius:3}
                ]
            },
            options:{
                responsive:true, maintainAspectRatio:false, indexAxis:'y',
                scales:{
                    x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10},callback:function(v){return v+'%';}}},
                    y:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:10}}}
                },
                plugins:{
                    legend:{labels:{color:'#9ca3af',font:{size:10}}},
                    tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.x+'% from average';}}},
                    annotation:{annotations:{zeroLine:{type:'line',xMin:0,xMax:0,borderColor:'rgba(255,255,255,0.3)',borderWidth:1,borderDash:[4,4]}}}
                }
            }
        });
    }

    function renderRiskScatter(canvasId, scatterData) {
        var key = canvasId;
        if(charts[key]) return;
        var ctx = document.getElementById(canvasId);
        if(!ctx) return;
        if(!scatterData||scatterData.length===0) return;

        var datasets = {};
        scatterData.forEach(function(d) {
            var lev = d.l;
            if(!datasets[lev]) datasets[lev]={label:LEVER_NAMES[lev]||'L'+lev,data:[],backgroundColor:LEVER_COLORS[lev]||'#666',pointRadius:[]};
            datasets[lev].data.push({x:d.p,y:d.rs});
            datasets[lev].pointRadius.push(Math.max(4,Math.min(16,d.ip*1.5)));
        });
        var dsArr = Object.values(datasets);

        charts[key] = new Chart(ctx, {
            type:'scatter',
            data:{datasets:dsArr},
            options:{
                responsive:true, maintainAspectRatio:false,
                scales:{
                    x:{title:{display:true,text:'Success Probability (%)',color:'#9ca3af',font:{size:10}},min:0,max:100,grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10}}},
                    y:{title:{display:true,text:'Risk Score',color:'#9ca3af',font:{size:10}},min:0,max:1,grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10}}}
                },
                plugins:{
                    legend:{labels:{color:'#9ca3af',font:{size:9}},position:'bottom'},
                    tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': Prob='+ctx.parsed.x+'%, Risk='+ctx.parsed.y;}}},
                    annotation:{annotations:{
                        vLine:{type:'line',xMin:50,xMax:50,borderColor:'rgba(255,255,255,0.15)',borderWidth:1,borderDash:[4,4]},
                        hLine:{type:'line',yMin:0.5,yMax:0.5,borderColor:'rgba(255,255,255,0.15)',borderWidth:1,borderDash:[4,4]}
                    }}
                }
            }
        });
    }

    function renderComparisonRadar(canvasId, pids) {
        var key = 'compRadar';
        var ctx = document.getElementById(canvasId);
        if(!ctx) return;

        var datasets = [];
        pids.forEach(function(pid,i) {
            var p = D.p.find(function(x){return x.id===pid;});
            if(!p) return;
            var total=0;
            for(var lev=1;lev<=8;lev++) total+=(p.ld[String(lev)]||0);
            var data=[];
            for(var lev=1;lev<=8;lev++) data.push(((p.ld[String(lev)]||0)/total*100).toFixed(1));
            datasets.push({
                label:p.nm,data:data,
                borderColor:COMP_COLORS[i],backgroundColor:COMP_COLORS[i]+'15',
                pointBackgroundColor:COMP_COLORS[i],borderWidth:2,pointRadius:3
            });
        });

        charts[key] = new Chart(ctx, {
            type:'radar',
            data:{labels:Object.values(LEVER_NAMES),datasets:datasets},
            options:{
                responsive:true,
                scales:{r:{grid:{color:'rgba(255,255,255,0.08)'},angleLines:{color:'rgba(255,255,255,0.08)'},pointLabels:{color:'#9ca3af',font:{size:10}},ticks:{display:false},beginAtZero:true}},
                plugins:{legend:{labels:{color:'#9ca3af',font:{size:10}}}}
            }
        });
    }

    function renderLeverDoughnut() {
        if(charts['leverDoughnut']) return;
        var ctx = document.getElementById('leverDoughnut');
        if(!ctx) return;
        charts['leverDoughnut'] = new Chart(ctx, {
            type:'doughnut',
            data:{
                labels:D.ls.map(function(l){return l.s;}),
                datasets:[{data:D.ls.map(function(l){return l.ip;}),backgroundColor:D.ls.map(function(l){return l.c;}),borderColor:'#2b2f38',borderWidth:2}]
            },
            options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+ctx.parsed+'% of total impact';}}}},cutout:'55%'}
        });
    }

    function renderRiskBar(pid) {
        var key='riskbar-'+pid;
        if(charts[key]) return;
        var ctx = document.getElementById(key);
        if(!ctx) return;
        var p = D.p.find(function(x){return x.id===pid;});
        if(!p) return;
        var levels=['Low','Medium','High','Critical'];
        var colors=['#22c55e','#f59e0b','#c41e3a','#ef4444'];
        var data=levels.map(function(l){return p.rp[l]||0;});
        charts[key] = new Chart(ctx, {
            type:'bar',
            data:{labels:levels,datasets:[{data:data,backgroundColor:colors.map(function(c){return c+'88';}),borderColor:colors,borderWidth:1,borderRadius:4}]},
            options:{
                responsive:true,indexAxis:'y',
                scales:{
                    x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10}}},
                    y:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:11}}}
                },
                plugins:{
                    legend:{display:false},
                    tooltip:{callbacks:{label:function(ctx){return ctx.parsed.x+' actions';}}},
                    datalabels:{display:true,color:'#f0f0f2',anchor:'end',align:'end',font:{size:10,weight:600},formatter:function(v){return v>0?v:'';}}
                }
            }
        });
    }

    /* ---- CHART ROUTING ---- */
    function renderChartsForTab(tabId) {
        if(tabId==='exec') {
            renderWaterfall('execWaterfall',D.ls.map(function(l){return {l:l.l,ip:l.ip};}).sort(function(a,b){return b.ip-a.ip;}));
        } else if(tabId==='ops') {
            return;
        } else {
            var pid = parseInt(tabId.replace('p',''));
            renderChartsForSubTab(pid,'overview');
        }
    }

    function renderChartsForSubTab(pid,subTab) {
        var p = D.p.find(function(x){return x.id===pid;});
        if(!p) return;
        if(subTab==='overview') {
            renderWaterfall('wf-'+pid, p.wf);
        } else if(subTab==='actions') {
            renderTornado('tornado-'+pid, p.tn);
        } else if(subTab==='risk') {
            renderRiskScatter('scatter-'+pid, p.sc);
            renderRiskBar(pid);
        }
    }

    /* ---- KEYBOARD SUPPORT ---- */
    document.addEventListener('keydown',function(e) {
        if(e.key==='Enter'||e.key===' ') {
            var el = document.activeElement;
            if(el&&el.classList.contains('accordion-header')) { e.preventDefault(); toggleAccordion(el); }
        }
    });

    /* ---- INIT ---- */
    function init() {
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-ZA',{year:'numeric',month:'short',day:'numeric'});
        document.getElementById('portfolioCountBadge').textContent = D.p.length+' PORTFOLIOS';
        buildTabBar();
        var contentHtml = buildExecTab()+buildOperationalTab();
        D.p.forEach(function(p){contentHtml+=buildPortfolioTab(p);});
        document.getElementById('contentArea').innerHTML = contentHtml;
        renderChartsForTab('exec');
    }

document.addEventListener('DOMContentLoaded',init);
    </script>
</body>
</html>
