<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Fleet Optimisation Engine | Enaex Africa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        :root {
            --bg-primary: #2b2f38;
            --bg-secondary: #343842;
            --bg-card: #3d424e;
            --bg-card-hover: #464c59;
            --bg-input: #2f3340;
            --accent-red: #c41e3a;
            --accent-red-light: #e63950;
            --accent-red-glow: rgba(196, 30, 58, 0.3);
            --accent-green: #22c55e;
            --accent-amber: #f59e0b;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-primary: #f0f0f2;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --glass-bg: rgba(61, 66, 78, 0.7);
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.25);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.35);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }

        @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideInLeft { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
        @keyframes slideInRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        @keyframes glowPulse { 0%,100%{opacity:.6} 50%{opacity:1} }

        /* HEADER */
        .header { background:var(--bg-secondary); border-bottom:1px solid var(--border-color); padding:.6rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:1000; overflow:hidden; }
        .header::before { content:''; position:absolute; top:-30px; right:80px; width:200px; height:200px; border:1px solid rgba(255,255,255,.04); transform:rotate(45deg); pointer-events:none; }
        .header::after { content:''; position:absolute; top:-50px; right:180px; width:160px; height:160px; border:1px solid rgba(255,255,255,.03); transform:rotate(45deg); pointer-events:none; }
        .logo-section { display:flex; align-items:center; gap:1rem; animation:slideInLeft .6s ease-out; }
        .logo { width:44px; height:44px; flex-shrink:0; }
        .logo svg { width:100%; height:100%; }
        .header-title h1 { font-size:1.1rem; font-weight:700; letter-spacing:-.02em; }
        .header-title p { font-size:.7rem; color:var(--text-secondary); margin-top:.1rem; }
        .header-meta { display:flex; align-items:center; gap:1rem; animation:slideInRight .6s ease-out; }
        .header-badge { display:flex; align-items:center; gap:.4rem; background:var(--accent-red); padding:.3rem .7rem; border-radius:20px; font-size:.65rem; font-weight:600; color:white; }
        .header-badge .dot { width:6px; height:6px; border-radius:50%; background:white; animation:glowPulse 2s ease-in-out infinite; }
        .date-display { background:var(--bg-card); padding:.35rem .7rem; border-radius:6px; border:1px solid var(--border-color); font-size:.7rem; color:var(--text-secondary); font-family:'Roboto Mono',monospace; }

        /* PRIMARY TAB BAR */
        .tab-bar { display:flex; background:var(--bg-secondary); border-bottom:1px solid var(--border-color); overflow-x:auto; flex-shrink:0; scrollbar-width:none; position:sticky; top:52px; z-index:999; }
        .tab-bar::-webkit-scrollbar { display:none; }
        .tab-btn { flex-shrink:0; padding:.55rem .85rem; font-size:.65rem; font-weight:600; font-family:'Inter',sans-serif; color:var(--text-muted); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; transition:all .2s ease; white-space:nowrap; }
        .tab-btn:hover { color:var(--text-secondary); background:rgba(255,255,255,.03); }
        .tab-btn.active { color:var(--text-primary); border-bottom-color:var(--accent-red); background:rgba(196,30,58,.08); }
        .tab-btn .tab-count { background:var(--bg-card); padding:.1rem .35rem; border-radius:8px; font-size:.55rem; margin-left:.3rem; font-family:'Roboto Mono',monospace; }
        .tab-btn.active .tab-count { background:var(--accent-red); color:white; }

        /* SUB-TAB BAR */
        .sub-tab-bar { display:flex; gap:.25rem; padding:.5rem 0; margin-bottom:.8rem; border-bottom:1px solid var(--border-color); }
        .sub-tab-btn { padding:.4rem .8rem; font-size:.65rem; font-weight:600; color:var(--text-muted); background:none; border:1px solid transparent; border-radius:6px; cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
        .sub-tab-btn:hover { color:var(--text-secondary); background:rgba(255,255,255,.03); }
        .sub-tab-btn.active { color:var(--text-primary); background:var(--bg-card); border-color:var(--border-color); }
        .sub-content { display:none; }
        .sub-content.active { display:block; animation:fadeInUp .3s ease-out; }

        /* CONTENT */
        .content-area { padding:1rem 1.5rem; max-width:1600px; margin:0 auto; animation:fadeInUp .5s ease-out; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        /* CARDS */
        .card { background:var(--glass-bg); -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); border:1px solid var(--glass-border); border-radius:10px; padding:.85rem; transition:border-color .3s ease; margin-bottom:.8rem; }
        .card:hover { border-color:var(--border-hover); }
        .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.7rem; padding-bottom:.5rem; border-bottom:1px solid var(--border-color); }
        .card-title { font-size:.72rem; font-weight:600; color:var(--text-primary); display:flex; align-items:center; gap:.4rem; text-transform:uppercase; letter-spacing:.04em; }
        .card-title .icon { width:16px; height:16px; display:flex; align-items:center; justify-content:center; background:var(--accent-red); border-radius:3px; font-size:.55rem; }

        /* STATS */
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.5rem; margin-bottom:.8rem; }
        .stats-grid-6 { grid-template-columns:repeat(6,1fr); }
        .stat-item { background:var(--bg-primary); border-radius:7px; padding:.55rem .4rem; text-align:center; border:1px solid var(--border-color); transition:all .25s ease; position:relative; overflow:hidden; }
        .stat-item::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; opacity:0; transition:opacity .25s ease; }
        .stat-item:hover { border-color:var(--border-hover); transform:translateY(-1px); }
        .stat-item:hover::before { opacity:1; }
        .stat-item.red::before { background:var(--accent-red); }
        .stat-item.green::before { background:var(--accent-green); }
        .stat-item.amber::before { background:var(--accent-amber); }
        .stat-item.blue::before { background:var(--accent-blue); }
        .stat-item.purple::before { background:var(--accent-purple); }
        .stat-value { font-size:1.3rem; font-weight:800; font-family:'Roboto Mono',monospace; line-height:1; font-variant-numeric:tabular-nums; }
        .stat-value.accent-red { color:var(--accent-red-light); }
        .stat-value.accent-green { color:var(--accent-green); }
        .stat-value.accent-amber { color:var(--accent-amber); }
        .stat-value.accent-blue { color:var(--accent-blue); }
        .stat-value.accent-purple { color:var(--accent-purple); }
        .stat-label { font-size:.55rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin-top:.25rem; font-weight:500; }

        /* LAYOUTS */
        .two-col { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; margin-bottom:.8rem; }
        .three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.8rem; margin-bottom:.8rem; }

        /* PORTFOLIO BANNER */
        .portfolio-banner { background:linear-gradient(135deg,rgba(196,30,58,.12),rgba(196,30,58,.04)); border:1px solid var(--glass-border); border-radius:10px; padding:1rem 1.2rem; margin-bottom:.8rem; }
        .portfolio-banner h2 { font-size:1rem; font-weight:700; margin-bottom:.2rem; }
        .portfolio-banner .scenario-badge { display:inline-block; background:var(--accent-red); color:white; padding:.15rem .5rem; border-radius:10px; font-size:.6rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-left:.5rem; }
        .portfolio-banner .scenario-badge.policy { background:var(--accent-blue); }
        .portfolio-banner p { font-size:.72rem; color:var(--text-secondary); margin-top:.4rem; line-height:1.5; }

        /* SECTION HEADERS */
        .section-title { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:.6rem; color:var(--text-primary); display:flex; align-items:center; gap:.4rem; }
        .section-title .dot { width:8px; height:8px; border-radius:50%; background:var(--accent-red); }

        /* BADGES */
        .badge { display:inline-block; padding:.15rem .45rem; border-radius:6px; font-size:.58rem; font-weight:600; text-transform:uppercase; letter-spacing:.03em; }
        .badge-low { background:rgba(34,197,94,.15); color:var(--accent-green); }
        .badge-medium { background:rgba(245,158,11,.15); color:var(--accent-amber); }
        .badge-high { background:rgba(196,30,58,.15); color:var(--accent-red-light); }
        .badge-critical { background:rgba(239,68,68,.25); color:#ef4444; }
        .badge-medium_high { background:rgba(249,115,22,.15); color:var(--accent-amber); }
        .badge-low_medium { background:rgba(34,197,94,.1); color:#86efac; }
        .badge-very_high { background:rgba(239,68,68,.3); color:#ef4444; }
        .lever-badge { display:inline-block; padding:.12rem .4rem; border-radius:4px; font-size:.55rem; font-weight:600; }

        /* LEVER CARDS */
        .lever-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.5rem; margin-bottom:.8rem; }
        .lever-card { background:var(--bg-primary); border:1px solid var(--border-color); border-radius:8px; padding:.6rem; transition:all .25s; position:relative; overflow:hidden; cursor:default; }
        .lever-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
        .lever-card:hover { border-color:var(--border-hover); transform:translateY(-1px); box-shadow:var(--shadow-md); }
        .lever-card-name { font-size:.62rem; font-weight:600; color:var(--text-primary); margin-bottom:.3rem; }
        .lever-card-stats { display:flex; gap:.6rem; margin-bottom:.3rem; }
        .lever-card-stat { text-align:center; }
        .lever-card-stat-val { font-size:.85rem; font-weight:700; font-family:'Roboto Mono',monospace; }
        .lever-card-stat-lbl { font-size:.48rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.04em; }
        .lever-card-bar { height:3px; border-radius:2px; background:var(--bg-card); overflow:hidden; }
        .lever-card-bar-fill { height:100%; border-radius:2px; transition:width .6s ease; }

        /* RISK CARDS */
        .risk-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:.5rem; margin-bottom:.8rem; }
        .risk-card { background:var(--bg-primary); border:1px solid var(--border-color); border-radius:8px; padding:.7rem; position:relative; overflow:hidden; }
        .risk-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
        .risk-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.4rem; }
        .risk-card-title { font-size:.68rem; font-weight:700; }
        .risk-card-count { font-size:.85rem; font-weight:800; font-family:'Roboto Mono',monospace; }
        .risk-card-body { font-size:.62rem; color:var(--text-secondary); line-height:1.5; }
        .risk-card-item { padding:.3rem 0; border-bottom:1px solid var(--border-color); }
        .risk-card-item:last-child { border-bottom:none; }

        /* ACTION TABLE */
        .action-table-wrap { max-height:500px; overflow-y:auto; border-radius:8px; border:1px solid var(--border-color); }
        .action-table { width:100%; border-collapse:collapse; font-size:.68rem; }
        .action-table thead { position:sticky; top:0; z-index:10; }
        .action-table th { background:var(--bg-secondary); padding:.5rem .4rem; text-align:left; font-size:.58rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); border-bottom:1px solid var(--border-color); cursor:pointer; }
        .action-table th:hover { color:var(--text-primary); }
        .action-table td { padding:.45rem .4rem; border-bottom:1px solid var(--border-color); color:var(--text-secondary); vertical-align:top; }
        .action-table tr:hover td { background:rgba(255,255,255,.02); }
        .action-table .impact-bar { height:4px; border-radius:2px; background:var(--accent-red); display:block; margin-top:.2rem; }
        .action-table .prob-bar { height:4px; border-radius:2px; display:block; margin-top:.2rem; }

        /* CHART CONTAINER */
        .chart-box { background:var(--bg-primary); border:1px solid var(--border-color); border-radius:8px; padding:.8rem; position:relative; }
        .chart-box canvas { max-height:280px; }

        /* TIMELINE */
        .timeline { display:flex; gap:0; margin-bottom:.8rem; }
        .timeline-phase { flex:1; position:relative; padding:.8rem .6rem .6rem; background:var(--bg-primary); border:1px solid var(--border-color); }
        .timeline-phase:first-child { border-radius:8px 0 0 8px; }
        .timeline-phase:last-child { border-radius:0 8px 8px 0; }
        .timeline-phase:only-child { border-radius:8px; }
        .timeline-phase::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--accent-red); opacity:.3; }
        .timeline-phase.active::before { opacity:1; }
        .timeline-phase-num { font-size:.85rem; font-weight:800; font-family:'Roboto Mono',monospace; color:var(--accent-red-light); margin-bottom:.3rem; }
        .timeline-phase-text { font-size:.62rem; color:var(--text-secondary); line-height:1.5; }

        /* ACCORDION */
        .accordion-item { border:1px solid var(--border-color); border-radius:8px; margin-bottom:.4rem; overflow:hidden; }
        .accordion-header { display:flex; align-items:center; justify-content:space-between; padding:.6rem .8rem; background:var(--bg-primary); cursor:pointer; transition:background .2s; }
        .accordion-header:hover { background:var(--bg-card); }
        .accordion-header h4 { font-size:.72rem; font-weight:600; display:flex; align-items:center; gap:.5rem; flex:1; }
        .accordion-header .chevron { font-size:.7rem; color:var(--text-muted); transition:transform .2s; }
        .accordion-header.open .chevron { transform:rotate(180deg); }
        .accordion-body { display:none; padding:.8rem; background:var(--bg-card); border-top:1px solid var(--border-color); }
        .accordion-body.open { display:block; animation:fadeInUp .2s ease-out; }
        .accordion-body p { font-size:.68rem; color:var(--text-secondary); line-height:1.6; margin-bottom:.5rem; }
        .accordion-body .sub-title { font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-primary); margin-bottom:.3rem; margin-top:.6rem; }

        /* STAKEHOLDER TABS */
        .sh-tabs { display:flex; gap:.3rem; margin-bottom:.6rem; }
        .sh-tab { padding:.3rem .6rem; font-size:.6rem; font-weight:600; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-primary); color:var(--text-muted); cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
        .sh-tab.active { background:var(--accent-red); color:white; border-color:var(--accent-red); }
        .sh-content { display:none; font-size:.68rem; color:var(--text-secondary); line-height:1.6; }
        .sh-content.active { display:block; }

        /* EXEC MEMO */
        .exec-section { margin-bottom:.8rem; }
        .exec-section h3 { font-size:.78rem; font-weight:700; color:var(--accent-red-light); margin-bottom:.3rem; }
        .exec-section p { font-size:.7rem; color:var(--text-secondary); line-height:1.6; }

        /* OPERATIONAL SUMMARY */
        .freshness-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.7rem; margin-bottom:.8rem; }
        .freshness-card { display:flex; align-items:center; justify-content:space-between; gap:.8rem; padding:.7rem .8rem; border:1px solid var(--border-color); border-radius:8px; background:var(--bg-secondary); }
        .freshness-card.ok { border-left:3px solid var(--accent-green); }
        .freshness-card.stale { border-left:3px solid var(--accent-red); }
        .freshness-title { font-size:.66rem; font-weight:700; color:var(--text-primary); }
        .freshness-detail { margin-top:.15rem; font-size:.58rem; color:var(--text-muted); }
        .freshness-state { font-size:.6rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
        .freshness-card.ok .freshness-state { color:var(--accent-green); }
        .freshness-card.stale .freshness-state { color:var(--accent-red-light); }
        .op-group { margin-bottom:.8rem; }
        .op-group:last-child { margin-bottom:0; }
        .op-group-title { display:flex; align-items:center; gap:.45rem; margin-bottom:.45rem; font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em; }
        .op-group-title.completed { color:var(--accent-green); }
        .op-group-title.action { color:var(--accent-blue); }
        .op-group-title.hold { color:var(--accent-amber); }
        .op-list { list-style:none; display:grid; gap:.35rem; }
        .op-item { display:flex; align-items:flex-start; gap:.55rem; padding:.55rem .65rem; border:1px solid var(--border-color); border-radius:7px; background:var(--bg-secondary); font-size:.69rem; line-height:1.45; color:var(--text-secondary); }
        .op-item.completed { border-left:3px solid var(--accent-green); }
        .op-item.action { border-left:3px solid var(--accent-blue); }
        .op-item.hold { border-left:3px solid var(--accent-amber); }
        .op-rank { flex:0 0 1.6rem; font-family:'Roboto Mono',monospace; font-size:.58rem; font-weight:700; color:var(--text-muted); padding-top:.08rem; }
        .op-text { color:var(--text-primary); }
        .op-score { margin-left:auto; flex-shrink:0; font-family:'Roboto Mono',monospace; font-size:.56rem; color:var(--text-muted); }

        /* COMPARISON TABLE */
        .comp-table { width:100%; border-collapse:collapse; font-size:.68rem; }
        .comp-table th { background:var(--bg-secondary); padding:.5rem; text-align:left; font-size:.58rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); border-bottom:1px solid var(--border-color); }
        .comp-table td { padding:.5rem; border-bottom:1px solid var(--border-color); color:var(--text-secondary); }
        .comp-table tr { cursor:pointer; transition:background .15s; }
        .comp-table tr:hover td { background:rgba(255,255,255,.03); }
        .comp-table .bar-stack { display:flex; height:8px; border-radius:4px; overflow:hidden; min-width:120px; }
        .comp-table .bar-seg { height:100%; }

        /* COMPARISON MODULE */
        .comp-toggle { display:flex; gap:.3rem; margin-bottom:.8rem; }
        .comp-toggle-btn { padding:.35rem .7rem; font-size:.62rem; font-weight:600; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-primary); color:var(--text-muted); cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
        .comp-toggle-btn.active { background:var(--accent-red); color:white; border-color:var(--accent-red); }
        .comp-view { display:none; }
        .comp-view.active { display:block; }
        .portfolio-selector { display:flex; flex-wrap:wrap; gap:.35rem; margin-bottom:.8rem; }
        .port-check { display:flex; align-items:center; gap:.25rem; background:var(--bg-input); padding:.3rem .5rem; border-radius:4px; border:1px solid var(--border-color); cursor:pointer; font-size:.62rem; color:var(--text-secondary); transition:all .2s; }
        .port-check:hover { border-color:var(--accent-red); }
        .port-check input { accent-color:var(--accent-red); width:11px; height:11px; }
        .comp-stats-row { display:grid; gap:.5rem; margin-top:.8rem; }

        /* BAR LEGEND */
        .bar-legend { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.4rem; }
        .bar-legend-item { display:flex; align-items:center; gap:.2rem; font-size:.55rem; color:var(--text-muted); }
        .bar-legend-dot { width:8px; height:8px; border-radius:2px; }

        /* FILTER BAR */
        .filter-bar { display:flex; gap:.5rem; align-items:center; padding:.5rem .6rem; background:var(--bg-primary); border-radius:8px; border:1px solid var(--border-color); margin-bottom:.6rem; flex-wrap:wrap; }
        .filter-select { background:var(--bg-input); border:1px solid var(--border-color); border-radius:6px; padding:.4rem .6rem; color:var(--text-primary); font-size:.68rem; font-family:'Inter',sans-serif; cursor:pointer; }
        .filter-select:focus { outline:none; border-color:var(--accent-red); box-shadow:0 0 0 2px var(--accent-red-glow); }
        .filter-label { font-size:.6rem; color:var(--text-muted); font-weight:500; }
        .search-input { background:var(--bg-input); border:1px solid var(--border-color); border-radius:6px; padding:.4rem .6rem; color:var(--text-primary); font-size:.68rem; font-family:'Inter',sans-serif; min-width:140px; }
        .search-input:focus { outline:none; border-color:var(--accent-red); box-shadow:0 0 0 2px var(--accent-red-glow); }
        .search-input::placeholder { color:var(--text-muted); }
        .filter-count { font-size:.6rem; color:var(--text-muted); margin-left:auto; font-family:'Roboto Mono',monospace; }

        /* COPY BUTTON */
        .copy-btn { padding:.3rem .6rem; font-size:.58rem; font-weight:600; border:1px solid var(--border-color); border-radius:5px; background:var(--bg-primary); color:var(--text-muted); cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
        .copy-btn:hover { border-color:var(--accent-red); color:var(--text-primary); }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border-color); border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }

        /* ACCESSIBILITY */
        .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
        *:focus-visible { outline:2px solid var(--accent-blue); outline-offset:2px; }
        *:focus:not(:focus-visible) { outline:none; }

        /* REDUCED MOTION */
        @media(prefers-reduced-motion:reduce) {
            *,*::before,*::after { animation-duration:.01ms !important; transition-duration:.01ms !important; }
        }

        /* PRINT */
        @media print {
            .header,.tab-bar,.sub-tab-bar,.filter-bar,.copy-btn,.comp-toggle,.portfolio-selector { display:none !important; }
            body { background:white; color:black; }
            .content-area { padding:0; max-width:none; }
            .card { background:white; border:1px solid #ccc; break-inside:avoid; backdrop-filter:none; -webkit-backdrop-filter:none; }
            .stat-value,.stat-label,.card-title,.section-title,.lever-card-name { color:black !important; }
            .tab-content { display:block !important; }
            .sub-content { display:block !important; }
            canvas { max-width:100%; max-height:200px; }
        }

        /* RESPONSIVE */
        @media(max-width:1100px) {
            .two-col,.three-col { grid-template-columns:1fr; }
            .stats-grid { grid-template-columns:repeat(2,1fr); }
            .stats-grid-6 { grid-template-columns:repeat(3,1fr); }
            .lever-grid { grid-template-columns:repeat(2,1fr); }
            .timeline { flex-direction:column; }
            .timeline-phase { border-radius:8px !important; }
            .header { flex-direction:column; gap:.4rem; }
        }
        @media(max-width:768px) {
            .content-area { padding:.6rem; }
            .stats-grid-6 { grid-template-columns:repeat(2,1fr); }
            .lever-grid { grid-template-columns:1fr; }
            .freshness-grid { grid-template-columns:1fr; }
            .op-item { flex-wrap:wrap; }
            .op-score { width:100%; margin-left:2.15rem; }
            .filter-bar { flex-direction:column; align-items:stretch; }
        }

 sites allows Enaex to (a) replace high-assistance, long-haul patterns at Carolina, Dorstfontein, and Isibonelo, (b) cut diesel and driver hours by 5-10% on those routes, and (c) increase effective capacity without new capex. This synergy can convert parked, low-cost assets into productive units while enabling 3-5 retirements of high-maintenance, long-route units in Q3-Q4, improving fleet efficiency and reducing cost per tonne by 2-4% at those hotspots.", "kt": "Reactivating parked units vs retiring old units: Reactivating MMU-745/747/719/795/781 generates combined value of material but increases short-term maintenance, certification, and operator training costs, and adds complexity to dispatch. To stay within the 5 retirements/quarter limit, Enaex must choose between (a) running a larger active fleet for 1-2 quarters (higher overhead but more flexibility and revenue) or (b) accelerating retirement of older, less reliable units, which may temporarily reduce redundancy and increase risk if demand spikes.; Concentrated productivity focus at Wildfontein vs support to hotspot sites: Prioritizing Wildfontein MMUs for productivity interventions maximizes margin improvement quickly (material from top 5 actions) but may delay direct relief to Carolina, Dorstfontein, and Isibonelo. Alternatively, redeploying one or two optimized Wildfontein units early to assist hotspots will reduce assistance dependency and travel distances but could slightly underutilize Wildfontein's full capacity uplift in the first 1-2 quarters, potentially deferring 5-10% of the theoretical margin gain.", "rp": {"High": 40, "Medium": 36}, "ap": 64.0, "ar": [{"a": "A1_f4574d58", "ip": 9.13}, {"a": "A1_074b3a74", "ip": 7.63}, {"a": "A1_0b9f4048", "ip": 7.22}, {"a": "A1_daa9199d", "ip": 6.31}, {"a": "A1_ae1f1a6b", "ip": 4.81}, {"a": "A8_7547da52", "ip": 4.1}, {"a": "A8_5faa8f5d", "ip": 4.1}, {"a": "A8_e4e85e30", "ip": 4.1}, {"a": "A8_96fa9039", "ip": 4.1}, {"a": "A8_10da3d14", "ip": 4.1}, {"a": "A8_026eee portfolio prioritises improving quality of utilisation before adding new units, which is consistent with a 'quality first' productivity strategy.", "ca": "Moderate but targeted alignment. Direct cost reductions are smaller than margin improvement but are achieved through better assistance patterns, route optimisation, and availability improvements, plus implicit cost leverage from fleet rationalisation (value includes both cost and revenue effects). The portfolio favours structural efficiency (better use of existing fleet and routes) over blunt cost cutting, which is appropriate given the group-wide productivity potential.", "ks": "Wildfontein productivity uplift + capacity target recalibration + route optimisation: Concentrating interventions on MMU-752, 717, 731, 766, and 754 at Wildfontein creates a compound effect. Raising productivity from 6-29% to an 85% target, while simultaneously shortening routes and recalibrating capacity targets, can unlock most of the productivity value with minimal additional capex. This cluster also frees up assistance capacity that can be redirected to hotspot sites (Carolina, Dorstfontein, Isibonelo) in later phases.; Fleet reactivation + operational availability + assistance pattern optimisation: Reactivating parked MMUs 745, 747, 719, 795, and 781 (each meaningful value) is synergistic only if paired with availability and assistance-pattern actions. Higher availability ensures reactivated units deliver the projected /year revenue, while optimised assistance patterns reduce the need for backup units at hotspot sites. Together, these levers support a leaner but more reliable fleet, enabling future retirements without compromising service levels.", "kt": "Productivity stretch vs operational risk: Moving Wildfontein units from 6-29% to 85% productivity is aggressive. If targets are set too high without phased ramp-up, there is risk of overtime, safety pressure, and quality issues. A more realistic stepped target (e.g., 60% in Q1-Q2, 75-80% in Q3-Q4) may reduce theoretical value by 5-10% but materially lowers execution and safety risk.; Fleet reactivation vs rationalisation and capex discipline: Reactivating 5 parked MMUs adds operating and maintenance cost and may reduce the headroom for retirements under the 5-per-quarter cap. If demand or productivity uplift under-delivers, Enaex could end up with excess capacity and higher fixed costs. A staggered reactivation (e.g., 2 units in Q1, 2 in Q2, 1 in Q3) with utilisation gates (e.g., more than 65% sustained utilisation for 2 quarters) may delay up of value but protects against locking in unnecessary operating cost.", "rp": {"High": 40, "Medium": 36}, "ap": 64.0, "ar": [{"a": "A1_f4574d58", "ip": 9.13}, {"a": "A1_074b3a74", "ip": 7.63}, {"a": "A1_0b9f4048", "ip": 7.22}, {"a": "A1_daa9199d", "ip": 6.31}, {"a": "A1_ae1f1a6b", "ip": 4.81}, {"a": "A8_7547da52", "ip": 4.1}, {"a": "A8_5faa8f5d", "ip": 4.1}, {"a": "A8_e4e85e30", "ip": 4.1}, {"a": "A8_96fa9039", "ip": 4.1}, {"a": "A8_10da3d14", "ip": 4.1}, {"a": "A8_026eee16", "ip": 4.1}, {"a": "A1_ed95ab04", "ip": 3.36}, {"a": "A1_94ca45b6", "ip": 2.83}, {"a": "A1_54958f86", "ip": 2.63}, {"a": "A1_ef1b948c", "ip": 2.6}, {"a": "A1_c5576793", "ip": 2.45}, {"a": "A1_74bf6c67", "ip": 1.71}, {"a": "A1_15f161c3", "ip": 1.68}, {"a": "A5_e26677a5", "ip": 1.48}, {"a": "A5_2e9335d1", "ip": 1.39}, {"a": "A1_cdad361d", "ip": 1.38}, {"a": "A1_3f4c2810", "ip": 1.3}, {"a": "A1_dd1f8e56", "ip": 1.1}, {"a": "A8_0c8361cc", "ip": 0.88}, {"a": "A8_bd676127", "ip": 0.88}, {"a": "A8_730492be", "ip": 0.88}, {"a": "A8_753417d3", "ip": 0.88}, {"a": "A8_3911aa1c", "ip": 0.64}, {"a": "A8_334e68df", "ip": 0.64}, {"a": "A8_3365840a", "ip": 0.64}, {"a": "A8_35ed4227", "ip": 0.64}, {"a": "A8_31fca1ef", "ip": 0.64}, {"a": "A1_a19de71f", "ip": 0.54}, {"a": "A4_4160ca25", "ip": 0.39}, {"a": "A4_4eb01a65", "ip": 0.39}, {"a": "A4_71ad48f5", "ip": 0.39}, {"a": "A5_c132e079", "ip": 0.38}, {"a": "A5_dde036c0", "ip": 0.33}, {"a": "A7_6e4144a9", tein and reactivated units). Target a 3-5 percentage point availability improvement.\n- Reactivate 2 parked MMUs (e.g., 745 and 747) where revenue potential is most certain and where they can relieve assistance pressure on hotspot sites. Ensure pre-reactivation maintenance and reliability checks are completed.\n- It is recommended to begin capacity target recalibration for Wildfontein units only: set interim targets at about 60-65% for Q1 with a clear ramp-up path. Avoid system-wide target changes until initial results are validated."}, {"ph": 2, "d": "Phase 2 (Q2): It is recommended to extend optimisation and rebalance assistance\n- Scale productivity interventions to the remaining 11 productivity actions beyond the top 5, using Q1 learnings to standardise best practices (shift patterns, loading sequences, on-bench cycle times).\n- It is recommended to complete remaining route distance optimisation actions (20 total), prioritising those that reduce assistance dependency at Carolina, Dorstfontein, and Isibonelo by shortening inter-site travel and clarifying primary vs backup coverage.\n- It is recommended to implement all remaining operational availability actions, with a focus on preventive maintenance windows for the reactivated units and high-value Wildfontein MMUs.\n- Reactivate 2 additional parked MMUs (e.g., 719 and 795) contingent on Q1 utilisation and margin performance; Them should be used to reduce chronic assistance at hotspot sites and to test whether some older, low-productivity units can be earmarked for retirement in Q3.\n- It is recommended to extend capacity target recalibration to all 16 targeted MMUs, aligning targets with observed Q1 performance (e.g., 70-75% for strong performers, 60-65% for laggards) and embedding them into site KPIs."}, {"ph": 3, "d": "Phase 3 (Q3): Consolidate, rationalise, and protect margin\n- Push productivity from interim levels towards 75-80% on Wildfontein units and other key MMUs, using refined KPIs and performance dialogues. At this stage, re-evaluate each unit's true sustainable capacity and adjust targets accordingly.\n- The now-stable route and assistance patterns should be used to identify redundant or chronically underutilised units. Within the 5-per-quarter retirement cap, The worst 3-5 performers (or those with highest maintenance cost per tonne) and redeploy up to 10-12 units from overserved to underserved sites should be retired, staying within the 15 redeployment limit.\n- Reactivate the final parked MMU (e.g., 781) only if Q1-Q2 data shows consistent demand and utilisation more than 70% on reactivated units; otherwise, consider permanent retirement instead of reactivation.\n- Tighten assistance pattern optimisation: formalise primary/secondary coverage rules so that hotspot sites rely on planned coverage rather than ad-hoc assistance, reducing unplanned travel and overtime."}, {"ph": 4, "d": "Phase 4 (Q4): Optimise portfolio and lock in policy\n- It is recommended to reassess the entire fleet using updated productivity, availability, and route data. It is recommended to identify a second wave of 3-5 retirements and up to 15 redeployments, focusing on aligning MMU capability with mine plans for the next 12-24 months.\n- Finalise capacity target recalibration as a policy: embed realistic but stretching targets into contracts, site scorecards, and operator incentives. Targets should reflect actual Q2-Q3 performance, not theoretical 85% where not yet proven.\n- Institutionalise best practices from Wildfontein across all sites: standard operating procedures for loading, blasting-day scheduling, and maintenance windows that support sustained high productivity.\n- It is recommended to review the performance of reactivated units: if any are below 60-65% utilisation with weak forward demand, It is recommended to plan for retirement or sale to avoid carrying cost drag in 2027 and beyond."}], "sb": {"Operations": "The focus should be on Wildfontein as the operational pilot. The top 5 MMUs (752, 717, 731, 766, 754) are the biggest levers; getting them from 6-29% to even 70% productivity will deliver most of the productivity value. Treat Q1 as a stabilisation and learning period: standardise shift patterns, reduce non-productive travel via route optimisation, and ensure operators are cross-trained. Reactivated units should be used to structurally reduce assistance at Carolina, Dorstfontein, and Isibonelo rather than as floating spares. It is recommended to monitor assistance hours per site weekly; if they do not drop by at least 20-30% by Q2, revisit route and coverage plans before adding more units.", "Finance": "This portfolio is margin-accretive, with about 82% of value from margin improvement and direct cost reductions. Cash risk sits mainly in reactivating parked units and in any follow-on capex for underperforming MMUs. Structure approvals with gates: each reactivation should require a clear revenue case (e.g., contracted or highly probable volume) and a 6-12 month payback based on incremental margin, not just revenue. Productivity and utilisation by MMU should be tracked monthly; if reactivated units are below 60-65% utilisation after two quarters, trigger a review for retirement or redeployment. The Q3-Q4 rationalisation steps should be used to lock in fixed-cost reductions and improve ROA on the fleet.", "Maintenance": "The role is pivotal to making the productivity and reactivation value real. Before reactivating MMUs 745, 747, 719, 795, and 781, It is recommended to perform full condition assessments and prioritise reliability-critical components (pumps, augers, chassis, electricals). It is recommended to align preventive maintenance windows with the new capacity targets so that availability improvements (value) are realised without increasing breakdown risk. Standardise maintenance regimes for the high-value Wildfontein units and reactivated MMUs, and feed real failure data back into the Q3-Q4 retirement decisions: units with hig , site-focused productivity play. The portfolio also uses capacity target recalibration and operational availability to structurally support sustained productivity gains rather than one-off improvements.", "ca": "Moderate but targeted. Direct cost reductions are (about 18% of total value), largely via route distance optimization, assistance pattern optimization, and fleet rationalization (total value, which blends cost avoidance with revenue uplift). Reactivating parked MMUs (745/747/719/795/781) reduces carrying cost (per unit) and converts sunk cost into revenue capacity, improving unit economics even if absolute opex rises.", "ks": "Wildfontein productivity uplift + capacity target recalibration + operational availability: Raising MMU-752/717/731/766/754 from 6-29% to 85% productivity, combined with recalibrated capacity targets and improved availability, creates a reinforcing loop. Higher availability and realistic targets reduce chronic underperformance, while productivity interventions (operator coaching, shift design, loading/charging process optimization) convert idle capacity (e.g., 3519t on MMU-752, 3130t on MMU-717) into billable tonnes. This synergy maximizes revenue uplift per MMU without immediately adding more units to the site.; Fleet rationalization (reactivations) + route distance & assistance optimization: Reactivating parked MMUs (745/747/719/795/781) and then deploying them on optimized routes and reduced-assistance patterns allows Enaex to absorb volume growth or relieve hotspot sites without proportionally increasing support costs. Shorter routes and better assistance patterns lower fuel, overtime, and standby costs per tonne, so each reactivated MMU delivers closer to the full /year revenue potential while keeping cost per tonne in check.", "kt": "Higher opex and complexity vs. margin improvement from reactivations: Reactivating 5 parked MMUs adds maintenance, operators, and support overhead. While each unit shows a net value of material (revenue - carrying cost - implied operating cost), this assumes strong utilization. If volumes or dispatch discipline lag, Enaex risks diluting fleet productivity and increasing fixed cost. The trade-off is between capturing + in value from these five units versus the risk of underutilized reactivated assets and higher maintenance burden.; Concentrated productivity push at Wildfontein vs. network flexibility: Focusing heavily on Wildfontein (five top-value productivity actions) maximizes short-term margin improvement but may delay interventions at hotspot sites like Carolina, Dorstfontein, and Isibonelo, which currently have high assistance dependency. The trade-off is between extracting quick value from a clearly underperforming site versus using some of that capacity uplift to structurally relieve assistance-heavy sites, which could unlock additional network-wide savings and reduce operational risk.", "rp": {"High": 39, "Medium": 37}, "ap": 64.0, "ar": [{"a": "A1_f4574d58", "ip": 9.13}, {"a": "A1_074b3a74", "ip": 7.63}, {"a": "A1_0b9f4048", "ip": 7.22}, {"a": "A1_daa9199d", "ip": 6.31}, {"a": "A1_ae1f1a6b", "ip": 4.81}, {"a": "A8_7547da52", "ip": 4.1}, {"a": "A8_5faa8f5d", "ip": 4.1}, {"a": "A8_e4e85e30", "ip": 4.1}, {"a": "A8_96fa9039", "ip": 4.1}, {"a": "A8_10da3d14", "ip": 4.1}, {"a": "A8_026eee16", "ip": 4.1}, {"a": "A1_ed95ab04", "ip": 3.36}, {"a": "A1_94ca45b6", "ip": 2.83}, {"a": "A1_54958f86", "ip": 2.63}, {"a": "A1_ef1b948c", "ip": 2.6}, {"a": "A1_c5576793", "ip": 2.45}, {"a": "A1_74bf6c67", "ip": 1.71}, {"a": "A1_15f161c3", "ip": 1.68}, {"a": "A5_e26677a5", "ip": 1.48}, {"a": "A5_2e9335d1", "ip": 1.39}, {"a": "A1_cdad361d", "ip": 1.38}, {"a": "A1_3f4c2810", "ip": 1.3}, {"a": "A1_dd1f8e56", "ip": 1.1}, {"a": "A8_0c8361cc", "ip": 0.88}, {"a": "A8_bd676127", "ip": 0.88}, {"a": "A8_730492be", "ip": 0.88}, {"a": "A8_753417d3", "ip": 0.88}, {"a": "A8_94ba93f8", "ip": 0.64}, {"a": "A8_a0e08146", "ip": 0.64}, {"a": "A8_9cadadcc", "ip": 0.64}, {"a": "A8_0553dbd3", " r these units and at least the remaining Wildfontein MMUs in the portfolio to align targets with realistic 70-85% productivity. It is recommended to begin operational availability actions that require minimal capex (preventive maintenance scheduling, critical spares planning, downtime reporting discipline). For fleet rationalization, It is recommended to complete technical and commercial readiness checks for parked MMUs 745/747/719/795/781 (condition assessments, cost-to-reactivate, potential site allocations, and contract alignment) but do not deploy them yet."}, {"ph": 2, "d": "Phase 2 (Q2): It is recommended to deploy reactivated units selectively; optimize routes and assistance; start relieving hotspots. Reactivate 2-3 of the highest-ROI parked MMUs first (e.g., 745, 747, 719) and deploy them where they either (a) directly support Wildfontein if volumes justify, or (b) allow redeployment of existing units from Wildfontein or other well-performing sites to assistance-heavy hotspots (Carolina, Dorstfontein, Isibonelo). It is recommended to implement route distance optimization actions for these reactivated units and for Wildfontein MMUs to reduce non-productive travel. Roll out assistance pattern optimization actions at sites where reactivated or freed-up MMUs can replace high levels of cross-site assistance. Continue operational availability improvements, prioritizing units that will carry higher planned tonnes after reallocation."}, {"ph": 3, "d": "Phase 3 (Q3): Consolidate gains; expand productivity and recalibration across remaining MMUs in the portfolio. It is recommended to extend the productivity optimization playbook (developed at Wildfontein) to the remaining 11 productivity actions in the portfolio, focusing on units with the largest idle capacity and stable demand. It is recommended to complete capacity target recalibration for all MMUs included in this portfolio, ensuring targets reflect actual achievable productivity and route realities. Reactivate the remaining 2-3 parked MMUs (795, 781) only if Q1-Q2 utilization and demand confirm the need; otherwise, consider alternative strategies (sale or long-term mothballing) to avoid overcapacity. It is recommended to refine route and assistance patterns based on Q1-Q2 data, targeting an incremental 5-10% reduction in non-productive kilometers and assistance hours."}, {"ph": 4, "d": "Phase 4 (Q4): Optimize fleet structure and prepare for retirements/redeployments. With productivity and availability stabilized, It is recommended to conduct a fleet-wide review to identify structurally underutilized MMUs (especially those still below 60-65% productivity despite interventions). The improved performance at Wildfontein and reactivated units should be used to enable up to 5 retirements and up to 15 redeployments (within quarterly caps) from chronically low-utilization or high-cost units to higher-margin contracts. Lock in policy changes: standard productivity benchmarks, minimum utilization thresholds for keeping MMUs active, and clear triggers for redeployment or retirement. Quantify and report realized value vs. the expected, and refine the portfolio for the next cycle."}], "sb": {"Operations": "Priority should be given to execution discipline at Wildfontein in Q1: the five top productivity actions can deliver material of the productivity value if implemented rigorously. The focus should be on cycle-time diagnostics (loading, travel, charging, waiting), operator performance management, and shift alignment to blasting schedules. The capacity target recalibration should be used to set realistic but stretching productivity KPIs (e.g., ramping from current 6-29% to 60% in 2-3 months, then toward 80-85%). It is recommended to plan reactivation of parked MMUs in a way that reduces reliance on cross-site assistance at Carolina, Dorstfontein, and Isibonelo-i.e., Reactivated units or freed-up capacity from Wildfontein should be used to station dedicated MMUs at these hotspots, cutting assistance hours and improving service reliability. Ensure route optimization is integrated into daily dispatch planning to avoid reactivated units simply adding more kilometers without extra tonnes.", "Finance": "This portfolio offers upside, with margin improvement and cost reductions. The highest financial leverage is in the Wildfontein productivity actions and the five reactivations. For budgeting, assume that achieving 70% of the targeted productivity uplift at Wildfontein still yields from the top five MMUs alone, making this a robust investment even with execution slippage. Reactivations should be gated by clear financial thresholds: each reactivated MMU should have a committed or highly probable volume plan that delivers at least revenue/year and a payback period under 12 months after reactivation costs. Incremental opex (operators should be tracked, maintenance, fuel) against the net value per reactivated unit; if utilization falls below 60-65% of planned tonnes for two consecutive quarters, trigger a review for redeployment or retirement. Q2-Q3 data should be used to support decisions on up to 5 retirements in Q4, focusing on units with persistently low ROA after interventions.", "Maintenance": "It is expected that a step-change in maintenance demand at Wildfontein and on reactivated units. For Wildfontein, higher utilization (moving from 6-29% to about 80-85%) will increase wear rates; pre-empt this by front-loading condition assessments and preventive maintenance in Q1, especially on critical systems (pumps, augers, hydraulics, chassis). It is recommended to align operational availability actions with a more structured PM schedule and improved breakdown reporting so that increased productivity does not translate into higher unplanned downtime. For reactivated MMUs 745/747/719/795/781, It is recommended to plan full recommissioning protocols: inspections, component replacements where necessary, and updated maintenance histories. Build a 6-12 month maintenance forecast for these units tied to expected utilization and route profiles (shorter, optimized routes should reduce some mechanical stress). Q2-Q3 performance data should be used to identify units that remain maintenance-heavy and low-productivity even after interventions; these become prime candidates for Q4 retirement, freeing workshop capacity and spares for the best-performing MMUs."}, "wf": [{"l": 1, "ip": 56.7}, {"l": 8, "ip": 31.3}, {"l": 7, "ip": 4.6}, {"l": 5, "ip": 3.8}, {"l": 6, "ip": 2.4}, {"l": 4, "ip": 1.2}], "tn": [{"l": 1, "avg": 3.54, "lo": 0.54, "hi": 9.13}, {"l": 8, "avg": 2.09, "lo": 0.64, "hi": 4.1}, {"l": 5, "avg": 0.64, "lo": 0.01, "hi": 1.48}, {"l": 6, "avg": 0.12, "lo": 0.1, "hi": 0.15}, {"l": 4, "avg": 0.39, "lo": 0.39, "hi": 0.39}, {"l": 7, "avg": 0.29, "lo": 0.29, "hi": 0.29}], "sc": [{"a": "A1_f4574d58", "p": 61.0, "rs": 0.62, "ip": 9.13, "l": 1}, {"a": "A1_074b3a74", "p": 63.0, "rs": 0.62, "ip": 7.63, "l": 1}, {"a": "A1_0b9f4048", "p": 62.0, "rs": 0.61, "ip": 7.22, "l": 1}, {"a": "A1_daa9199d", "p": 66.0, "rs": 0.62, "ip": 6.31, "l": 1}, {"a": "A1_ae1f1a6b", "p": 65.0, "rs": 0.62, "ip": 4.81, "l": 1}, {"a": "A8_7547da52", "p": 50.0, "rs": 0.44, "ip": 4.1, "l": 8}, {"a": "A8_5faa8f5d", "p": 50.0, "rs": 0.44, "ip": 4.1, "l": 8}, {"a": "A8_e4e85e30", "p": 50.0, "rs": 0.62, "ip": 4.1, "l": 8}, {"a": "A8_96fa9039", "p": 50.0, "rs": 0.62, "ip": 4.1, "l": 8}, {"a": "A8_10da3d14", "p": 50.0, "rs": 0.42, "ip": 4.1, "l": 8}, {"a": "A8_026eee16", "p": 50.0, "rs": 0.42, "ip": 4.1, "l": 8}, {"a": "A1_ed95ab04", "p": 71.0, "rs": 0.62, "ip": 3.36, "l": 1}, {"a": "A1_94ca45b6", "p": 71.0, "rs": 0.63, "ip": 2.83, "l": 1}, {"a": "A1_54958f86", "p": 72.0, "rs": 0.62, "ip": 2.63, "l": 1}, {"a": "A1_ef1b948c", "p": 70.0, "rs": 0.63, "ip": 2.6, "l": 1}, {"a": "A1_c5576793", "p": 63.0, "rs": 0.62, "ip": 2.45, "l": 1}, {"a": "A1_74bf6c67", "p": 66.0, "rs": 0.62, "ip": 1.71, "l": 1}, {"a": "A1_15f161c3", "p": 72.0, "rs": 0.61, "ip": 1.68, "l": 1}, {"a": "A5 16 productivity actions, heavily concentrated at Wildfontein (top 5 actions material). These interventions directly address low utilization (6-29% vs 85% target) and unlock about 15-20% of Enaex's group-wide productivity potential in a single portfolio.", "ca": "Moderate but targeted. Direct cost reductions (17% of total value) are mainly from fleet rationalization (carrying cost reductions) and route/assistance optimization. The portfolio prioritizes margin improvement over pure opex cuts, which is appropriate where spare capacity is high and revenue can be grown without capex.", "ks": "Wildfontein productivity + capacity recalibration synergy: Combining the top 5 productivity interventions at Wildfontein (material) with capacity target recalibration for those same MMUs allows Enaex to (a) lift utilization toward 85%, (b) then reset contractual/operational capacity targets to realistic levels. This reduces the need for standby units and frees 1-2 MMUs for redeployment without compromising service levels.; Reactivated parked MMUs + assistance/route optimization synergy: Reactivating MMU-745/747/719/795/781 (material) and then optimizing assistance patterns and route distances allows these units to absorb work currently handled by high-assistance hotspots (Carolina, Dorstfontein, Isibonelo). This can reduce assistance dependency by an estimated 15-25% at those sites while improving loaded km per shift and lowering assistance truck hours.", "kt": "Higher complexity and fixed cost vs revenue uplift: Reactivating 5 parked MMUs increases fixed and semi-fixed costs (operators, maintenance, insurance) and adds scheduling complexity. The net value (material per unit) assumes at least material/year incremental revenue per MMU; if actual demand or mine call-outs are 20-30% lower than assumed, the margin improvement could erode by per unit.; Concentration risk at Wildfontein vs portfolio diversification: Focusing heavily on Wildfontein productivity (top 5 actions about 35% of portfolio value) accelerates value capture but exposes Enaex to site-specific risks (mine plan changes, contractor competition, or operational disruptions). Diversifying some redeployed/reactivated units to Carolina, Dorstfontein, and Isibonelo may slightly delay Wildfontein optimization but reduces overall portfolio volatility and supports strategic hotspot stabilization.", "rp": {"High": 34, "Medium": 32}, "ap": 65.0, "ar": [{"a": "A1_f4574d58", "ip": 9.22}, {"a": "A1_074b3a74", "ip": 7.71}, {"a": "A1_0b9f4048", "ip": 7.29}, {"a": "A1_daa9199d", "ip": 6.38}, {"a": "A1_ae1f1a6b", "ip": 4.86}, {"a": "A8_7547da52", "ip": 4.14}, {"a": "A8_5faa8f5d", "ip": 4.14}, {"a": "A8_e4e85e30", "ip": 4.14}, {"a": "A8_96fa9039", "ip": 4.14}, {"a": "A8_10da3d14", "ip": 4.14}, {"a": "A8_026eee16", "ip": 4.14}, {"a": "A1_ed95ab04", "ip": 3.39}, {"a": "A1_94ca45b6", "ip": 2.85}, {"a": "A1_54958f86", "ip": 2.66}, {"a": "A1_ef1b948c", "ip": 2.63}, {"a": "A1_c5576793", "ip": 2.48}, {"a": "A1_74bf6c67", "ip": 1.73}, {"a": "A1_15f161c3", "ip": 1.7}, {"a": "A5_e26677a5", "ip": 1.5}, {"a": "A5_2e9335d1", "ip": 1.41}, {"a": "A1_cdad361d", "ip": 1.4}, {"a": "A1_3f4c2810", "ip": 1.31}, {"a": "A1_dd1f8e56", "ip": 1.11}, {"a": "A8_0c8361cc", "ip": 0.89}, {"a": "A8_bd676127", "ip": 0.89}, {"a": "A8_730492be", "ip": 0.89}, {"a": "A8_753417d3", "ip": 0.89}, {"a": "A8_481220c7", "ip": 0.65}, {"a": "A8_40f245a0", "ip": 0.65}, {"a": "A8_3df32275", "ip": 0.65}, {"a": "A8_4698cad9", "ip": 0.65}, {"a": "A8_3dfcffbc", "ip": 0.65}, {"a": "A1_a19de71f", "ip": 0.54}, {"a": "A4_4160ca25", "ip": 0.4}, {"a": "A4_4eb01a65", "ip": 0.4}, {"a": "A4_71ad48f5", "ip": 0.4}, {"a": "A5_c132e079", "ip": 0.39}, {"a": "A5_dde036c0", "ip": 0.33}, {"a": "A7_6e4144a9", "ip": 0.29}, {"a": "A7_921671b7", "ip": 0.29}, {"a": "A7_57a0f4d3", "ip": 0.29}, {"a": "A7_015f5672", "ip": 0.29}, {"a": "A7_0bf19786", "ip": 0.29}, {"a": "A7_062fb7a9", "ip": 0.29}, {"a": "A7_9a7839fd", "ip": 0.29}, {"a": "A7_2168480f", "ip": 0.29}, {"a": "A7_4120349c", "ip": 0.29}, {"a": "A7_66b5e04e", "ip": 0.29}, {"a": "A7_97f87bef", "ip": 0.29}, {"a": "A7_3a73e26d", "ip": 0.29}, {"a": "A7_b68c0ed5", "ip": 0.29}, {"a": "A7_ae5fd684", "ip": 0.29}, {"a": "A7_4b0b6a44", "ip": 0.29}, {"a": "A7_58d18496", "ip": 0.29}, {"a": "A5_16abfb84", "ip": 0.21}, {"a": "A6_8ce59fe0", "ip": 0.15}, {"a": "A6_122ff2c8", "ip": 0.15}, {"a": "A6_56179f3f", "ip": 0.13}, {"a": "A6_c7283502", "ip": 0.13}, {"a": "A6_a8984fad", "ip": 0.13}, {"a": "A6_26976cca", "ip": 0.13}, {"a": "A6_6ad0d6bb", "ip": 0.12}, {"a": "A6_ac60ad17", "ip": 0.12}, {"a": "A6_37222b25", "ip": 0.12}, {"a": "A6_e738dfd1", "ip": 0.12}, {"a": "A6_92588ba2", "ip": 0.12}], "rm": [{"ph": 1, "d": "Phase 1 (Q1): Stabilize and unlock Wildfontein core productivity\n- It is recommended to execute top 5 productivity interventions at Wildfontein (MMU-752, 717, 731, 766, 754). Target a step-change from current 6-29% productivity to at least 60-70% within Q1 as an intermediate milestone toward 85%.\n- It is recommended to implement initial capacity target recalibration for Wildfontein MMUs: It is recommended to align shift patterns, loading windows, and bench allocation with realistic 6-9 month demand forecasts.\n- Start with low-capex operational availability actions (5 actions,) that directly support Wildfontein and any other high-value MMUs (e.g., quick wins like planned maintenance windows, critical spares, and operator training).\n- It is recommended to limit redeployments to <=5 units in Q1, focusing on internal balancing at Wildfontein and 1-2 redeployments to the most constrained hotspot (likely Carolina) to reduce immediate assistance dependency."}, {"ph": 2, "d": "Phase 2 (Q2): It is recommended to deploy reactivated fleet and optimize assistance patterns\n- Reactivate 3 of the 5 parked MMUs (e.g., MMU-745, 747, 719) and redeploy them to Carolina, Dorstfontein, and Isibonelo based on assistance hours and blast plan density. Keep within the quarterly cap of 15 redeployments by bundling moves (e.g., 3-5 redeployments total in Q2 including internal shifts).\n- It is recommended to execute all 3 assistance pattern optimization actions and prioritize them at the hotspots where reactivated units are deployed. Aim for a 15-20% reduction in assistance truck hours and overtime.\n- It is recommended to implement 50-70% of route distance optimization actions (11 total,) focusing on sites with new or reactivated MMUs to lock in efficient routing from day one.\n- Continue productivity optimization for the remaining 11 productivity actions, prioritizing units with the largest idle capacity and stable mine plans."}, {"ph": 3, "d": "Phase 3 (Q3): Full fleet rationalization and capacity rebalance\n- Reactivate the remaining 2 parked MMUs (MMU-795, 781) only if Q1-Q2 utilization data confirm demand (target >=70% utilization on reactivated units). Otherwise, convert 1-2 low-productivity units to retirement or long-term park to stay within the 5 retirements/quarter limit.\n- It is recommended to complete all capacity target recalibration actions (16 total,) across the portfolio to align MMU capacity with actual and forecasted demand. This should enable 3-5 net redeployments from overserved to underserved sites while staying within the 15 redeployment cap.\n- Finish remaining route optimization actions and refine assistance patterns based on measured performance (e.g., adjust shift overlaps, staging points, and refuel locations).\n- It is recommended to begin structured retirement or deep-park decisions for chronically underutilized MMUs (those still below 50-60% productivity after interventions), targeting up to 5 retirements in Q3 to reduce carrying costs."}, {"ph": 4, "d": "Phase 4 (Q4): Consolidate gains and embed performance management\n- 9-12 months of data should be used to recalibrate site-level MMU allocations: confirm which reactivated units remain in the active fleet and which can be retired or parked long-term without risking service levels.\n- It is recommended to execute final wave of fleet rationalization actions (remaining of the 15 actions,), focusing on: Retiring or selling 3-5 lowest-value units (within the 5 retirements/quarter cap). Redeploying 5-8 MMUs to align with the next year's mine plans and contract pipeline.\n- It is recommended to institutionalize productivity and availability dashboards for Operations and Maintenance: Tons/MMU should be tracked, availability, assistance hours, and route efficiency per site.\n- It is recommended to prepare a Q1 next-year plan that locks in the optimized fleet footprint and avoids reintroducing low-productivity patterns (e.g., strict gatekeeping for any new MMU additions)."}], "sb": {"Operations": "This portfolio is operations-heavy and will change how MMUs are scheduled and utilized, especially at Wildfontein and the assistance hotspots. The biggest operational lever is improving productivity on a small number of underperforming units: MMU-752, 717, 731, 766, and 754 at Wildfontein alone represent a material share of the value. The focus should be on:\n- Shift design and bench allocation: ensure these MMUs have continuous work, minimal waiting time at the face, and clear priority in blast sequencing.\n- Operator deployment: assign the strongest operators to the lowest-productivity MMUs for the first 2-3 months, with targeted coaching and standardized best-practice loading cycles.\n- Coordination with mine planning: lock in predictable loading windows and reduce last-minute plan changes that strand capacity.\n- For reactivated MMUs, avoid simply adding them into existing patterns; instead, redesign assistance and routing so they replace assistance trucks and reduce double-handling. Measure success via tons per shift and assistance hours per blast.", "Finance": "The portfolio delivers of upside, with much of the value coming from margin improvement and cost reductions. The financial profile is front-loaded in productivity and back-loaded in structural cost reduction:\n- It is expected that Q1-Q2 to show strong revenue/margin improvement from Wildfontein and early reactivations, with limited immediate opex reduction (as more units are active).\n- Q3-Q4 is where structural savings materialize via fleet rationalization and selective retirements. It is recommended to plan for 3-5 retirements per quarter in H2 to lock in lower carrying costs.\n- Closely monitor utilization and revenue per reactivated MMU: if any reactivated unit fails to reach at least about 70% of its revenue target by the end of its second full quarter, trigger a review for retirement or redeployment.\n- From a capital discipline perspective, priority should be given to low-capex interventions (process, scheduling, training) over hardware upgrades. Ensure that any incremental maintenance or staffing costs for reactivated units are explicitly offset by measured revenue and margin gains.", "Maintenance": "Maintenance will be a critical enabler and potential bottleneck. Reactivating 5 parked MMUs and pushing productivity on underutilized units will increase maintenance load and require disciplined planning:\n- For reactivated units (MMU-745, 747, 719, 795, 781), It is recommended to plan structured recommissioning: full inspections, replacement of age-sensitive components, and baseline condition assessments before they enter high-utilization duty. This prevents early-life failures that could undermine the business case.\n- It is recommended to align preventive maintenance windows with the new productivity targets: high-productivity units at Wildfontein will need tightly scheduled maintenance to avoid unplanned downtime during peak blasting periods.\n- Operational availability actions (5 actions,) should be used to address known chronic issues: critical spares stocking, workshop capacity at Wildfontein and hotspots, and quick-response field maintenance.\n- Availability and mean time between failures (MTBF) per MMU should be tracked, especially for reactivated  assistance/route inefficiencies.", "ks": "Productivity optimization at Wildfontein (MMU-752/717/731/766/754) combined with capacity target recalibration across 16 units creates a compounding effect: by lifting productivity on currently under-performing units and then resetting capacity targets, Enaex can reduce the need for assistance trucks from Carolina, Dorstfontein, and Isibonelo, freeing those fleets for redeployment or partial retirement. This can unlock both margin improvement and downstream cost reductions (reduced assistance and standby capacity) without breaching the 15-redeployment cap.; Reactivating high-value parked MMUs (745/747/719/795/781; meaningful value) in combination with route distance optimization and operational availability improvements allows Enaex to build a more resilient, shorter-haul, high-uptime core fleet. Deploying these reactivated units to sites currently over-reliant on assistance (Carolina, Dorstfontein, Isibonelo) can reduce assistance patterns (direct value) while improving service reliability and enabling the retirement of the least productive or highest-cost units in later quarters, staying within the 5-retirement limit.", "kt": "Reactivating five parked MMUs increases fixed and variable costs (operators, maintenance, insurance, spares) before the full revenue uplift is realized. If demand at target sites (e.g., Wildfontein and the three assistance hotspots) does not materialize as forecast, Enaex could temporarily increase cost per tonne. The trade-off is roughly/year in additional operating cost across these five units versus/year in potential incremental margin if they are fully utilized.; Aggressive productivity targets at Wildfontein (e.g., MMU-752 from 6% to 85%, MMU-717 from 12% to 85%) may require operational changes (shift patterns, loading practices, blast scheduling) that could strain maintenance windows and operator fatigue management. Pushing too hard on utilization can increase unplanned downtime and maintenance cost by 10-20% on those units if not balanced with the operational availability lever. The trade-off is between capturing the full productivity value quickly versus phasing the uplift to protect reliability and safety.", "rp": {"High": 36, "Medium": 30}, "ap": 65.0, "ar": [{"a": "A1_f4574d58", "ip": 9.23}, {"a": "A1_074b3a74", "ip": 7.71}, {"a": "A1_0b9f4048", "ip": 7.3}, {"a": "A1_daa9199d", "ip": 6.38}, {"a": "A1_ae1f1a6b", "ip": 4.86}, {"a": "A8_7547da52", "ip": 4.14}, {"a": "A8_5faa8f5d", "ip": 4.14}, {"a": "A8_e4e85e30", "ip": 4.14}, {"a": "A8_96fa9039", "ip": 4.14}, {"a": "A8_10da3d14", "ip": 4.14}, {"a": "A8_026eee16", "ip": 4.14}, {"a": "A1_ed95ab04", "ip": 3.39}, {"a": "A1_94ca45b6", "ip": 2.86}, {"a": "A1_54958f86", "ip": 2.66}, {"a": "A1_ef1b948c", "ip": 2.63}, {"a": "A1_c5576793", "ip": 2.48}, {"a": "A1_74bf6c67", "ip": 1.73}, {"a": "A1_15f161c3", "ip": 1.7}, {"a": "A5_e26677a5", "ip": 1.5}, {"a": "A5_2e9335d1", "ip": 1.41}, {"a": "A1_cdad361d", "ip": 1.4}, {"a": "A1_3f4c2810", "ip": 1.31}, {"a": "A1_dd1f8e56", "ip": 1.11}, {"a": "A8_0c8361cc", "ip": 0.89}, {"a": "A8_bd676127", "ip": 0.89}, {"a": "A8_730492be", "ip": 0.89}, {"a": "A8_753417d3", "ip": 0.89}, {"a": "A8_5c6504d3", "ip": 0.65}, {"a": "A8_4b93aaa6", "ip": 0.65}, {"a": "A8_50b56bcc", "ip": 0.65}, {"a": "A8_4b837c39", "ip": 0.65}, {"a": "A8_5cae9d36", "ip": 0.65}, {"a": "A1_a19de71f", "ip": 0.54}, {"a": "A4_4160ca25", "ip": 0.4}, {"a": "A4_4eb01a65", "ip": 0.4}, {"a": "A4_71ad48f5", "ip": 0.4}, {"a": "A5_c132e079", "ip": 0.39}, {"a": "A5_dde036c0", "ip": 0.33}, {"a": "A7_6e4144a9", "ip": 0.29}, {"a": "A7_921671b7", "ip": 0.29}, {"a": "A7_57a0f4d3", "ip": 0.29}, {"a": "A7_015f5672", "ip": 0.29}, {"a": "A7_0bf19786", "ip": 0.29}, {"a": "A7_062fb7a9", "ip": 0.29}, {"a": "A7_9a7839fd", "ip": 0.29}, {"a": "A7_2168480f", "ip": 0.29}, {"a": "A7_4120349c", "ip": 0.29}, {"a": "A7_66b5e04e", "ip": 0.29}, {"a": "A7_97f87bef", "ip": 0.29}, {"a": "A7_3a73e26d", "ip": 0.29}, {"a": "A7_b68c0ed5", "ip": 0.29  least 30-40% of recurring assistance into primary MMU coverage. It is recommended to maintain redeployments under 15 for the quarter and avoid retirements until utilization data stabilizes."}, {"ph": 3, "d": "Phase 3 (Q3): Consolidate and selectively rationalize. With 2-3 quarters of utilization and cost data, It is recommended to identify the bottom 5-7% of fleet by productivity and cost per tonne. The improved capacity and productivity at Wildfontein and the hotspots should be used to enable up to 5 targeted retirements (aligned with the quarterly cap), focusing on the oldest, least reliable, or structurally under-utilized units. Fine-tune assistance patterns to a steady-state model where assistance is used only for genuine peaks or breakdown cover, not structural gaps. Continue operational availability improvements on units showing recurring downtime patterns."}, {"ph": 4, "d": "Phase 4 (Q4): Optimize portfolio and lock in gains. Re-validate capacity targets and route designs based on actual blast plans and production forecasts for the next year. Where utilization is consistently above 80-85% and margins are strong, consider minor additional redeployments (within the 15-per-quarter limit) to further reduce assistance at secondary sites. Best practices should be institutionalized from Wildfontein (loading discipline, shift design, operator training) across the network. The full-year data should be used to confirm that reactivated units are delivering their expected /year revenue each and adjust the long-term retirement roadmap accordingly, potentially planning the next wave of retirements or sales for the following year."}], "sb": {"Operations": "Priority should be given to Wildfontein as the operational pilot for this portfolio. The five top-value MMUs there represent a concentrated opportunity to lift site productivity and reduce reliance on external assistance. The focus should be on practical enablers: It is recommended to align blast schedules to MMU availability, standardize loading and turnaround procedures, and ensure operators are cross-trained across the Wildfontein fleet. When reactivating parked units, It is recommended to deploy them to Carolina, Dorstfontein, and Isibonelo with clear KPIs: reduction in assistance hours, improved on-time blast service, and higher tonnes per shift. Carefully phase the productivity uplift to avoid over-stretching crews and maintenance; aim for step changes (e.g., 60% then 75% then 85%) rather than a single leap.", "Finance": "This portfolio is margin-heavy: about 83% of value is margin improvement, with meaningful direct cost reductions. It is expected that a short-term increase in operating costs from reactivating five parked MMUs (labour, maintenance, fuel) before the full revenue benefit is realized. Model cash flows by site and by unit, especially for Wildfontein and the three assistance hotspots, to ensure that reactivated units are deployed only where they can achieve near-full utilization. ROI per lever should be tracked: productivity optimization and fleet rationalization should deliver the bulk of the; assistance and route optimization are smaller but important enablers. Quarterly reviews (post-Q2 and post-Q3) should be used to decide whether to proceed with the full 5-unit retirement allowance or to defer retirements if demand remains strong.", "Maintenance": "Reactivating five parked MMUs will increase maintenance workload and parts demand; It is recommended to plan a structured recommissioning program with full inspections, component replacements where needed, and baseline condition assessments before deployment. Priority should be given to reactivation of units with the best remaining life and lowest expected maintenance cost (e.g., fewer engine hours, better corrosion status). At Wildfontein, the planned productivity uplift will increase duty cycles significantly on MMU-752/717/731/766/754; adjust preventive maintenance intervals and spares stocking accordingly to a
