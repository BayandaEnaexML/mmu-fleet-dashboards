<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Fleet Optimisation Engine | Enaex Africa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        :root {
            --bg-primary: #2b2f38;
            --bg-secondary: #343842;
            --bg-card: #3d424e;
            --bg-card-hover: #464c59;
            --bg-input: #2f3340;
            --accent-red: #c41e3a;
            --accent-red-light: #e63950;
            --accent-red-glow: rgba(196, 30, 58, 0.3);
            --accent-green: #22c55e;
            --accent-amber: #f59e0b;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-primary: #f0f0f2;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --glass-bg: rgba(61, 66, 78, 0.7);
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.25);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.35);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }

        @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideInLeft { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
        @keyframes slideInRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        @keyframes glowPulse { 0%,100%{opacity:.6} 50%{opacity:1} }

        /* HEADER */
        .header { background:var(--bg-secondary); border-bottom:1px solid var(--border-color); padding:.6rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:1000; overflow:hidden; }
        .header::before { content:''; position:absolute; top:-30px; right:80px; width:200px; height:200px; border:1px solid rgba(255,255,255,.04); transform:rotate(45deg); pointer-events:none; }
        .header::after { content:''; position:absolute; top:-50px; right:180px; width:160px; height:160px; border:1px solid rgba(255,255,255,.03); transform:rotate(45deg); pointer-events:none; }
        .logo-section { display:flex; align-items:center; gap:1rem; animation:slideInLeft .6s ease-out; }
        .logo { width:44px; height:44px; flex-shrink:0; }
        .logo svg { width:100%; height:100%; }
        .header-title h1 { font-size:1.1rem; font-weight:700; letter-spacing:-.02em; }
        .header-title p { font-size:.7rem; color:var(--text-secondary); margin-top:.1rem; }
        .header-meta { display:flex; align-items:center; gap:1rem; animation:slideInRight .6s ease-out; }
        .header-badge { display:flex; align-items:center; gap:.4rem; background:var(--accent-red); padding:.3rem .7rem; border-radius:20px; font-size:.65rem; font-weight:600; color:white; }
        .header-badge .dot { width:6px; height:6px; border-radius:50%; background:white; animation:glowPulse 2s ease-in-out infinite; }
        .date-display { background:var(--bg-card); padding:.35rem .7rem; border-radius:6px; border:1px solid var(--border-color); font-size:.7rem; color:var(--text-secondary); font-family:'Roboto Mono',monospace; }

        /* PRIMARY TAB BAR */
        .tab-bar { display:flex; background:var(--bg-secondary); border-bottom:1px solid var(--border-color); overflow-x:auto; flex-shrink:0; scrollbar-width:none; position:sticky; top:52px; z-index:999; }
        .tab-bar::-webkit-scrollbar { display:none; }
        .tab-btn { flex-shrink:0; padding:.55rem .85rem; font-size:.65rem; font-weight:600; font-family:'Inter',sans-serif; color:var(--text-muted); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; transition:all .2s ease; white-space:nowrap; }
        .tab-btn:hover { color:var(--text-secondary); background:rgba(255,255,255,.03); }
        .tab-btn.active { color:var(--text-primary); border-bottom-color:var(--accent-red); background:rgba(196,30,58,.08); }
        .tab-btn .tab-count { background:var(--bg-card); padding:.1rem .35rem; border-radius:8px; font-size:.55rem; margin-left:.3rem; font-family:'Roboto Mono',monospace; }
        .tab-btn.active .tab-count { background:var(--accent-red); color:white; }

        /* SUB-TAB BAR */
        .sub-tab-bar { display:flex; gap:.25rem; padding:.5rem 0; margin-bottom:.8rem; border-bottom:1px solid var(--border-color); }
        .sub-tab-btn { padding:.4rem .8rem; font-size:.65rem; font-weight:600; color:var(--text-muted); background:none; border:1px solid transparent; border-radius:6px; cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
        .sub-tab-btn:hover { color:var(--text-secondary); background:rgba(255,255,255,.03); }
        .sub-tab-btn.active { color:var(--text-primary); background:var(--bg-card); border-color:var(--border-color); }
        .sub-content { display:none; }
        .sub-content.active { display:block; animation:fadeInUp .3s ease-out; }

        /* CONTENT */
        .content-area { padding:1rem 1.5rem; max-width:1600px; margin:0 auto; animation:fadeInUp .5s ease-out; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        /* CARDS */
        .card { background:var(--glass-bg); -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); border:1px solid var(--glass-border); border-radius:10px; padding:.85rem; transition:border-color .3s ease; margin-bottom:.8rem; }
        .card:hover { border-color:var(--border-hover); }
        .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.7rem; padding-bottom:.5rem; border-bottom:1px solid var(--border-color); }
        .card-title { font-size:.72rem; font-weight:600; color:var(--text-primary); display:flex; align-items:center; gap:.4rem; text-transform:uppercase; letter-spacing:.04em; }
        .card-title .icon { width:16px; height:16px; display:flex; align-items:center; justify-content:center; background:var(--accent-red); border-radius:3px; font-size:.55rem; }

        /* STATS */
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.5rem; margin-bottom:.8rem; }
        .stats-grid-6 { grid-template-columns:repeat(6,1fr); }
        .stat-item { background:var(--bg-primary); border-radius:7px; padding:.55rem .4rem; text-align:center; border:1px solid var(--border-color); transition:all .25s ease; position:relative; overflow:hidden; }
        .stat-item::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; opacity:0; transition:opacity .25s ease; }
        .stat-item:hover { border-color:var(--border-hover); transform:translateY(-1px); }
        .stat-item:hover::before { opacity:1; }
        .stat-item.red::before { background:var(--accent-red); }
        .stat-item.green::before { background:var(--accent-green); }
        .stat-item.amber::before { background:var(--accent-amber); }
        .stat-item.blue::before { background:var(--accent-blue); }
        .stat-item.purple::before { background:var(--accent-purple); }
        .stat-value { font-size:1.3rem; font-weight:800; font-family:'Roboto Mono',monospace; line-height:1; font-variant-numeric:tabular-nums; }
        .stat-value.accent-red { color:var(--accent-red-light); }
        .stat-value.accent-green { color:var(--accent-green); }
        .stat-value.accent-amber { color:var(--accent-amber); }
        .stat-value.accent-blue { color:var(--accent-blue); }
        .stat-value.accent-purple { color:var(--accent-purple); }
        .stat-label { font-size:.55rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin-top:.25rem; font-weight:500; }

        /* LAYOUTS */
        .two-col { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; margin-bottom:.8rem; }
        .three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.8rem; margin-bottom:.8rem; }

        /* PORTFOLIO BANNER */
        .portfolio-banner { background:linear-gradient(135deg,rgba(196,30,58,.12),rgba(196,30,58,.04)); border:1px solid var(--glass-border); border-radius:10px; padding:1rem 1.2rem; margin-bottom:.8rem; }
        .portfolio-banner h2 { font-size:1rem; font-weight:700; margin-bottom:.2rem; }
        .portfolio-banner .scenario-badge { display:inline-block; background:var(--accent-red); color:white; padding:.15rem .5rem; border-radius:10px; font-size:.6rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-left:.5rem; }
        .portfolio-banner .scenario-badge.policy { background:var(--accent-blue); }
        .portfolio-banner p { font-size:.72rem; color:var(--text-secondary); margin-top:.4rem; line-height:1.5; }

        /* SECTION HEADERS */
        .section-title { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:.6rem; color:var(--text-primary); display:flex; align-items:center; gap:.4rem; }
        .section-title .dot { width:8px; height:8px; border-radius:50%; background:var(--accent-red); }

        /* BADGES */
        .badge { display:inline-block; padding:.15rem .45rem; border-radius:6px; font-size:.58rem; font-weight:600; text-transform:uppercase; letter-spacing:.03em; }
        .badge-low { background:rgba(34,197,94,.15); color:var(--accent-green); }
        .badge-medium { background:rgba(245,158,11,.15); color:var(--accent-amber); }
        .badge-high { background:rgba(196,30,58,.15); color:var(--accent-red-light); }
        .badge-critical { background:rgba(239,68,68,.25); color:#ef4444; }
        .badge-medium_high { background:rgba(249,115,22,.15); color:var(--accent-amber); }
        .badge-low_medium { background:rgba(34,197,94,.1); color:#86efac; }
        .badge-very_high { background:rgba(239,68,68,.3); color:#ef4444; }
        .lever-badge { display:inline-block; padding:.12rem .4rem; border-radius:4px; font-size:.55rem; font-weight:600; }

        /* LEVER CARDS */
        .lever-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.5rem; margin-bottom:.8rem; }
        .lever-card { background:var(--bg-primary); border:1px solid var(--border-color); border-radius:8px; padding:.6rem; transition:all .25s; position:relative; overflow:hidden; cursor:default; }
        .lever-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
        .lever-card:hover { border-color:var(--border-hover); transform:translateY(-1px); box-shadow:var(--shadow-md); }
        .lever-card-name { font-size:.62rem; font-weight:600; color:var(--text-primary); margin-bottom:.3rem; }
        .lever-card-stats { display:flex; gap:.6rem; margin-bottom:.3rem; }
        .lever-card-stat { text-align:center; }
        .lever-card-stat-val { font-size:.85rem; font-weight:700; font-family:'Roboto Mono',monospace; }
        .lever-card-stat-lbl { font-size:.48rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.04em; }
        .lever-card-bar { height:3px; border-radius:2px; background:var(--bg-card); overflow:hidden; }
        .lever-card-bar-fill { height:100%; border-radius:2px; transition:width .6s ease; }

        /* RISK CARDS */
        .risk-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:.5rem; margin-bottom:.8rem; }
        .risk-card { background:var(--bg-primary); border:1px solid var(--border-color); border-radius:8px; padding:.7rem; position:relative; overflow:hidden; }
        .risk-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
        .risk-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.4rem; }
        .risk-card-title { font-size:.68rem; font-weight:700; }
        .risk-card-count { font-size:.85rem; font-weight:800; font-family:'Roboto Mono',monospace; }
        .risk-card-body { font-size:.62rem; color:var(--text-secondary); line-height:1.5; }
        .risk-card-item { padding:.3rem 0; border-bottom:1px solid var(--border-color); }
        .risk-card-item:last-child { border-bottom:none; }

        /* ACTION TABLE */
        .action-table-wrap { max-height:500px; overflow-y:auto; border-radius:8px; border:1px solid var(--border-color); }
        .action-table { width:100%; border-collapse:collapse; font-size:.68rem; }
        .action-table thead { position:sticky; top:0; z-index:10; }
        .action-table th { background:var(--bg-secondary); padding:.5rem .4rem; text-align:left; font-size:.58rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); border-bottom:1px solid var(--border-color); cursor:pointer; }
        .action-table th:hover { color:var(--text-primary); }
        .action-table td { padding:.45rem .4rem; border-bottom:1px solid var(--border-color); color:var(--text-secondary); vertical-align:top; }
        .action-table tr:hover td { background:rgba(255,255,255,.02); }
        .action-table .impact-bar { height:4px; border-radius:2px; background:var(--accent-red); display:block; margin-top:.2rem; }
        .action-table .prob-bar { height:4px; border-radius:2px; display:block; margin-top:.2rem; }

        /* CHART CONTAINER */
        .chart-box { background:var(--bg-primary); border:1px solid var(--border-color); border-radius:8px; padding:.8rem; position:relative; }
        .chart-box canvas { max-height:280px; }

        /* TIMELINE */
        .timeline { display:flex; gap:0; margin-bottom:.8rem; }
        .timeline-phase { flex:1; position:relative; padding:.8rem .6rem .6rem; background:var(--bg-primary); border:1px solid var(--border-color); }
        .timeline-phase:first-child { border-radius:8px 0 0 8px; }
        .timeline-phase:last-child { border-radius:0 8px 8px 0; }
        .timeline-phase:only-child { border-radius:8px; }
        .timeline-phase::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--accent-red); opacity:.3; }
        .timeline-phase.active::before { opacity:1; }
        .timeline-phase-num { font-size:.85rem; font-weight:800; font-family:'Roboto Mono',monospace; color:var(--accent-red-light); margin-bottom:.3rem; }
        .timeline-phase-text { font-size:.62rem; color:var(--text-secondary); line-height:1.5; }

        /* ACCORDION */
        .accordion-item { border:1px solid var(--border-color); border-radius:8px; margin-bottom:.4rem; overflow:hidden; }
        .accordion-header { display:flex; align-items:center; justify-content:space-between; padding:.6rem .8rem; background:var(--bg-primary); cursor:pointer; transition:background .2s; }
        .accordion-header:hover { background:var(--bg-card); }
        .accordion-header h4 { font-size:.72rem; font-weight:600; display:flex; align-items:center; gap:.5rem; flex:1; }
        .accordion-header .chevron { font-size:.7rem; color:var(--text-muted); transition:transform .2s; }
        .accordion-header.open .chevron { transform:rotate(180deg); }
        .accordion-body { display:none; padding:.8rem; background:var(--bg-card); border-top:1px solid var(--border-color); }
        .accordion-body.open { display:block; animation:fadeInUp .2s ease-out; }
        .accordion-body p { font-size:.68rem; color:var(--text-secondary); line-height:1.6; margin-bottom:.5rem; }
        .accordion-body .sub-title { font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-primary); margin-bottom:.3rem; margin-top:.6rem; }

        /* STAKEHOLDER TABS */
        .sh-tabs { display:flex; gap:.3rem; margin-bottom:.6rem; }
        .sh-tab { padding:.3rem .6rem; font-size:.6rem; font-weight:600; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-primary); color:var(--text-muted); cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
        .sh-tab.active { background:var(--accent-red); color:white; border-color:var(--accent-red); }
        .sh-content { display:none; font-size:.68rem; color:var(--text-secondary); line-height:1.6; }
        .sh-content.active { display:block; }

        /* EXEC MEMO */
        .exec-section { margin-bottom:.8rem; }
        .exec-section h3 { font-size:.78rem; font-weight:700; color:var(--accent-red-light); margin-bottom:.3rem; }
        .exec-section p { font-size:.7rem; color:var(--text-secondary); line-height:1.6; }

        /* OPERATIONAL SUMMARY */
        .freshness-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.7rem; margin-bottom:.8rem; }
        .freshness-card { display:flex; align-items:center; justify-content:space-between; gap:.8rem; padding:.7rem .8rem; border:1px solid var(--border-color); border-radius:8px; background:var(--bg-secondary); }
        .freshness-card.ok { border-left:3px solid var(--accent-green); }
        .freshness-card.stale { border-left:3px solid var(--accent-red); }
        .freshness-title { font-size:.66rem; font-weight:700; color:var(--text-primary); }
        .freshness-detail { margin-top:.15rem; font-size:.58rem; color:var(--text-muted); }
        .freshness-state { font-size:.6rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
        .freshness-card.ok .freshness-state { color:var(--accent-green); }
        .freshness-card.stale .freshness-state { color:var(--accent-red-light); }
        .op-group { margin-bottom:.8rem; }
        .op-group:last-child { margin-bottom:0; }
        .op-group-title { display:flex; align-items:center; gap:.45rem; margin-bottom:.45rem; font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em; }
        .op-group-title.completed { color:var(--accent-green); }
        .op-group-title.action { color:var(--accent-blue); }
        .op-group-title.hold { color:var(--accent-amber); }
        .op-list { list-style:none; display:grid; gap:.35rem; }
        .op-item { display:flex; align-items:flex-start; gap:.55rem; padding:.55rem .65rem; border:1px solid var(--border-color); border-radius:7px; background:var(--bg-secondary); font-size:.69rem; line-height:1.45; color:var(--text-secondary); }
        .op-item.completed { border-left:3px solid var(--accent-green); }
        .op-item.action { border-left:3px solid var(--accent-blue); }
        .op-item.hold { border-left:3px solid var(--accent-amber); }
        .op-rank { flex:0 0 1.6rem; font-family:'Roboto Mono',monospace; font-size:.58rem; font-weight:700; color:var(--text-muted); padding-top:.08rem; }
        .op-text { color:var(--text-primary); }
        .op-score { margin-left:auto; flex-shrink:0; font-family:'Roboto Mono',monospace; font-size:.56rem; color:var(--text-muted); }
        .request-table-wrap { overflow-x:auto; }
        .request-table { width:100%; border-collapse:collapse; font-size:.66rem; }
        .request-table th { padding:.48rem; text-align:left; color:var(--text-muted); background:var(--bg-secondary); border-bottom:1px solid var(--border-color); font-size:.56rem; text-transform:uppercase; letter-spacing:.04em; }
        .request-table td { padding:.52rem .48rem; color:var(--text-secondary); border-bottom:1px solid var(--border-color); vertical-align:top; }
        .request-status { display:inline-block; border-radius:10px; padding:.12rem .4rem; font-size:.52rem; font-weight:800; letter-spacing:.03em; }
        .request-status.actionable { color:var(--accent-green); background:rgba(34,197,94,.12); }
        .request-status.contract-renegotiation { color:var(--accent-amber); background:rgba(245,158,11,.12); }
        .request-status.unmet,.request-status.blocked { color:var(--accent-red-light); background:rgba(196,30,58,.13); }
        .request-form { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:.65rem; margin-top:.6rem; }
        .request-field { display:flex; flex-direction:column; gap:.25rem; }
        .request-field.span-2 { grid-column:span 2; }
        .request-field.span-4 { grid-column:span 4; }
        .request-field label { font-size:.56rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.04em; }
        .request-field input,.request-field select,.request-field textarea { width:100%; padding:.48rem .55rem; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-input); color:var(--text-primary); font:inherit; font-size:.66rem; }
        .request-field textarea { min-height:66px; resize:vertical; }
        .request-field input:focus,.request-field select:focus,.request-field textarea:focus { outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 2px rgba(59,130,246,.18); }
        .request-actions { grid-column:span 4; display:flex; align-items:center; gap:.7rem; }
        .request-export-btn { padding:.48rem .8rem; border:1px solid var(--accent-blue); border-radius:6px; background:var(--accent-blue); color:white; font:inherit; font-size:.62rem; font-weight:700; cursor:pointer; }
        .request-note { font-size:.58rem; line-height:1.45; color:var(--text-muted); }
        .feature-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.45rem; }
        .feature-item { padding:.55rem .6rem; border:1px solid var(--border-color); border-left:3px solid var(--accent-green); border-radius:6px; background:var(--bg-secondary); }
        .feature-item.stale { border-left-color:var(--accent-amber); }
        .feature-name { font-size:.64rem; font-weight:700; color:var(--text-primary); }
        .feature-detail { margin-top:.2rem; font-size:.56rem; line-height:1.4; color:var(--text-muted); }

        /* COMPARISON TABLE */
        .comp-table { width:100%; border-collapse:collapse; font-size:.68rem; }
        .comp-table th { background:var(--bg-secondary); padding:.5rem; text-align:left; font-size:.58rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); border-bottom:1px solid var(--border-color); }
        .comp-table td { padding:.5rem; border-bottom:1px solid var(--border-color); color:var(--text-secondary); }
        .comp-table tr { cursor:pointer; transition:background .15s; }
        .comp-table tr:hover td { background:rgba(255,255,255,.03); }
        .comp-table .bar-stack { display:flex; height:8px; border-radius:4px; overflow:hidden; min-width:120px; }
        .comp-table .bar-seg { height:100%; }

        /* COMPARISON MODULE */
        .comp-toggle { display:flex; gap:.3rem; margin-bottom:.8rem; }
        .comp-toggle-btn { padding:.35rem .7rem; font-size:.62rem; font-weight:600; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-primary); color:var(--text-muted); cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
        .comp-toggle-btn.active { background:var(--accent-red); color:white; border-color:var(--accent-red); }
        .comp-view { display:none; }
        .comp-view.active { display:block; }
        .portfolio-selector { display:flex; flex-wrap:wrap; gap:.35rem; margin-bottom:.8rem; }
        .port-check { display:flex; align-items:center; gap:.25rem; background:var(--bg-input); padding:.3rem .5rem; border-radius:4px; border:1px solid var(--border-color); cursor:pointer; font-size:.62rem; color:var(--text-secondary); transition:all .2s; }
        .port-check:hover { border-color:var(--accent-red); }
        .port-check input { accent-color:var(--accent-red); width:11px; height:11px; }
        .comp-stats-row { display:grid; gap:.5rem; margin-top:.8rem; }

        /* BAR LEGEND */
        .bar-legend { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.4rem; }
        .bar-legend-item { display:flex; align-items:center; gap:.2rem; font-size:.55rem; color:var(--text-muted); }
        .bar-legend-dot { width:8px; height:8px; border-radius:2px; }

        /* FILTER BAR */
        .filter-bar { display:flex; gap:.5rem; align-items:center; padding:.5rem .6rem; background:var(--bg-primary); border-radius:8px; border:1px solid var(--border-color); margin-bottom:.6rem; flex-wrap:wrap; }
        .filter-select { background:var(--bg-input); border:1px solid var(--border-color); border-radius:6px; padding:.4rem .6rem; color:var(--text-primary); font-size:.68rem; font-family:'Inter',sans-serif; cursor:pointer; }
        .filter-select:focus { outline:none; border-color:var(--accent-red); box-shadow:0 0 0 2px var(--accent-red-glow); }
        .filter-label { font-size:.6rem; color:var(--text-muted); font-weight:500; }
        .search-input { background:var(--bg-input); border:1px solid var(--border-color); border-radius:6px; padding:.4rem .6rem; color:var(--text-primary); font-size:.68rem; font-family:'Inter',sans-serif; min-width:140px; }
        .search-input:focus { outline:none; border-color:var(--accent-red); box-shadow:0 0 0 2px var(--accent-red-glow); }
        .search-input::placeholder { color:var(--text-muted); }
        .filter-count { font-size:.6rem; color:var(--text-muted); margin-left:auto; font-family:'Roboto Mono',monospace; }

        /* COPY BUTTON */
        .copy-btn { padding:.3rem .6rem; font-size:.58rem; font-weight:600; border:1px solid var(--border-color); border-radius:5px; background:var(--bg-primary); color:var(--text-muted); cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
        .copy-btn:hover { border-color:var(--accent-red); color:var(--text-primary); }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border-color); border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }

        /* ACCESSIBILITY */
        .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
        *:focus-visible { outline:2px solid var(--accent-blue); outline-offset:2px; }
        *:focus:not(:focus-visible) { outline:none; }

        /* REDUCED MOTION */
        @media(prefers-reduced-motion:reduce) {
            *,*::before,*::after { animation-duration:.01ms !important; transition-duration:.01ms !important; }
        }

        /* PRINT */
        @media print {
            .header,.tab-bar,.sub-tab-bar,.filter-bar,.copy-btn,.comp-toggle,.portfolio-selector,.request-form { display:none !important; }
            body { background:white; color:black; }
            .content-area { padding:0; max-width:none; }
            .card { background:white; border:1px solid #ccc; break-inside:avoid; backdrop-filter:none; -webkit-backdrop-filter:none; }
            .stat-value,.stat-label,.card-title,.section-title,.lever-card-name { color:black !important; }
            .tab-content { display:block !important; }
            .sub-content { display:block !important; }
            canvas { max-width:100%; max-height:200px; }
        }

        /* RESPONSIVE */
        @media(max-width:1100px) {
            .two-col,.three-col { grid-template-columns:1fr; }
            .stats-grid { grid-template-columns:repeat(2,1fr); }
            .stats-grid-6 { grid-template-columns:repeat(3,1fr); }
            .lever-grid { grid-template-columns:repeat(2,1fr); }
            .timeline { flex-direction:column; }
            .timeline-phase { border-radius:8px !important; }
            .header { flex-direction:column; gap:.4rem; }
        }
        @media(max-width:768px) {
            .content-area { padding:.6rem; }
            .stats-grid-6 { grid-template-columns:repeat(2,1fr); }
            .lever-grid { grid-template-columns:1fr; }
            .freshness-grid { grid-template-columns:1fr; }
            .feature-grid,.request-form { grid-template-columns:1fr; }
            .request-field.span-2,.request-field.span-4,.request-actions { grid-column:span 1; }
            .op-item { flex-wrap:wrap; }
            .op-score { width:100%; margin-left:2.15rem; }
            .filter-bar { flex-direction:column; align-items:stretch; }
        }
    </style>

ue), mainly via Operational Availability (Lever 5) and Assistance Pattern Optimization (Lever 4). The primary value is margin improvement rather than pure cost-out, but improved availability (MMU-761, MMU-760, MMU-705) will reduce overtime, breakdown costs, and standby charges. Capacity Target Recalibration (Lever 7,) also helps avoid overcapitalization and unnecessary support costs.", "ks": "Productivity + Availability at Wildfontein and Weilaagte: The high-value productivity interventions on MMU-752/717/731/754 (combined) and MMU-756 will only be fully realized if availability improvements (Lever 5) are sequenced in parallel. Raising availability of key units (e.g., MMU-760/761) to about 90% creates the stable operating window needed to consistently hit 85% productivity, converting theoretical idle capacity (3519t, 3130t, 2853t, 2224t, 1042t) into billable tons.; Productivity + Assistance Pattern Optimization at hotspot sites: At Isibonelo (MMU-758, uplift), optimizing assistance patterns (Lever 4, total) can reduce dependency on support MMUs from Carolina and Dorstfontein. This synergy frees up assistance capacity, enabling future redeployments from these hotspots while maintaining service levels. As productivity rises, fewer assistance hours per ton are needed, which directly lowers variable support costs and improves fleet efficiency.", "kt": "Short-term availability and productivity interventions may reduce immediate capacity: Implementing preventative maintenance (MMU-705) and availability upgrades (MMU-760/761) will require planned downtime. In the short term, this can temporarily reduce available capacity and may require tighter blasting schedules or short-term assistance from other MMUs. The trade-off is a 1-2 week dip in capacity for a sustained uplift of material (+ +) plus the enabling effect on the productivity gains.; Concentration risk at Wildfontein vs. broader hotspot coverage: Over 65% of portfolio value is concentrated in four Wildfontein units (MMU-752/717/731/754). Prioritizing these actions maximizes financial return but may delay interventions at other hotspot sites (Carolina, Dorstfontein) that are assistance-dependent. This creates a trade-off between maximizing near-term margin improvement and reducing structural assistance dependency across the network. If not managed, Carolina and Dorstfontein may continue to consume assistance capacity, limiting redeployment options despite improved productivity elsewhere.", "rp": {"Medium": 14, "High": 10, "Low": 1}, "ap": 72.0, "ar": [{"a": "A1_f4574d58", "ip": 20.93}, {"a": "A1_074b3a74", "ip": 17.49}, {"a": "A1_0b9f4048", "ip": 16.54}, {"a": "A1_ae1f1a6b", "ip": 11.03}, {"a": "A1_c5576793", "ip": 5.62}, {"a": "A1_15f161c3", "ip": 3.85}, {"a": "A5_e26677a5", "ip": 3.4}, {"a": "A5_2e9335d1", "ip": 3.19}, {"a": "A1_3f4c2810", "ip": 2.97}, {"a": "M5_705_predictive_service", "ip": 1.82}, {"a": "A1_a19de71f", "ip": 1.23}, {"a": "M5_702_predictive_service", "ip": 1.13}, {"a": "M5_706_predictive_service", "ip": 1.11}, {"a": "M5_709_predictive_service", "ip": 1.1}, {"a": "M5_708_predictive_service", "ip": 1.02}, {"a": "M5_704_predictive_service", "ip": 0.95}, {"a": "A4_4160ca25", "ip": 0.9}, {"a": "A4_4eb01a65", "ip": 0.9}, {"a": "A4_71ad48f5", "ip": 0.9}, {"a": "A7_57a0f4d3", "ip": 0.65}, {"a": "A7_4120349c", "ip": 0.65}, {"a": "A7_97f87bef", "ip": 0.65}, {"a": "A7_3a73e26d", "ip": 0.65}, {"a": "A7_b68c0ed5", "ip": 0.65}, {"a": "A7_ae5fd684", "ip": 0.65}], "rm": [{"ph": 1, "d": "Phase 1 (Q1): Stabilize availability and de-risk high-value units\n- It is recommended to execute MaintenancePriority on MMU-705 immediately, scheduling the M8 service in a low-production window to minimize impact. This addresses the 0.76 risk score and protects meaningful value plus downstream availability.\n- It is recommended to implement availability improvements for MMU-761 (74% -> 90%,) and MMU-760 (77% -> 90%,). Coordinate with site planning to cluster downtime and avoid overlapping with peak blasting days.\n- It is recommended to begin Assistance Pattern Optimization design for Isibonelo, Carolina, and Dorstfontein (process mapping, shift pattern review, support MMU routing) without yet changing physical deployments. This sets the foundation for reducing assistance dependency in later phases.\n- Confirm realistic 85% productivity targets per MMU with site teams, adjusting for mine-specific constraints (bench access, drill-and-blast schedule) to avoid overcommitting."}, {"ph": 2, "d": "Phase 2 (Q2): It is recommended to execute high-value productivity interventions at Wildfontein and Weilaagte\n- Roll out structured productivity programs for MMU-752, 717, 731, and 754 at Wildfontein, focusing on loading cycle time, queue time at blast faces, and operator utilization. Target at least 50-60% of the theoretical uplift in the first quarter of implementation (realized vs. potential).\n- It is recommended to implement the productivity intervention for MMU-756 at Weilaagte once availability is stable and any critical maintenance is cleared.\n- Improved availability from Phase 1 should be used to reduce reliance on ad-hoc assistance at these sites, freeing up support capacity for hotspots.\n- Start piloting revised assistance patterns at Isibonelo (supporting MMU-758's uplift to 85% productivity) with clear KPIs: assistance hours per ton, blasts completed without external support, and standby time per MMU."}, {"ph": 3, "d": "Phase 3 (Q3): Scale productivity and recalibrate capacity targets\n- Consolidate productivity gains at Wildfontein, Weilaagte, Rustenburg OC (MMU-759,), and Isibonelo (MMU-758,) by embedding standard work, dashboards, and operator coaching.\n- It is recommended to implement Capacity Target Recalibration (Lever 7,) across the improved units: adjust contractual and internal capacity benchmarks to reflect higher sustainable productivity and availability. This allows Finance and Operations to identify surplus capacity for redeployment or retirement within the quarterly caps (up to 15 redeployments, 5 retirements).\n- The freed-up capacity from higher-productivity units should be used to systematically reduce assistance dependency at Carolina and Dorstfontein, reallocating support MMUs where they add the highest marginal value.\n- It is recommended to begin planning for 1-2 strategic redeployments from over-served sites (e.g., Wildfontein once stable) to under-served hotspots, ensuring no erosion of newly achieved productivity levels."}, {"ph": 4, "d": "Phase 4 (Q4): Optimize fleet mix and lock in cost reductions\n- Based on Q2-Q3 performance data, confirm which MMUs are structurally underutilized even after productivity and availability interventions. Propose up to 3-5 retirements or long-term layups aligned with the 5-per-quarter cap, focusing on high-maintenance-cost, low-productivity units.\n- Finalize Assistance Pattern Optimization across all hotspots, using Q1-Q3 learnings to standardize best-practice patterns (e.g., shared standby pools, cross-site support rules, and maximum assistance hours per MMU).\n- Revisit capacity targets and site-level MMU allocations to ensure that the improved productivity (approaching 85%) translates into a leaner, more efficient fleet. This should lock in the cost reductions and potentially unlock additional savings through reduced spares, fuel, and overtime.\n- It is recommended to institutionalize governance: monthly productivity and availability reviews, predictive maintenance triggers (like MMU-705's risk score), and a formal redeployment/retirement decision framework tied to utilization and margin per MMU."}], "sb": {"Operations": "The portfolio is an operations-led value driver: material comes from how effectively MMUs are used, not from adding equipment. For you, the critical success factor is sequencing: first stabilize availability (MMU-760/761/705) and assistance patterns, then push hard on productivity at Wildfontein, Weilaagte, Rustenburg OC, and Isibonelo. It is expected that short-term pressure on schedules during planned maintenance and process changes, but the goal is to lift productivity on key units from 6-23% toward 85%, effectively adding several virtual MMUs worth of capacity without capex. It is advisable to set clear site-level KPIs (tons per MMU per shift, assistance hours per ton, availability %) and hold weekly reviews to ensure the theoretical uplift translates into actual blasts completed. The improved performance should be used to reduce reliance on assistance at Carolina and Dorstfontein, freeing up support capacity for strategic redeployments.", "Finance": "This portfolio is margin-accretive with a strong payback profile: margin improvement plus cost reductions, with no major capex implied. The concentration of value at Wildfontein (MMU-752/717/731/754) and a few other units means that execution risk is focused but manageable; under-delivery at these units will materially impact the upside. It is advisable to track realized vs. expected uplift per MMU monthly and challenge assumptions behind the 85% productivity targets. Capacity Target Recalibration in Q3-Q4 is the lever to convert operational gains into structural financial benefits: lower required fleet size, reduced depreciation and maintenance spend, and the ability to retire or redeploy up to 5 units per quarter without compromising service. Also, it is recommended to monitor assistance costs at Carolina, Dorstfontein, and Isibonelo; as assistance patterns are optimized, It is advisable to see a measurable reduction in support hours and associated variable costs.", "Maintenance": "The role is pivotal in enabling the value, especially via Operational Availability and risk mitigation. The MaintenancePriority on MMU-705 (risk score 0.76) and availability improvements on MMU-760/761 must be treated as strategic interventions, not routine jobs. It is recommended to plan these services in tight coordination with Operations to minimize lost production days and ensure that post-maintenance availability reliably reaches about 90%. This portfolio should be used to push a more predictive maintenance model: replicate the risk-based approach used for MMU-705 across the fleet, prioritizing units with high productivity potential (Wildfontein, Weilaagte, Rustenburg OC, Isibonelo). As productivity rises, component wear will increase; it is advisable to pre-emptively adjust PM intervals, critical spares holdings, and technician allocation to avoid new bottlenecks. Finally, the data on breakdown patterns and MTBF should feed into Q3-Q4 decisions on which MMUs are candidates for retirement vs. further investment, ensuring that the fleet mix favors reliable, high-margin units."}, "wf": [{"l": 1, "ip": 79.7}, {"l": 5, "ip": 13.7}, {"l": 7, "ip": 3.9}, {"l": 4, "ip": 2.7}], "tn": [{"l": 1, "avg": 9.96, "lo": 1.23, "hi": 20.93}, {"l": 5, "avg": 1.71, "lo": 0.95, "hi": 3.4}, {"l": 4, "avg": 0.9, "lo": 0.9, "hi": 0.9}, {"l": 7, "avg": 0.65, "lo": 0.65, "hi": 0.65}], "sc": [{"a": "A1_f4574d58", "p": 61.0, "rs": 0.62, "ip": 20.93, "l": 1}, {"a": "A1_074b3a74", "p": 63.0, "rs": 0.62, "ip": 17.49, "l": 1}, {"a": "A1_0b9f4048", "p": 62.0, "rs": 0.61, "ip": 16.54, "l": 1}, {"a": "A1_ae1f1a6b", "p": 65.0, "rs": 0.62, "ip": 11.03, "l": 1}, {"a": "A1_c5576793", "p": 63.0, "rs": 0.62, "ip": 5.62, "l": 1}, {"a": "A1_15f161c3", "p": 72.0, "rs": 0.61, "ip": 3.85, "l": 1}, {"a": "A5_e26677a5", "p": 70.0, "rs": 0.62, "ip": 3.4, "l": 5}, {"a": "A5_2e9335d1", "p": 70.0, "rs": 0.63, "ip": 3.19, "l": 5}, {"a": "A1_3f4c2810", "p": 74.0, "rs": 0.62, "ip": 2.97, "l": 1}, {"a": "M5_705_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.82, "l": 5}, {"a": "A1_a19de71f", "p": 73.0, "rs": 0.62, "ip": 1.23, "l": 1}, {"a": "M5_702_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.13, "l": 5}, {"a": "M5_706_predictive_service", "p": 80.0, "rs": 0.41, "ip": 1.11, "l": 5}, {"a": "M5_709_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.1, "l": 5}, {"a": "M5_708_predictive_service", "p": 80.0, "rs": 0.44, "ip": 1.02, "l": 5}, {"a": "M5_704_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.95, "l": 5}, {"a": "A4_4160ca25", "p": 55.0, "rs": 0.44, "ip": 0.9, "l": 4}, {"a": "A4_4eb01a65", "p": 55.0, "rs": 0.44, "ip": 0.9, "l": 4}, {"a": "A4_71ad48f5", "p": 55.0, "rs": 0.44, "ip": 0.9, "l": 4}, {"a": "A7_57a0f4d3", "p": 80.0, "rs": 0.42, "ip": 0.65, "l": 7}, {"a": "A7_4120349c", "p": 80.0, "rs": 0.38, "ip": 0.65, "l": 7}, {"a": "A7_97f87bef", "p": 80.0, "rs": 0.42, "ip": 0.65, "l": 7}, {"a": "A7_3a73e26d", "p": 80.0, "rs": 0.28, "ip": 0.65, "l": 7}, {"a": "A7_b68c0ed5", "p": 80.0, "rs": 0.42, "ip": 0.65, "l": 7}, {"a": "A7_ae5fd684", "p": 80.0, "rs": 0.42, "ip": 0.65, "l": 7}], "mp": 86.3}, {"id": 10, "nm": "Maintenance Priority", "on": "Maintenance_Risk_Priority", "st": "policy", "ac": 25, "ld": {"1": 7, "2": 0, "3": 0, "4": 3, "5": 8, "6": 0, "7": 7, "8": 0}, "pa": "Very strong alignment. about 79% of total value comes 7 productivity actions, heavily concentrated at Wildfontein (MMU-752/717/731/754) and supported by Weilaagte and Rustenburg OC. These interventions directly convert idle capacity (about 14,200t combined across top 6 MMUs) into billable tonnes, with limited capex and high margin leverage.", "ca": "Moderate but targeted alignment. Direct cost reductions are modest versus total value, but most value is margin improvement from better utilization and availability. Cost benefits are primarily from avoiding unplanned downtime (maintenance risk actions) and reducing assistance dependency via better availability and capacity recalibration.", "ks": "Wildfontein productivity + availability synergy: Concentrating productivity interventions on MMU-752/717/731/754 at Wildfontein, combined with targeted availability improvements on their support/backup units, creates a step-change in site-level output. As these four units move toward 85% productivity, the site can absorb more blasting demand without adding MMUs, enabling future redeployment of any persistently low-utilization backup units within the 15-per-quarter redeployment cap.; Maintenance risk actions enabling assistance pattern optimization at Isibonelo and other hotspots: Prioritizing preventative maintenance (e.g., MMU-705 M8 service, high predictive risk) and availability improvements (MMU-760/761) reduces breakdown-driven assistance calls. This directly supports Lever 4 (assistance pattern optimization,) by making assistance more planned and less reactive, freeing high-performing MMUs from frequent cross-site support and improving overall fleet stability.; Capacity target recalibration + productivity interventions: Recalibrating capacity targets (Lever 7) at Wildfontein, Weilaagte, and Rustenburg OC to reflect realistic 80-85% productivity unlocks two benefits: it prevents overcommitting single units and clarifies which MMUs are structurally surplus. This creates a clear basis for redeploying up to 15 low-need units per quarter and retiring up to 5 structurally redundant units, while protecting service levels.; Operational availability + cost reduction: Improving availability on MMU-761 (74%->90%) and MMU-760 (77%->90%) reduces overtime, emergency maintenance, and rental/contractor reliance. This not only delivers + in direct value but also lowers maintenance cost per tonne and stabilizes shift planning, which compounds the margin improvement from productivity improvements.; Productivity uplift at Wildfontein + hotspot relief: As Wildfontein's four underperforming MMUs approach 85% productivity, the site can handle more volume with the same or fewer units. This creates optionality to redeploy one Wildfontein unit to assistance-dependent hotspots like Carolina, Dorstfontein, or Isibonelo in later quarters, reducing their assistance dependency without breaching the 15 redeployment limit.", "kt": "Short-term maintenance downtime vs. availability and risk reduction: Scheduling immediate preventative services (e.g., MMU-705 M8) and availability upgrades (MMU-760/761) will temporarily reduce available capacity. The trade-off is a 1-2 week localized capacity dip versus a sustained increase in availability (to about 90%) and reduced breakdown risk, which protects + in value and avoids unplanned stoppages that could trigger costly assistance from other sites.; Concentrated focus on Wildfontein vs. balanced fleet optimization: Over 70% of productivity value is concentrated at Wildfontein. Prioritizing these four MMUs maximizes near-term financial return but may delay interventions at smaller sites. The trade-off is rapid margin improvement (material from top 4 Wildfontein actions) versus slower improvement in assistance-heavy sites like Carolina and Dorstfontein, which may continue to rely on support in the short term.; Higher utilization vs. maintenance load and component life: Driving MMU-752/717/731/754 from 6-23% to about 85% productivity will increase engine hours, wear, and maintenance frequency. This improves revenue and margin but accelerates component replacement cycles and may bring forward major services by 1-2 quarters. Maintenance planning must absorb this without exceeding workshop capacity or spares budgets.; Capacity target tightening vs. operational flexibility: Recalibrating capacity targets closer to realistic 80-85% utilization improves planning accuracy and highlights surplus capacity, but reduces buffer for unexpected demand spikes or simultaneous breakdowns. The trade-off is better fleet efficiency and clearer redeployment/retirement candidates versus less slack to absorb unplanned events at site level.; Assistance pattern optimization vs. local autonomy: Standardizing assistance patterns and reducing ad hoc cross-site support (Lever 4) will improve cost control and predictability but may be perceived by sites as reduced flexibility to \"grab\" help when needed. This may require stricter central coordination and could initially face resistance from site operations teams.", "rp": {"Medium": 15, "High": 9, "Low": 1}, "ap": 72.0, "ar": [{"a": "A1_f4574d58", "ip": 21.05}, {"a": "A1_074b3a74", "ip": 17.59}, {"a": "A1_0b9f4048", "ip": 16.64}, {"a": "A1_ae1f1a6b", "ip": 11.09}, {"a": "A1_c5576793", "ip": 5.65}, {"a": "A1_15f161c3", "ip": 3.88}, {"a": "A5_e26677a5", "ip": 3.42}, {"a": "A5_2e9335d1", "ip": 3.21}, {"a": "A1_3f4c2810", "ip": 2.99}, {"a": "M5_705_predictive_service", "ip": 1.83}, {"a": "M5_702_predictive_service", "ip": 1.14}, {"a": "M5_706_predictive_service", "ip": 1.11}, {"a": "M5_709_predictive_service", "ip": 1.11}, {"a": "M5_708_predictive_service", "ip": 1.02}, {"a": "M5_704_predictive_service", "ip": 0.95}, {"a": "A4_4160ca25", "ip": 0.9}, {"a": "A4_4eb01a65", "ip": 0.9}, {"a": "A4_71ad48f5", "ip": 0.9}, {"a": "A7_57a0f4d3", "ip": 0.66}, {"a": "A7_015f5672", "ip": 0.66}, {"a": "A7_4120349c", "ip": 0.66}, {"a": "A7_66b5e04e", "ip": 0.66}, {"a": "A7_97f87bef", "ip": 0.66}, {"a": "A7_3a73e26d", "ip": 0.66}, {"a": "A7_4b0b6a44", "ip": 0.66}], "rm": [{"ph": 1, "d": "Phase 1 (Q1): Stabilize high-risk units and unlock quick productivity wins\n- Priority should be given to maintenance risk and availability improvements: - It is recommended to execute immediate preventative service on MMU-705 (M8, risk score 0.76) and any other high-risk units in the availability lever to prevent unplanned failures. - It is recommended to implement availability improvements on MMU-761 (74%->90%) and MMU-760 (77%->90%), scheduling work in low-demand windows to minimize production impact.\n- Launch focused productivity interventions at Wildfontein: - Start with MMU-752 (6%->target 85%) and MMU-717 (12%->85%), as they have the largest idle capacities and value (material combined). Actions include operator coaching, shift pattern optimization, loading/queuing process redesign, and tighter dispatch control. - It is recommended to begin baseline data capture (cycle times, delays, breakdown causes) for MMU-731 and MMU-754 to prepare for Q2 ramp-up.\n- Define capacity target recalibration framework: - Set provisional capacity targets for Wildfontein, Weilaagte, Rustenburg OC, and Isibonelo based on realistic 75-80% short-term utilization, using current demand and maintenance windows. - No major redeployments yet; only micro-adjustments within sites to avoid breaching the 15-per-quarter limit later when bigger moves are needed."}, {"ph": 2, "d": "Phase 2 (Q2): Scale productivity and embed availability gains\n- Expand productivity optimization at Wildfontein and Weilaagte: - Fully roll out interventions to MMU-731 (8%->85%) and MMU-754 (23%->85%), leveraging lessons from Q1 on MMU-752/717. - It is recommended to implement productivity improvements at Weilaagte (MMU-756, 16%->85%) and Rustenburg OC (MMU-759, 54%->85%), focusing on reducing non-productive travel, queuing, and standby time.\n- Consolidate availability improvements and maintenance discipline: - It is recommended to monitor MMU-760/761/705 performance post-intervention; adjust PM intervals and spares stocking based on actual failure patterns. - It is recommended to extend availability improvement practices (standard checklists, condition monitoring, first-line maintenance by operators) to other MMUs in the operational availability lever.\n- It is recommended to implement first wave of capacity target recalibration and limited redeployments: - Lock in revised capacity targets at Wildfontein, Weilaagte, and Rustenburg OC, now assuming 80-85% productivity for improved units. - It is recommended to identify 3-5 lowest-utilization MMUs across these sites that are structurally surplus under new targets and plan up to 5 redeployments to high-assistance sites (Carolina, Dorstfontein, Isibonelo), staying well within the 15 redeployment cap.\n- It is recommended to begin structured assistance pattern optimization: - Improved availability and clearer capacity should be used to formalize assistance rules (who assists whom, under what triggers, and for how long) to capture the value and reduce reactive support."}, {"ph": 3, "d": "Phase 3 (Q3): Optimize fleet mix and reduce structural overcapacity\n- Deepen productivity and assistance optimization at hotspots: - Apply proven productivity playbook to MMU-758 at Isibonelo (64%->85%), focusing on shift alignment with mine schedule and minimizing idle time between blasts. - With redeployed units now in place, redesign assistance patterns at Carolina and Dorstfontein to reduce chronic dependency and move to planned, scheduled support.\n- It is recommended to execute second wave of capacity recalibration and redeployments/retirements: - It is recommended to reassess fleet needs per site using 6 months of improved productivity and availability data. - Redeploy up to an additional 10 MMUs (staying within the 15-per-quarter cap) from consistently over-capacity sites to under-served or growth sites. - It is recommended to identify 3-5 MMUs for retirement (within the 5-per-quarter cap) based on age, maintenance cost per tonne, and chronic underutilization, prioritizing units that would otherwise require major capex.\n- Integrate maintenance risk scoring into standard planning: - Embed predictive risk scores into weekly maintenance scheduling so that high-risk units are proactively serviced before availability drops, locking in the + availability value and avoiding new hotspots."}, {"ph": 4, "d": "Phase 4 (Q4): Consolidate, standardize, and prepare next optimization cycle\n- Standardize best practices across all sites: - Codify the Wildfontein productivity interventions into a standard MMU productivity toolkit (dispatch rules, operator KPIs, daily performance huddles) and roll out to remaining sites. - It is recommended to institutionalize availability and maintenance standards (PM templates, condition monitoring routines, risk-based service triggers) across the fleet.\n- Finalize structural fleet optimization: - It is recommended to conduct a portfolio-wide review of utilization, availability, and cost per tonne to confirm which MMUs remain surplus. - Remaining quarterly headroom for up should be used to 15 redeployments and 5 retirements to fine-tune fleet distribution and remove any residual structural overcapacity.\n- It is recommended to align budgets and contracts with new operating model: - Adjust maintenance budgets, spares contracts, and potential replacement plans to reflect higher utilization on core units and retirement of high-cost/low-use units. - Update site-level service agreements and internal SLAs to embed new capacity targets, assistance rules, and performance expectations for the next planning cycle."}], "sb": {"Operations": "Focus operationally on making Wildfontein the flagship productivity turnaround. Four MMUs (752, 717, 731, 754) represent over of value; raising them toward 85% productivity will materially increase tonnes without adding trucks. It is recommended to plan interventions around shift design, queue management at loading points, and operator performance management. Coordinate closely with maintenance to time availability upgrades (e.g., MMU-760/761, MMU-705 service) in low-demand windows so you avoid production dips. The new capacity targets should be used to challenge sites that are holding onto surplus MMUs 'just in case' and prepare to release 3-5 units in Q2 for redeployment to Carolina, Dorstfontein, and Isibonelo. For assistance, move from ad hoc calls to a rules-based model: define which MMUs can assist which sites, under what conditions, and for how long, so that assistance does not undermine productivity on the best-performing units.", "Finance": "This portfolio is margin-accretive: of margin improvement on total value, with only meaningful direct cost reductions. The main lever is better utilization of existing assets, not capex. Priority should be given to funding for the maintenance and availability actions that unlock the highest productivity value (e.g., MMU-705, 760, 761), as they protect revenue and reduce the risk of expensive emergency repairs. It is expected that a short-term increase in maintenance spend and possibly overtime in Q1-Q2 as availability improvements and preventative services are executed, but this should be offset by lower breakdown costs and higher revenue per MMU. The capacity target recalibration and subsequent redeployments/retirements will reduce structural overcapacity; The financial impact via cost per tonne and return on capital per MMU should be tracked. The 5-per-quarter retirement allowance should be used to eliminate high-maintenance, low-utilization units and avoid future capex on them, while ensuring that redeployments (up to 15 per quarter) are directed to sites where incremental tonnes deliver the highest margin per tonne.", "Maintenance": "The role is central to unlocking this portfolio's value. The operational availability lever and maintenance-priority actions (e.g., MMU-705 with a high predictive risk score of 0.76) must be front-loaded in Q1 to prevent failures that would undermine productivity gains. It is recommended to plan preventative services and availability upgrades (especially for MMU-760 and MMU-761) using risk-based scheduling: Priority should be given to high-risk, high-value units even if it means short-term downtime. As productivity rises toward 85% on Wildfontein and other key units, It is expected that increased wear and component consumption; adjust PM intervals, inspection routines, and spares stocking accordingly to avoid bottlenecks in the workshop. Integrate predictive risk scores into weekly planning so that It is possible to intervene before availability drops. For redeployments and retirements, provide data on maintenance cost per tonne, failure history, and remaining useful life to help identify which MMUs can be safely retired (up to 5 per quarter) and which are best candidates for redeployment without creating new reliability hotspots at receiving sites."}, "wf": [{"l": 1, "ip": 78.9}, , "nm": "Quality First", "on": "Quality_First", "st": "policy", "ac": 25, "ld": {"1": 7, "2": 0, "3": 0, "4": 3, "5": 8, "6": 0, "7": 7, "8": 0}, "pa": "Very strong alignment. about 79% of total value comes from productivity optimization, heavily concentrated at Wildfontein (MMU-752/717/731/754) and supported by Weilaagte (MMU-756) and Rustenburg OC (MMU-759). The interventions directly attack idle capacity (3519t, 3130t, 2853t, 2224t, 1042t, 1422t) and move units toward an 85% productivity benchmark, which is consistent with Enaex's group-wide productivity potential.", "ca": "Moderate but targeted. Direct cost reductions are (about 15% of total value) with the balance of value as margin improvement from better utilization. Cost benefits are primarily via higher throughput per fixed cost base and reduced unplanned downtime from availability actions. No immediate retirements or redeployments are embedded, so opex-per-ton improves without major capex or disposal decisions.", "ks": "Productivity + Availability at Wildfontein and adjacent sites: Raising availability on MMUs like 760/761 while simultaneously executing productivity interventions on MMUs 752/717/731/754 at Wildfontein and 756 at Weilaagte creates a compounding effect. Higher availability ensures that productivity interventions (operator coaching, cycle-time reduction, blast planning discipline) translate into sustained throughput. For example, a 10-15 percentage point availability gain combined with moving from 6-23% to about 70-85% productivity can effectively double or triple realized tons per MMU without adding fleet.; Productivity + Capacity Target Recalibration + Assistance Optimization at hotspot and semi-hotspot sites: Recalibrating capacity targets for Wildfontein, Weilaagte, Rustenburg OC, and Isibonelo to realistic 80-85% productivity, then aligning assistance patterns (e.g., reducing chronic reliance on support MMUs from Carolina/Dorstfontein/Isibonelo) creates a system-level synergy. It stabilizes planning, reduces emergency assistance moves, and frees up high-assistance sites to focus their MMUs on core contracts. This can unlock an additional 5-10% effective capacity at hotspot sites without new capital by eliminating low-value assistance trips and idle time caused by misaligned targets.", "kt": "Execution bandwidth vs. value capture: 25 actions across 4 levers in one portfolio risk overloading site teams, especially at Wildfontein where four of the top five productivity actions are concentrated. Trying to push all productivity and availability interventions simultaneously may dilute focus and extend ramp-up times. A phased approach (e.g., first stabilizing availability and maintenance, then driving aggressive productivity gains) may delay some of the value but reduces change-management risk and quality slippage.; Short-term assistance dependence vs. long-term fleet rationalization: Assistance pattern optimization and capacity target recalibration will expose structural over-capacity at some sites once productivity improves. In the short term, this may increase perceived 'spare' MMUs and pressure to redeploy or retire units, which can be politically sensitive and may temporarily increase logistics and training costs. However, not acting on this (i.e., keeping surplus MMUs idle) forfeits potential redeployment/retirement savings that could be worth/quarter if 3-5 underutilized units are moved or retired in later quarters.", "rp": {"Medium": 15, "High": 9, "Low": 1}, "ap": 72.0, "ar": [{"a": "A1_f4574d58", "ip": 21.05}, {"a": "A1_074b3a74", "ip": 17.59}, {"a": "A1_0b9f4048", "ip": 16.64}, {"a": "A1_ae1f1a6b", "ip": 11.09}, {"a": "A1_c5576793", "ip": 5.65}, {"a": "A1_15f161c3", "ip": 3.88}, {"a": "A5_e26677a5", "ip": 3.42}, {"a": "A5_2e9335d1", "ip": 3.21}, {"a": "A1_3f4c2810", "ip": 2.99}, {"a": "M5_705_predictive_service", "ip": 1.83}, {"a": "M5_702_predictive_service", "ip": 1.14}, {"a": "M5_706_predictive_service", "ip": 1.11}, {"a": "M5_709_predictive_service", "ip": 1.11}, {"a": "M5_708_predictive_service", "ip": 1.02}, {"a": "M5_704_predictive_service", "ip": 0.95}, {"a": "A4_4160ca25", "ip": 0.9}, {"a": "A4_4eb01a65", "ip": 0.9}, {"a": "A4_71ad48f5", "ip": 0.9}, {"a": "A7_57a0f4d3", "ip": 0.66}, {"a": "A7_015f5672", "ip": 0.66}, {"a": "A7_4120349c", "ip": 0.66}, {"a": "A7_66b5e04e", "ip": 0.66}, {"a": "A7_97f87bef", "ip": 0.66}, {"a": "A7_3a73e26d", "ip": 0.66}, {"a": "A7_4b0b6a44", "ip": 0.66}], "rm": [{"ph": 1, "d": "Phase 1 (Q1): Stabilize availability and critical risk, then pilot productivity uplift at Wildfontein and Isibonelo. The focus should be on: (1) Operational Availability actions, especially MMU-761 (74%->90%,) and MMU-760 (77%->90%,), plus immediate preventative service for MMU-705 (risk score 0.76,). Objective: lift critical MMUs above 88-90% availability and reduce unplanned downtime. (2) Launch structured productivity interventions on the two most underperforming Wildfontein units: MMU-752 (6%->target 85%, 3519t idle,) and MMU-717 (12%->85%, 3130t idle,). (3) Start a focused productivity program at Isibonelo on MMU-758 (64%->85%, 1597t idle,) to directly reduce assistance dependency at this hotspot. (4) It is recommended to begin data-driven capacity target recalibration design (no hard target changes yet) using Q1 performance data to define realistic 6-12 month targets per MMU."}, {"ph": 2, "d": "Phase 2 (Q2): Scale productivity interventions and lock in availability gains; start formal capacity target recalibration. (1) It is recommended to extend productivity optimization to remaining Wildfontein units MMU-731 (8%->85%, 2853t idle,) and MMU-754 (23%->85%, 2224t idle,), plus Weilaagte MMU-756 (16%->85%, 1042t idle,) and Rustenburg OC MMU-759 (54%->85%, 1422t idle,). Q1 learnings should be used to standardize operating procedures, operator coaching modules, and blast planning templates. (2) It is recommended to institutionalize availability improvements: embed preventative maintenance schedules and parts planning for all MMUs targeted in Q1, using MMU-705 as the template for predictive maintenance triggers. (3) It is recommended to implement first wave of capacity target recalibration: adjust MMU-level capacity targets to about 80-85% productivity where Q1 data shows feasibility, and reduce unrealistic targets where geology or mine plan constraints limit achievable output. (4) It is recommended to begin tactical assistance pattern optimization: reduce low-value assistance moves from Wildfontein/Weilaagte/Rustenburg OC, and at Isibonelo shift from chronic inbound assistance to self-sufficiency using improved productivity on MMU-758."}, {"ph": 3, "d": "Phase 3 (Q3): Optimize assistance patterns and prepare structural fleet decisions. (1) 2 quarters of data should be used to redesign assistance patterns across Carolina, Dorstfontein, and Isibonelo: Priority should be given to assistance only for high-margin, high-risk blasts and eliminate routine assistance where local MMUs can now meet recalibrated capacity targets. (2) It is recommended to identify structurally underutilized MMUs (e.g., units consistently below 50-60% utilization even after interventions) as candidates for redeployment or retirement in a separate structural portfolio, staying within the 15 redeployments and 5 retirements/quarter cap. (3) Fine-tune capacity targets again to reflect new assistance rules and any mine plan changes, ensuring that targets remain achievable but stretch-oriented. (4) Introduce cross-site best-practice exchanges: Wildfontein and Isibonelo as reference sites for productivity and availability playbooks should be used."}, {"ph": 4, "d": "Phase 4 (Q4): Consolidate gains and integrate with fleet-rightsizing strategy. (1) Lock in Quality_First policies as standard operating policy: embed productivity benchmarks (e.g., minimum 70% with path to 85%), availability thresholds (more than 90%), and maintenance triggers into contracts, KPIs, and bonus schemes. (2) Coordinate with the corporate fleet optimization program to execute a targeted set of redeployments/retirements based on the stabilized productivity and availability data, focusing on MMUs that remain structurally underutilized after all Quality_First actions. (3) Re-evaluate assistance patterns at hotspot sites (Carolina, Dorstfontein, Isibonelo) to ensure assistance is now exceptional rather than systemic, and quantify the reduction in assistance hours and associated cost. (4) It is recommended to run a portfolio review to identify which Quality_First actions should be scaled to other sites in 2027, and where additional digital or automation investments (e.g., telemetry, operator guidance) would further increase productivity without adding fleet."}], "sb": {"Operations": "For the Operations Manager, this portfolio is an execution and discipline play. The biggest wins are at Wildfontein and Isibonelo: four Wildfontein MMUs (752, 717, 731, 754) and Isibonelo's MMU-758 together account for over of value. Focus the operational resources there first. Sequence actions so that availability and maintenance stability come before aggressive productivity targets-if MMU-760/761 and 705 are not stable, productivity gains will be inconsistent and operators will lose confidence in the new standards. Q1-Q2 should be used to standardize shift routines, loading cycles, and blast preparation checklists, and to embed clear productivity KPIs (e.g., tons/shift, blasts/shift) into supervisor dashboards. At hotspot sites, the goal is to move from chronic assistance to self-sufficiency: once MMU-758 at Isibonelo is consistently above about 75% productivity and availability more than 90%, It is possible to start to cap inbound assistance and protect the own fleet from being pulled away for emergency support.", "Finance": "For the Finance Controller, Quality_First delivers of upside, of which material is margin improvement and is direct cost reductions. The economic logic is to sweat existing assets harder before committing to capex or structural disposals. It is advisable to track realized value by site and by lever: (1) productivity uplift at Wildfontein, Weilaagte, Rustenburg OC, and Isibonelo should translate into higher revenue per MMU with minimal incremental fixed cost; (2) availability improvements and preventative maintenance (e.g., MMU-705) should reduce repair costs and rental/substitute equipment spend over 6-12 months. It is expected that a modest short-term increase in training and maintenance opex in Q1-Q2, but this should be offset by reduced unplanned downtime and better blast reliability. Q2-Q3 data should be used to build a business case for redeploying or retiring structurally underutilized MMUs in a separate structural portfolio, quantifying potential savings from lower depreciation, insurance, and standing charges. Also, it is recommended to monitor assistance cost lines at Carolina, Dorstfontein, and Isibonelo; a 10-20% reduction in assistance hours by Q3 would validate the portfolio's policy impact.", "Maintenance": "For the Maintenance Lead, this portfolio is an opportunity to shift from reactive to predictive maintenance while directly supporting productivity. The AvailabilityImprovement actions for MMU-761 and MMU-760, plus the MaintenancePriority for MMU-705 (risk score 0.76), should be treated as pilots for a standard preventative maintenance model. In Q1, priority should be given to clearing critical backlogs and aligning service intervals with actual utilization (tons pumped, engine hours) rather than calendar time. MMU-705 should be used to refine the predictive risk thresholds: if the M8 service reduces unplanned downtime and improves availability, formalize similar triggers for other high-value MMUs. From Q2 onward, coordinate closely with Operations so that maintenance windows are planned around the new productivity targets-short, well-planned interventions that protect availability above 90% are more valuable than long, infrequent overhauls that disrupt blasting schedules. As productivity rises at Wildfontein and Isibonelo, It is expected that higher mechanical stress; It is recommended to plan for slightly higher planned maintenance frequency but lower catastrophic failure rates. Finally, feed maintenance performance data into the capacity target recalibration process so that targets reflect realistic availability and maintenance constraints, avoiding over-promising on MMU capacity that the team cannot reliably support."}, "wf": [{"l": 1, "ip": 78.9}, {"l": 5, "ip": 13.8}, {"l": 7, "ip": 4.6}, {"l": 4, "ip": 2.7}], "tn": [{"l": 1, "avg": 11.27, "lo": 2.99, "hi": 21.05}, {"l": 5, "avg": 1.72, "lo": 0.95, "hi": 3.42}, {"l": 4, "avg": 0.9, "lo": 0.9, "hi": 0.9}, {"l": 7, "avg": 0.66, "lo": 0.66, "hi": 0.66}], "sc": [{"a": "A1_f4574d58", "p": 61.0, "rs": 0.62, "ip": 21.05, "l": 1}, {"a": "A1_074b3a74", "p": 63.0, "rs": 0.62, "ip": 17.59, "l": 1}, {"a": "A1_0b9f4048", "p": 62.0, "rs": 0.61, "ip": 16.64, "l": 1}, {"a": "A1_ae1f1a6b", "p": 65.0, "rs": 0.62, "ip": 11.09, "l": 1}, {"a": "A1_c5576793", "p": 63.0, "rs": 0.62, "ip": 5.65, "l": 1}, {"a": "A1_15f161c3", "p": 72.0, "rs": 0.61, "ip": 3.88, "l": 1}, {"a": "A5_e26677a5", "p": 70.0, "rs": 0.62, "ip": 3.42, "l": 5}, {"a": "A5_2e9335d1", "p": 70.0, "rs": 0.63, "ip": 3.21, "l": 5}, {"a": "A1_3f4c2810", "p": 74.0, "rs": 0.62, "ip": 2.99, "l": 1}, {"a": "M5_705_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.83, "l": 5}, {"a": "M5_702_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.14, "l": 5}, {"a": "M5_706_predictive_service", "p": 80.0, "rs": 0.41, "ip": 1.11, "l": 5}, {"a": "M5_709_predictive_service", "p": 80.0, "rs": 0.42, "ip": 1.11, "l": 5}, {"a": "M5_708_predictive_service", "p": 80.0, "rs": 0.44, "ip": 1.02, "l": 5}, {"a": "M5_704_predictive_service", "p": 80.0, "rs": 0.42, "ip": 0.95, "l": 5}, {"a": "A4_4160ca25", "p": 55.0, "rs": 0.44, "ip": 0.9, "l": 4}, {"a": "A4_4eb01a65", "p": 55.0, "rs": 0.44, "ip": 0.9, "l": 4}, {"a": "A4_71ad48f5", "p": 55.0, "rs": 0.44, "ip": 0.9, "l": 4}, {"a": "A7_57a0f4d3", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_015f5672", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_4120349c", "p": 80.0, "rs": 0.38, "ip": 0.66, "l": 7}, {"a": "A7_66b5e04e", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_97f87bef", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}, {"a": "A7_3a73e26d", "p": 80.0, "rs": 0.28, "ip": 0.66, "l": 7}, {"a": "A7_4b0b6a44", "p": 80.0, "rs": 0.42, "ip": 0.66, "l": 7}], "mp": 85.5}, {"id": 2, "nm": "Alternative Fleet Mix", "on": "Diversity_2", "st": "diversity", "ac": 25, "ld": {"1": 8, "2": 0, "3": 0, "4": 3, "5": 8, "6": 0, "7": 6, "8": 0}, "pa": "Very strong alignment. about 80% of total value comes 8 productivity actions, heavily concentrated at Wildfontein (MMU-752/717/731/754) and supported by Weilaagte (MMU-756) and Isibonelo (MMU-758). These actions directly address idle capacity (3519t + 3130t + 2853t + 2224t + 1042t + 1597t) and convert it into billable tonnes, driving the bulk of the margin improvement. The portfolio targets both chronic under-utilisation (6-23% productivity) and moderate under-utilisation (54-64%), which is consistent with the group-wide productivity potential.", "ca": "Moderate but positive alignment. Direct cost reductions are (about 12% of total value), but many productivity and availability actions indirectly reduce unit costs (fixed cost dilution per tonne, fewer emergency call-outs, better maintenance planning). The operational availability lever will also reduce overtime, standby, and breakdown-related costs, though these are not fully captured in the headline.", "ks": "Wildfontein cluster synergy: Coordinated productivity interventions on MMU-752, 717, 731, and 754 at Wildfontein create a site-level step change. Combined potential value from these four units is approximately (+ + +). Implementing common interventions (operator upskilling, loading pattern optimisation, tighter shift start discipline, and mine-facing scheduling changes) once at site level yields benefits across all four units, reducing per-unit implementation cost and change-management effort.; Availability-productivity synergy: Improving availability on MMU-761 and 760 (combined value) and executing the preventative service on MMU-705 before or in parallel with productivity pushes ensures that increased demand can be met reliably. Higher availability expands the productive window, which allows productivity interventions (especially at Isibonelo and Rustenburg OC) to translate into sustained tonnes rather than short-lived spikes followed by breakdowns.; Assistance pattern and hotspot relief synergy: Productivity uplift on MMU-758 at Isibonelo combined with assistance-pattern optimisation actions (total) can reduce reliance on external or standby assistance units at hotspot sites (Isibonelo, Carolina, Dorstfontein). As Isibonelo's own MMU productivity and availability improve, assistance units can be redeployed to Carolina and Dorstfontein within the quarterly limit, improving overall fleet utilisation and reducing assistance hours.; Capacity target recalibration and redeployment synergy: Recalibrating capacity targets using the new productivity and availability baselines enables more accurate identification of structurally under- or over-capacitated sites. This supports data-driven redeployment (up to 15 per quarter) and up to 5 retirements, ensuring that high-potential units (e.g., Wildfontein and Rustenburg OC MMUs) are retained and fully utilised, while chronically low-demand units are candidates for redeployment or retirement.", "kt": "Execution intensity vs. operational stability: Pushing multiple Wildfontein MMUs (752, 717, 731, 754) from very low productivity (6-23%) to 85% in a short period risks operational disruption-operator fatigue, loading errors, and mine-interface friction. A more gradual ramp-up (e.g., 6%->50%->70%->85%) may reduce risk but will delay full value realisation by 1-2 quarters, potentially deferring of uplift.; Maintenance load vs. availability gains: The availability improvements for MMU-761 and 760 and the preventative service on MMU-705 will temporarily take units out of service. Short-term downtime (e.g., 1-3 days per unit) may require temporary assistance or schedule adjustments, slightly increasing assistance costs or reducing tonnes in the implementation quarter. However, this is traded against a projected + in availability-related value and lower breakdown risk over the year.; Assistance reduction vs. service level at hotspot sites: Optimising assistance patterns to reduce cost may mean fewer standby units at Isibonelo, Carolina, and Dorstfontein. If productivity and availability interventions under-deliver or are delayed, there is a risk of service level dips (missed blasts, longer response times). Maintaining a minimal buffer of assistance capacity during the first 1-2 quarters will reduce immediate savings but protect customer relationships.; Capacity target recalibration vs. internal expectations: Recalibrating capacity targets may formally reduce expected tonnes for some sites, which can be perceived as a downgrade by site teams and may reduce short-term pressure to improve. Conversely, raising targets where potential is high (e.g., Wildfontein) will increase performance pressure and may require additional support (training, supervision). Balancing realistic targets with stretch goals is necessary to avoid demotivation or burnout.", "rp": {"Medium": 13, "High": 11, "Low": 1}, "ap": 72.0, "ar": [{"a": "A1_f4574d58", "ip": 21.07}, {"a": "A1_074b3a74", "ip": 17.61}, {"a": "A1_0b9f4048", "ip": 16.66}, {"a": "A1_ae1f1a6b", "ip": 11.11}, {"a": "A1_c5576793", "ip": 5.65}, {"a": "A1_15f161c3", "ip": 3.88}, {"a": "A5_e26677a5", "ip": 3.42}, {"a": "A5_2e9335d1", "ip": 3.21}, {"a": "A1_3f4c2810", "ip": 2.99}, {"a": "M5_705_predictive_service", "ip": 1.83}, {"a": "A1_a19de71f", "ip": 1.24}, {"a": "M5_702_predictive_service", "ip": 1.14}, {"a": "A4_4160ca25", "ip": 0.91}, {"a": "A4_4eb01a65", "ip": 0.91}, {"a": "A4_71ad48f5", "ip": 0.91}, {"a": "A5_c132e079", "ip": 0.89}, {"a": "M5_735_predictive_service", "ip": 0.88}, {"a": "M5_785_predictive_service", "ip": 0.88}, {"a": "M5_794_predictive_service", "ip": 0.87}, {"a": "A7_6e4144a9", "ip": 0.66}, {"a": "A7_0bf19786", "ip": 0.66}, {"a": "A7_062fb7a9", "ip": 0.66}, {"a": "A7_2168480f", "ip": 0.66}, {"a": "A7_66b5e04e", "ip": 0.66}, {"a": "A7_3a73e26d", "ip": 0.66}], "rm": [{"ph": 1, "d": "Phase 1 (Q1): Stabilise availability and de-risk high-value units. 1) Execute preventative maintenance and availability actions: prioritise MMU-705 service (risk score 0.76) and implement availability improvements on MMU-761 and 760, scheduling work in low-demand windows to minimise lost tonnes. 2) Launch foundational productivity interventions at Wildfontein and Weilaagte: The focus should be on quick wins-standardised operating procedures, operator coaching, and shift discipline-aiming for intermediate productivity targets (e.g., 6-23% up to 40-50%) rather than full 85%. 3) Start assistance-pattern diagnostics at Isibonelo, Carolina, and Dorstfontein without yet removing capacity: map actual vs. planned assistance usage and identify redundant overlaps. 4) Begin data collection for capacity target recalibration: confirm true demand, blast schedules, and mine constraints at Wildfontein, Weilaagte, Rustenburg OC, and Isibonelo."}, {"ph": 2, "d": "Phase 2 (Q2): Ramp productivity and implement first assistance optimisations. 1) Intensify productivity interventions on Wildfontein MMUs 752, 717, 731, 754 to move towards 70%+ productivity, and on Weilaagte MMU-756 and Rustenburg OC MMU-759 to close at least half the gap to 85%. 2) Implement targeted productivity uplift on Isibonelo MMU-758, coordinated with mine planning to ensure consistent loading opportunities. 3) Use improved availability on MMU-761 and 760 to support higher throughput and reduce
