        ].forEach(function(group) {
            var rows=D.os.filter(function(x){return x.g===group.key;});
            if(!rows.length) return;
            html += '<section class="op-group" aria-labelledby="op-'+group.cls+'">'
                + '<h2 class="op-group-title '+group.cls+'" id="op-'+group.cls+'">'+group.label+' <span class="tab-count">'+rows.length+'</span></h2>'
                + '<ol class="op-list">';
            rows.forEach(function(row) {
                var membership='';
                if(group.key==='ACTION' && row.portfolio_ids && row.portfolio_ids.length) {
                    membership='<span class="portfolio-membership">';
                    row.portfolio_ids.forEach(function(pid,index){
                        var label=(row.portfolio_names&&row.portfolio_names[index])||('Portfolio '+pid);
                        membership+='<button class="portfolio-link" type="button" onclick="event.stopPropagation();switchTab(\'p'+pid+'\')">'+escHtml(label)+'</button>';
                    });
                    membership+='</span>';
                }
                html += '<li class="op-item '+group.cls+'"><span class="op-rank">'+String(row.r).padStart(2,'0')+'</span>'
                    + '<span class="op-text">'+escHtml(row.b)
                    + (group.key==='ACTION'&&!row.dispatch?'<span class="no-dispatch">No dispatch authority</span>':'')
                    + membership+'</span>'
                    + (group.key==='ACTION'?'<span class="op-score">Priority '+row.p+'</span>':'')
                    + '</li>';
            });
            html += '</ol></section>';
        });
        html += '</div>';

        if(D.rq.length) {
            html += '<div class="card"><div class="card-header"><div><div class="card-title">Redeployment request decisions</div>'
                + '<div class="request-note">Ranked options are governed outputs. CONTRACT_RENEGOTIATION is not authority to dispatch.</div></div></div>'
                + '<div class="request-table-wrap"><table class="request-table"><thead><tr><th>Request</th><th>Decision</th><th>Donor</th><th>Route</th><th>Score</th><th>Recommendation</th></tr></thead><tbody>';
            D.rq.forEach(function(row){
                var statusClass=row.status.toLowerCase().replace(/_/g,'-');
                html += '<tr><td>'+escHtml(row.id)+'</td><td><span class="request-status '+statusClass+'">'+escHtml(row.status.replace(/_/g,' '))+'</span></td>'
                    + '<td>'+(row.donor?'MMU '+escHtml(row.donor):'&mdash;')+'</td>'
                    + '<td>'+escHtml(row.source)+(row.source?' &rarr; ':'')+escHtml(row.destination)+'</td>'
                    + '<td>'+row.score+'</td><td>'+escHtml(row.text)+'</td></tr>';
            });
            html += '</tbody></table></div></div>';
        }

        if(D.ff.length) {
            html += '<div class="card"><div class="card-header"><div class="card-title">Feature evidence and fallbacks</div></div><div class="feature-grid">';
            D.ff.forEach(function(feature){
                html += '<div class="feature-item '+(feature.fresh?'':'stale')+'"><div class="feature-name">'+escHtml(feature.feature)+' &mdash; '+(feature.fresh?'Current':'Fallback active')+'</div>'
                    + '<div class="feature-detail">Latest: '+escHtml(feature.period)+' &middot; '+feature.age+' days old. '+escHtml(feature.action)+'</div></div>';
            });
            html += '</div></div>';
        }

        html += '<div class="card"><div class="card-header"><div><div class="card-title">Draft a redeployment request</div>'
            + '<div class="request-note">Exports one DRAFT CSV row matching the governed workbook schema. It does not approve or modify the workbook.</div></div></div>'
            + '<form class="request-form" id="redeploymentRequestForm" onsubmit="event.preventDefault();exportRedeploymentRequest();">'
            + '<div class="request-field"><label for="requestDestination">Destination</label><input id="requestDestination" name="destination_site" list="requestSiteList" required><datalist id="requestSiteList">'
            + D.sites.map(function(site){return '<option value="'+escHtml(site)+'">';}).join('')+'</datalist></div>'
            + '<div class="request-field"><label for="requestQuantity">Quantity</label><input id="requestQuantity" name="required_mmu_count" type="number" min="1" step="1" value="1" required></div>'
            + '<div class="request-field"><label for="requestSize">Tank size (t)</label><input id="requestSize" name="required_tank_size_t" type="number" min="1" step="1" value="18" required></div>'
            + '<div class="request-field"><label for="requestType">MMU type</label><input id="requestType" name="required_mmu_type" value="Vertex A" required></div>'
            + '<div class="request-field"><label for="requestNeedBy">Need-by date</label><input id="requestNeedBy" name="need_by_date" type="date" required></div>'
            + '<div class="request-field"><label for="requestTonnes">Monthly tonnes (optional)</label><input id="requestTonnes" name="monthly_tonnes" type="number" min="0" step="0.1"></div>'
            + '<div class="request-field"><label for="requestCustomers">Customers / trials</label><input id="requestCustomers" name="customers_or_trials" placeholder="Customer A; Trial B"></div>'
            + '<div class="request-field"><label for="requestDistances">Route distances (km)</label><input id="requestDistances" name="route_distances_km" placeholder="84; 170; 200"></div>'
            + '<div class="request-field span-2"><label for="requestReason">Business reason</label><textarea id="requestReason" name="business_reason" required></textarea></div>'
            + '<div class="request-field span-2"><label for="requestRequester">Requester</label><input id="requestRequester" name="requester" required></div>'
            + '<div class="request-actions"><button class="request-export-btn" type="submit">Export draft CSV</button><span class="request-note">Operations must import, review and approve the row before the engine treats it as authoritative.</span></div>'
            + '</form></div>';

        html += '</div>';
        return html;
    }

    /* ---- PORTFOLIO TAB WRAPPER ---- */
    function buildPortfolioTab(p) {
        var html = '<div class="tab-content" id="tab-p'+p.id+'" role="tabpanel" aria-labelledby="btn-p'+p.id+'">';

        // Banner
        var badgeClass = p.st==='policy' ? 'policy' : '';
        html += '<div class="portfolio-banner">'
            + '<h2>'+p.nm+' <span class="scenario-badge '+badgeClass+'">'+(p.st==='policy'?'Policy Scenario':'Diversity Portfolio')+'</span></h2>'
            + '<p><strong>Strategy:</strong> '+(p.pa||'N/A')+'</p>'
            + '</div>';

        // Sub-tab bar
        html += '<div class="sub-tab-bar" role="tablist" aria-label="Portfolio views">'
            + '<button class="sub-tab-btn active" role="tab" aria-selected="true" data-subtab="overview" onclick="switchSubTab('+p.id+',\'overview\')">&#9632; Overview</button>'
            + '<button class="sub-tab-btn" role="tab" aria-selected="false" data-subtab="actions" onclick="switchSubTab('+p.id+',\'actions\')">&#9776; Actions & Analysis</button>'
            + '<button class="sub-tab-btn" role="tab" aria-selected="false" data-subtab="risk" onclick="switchSubTab('+p.id+',\'risk\')">&#9888; Risk & Implementation</button>'
            + '</div>';

        html += buildOverviewView(p);
        html += buildActionsView(p);
        html += buildRiskView(p);

        html += '</div>';
        return html;
    }

    /* ---- OVERVIEW SUB-TAB ---- */
    function buildOverviewView(p) {
        var html = '<div class="sub-content active" id="sub-'+p.id+'-overview">';

        // Stats grid
        var highRisk = (p.rp['High']||0)+(p.rp['Critical']||0);
        var leversActive = 0;
        for(var lev=1;lev<=8;lev++) if((p.ld[String(lev)]||0)>0) leversActive++;
        var topLK='1',topLV=0;
        for(var lev=1;lev<=8;lev++){var v=p.ld[String(lev)]||0;if(v>topLV){topLK=String(lev);topLV=v;}}

        html += '<div class="stats-grid stats-grid-6">'
            + '<div class="stat-item red"><div class="stat-value accent-red">'+p.ac+'</div><div class="stat-label">Actions</div></div>'
            + '<div class="stat-item green"><div class="stat-value accent-green">'+p.ap+'%</div><div class="stat-label">Avg Probability</div></div>'
            + '<div class="stat-item amber"><div class="stat-value accent-amber">'+highRisk+'</div><div class="stat-label">High Risk</div></div>'
            + '<div class="stat-item blue"><div class="stat-value accent-blue">'+leversActive+'</div><div class="stat-label">Levers Active</div></div>'
            + '<div class="stat-item purple"><div class="stat-value accent-purple">'+p.mp+'%</div><div class="stat-label">Margin Share</div></div>'
            + '<div class="stat-item red"><div class="stat-value" style="color:'+LEVER_COLORS[topLK]+'">'+topLV+'</div><div class="stat-label">Top: '+(LEVER_NAMES[topLK]||'')+'</div></div>'
            + '</div>';

        // Waterfall + Lever cards
        html += '<div class="two-col">';
        html += '<div class="card">'
            + '<div class="card-header"><div class="card-title"><span class="icon">&#9650;</span> Lever Impact Waterfall</div></div>'
            + '<div class="chart-box" role="img" aria-label="Waterfall chart showing lever contributions for '+p.nm+'"><canvas id="wf-'+p.id+'" aria-hidden="true"></canvas></div>'
            + '</div>';

        html += '<div class="card">'
            + '<div class="card-header"><div class="card-title"><span class="icon">&#9632;</span> Lever Breakdown</div></div>'
            + '<div class="lever-grid">';
        for(var lev=1;lev<=8;lev++){
            var cnt=p.ld[String(lev)]||0;
            if(cnt===0) continue;
            var wfItem=p.wf.find(function(w){return w.l===lev;});
            var ip=wfItem?wfItem.ip:0;
            var meta=D.ls.find(function(l){return l.l===lev;});
            var ap=meta?meta.ap:0;
            var c=LEVER_COLORS[lev];
            html += '<div class="lever-card">'
                + '<div style="position:absolute;top:0;left:0;width:3px;height:100%;background:'+c+';border-radius:8px 0 0 8px;"></div>'
                + '<div class="lever-card-name" style="padding-left:.3rem;">'+(LEVER_NAMES[lev]||'L'+lev)+'</div>'
                + '<div class="lever-card-stats">'
                + '<div class="lever-card-stat"><div class="lever-card-stat-val" style="color:'+c+'">'+cnt+'</div><div class="lever-card-stat-lbl">Actions</div></div>'
                + '<div class="lever-card-stat"><div class="lever-card-stat-val">'+ip+'%</div><div class="lever-card-stat-lbl">Impact</div></div>'
                + '<div class="lever-card-stat"><div class="lever-card-stat-val" style="color:'+probColor(ap)+'">'+ap+'%</div><div class="lever-card-stat-lbl">Prob.</div></div>'
                + '</div>'
                + '<div class="lever-card-bar"><div class="lever-card-bar-fill" style="width:'+ip+'%;background:'+c+';"></div></div>'
                + '</div>';
        }
        html += '</div></div>';
        html += '</div>';

        // Strategy narrative
        html += '<div class="card">'
            + '<div class="card-header"><div class="card-title"><span class="icon">&#9670;</span> Strategic Alignment</div></div>'
            + '<div class="exec-section"><h3>'+p.nm+' — Productivity Alignment</h3><p>'+(p.pa||'N/A')+'</p></div>'
            + '<div class="exec-section"><h3>'+p.nm+' — Cost Reduction Alignment</h3><p>'+(p.ca||'N/A')+'</p></div>'
            + (p.ks?'<div class="exec-section"><h3>Key Synergies</h3><p>'+p.ks+'</p></div>':'')
            + (p.kt?'<div class="exec-section"><h3>Key Trade-offs</h3><p>'+p.kt+'</p></div>':'')
            + '</div>';

        html += '</div>';
        return html;
    }

    /* ---- ACTIONS & ANALYSIS SUB-TAB ---- */
    function buildActionsView(p) {
        var html = '<div class="sub-content" id="sub-'+p.id+'-actions">';

        // Tornado chart
        html += '<div class="card">'
            + '<div class="card-header"><div class="card-title"><span class="icon">&#9650;</span> Impact Range by Lever (Sensitivity)</div></div>'
            + '<div class="chart-box" role="img" aria-label="Tornado chart showing impact range per lever for '+p.nm+'"><canvas id="tornado-'+p.id+'" aria-hidden="true" style="max-height:220px;"></canvas></div>'
            + '</div>';

        // Filter bar
        html += '<div class="card">'
            + '<div class="card-header">'
            + '<div class="card-title"><span class="icon">&#9632;</span> Action Breakdown ('+p.ar.length+' actions)</div>'
            + '<button class="copy-btn" data-copy="tbl-'+p.id+'" onclick="copyTableToClipboard(\'tbl-'+p.id+'\')">Copy Table</button>'
            + '</div>'
            + '<div class="filter-bar">'
            + '<label class="filter-label">Lever:</label>'
            + '<select class="filter-select" onchange="applyFilters('+p.id+')" id="fl-'+p.id+'" aria-label="Filter by lever">'
            + '<option value="all">All Levers</option>';
        for(var lev=1;lev<=8;lev++) html+='<option value="'+lev+'">'+LEVER_FULL[lev]+'</option>';
        html += '</select>'
            + '<label class="filter-label">Risk:</label>'
            + '<select class="filter-select" onchange="applyFilters('+p.id+')" id="fr-'+p.id+'" aria-label="Filter by risk">'
            + '<option value="all">All Risk</option><option value="Low">Low</option><option value="Medium">Medium</option><option value="High">High</option><option value="Critical">Critical</option>'
            + '</select>'
            + '<input type="text" class="search-input" placeholder="Search actions..." oninput="applyFilters('+p.id+')" id="fs-'+p.id+'" aria-label="Search actions">'
            + '<span class="filter-count" id="fc-'+p.id+'">'+p.ar.length+' of '+p.ar.length+'</span>'
            + '</div>';

        // Action table
        html += '<div class="action-table-wrap"><table class="action-table" id="tbl-'+p.id+'">'
            + '<thead><tr><th>Type</th><th>Target</th><th>Movement</th><th>Lever</th><th>Impact</th><th>Probability</th><th>Risk</th><th></th></tr></thead><tbody>';
        p.ar.forEach(function(ref) {
            var a = D.ua[ref.a];
            if(!a) return;
            var move = a.fs&&a.ts ? a.fs+' -> '+a.ts : (a.ts||'-');
            var searchText = (actionTypeName(a.t)+' '+a.e+' '+move+' '+(a.x||'')).toLowerCase();
            html += '<tr data-lever="'+a.l+'" data-risk="'+a.rl+'" data-search="'+searchText.replace(/"/g,'&quot;')+'" class="action-row" onclick="toggleActionDetail(\'det-'+p.id+'-'+ref.a+'\')" style="cursor:pointer;">'
                + '<td style="color:var(--text-primary);font-weight:500;">'+actionTypeName(a.t)+'</td>'
                + '<td style="font-family:\'Roboto Mono\',monospace;font-weight:600;">'+(a.e||'-')+'</td>'
                + '<td style="font-size:.6rem;">'+move+'</td>'
                + '<td>'+leverBadge(a.l)+'</td>'
                + '<td><span style="font-family:\'Roboto Mono\',monospace;font-weight:600;">'+ref.ip+'%</span><span class="impact-bar" style="width:'+Math.min(ref.ip*3,80)+'px"></span></td>'
                + '<td><span style="font-family:\'Roboto Mono\',monospace;font-weight:600;color:'+probColor(a.p)+'">'+a.p+'%</span><span class="prob-bar" style="width:'+a.p*0.6+'px;background:'+probColor(a.p)+'"></span></td>'
                + '<td>'+riskBadge(a.rl)+'</td>'
                + '<td style="color:var(--text-muted);font-size:.7rem;">&#9660;</td>'
                + '</tr>';
            var rk=D.rk[ref.a]||{};
            var nr=D.nr[ref.a]||{};
            html += '<tr class="action-detail-row" id="det-'+p.id+'-'+ref.a+'" style="display:none;">'
                + '<td colspan="8" style="padding:0;"><div style="padding:.8rem;background:var(--bg-card);">'
                + '<p style="font-size:.68rem;color:var(--text-secondary);line-height:1.6;margin-bottom:.4rem;">'+(a.x||'No description available.')+'</p>';
            if(rk.tr) html += '<div style="margin-top:.4rem;"><span style="font-size:.6rem;font-weight:700;color:var(--text-primary);">Top Risk: </span><span style="font-size:.65rem;color:var(--text-secondary);">'+rk.tr+(rk.tp?' ('+rk.tp+'% probability)':'')+'</span></div>';
            if(rk.tm) html += '<div><span style="font-size:.6rem;font-weight:700;color:var(--text-primary);">Mitigation: </span><span style="font-size:.65rem;color:var(--text-secondary);">'+rk.tm+'</span></div>';
            // Audience tabs
            if(nr.es||nr.ob||nr.fb||nr.mb) {
                html += '<div style="margin-top:.6rem;">'
                    + '<div class="sh-tabs">'
                    + '<button class="sh-tab active" onclick="switchSH(this,\'nr-'+p.id+'-'+ref.a+'-ex\')">Executive</button>'
                    + '<button class="sh-tab" onclick="switchSH(this,\'nr-'+p.id+'-'+ref.a+'-op\')">Operations</button>'
                    + '<button class="sh-tab" onclick="switchSH(this,\'nr-'+p.id+'-'+ref.a+'-fi\')">Finance</button>'
                    + '<button class="sh-tab" onclick="switchSH(this,\'nr-'+p.id+'-'+ref.a+'-mt\')">Maintenance</button>'
                    + '</div>'
                    + '<div class="sh-content active" id="nr-'+p.id+'-'+ref.a+'-ex">'+(nr.es||'N/A')+'</div>'
                    + '<div class="sh-content" id="nr-'+p.id+'-'+ref.a+'-op">'+(nr.ob||'N/A')+'</div>'
                    + '<div class="sh-content" id="nr-'+p.id+'-'+ref.a+'-fi">'+(nr.fb||'N/A')+'</div>'
                    + '<div class="sh-content" id="nr-'+p.id+'-'+ref.a+'-mt">'+(nr.mb||'N/A')+'</div>'
                    + '</div>';
            }
            html += '</div></td></tr>';
        });
        html += '</tbody></table></div></div>';

        // Top 10 deep dives
        html += '<div class="section-title"><span class="dot"></span> Top Actions - Deep Dive</div>';
        var topActions = p.ar.slice(0,10);
        topActions.forEach(function(ref) {
            var a=D.ua[ref.a]; var n=D.nr[ref.a]; var r=D.rk[ref.a];
            if(!a||!n) return;
            html += '<div class="accordion-item">'
                + '<div class="accordion-header" onclick="toggleAccordion(this)" tabindex="0" role="button" aria-expanded="false">'
                + '<h4>'+leverBadge(a.l)+' '+actionTypeName(a.t)+' - '+(a.e||'N/A')+' <span style="color:var(--text-muted);font-weight:400;font-size:.6rem;margin-left:.5rem;">'+ref.ip+'% impact</span> '+riskBadge(a.rl)+'</h4>'
                + '<span class="chevron">&#9660;</span></div>'
                + '<div class="accordion-body">'
                + (n.es?'<div class="sub-title">Executive Summary</div><p>'+n.es+'</p>':'')
                + (n.dd?'<div class="sub-title">Detailed Description</div><p>'+n.dd.replace(/\n/g,'<br>')+'</p>':'')
                + (n.wi?'<div class="sub-title">What-If Analysis</div><p>'+n.wi.replace(/\n/g,'<br>')+'</p>':'')
                + (r&&r.tr?'<div class="sub-title">Top Operational Risk</div><p>'+r.tr+' <span style="color:var(--accent-amber);">'+(r.tp?'('+r.tp+'% probability)':'')+'</span></p>':'')
                + (r&&r.tm?'<div class="sub-title">Mitigation Strategy</div><p>'+r.tm+'</p>':'')
                + '<div style="margin-top:.6rem;">'
                + '<div class="sh-tabs">'
                + '<button class="sh-tab active" onclick="switchSH(this,\'dd-'+p.id+'-'+ref.a+'-ops\')">Operations</button>'
                + '<button class="sh-tab" onclick="switchSH(this,\'dd-'+p.id+'-'+ref.a+'-fin\')">Finance</button>'
                + '<button class="sh-tab" onclick="switchSH(this,\'dd-'+p.id+'-'+ref.a+'-mnt\')">Maintenance</button>'
                + '</div>'
                + '<div class="sh-content active" id="dd-'+p.id+'-'+ref.a+'-ops">'+(n.ob||'N/A')+'</div>'
                + '<div class="sh-content" id="dd-'+p.id+'-'+ref.a+'-fin">'+(n.fb||'N/A')+'</div>'
                + '<div class="sh-content" id="dd-'+p.id+'-'+ref.a+'-mnt">'+(n.mb||'N/A')+'</div>'
                + '</div></div></div>';
        });

        html += '</div>';
        return html;
    }

    /* ---- RISK & IMPLEMENTATION SUB-TAB ---- */
    function buildRiskView(p) {
        var html = '<div class="sub-content" id="sub-'+p.id+'-risk">';

        // Two-col: Risk scatter + Risk bar
        html += '<div class="two-col">';
        html += '<div class="card">'
            + '<div class="card-header"><div class="card-title"><span class="icon">&#9888;</span> Risk Matrix</div></div>'
            + '<div class="chart-box" role="img" aria-label="Scatter chart plotting probability vs risk score for actions in '+p.nm+'"><canvas id="scatter-'+p.id+'" aria-hidden="true"></canvas></div>'
            + '</div>';
        html += '<div class="card">'
            + '<div class="card-header"><div class="card-title"><span class="icon">&#9632;</span> Risk Distribution</div></div>'
            + '<div class="chart-box" role="img" aria-label="Bar chart of risk level distribution for '+p.nm+'"><canvas id="riskbar-'+p.id+'" aria-hidden="true"></canvas></div>'
            + '</div>';
        html += '</div>';

        // Risk profile cards
        html += '<div class="section-title"><span class="dot"></span> Risk Profile</div>';
        html += '<div class="risk-cards">';
        var riskColors = {'Low':'var(--accent-green)','Medium':'var(--accent-amber)','High':'var(--accent-red-light)','Critical':'#ef4444'};
        ['Low','Medium','High','Critical'].forEach(function(level) {
            var count = p.rp[level]||0;
            if(count===0) return;
            var c = riskColors[level];
            // Find top 3 actions at this risk level
            var levelActions = p.ar.filter(function(ref){var a=D.ua[ref.a];return a&&a.rl===level;}).slice(0,3);
            html += '<div class="risk-card">'
                + '<div style="position:absolute;top:0;left:0;width:3px;height:100%;background:'+c+';border-radius:8px 0 0 8px;"></div>'
                + '<div class="risk-card-header" style="padding-left:.3rem;">'
                + '<div class="risk-card-title" style="color:'+c+'">'+level+' Risk</div>'
                + '<div class="risk-card-count" style="color:'+c+'">'+count+'</div>'
                + '</div>'
                + '<div class="risk-card-body">';
            levelActions.forEach(function(ref) {
                var a=D.ua[ref.a]; var rk=D.rk[ref.a]||{};
                if(!a) return;
                html += '<div class="risk-card-item">'
                    + '<div style="font-weight:600;color:var(--text-primary);font-size:.62rem;">'+actionTypeName(a.t)+' - '+(a.e||'N/A')+'</div>'
                    + (rk.tr?'<div style="font-size:.58rem;margin-top:.1rem;">'+truncate(rk.tr,200)+'</div>':'')
                    + (rk.tm?'<div style="font-size:.58rem;color:var(--accent-green);margin-top:.1rem;">Mitigation: '+truncate(rk.tm,150)+'</div>':'')
                    + '</div>';
            });
            html += '</div></div>';
        });
        html += '</div>';

        // Implementation roadmap
        if (p.rm && p.rm.length>0) {
            html += '<div class="section-title"><span class="dot"></span> Implementation Roadmap</div>';
            var currentQ = Math.ceil((new Date().getMonth()+1)/3);
            html += '<div class="timeline">';
            p.rm.forEach(function(phase,i) {
                var isActive = (phase.ph===currentQ);
                html += '<div class="timeline-phase '+(isActive?'active':'')+'">'
                    + '<div class="timeline-phase-num">Phase '+phase.ph+'</div>'
                    + '<div class="timeline-phase-text">'+(phase.d||'').replace(/\n/g,'<br>')+'</div>'
                    + '</div>';
            });
            html += '</div>';
        }

        // Stakeholder briefings
        if (p.sb && Object.keys(p.sb).length>0) {
            html += '<div class="card">'
                + '<div class="card-header"><div class="card-title"><span class="icon">&#9670;</span> Stakeholder Briefings</div></div>'
                + '<div class="sh-tabs">';
            var sKeys = Object.keys(p.sb);
            sKeys.forEach(function(s,i) { html += '<button class="sh-tab '+(i===0?'active':'')+'" onclick="switchSH(this,\'sh-'+p.id+'-'+s.replace(/\s/g,'')+'\')">'+s+'</button>'; });
            html += '</div>';
            sKeys.forEach(function(s,i) { html += '<div class="sh-content '+(i===0?'active':'')+'" id="sh-'+p.id+'-'+s.replace(/\s/g,'')+'">'+(p.sb[s]||'').replace(/\n/g,'<br>')+'</div>'; });
            html += '</div>';
        }

        html += '</div>';
        return html;
    }

    /* ---- EVENT HANDLERS ---- */
    function toggleAccordion(header) {
        header.classList.toggle('open');
        header.setAttribute('aria-expanded', header.classList.contains('open'));
        var body = header.nextElementSibling;
        body.classList.toggle('open');
    }

    function toggleActionDetail(id) {
        var row = document.getElementById(id);
        if(row) row.style.display = row.style.display==='none' ? 'table-row' : 'none';
    }

    function switchSH(btn,contentId) {
        var parent = btn.parentElement;
        parent.querySelectorAll('.sh-tab').forEach(function(t){t.classList.remove('active');});
        btn.classList.add('active');
        var container = parent.parentElement;
        container.querySelectorAll('.sh-content').forEach(function(c){c.classList.remove('active');});
        var el = document.getElementById(contentId);
        if(el) el.classList.add('active');
    }

    function toggleCompView(view,btn) {
        btn.parentElement.querySelectorAll('.comp-toggle-btn').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active');
        document.querySelectorAll('.comp-view').forEach(function(v){v.classList.remove('active');});
        var el = document.getElementById('comp-'+view);
        if(el) el.classList.add('active');
        if(view==='sidebyside') updateComparison();
    }

    /* ---- FILTERING ---- */
    var filterTimers = {};
    function applyFilters(pid) {
        clearTimeout(filterTimers[pid]);
        filterTimers[pid] = setTimeout(function() {
            var leverVal = document.getElementById('fl-'+pid).value;
            var riskVal = document.getElementById('fr-'+pid).value;
            var searchVal = (document.getElementById('fs-'+pid).value||'').toLowerCase();
            var table = document.getElementById('tbl-'+pid);
            if(!table) return;
            var rows = table.querySelectorAll('tbody tr.action-row');
            var shown = 0;
            rows.forEach(function(row) {
                var detailRow = row.nextElementSibling;
                var show = true;
                if(leverVal!=='all' && row.dataset.lever!==leverVal) show=false;
                if(riskVal!=='all' && row.dataset.risk!==riskVal) show=false;
                if(searchVal && row.dataset.search.indexOf(searchVal)===-1) show=false;
                row.style.display = show ? '' : 'none';
                if(detailRow && detailRow.classList.contains('action-detail-row')) detailRow.style.display='none';
                if(show) shown++;
            });
            var fc = document.getElementById('fc-'+pid);
            if(fc) fc.textContent = shown+' of '+rows.length;
        }, 200);
    }

    /* ---- COPY TO CLIPBOARD ---- */
    function copyTableToClipboard(tableId) {
        var table = document.getElementById(tableId);
        if(!table) return;
        var rows = table.querySelectorAll('tr');
        var tsv = '';
        rows.forEach(function(row) {
            if(row.style.display==='none') return;
            if(row.classList.contains('action-detail-row')) return;
            var cells = row.querySelectorAll('th,td');
            var rowData = [];
            cells.forEach(function(cell){rowData.push(cell.textContent.trim().replace(/\t/g,' '));});
            tsv += rowData.join('\t')+'\n';
        });
        navigator.clipboard.writeText(tsv).then(function(){
            var btn = document.querySelector('[data-copy="'+tableId+'"]');
            if(btn){var orig=btn.textContent;btn.textContent='Copied!';setTimeout(function(){btn.textContent=orig;},2000);}
        }).catch(function(){});
    }

    /* ---- COMPARISON MODULE ---- */
    function buildComparisonBars(selected) {
        var panel=document.getElementById('compBarsPanel');
        if(!panel) return;
        var html='';
        for(var lever=1;lever<=8;lever++) {
            var rows=selected.map(function(pid){
                var p=D.p.find(function(item){return item.id===pid;});
                return {p:p,count:p?(p.ld[String(lever)]||0):0};
            });
            var maximum=Math.max.apply(null,rows.map(function(row){return row.count;}));
            html+='<section class="comparison-lever-group"><div class="comparison-lever-title">'+LEVER_FULL[lever]+'</div>';
            rows.forEach(function(row,index){
                if(!row.p) return;
                var width=maximum>0?row.count/maximum*100:0;
                var coverage=D.lc.find(function(item){return item.pid===row.p.id&&item.l===lever;})||{zero:'No coverage data'};
                html+='<div class="comparison-bar-row" title="'+escHtml(row.count?row.count+' selected actions':coverage.zero)+'">'
                    +'<span>'+escHtml(row.p.nm)+'</span><div class="comparison-bar-track"><div class="comparison-bar-fill" style="width:'+width+'%;background:'+COMP_COLORS[index]+'"></div></div><strong>'+row.count+'</strong></div>';
            });
            html+='</section>';
        }
        panel.innerHTML=html;
    }

    function updateComparison() {
        var selected = [];
        document.querySelectorAll('.comp-check:checked').forEach(function(cb){
            selected.push(parseInt(cb.value));
        });
        if(selected.length>4) return;
        if(selected.length===0) return;
        comparisonSelection = selected;

        buildComparisonBars(selected);

        // Build stat columns
        var panel = document.getElementById('compStatsPanel');
        if(!panel) return;
        var h = '<div style="display:grid;grid-template-columns:repeat('+selected.length+',1fr);gap:.5rem;">';
        selected.forEach(function(pid,i) {
            var p = D.p.find(function(x){return x.id===pid;});
            if(!p) return;
            var hr = (p.rp['High']||0)+(p.rp['Critical']||0);
            h += '<div class="card" style="border-top:3px solid '+COMP_COLORS[i]+'">'
                + '<div style="font-size:.7rem;font-weight:700;color:'+COMP_COLORS[i]+';margin-bottom:.5rem;">'+p.nm+'</div>'
                + '<div style="font-size:.58rem;color:var(--text-muted);margin-bottom:.2rem;">ACTIONS</div><div style="font-size:1rem;font-weight:800;font-family:\'Roboto Mono\',monospace;">'+p.ac+'</div>'
                + '<div style="font-size:.58rem;color:var(--text-muted);margin-top:.4rem;margin-bottom:.2rem;">AVG PROB.</div><div style="font-size:1rem;font-weight:800;font-family:\'Roboto Mono\',monospace;color:'+probColor(p.ap)+'">'+p.ap+'%</div>'
                + '<div style="font-size:.58rem;color:var(--text-muted);margin-top:.4rem;margin-bottom:.2rem;">HIGH RISK</div><div style="font-size:1rem;font-weight:800;font-family:\'Roboto Mono\',monospace;color:var(--accent-amber);">'+hr+'</div>'
                + '<div style="font-size:.58rem;color:var(--text-muted);margin-top:.4rem;margin-bottom:.2rem;">MARGIN</div><div style="font-size:1rem;font-weight:800;font-family:\'Roboto Mono\',monospace;">'+p.mp+'%</div>'
                + '</div>';
        });
        h += '</div>';
        panel.innerHTML = h;
    }

    /* ---- CHART RENDERERS ---- */
    function renderWaterfall(canvasId, wfData) {
        var key = canvasId;
        if(charts[key]) return;
        var ctx = document.getElementById(canvasId);
        if(!ctx) return;

        var labels = wfData.map(function(d){return LEVER_NAMES[d.l]||'L'+d.l;});
        labels.push('Total');
        var values = wfData.map(function(d){return d.ip;});
        var totalPct = values.reduce(function(a,b){return a+b;},0);
        values.push(Math.round(totalPct*10)/10);
        var bases = [];
        var cum = 0;
        wfData.forEach(function(d){bases.push(cum);cum+=d.ip;});
        bases.push(0);
        var colors = wfData.map(function(d){return LEVER_COLORS[d.l]||'#666';});
        colors.push('#f0f0f2');

        charts[key] = new Chart(ctx, {
            type:'bar',
            data:{
                labels:labels,
                datasets:[
                    {label:'Base',data:bases,backgroundColor:'transparent',borderWidth:0,borderSkipped:false},
                    {label:'Value',data:values,backgroundColor:colors,borderWidth:0,borderRadius:3}
                ]
            },
            options:{
                responsive:true, maintainAspectRatio:false,
                scales:{
                    x:{stacked:true,grid:{display:false},ticks:{color:'#9ca3af',font:{size:9}}},
                    y:{stacked:true,grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10},callback:function(v){return v+'%';}}}
                },
                plugins:{
                    legend:{display:false},
                    tooltip:{callbacks:{label:function(ctx){if(ctx.datasetIndex===0)return '';return ctx.parsed.y+'% of total impact';}}},
                    datalabels:{display:function(ctx){return ctx.datasetIndex===1;},color:'#f0f0f2',anchor:'end',align:'end',font:{size:9,weight:600},formatter:function(v){return v>1?v+'%':'';}}
                }
            }
        });
    }

    function renderTornado(canvasId, tnData) {
        var key = canvasId;
        if(charts[key]) return;
        var ctx = document.getElementById(canvasId);
        if(!ctx) return;
        if(!tnData||tnData.length===0) return;

        var labels = tnData.map(function(d){return LEVER_NAMES[d.l]||'L'+d.l;});
        var downside = tnData.map(function(d){return Math.round((d.lo-d.avg)*100)/100;});
        var upside = tnData.map(function(d){return Math.round((d.hi-d.avg)*100)/100;});

        charts[key] = new Chart(ctx, {
            type:'bar',
            data:{
                labels:labels,
                datasets:[
                    {label:'Downside',data:downside,backgroundColor:'rgba(248,113,113,0.7)',borderColor:'#f87171',borderWidth:1,borderRadius:3},
                    {label:'Upside',data:upside,backgroundColor:'rgba(74,222,128,0.7)',borderColor:'#4ade80',borderWidth:1,borderRadius:3}
                ]
            },
            options:{
                responsive:true, maintainAspectRatio:false, indexAxis:'y',
                scales:{
                    x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10},callback:function(v){return v+'%';}}},
                    y:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:10}}}
                },
                plugins:{
                    legend:{labels:{color:'#9ca3af',font:{size:10}}},
                    tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.x+'% from average';}}},
                    annotation:{annotations:{zeroLine:{type:'line',xMin:0,xMax:0,borderColor:'rgba(255,255,255,0.3)',borderWidth:1,borderDash:[4,4]}}}
                }
            }
        });
    }

    function renderRiskScatter(canvasId, scatterData) {
        var key = canvasId;
        if(charts[key]) return;
        var ctx = document.getElementById(canvasId);
        if(!ctx) return;
        if(!scatterData||scatterData.length===0) return;

        var datasets = {};
        scatterData.forEach(function(d) {
            var lev = d.l;
            if(!datasets[lev]) datasets[lev]={label:LEVER_NAMES[lev]||'L'+lev,data:[],backgroundColor:LEVER_COLORS[lev]||'#666',pointRadius:[]};
            datasets[lev].data.push({x:d.p,y:d.rs});
            datasets[lev].pointRadius.push(Math.max(4,Math.min(16,d.ip*1.5)));
        });
        var dsArr = Object.values(datasets);

        charts[key] = new Chart(ctx, {
            type:'scatter',
            data:{datasets:dsArr},
            options:{
                responsive:true, maintainAspectRatio:false,
                scales:{
                    x:{title:{display:true,text:'Success Probability (%)',color:'#9ca3af',font:{size:10}},min:0,max:100,grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10}}},
                    y:{title:{display:true,text:'Risk Score',color:'#9ca3af',font:{size:10}},min:0,max:1,grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10}}}
                },
                plugins:{
                    legend:{labels:{color:'#9ca3af',font:{size:9}},position:'bottom'},
                    tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': Prob='+ctx.parsed.x+'%, Risk='+ctx.parsed.y;}}},
                    annotation:{annotations:{
                        vLine:{type:'line',xMin:50,xMax:50,borderColor:'rgba(255,255,255,0.15)',borderWidth:1,borderDash:[4,4]},
                        hLine:{type:'line',yMin:0.5,yMax:0.5,borderColor:'rgba(255,255,255,0.15)',borderWidth:1,borderDash:[4,4]}
                    }}
                }
            }
        });
    }

    function renderComparisonRadar(canvasId, pids) {
        var key = 'compRadar';
        var ctx = document.getElementById(canvasId);
        if(!ctx) return;

        var datasets = [];
        pids.forEach(function(pid,i) {
            var p = D.p.find(function(x){return x.id===pid;});
            if(!p) return;
            var total=0;
            for(var lev=1;lev<=8;lev++) total+=(p.ld[String(lev)]||0);
            var data=[];
            for(var lev=1;lev<=8;lev++) data.push(((p.ld[String(lev)]||0)/total*100).toFixed(1));
            datasets.push({
                label:p.nm,data:data,
                borderColor:COMP_COLORS[i],backgroundColor:COMP_COLORS[i]+'15',
                pointBackgroundColor:COMP_COLORS[i],borderWidth:2,pointRadius:3
            });
        });

        charts[key] = new Chart(ctx, {
            type:'radar',
            data:{labels:Object.values(LEVER_NAMES),datasets:datasets},
            options:{
                responsive:true,
                scales:{r:{grid:{color:'rgba(255,255,255,0.08)'},angleLines:{color:'rgba(255,255,255,0.08)'},pointLabels:{color:'#9ca3af',font:{size:10}},ticks:{display:false},beginAtZero:true}},
                plugins:{legend:{labels:{color:'#9ca3af',font:{size:10}}}}
            }
        });
    }

    function renderLeverDoughnut() {
        if(charts['leverDoughnut']) return;
        var ctx = document.getElementById('leverDoughnut');
        if(!ctx) return;
        charts['leverDoughnut'] = new Chart(ctx, {
            type:'doughnut',
            data:{
                labels:D.ls.map(function(l){return l.s;}),
                datasets:[{data:D.ls.map(function(l){return l.ip;}),backgroundColor:D.ls.map(function(l){return l.c;}),borderColor:'#2b2f38',borderWidth:2}]
            },
            options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+ctx.parsed+'% of total impact';}}}},cutout:'55%'}
        });
    }

    function renderRiskBar(pid) {
        var key='riskbar-'+pid;
        if(charts[key]) return;
        var ctx = document.getElementById(key);
        if(!ctx) return;
        var p = D.p.find(function(x){return x.id===pid;});
        if(!p) return;
        var levels=['Low','Medium','High','Critical'];
        var colors=['#22c55e','#f59e0b','#c41e3a','#ef4444'];
        var data=levels.map(function(l){return p.rp[l]||0;});
        charts[key] = new Chart(ctx, {
            type:'bar',
            data:{labels:levels,datasets:[{data:data,backgroundColor:colors.map(function(c){return c+'88';}),borderColor:colors,borderWidth:1,borderRadius:4}]},
            options:{
                responsive:true,indexAxis:'y',
                scales:{
                    x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#9ca3af',font:{family:'Roboto Mono',size:10}}},
                    y:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:11}}}
                },
                plugins:{
                    legend:{display:false},
                    tooltip:{callbacks:{label:function(ctx){return ctx.parsed.x+' actions';}}},
                    datalabels:{display:true,color:'#f0f0f2',anchor:'end',align:'end',font:{size:10,weight:600},formatter:function(v){return v>0?v:'';}}
                }
            }
        });
    }

    /* ---- CHART ROUTING ---- */
    function renderChartsForTab(tabId) {
        if(tabId==='exec') {
            renderWaterfall('execWaterfall',D.ls.map(function(l){return {l:l.l,ip:l.ip};}).sort(function(a,b){return b.ip-a.ip;}));
        } else if(tabId==='ops') {
            return;
        } else {
            var pid = parseInt(tabId.replace('p',''));
            renderChartsForSubTab(pid,'overview');
        }
    }

    function renderChartsForSubTab(pid,subTab) {
        var p = D.p.find(function(x){return x.id===pid;});
        if(!p) return;
        if(subTab==='overview') {
            renderWaterfall('wf-'+pid, p.wf);
        } else if(subTab==='actions') {
            renderTornado('tornado-'+pid, p.tn);
        } else if(subTab==='risk') {
            renderRiskScatter('scatter-'+pid, p.sc);
            renderRiskBar(pid);
        }
    }

    /* ---- KEYBOARD SUPPORT ---- */
    document.addEventListener('keydown',function(e) {
        if(e.key==='Enter'||e.key===' ') {
            var el = document.activeElement;
            if(el&&el.classList.contains('accordion-header')) { e.preventDefault(); toggleAccordion(el); }
        }
    });

    /* ---- INIT ---- */
    function init() {
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-ZA',{year:'numeric',month:'short',day:'numeric'});
        document.getElementById('portfolioCountBadge').textContent = D.p.length+' PORTFOLIOS';
        buildTabBar();
        var contentHtml = buildExecTab()+buildOperationalTab();
        D.p.forEach(function(p){contentHtml+=buildPortfolioTab(p);});
        document.getElementById('contentArea').innerHTML = contentHtml;
        renderChartsForTab('exec');
    }

document.addEventListener('DOMContentLoaded',init);
    </script>
